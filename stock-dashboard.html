week":4.45},"sections":{"resumen":"CCU llega a julio 2026 como un claro rezagado del rally chileno: mientras el IPSA encadena máximos históricos, la acción opera ~20% bajo su máximo de 52 semanas ($6.598) tras un año bajista, aunque en las últimas semanas construye una base sobre los $5.000 con el MACD recién cruzado al alza. La tesis tiene tres patas: un negocio en Chile que opera muy bien (EBITDA +13,7% en 1T26, margen 20%, viento a favor del peso fuerte), dos lastres visibles (Argentina con EBITDA −18,6% y Vinos con −50,1%) y una valuación ~20% por debajo de su promedio histórico de 10 años. El consenso es tibio (Hold/Neutral, target $5.877) pero con dispersión extrema: BICE ve +52% ($7.794) y UBS recomienda vender ($4.750). Catalizadores inmediatos: resultados 2T26 el 6-ago y las primeras señales del nuevo CEO Eduardo Ffrench-Davis, que asumió el 1-jul con foco declarado en márgenes y eficiencia.","fundamental":"**Resultados 1T26** (reportados 6/7-may-2026):\n\n- HECHO: Ventas consolidadas CLP 819.515 millones (+0,2% a/a); EBITDA CLP 131.644 millones (+0,1%), margen estable en 16,1%; utilidad controladora CLP 53.856 millones (−6,8%, ~US$58M); UPA CLP 145,8; volúmenes consolidados +1,8% (press release 1Q26 / TipRanks / La Tercera, may-2026).\n- HECHO — **Chile, el motor**: ventas +3,9%, EBITDA +13,7% a CLP 107.357 millones, margen 20,0% (+173 pb), ayudado por la apreciación del CLP de 8,1% vs USD (menores costos dolarizados) y volúmenes +3,9% liderados por categorías no alcohólicas (press release 1Q26, may-2026).\n- HECHO — **Negocios Internacionales** (Argentina, Bolivia, Paraguay, Uruguay): ventas −6,7%, EBITDA −18,6% a CLP 28.489 millones; volúmenes −1,7% con caída de un dígito medio en cerveza en Argentina (press release 1Q26).\n- HECHO — **Vinos**: ventas −7,2%, EBITDA −50,1% a CLP 3.288 millones (margen −508 pb) por mayor costo del vino y sobreoferta global (~US$19B de inventario excedente en la industria) (press release 1Q26; DF, 12-jun-2026).\n- HECHO: TTM en USD (ADR): revenue US$3,13B (−2,2%), utilidad neta US$121,8M (−32,0%); ROE 7,3-7,9%; Deuda/Patrimonio 0,71x (StockAnalysis 20-jul-2026; Visfin jul-2026).\n\n**Propiedad y movimientos corporativos:**\n\n- HECHO: IRSA controla el 65,87% de CCU; IRSA es JV 50/50 entre Quiñenco y Heineken. Free float: 20,04% local + 14,09% ADR (ccuinvestor.com, 2026).\n- HECHO: CCU completó la compra de la participación de Nestlé en el JV de aguas por US$180 millones (DF, 12-jun-2026).\n- HECHO: Eduardo Ffrench-Davis asumió como CEO el 1-jul-2026 tras 28 años de Patricio Jottar, quien pasa al directorio; Alexandre Carreteiro (presidente de Heineken Américas) fue nombrado vicepresidente del directorio (TipRanks, jul-2026).\n- LECTURA: el negocio chileno (dos tercios del EBITDA) está en su mejor momento de márgenes en años; el problema de CCU no es operacional en su core, sino la exposición a Argentina y al ciclo global del vino. La mayor injerencia de Heineken en el directorio puede traer disciplina de márgenes o tensión con Quiñenco — sin evidencia de conflicto por ahora.","valuacion":"- HECHO: P/E trailing 17,25x local / 16,9-18,4x ADR; forward ~15x (BTG estima 13,3x); EV/EBITDA 8,66x (Investing/Visfin/StockAnalysis, jul-2026).\n- HECHO: la acción transa **~20% por debajo de su promedio de valuación de los últimos 10 años** (DF, 12-jun-2026).\n- HECHO: dividend yield ~3,0% local (dividendo definitivo N°272 de $74,53 por acción pagado desde el 24-abr-2026) (TipRanks/Diario Estrategia, abr-2026).\n- HECHO — targets locales: consenso **$5.877 CLP (+11%)**, máx $6.600, mín $4.365; 2 buy / 4 hold / 4 sell (Investing.com, jul-2026). Casas (DF, 12-jun-2026): **BICE Sobreponderar PO $7.794 (+52%)**, **BTG Neutral PO $6.500**, **UBS Vender PO $4.750** (argumenta crecimiento de ingresos de un dígito hasta 2028).\n- HECHO: ADR consenso Hold, target US$12,46 (+10,8%, 7 analistas) (StockAnalysis, 20-jul-2026).\n- LECTURA: la valuación es el corazón de la tesis alcista — múltiplos comprimidos contra la propia historia con un IPSA que transa ~12% caro vs la suya. Pero el descuento tiene causa: el upside depende de que Argentina y Vinos se normalicen, no del negocio chileno que ya opera bien y está en el precio. La dispersión BICE/UBS (de +52% a −7%) refleja exactamente esa apuesta.","tecnico":"- HECHO: precio $5.285 CLP, +1,28% en la sesión del lunes 20-jul y +1,63% vs 5 ruedas atrás (TradingView tiempo real, 20-jul-2026).\n- HECHO: RSI(14) diario 56,3 — neutral con sesgo alcista; MACD(12,26,9) +12,6 sobre señal −1,0 (histograma +13,6): **cruce alcista reciente** (calculado sobre 130 barras diarias de TradingView, 20-jul-2026).\n- HECHO: precio sobre la SMA20 (~$5.183, +2,0%) y SMA50 (~$5.204, +1,6%), y justo en la SMA100 (~$5.285); bajo la MM200 publicada (~$5.670) (TradingView 20-jul-2026; Visfin jul-2026).\n- HECHO: señal técnica diaria \"Strong Buy\", semanal neutral (Investing.com, jul-2026). Mínimo de 52 semanas $4.947 tocado a inicios de mayo; desde ahí, piso doble en la zona $5.000-5.050 (jun y feb).\n- LECTURA: estructura de base tras 12 meses bajistas (−16,6% en las últimas ~26 semanas). Soportes: $5.183-5.204 (SMA20/50) y $5.000-4.947; resistencias: $5.443 (máximo intradía del 20-jul), $5.670 (MM200) — su recuperación sería la confirmación de cambio de tendencia — y la zona $6.600. El cruce de MACD con RSI aún lejos de sobrecompra deja espacio al rebote, pero mientras siga bajo la MM200 es un rebote dentro de tendencia bajista, no una tendencia alcista nueva.","catalizadores":"- HECHO: **resultados 2T26 el 6-ago-2026** (StockAnalysis, jul-2026). LECTURA: trimestre de invierno, estacionalmente débil en volúmenes; el foco estará en si Chile sostiene margen 20% y en el ritmo de deterioro/mejora argentino.\n- HECHO: **nuevo CEO** Eduardo Ffrench-Davis desde el 1-jul-2026, con prioridad declarada en márgenes y eficiencia; renovación de comités del directorio entre julio y agosto (DF 12-jun-2026; TipRanks jul-2026). LECTURA: primer plan estratégico del nuevo management es el catalizador idiosincrático más cercano.\n- HECHO: **tipo de cambio** — USD/CLP ~926 (14-jul-2026), con el CLP apreciado 8,1% vs USD en 1T26: viento a favor directo en costos dolarizados del segmento Chile (dolarhoy.net; press release 1Q26).\n- HECHO: **insumos** — aluminio LME ~US$3.160-3.200/t con inventarios −43% en el año y déficit proyectado (~930 kt según Macquarie); cebada y lúpulo europeos +12-18% de costo desembarcado en 1T26 (TradingEconomics/AgMetalMiner/Expert Market Research, jul-2026).\n- HECHO: **Argentina** — consumo masivo −3,3% acumulado en 2026, pero inflación mensual desacelerando (<2% proyectado para julio) y expectativa de recuperación gradual del consumo en 2S26 (Bloomberg Línea/Infobae, jun-2026). LECTURA: la recuperación argentina es la opción de mayor convexidad de la tesis.\n- HECHO: **macro Chile** — PIB 1T26 −0,5% a/a, Imacec de mayo −0,9% (quinto retroceso consecutivo), Banco Central recortó el crecimiento 2026 hacia ~1%, riesgo de recesión técnica (Emol/Bloomberg/XTB, mar-jul 2026). LECTURA: el 1T26 se benefició de un consumo chileno que ya no acelera — el viento de cola doméstico se está apagando.","sentimiento":"- HECHO: consenso local Neutral con 2 buy / 4 hold / 4 sell y PO $5.877 (Investing, jul-2026); ADR Hold con target US$12,46 (StockAnalysis, 20-jul-2026). El DF tituló (12-jun-2026): \"Argentina y alta exposición a vinos y cervezas hacen dudar al mercado\".\n- HECHO: noticias de los últimos 45 días — cierre de la compra del JV de aguas a Nestlé (US$180M, jun), cambio de CEO y reordenamiento del directorio con mayor presencia de Heineken (1-jul), y entrada en vigencia de nuevas restricciones a la publicidad de alcohol en Chile el 7-jul-2026.\n- HECHO: contexto IPSA — el índice acumula ~70 máximos históricos en el año, transa ~12% más caro que su historia, con flujos extranjeros récord (US$112M vía el principal ETF en el año) y targets como el de Bci en 12.050 puntos; el optimismo se moderó en julio por el débil crecimiento (DF/Emol/Bloomberg, 2026).\n- LECTURA: el contraste es la historia — el IPSA en máximos mientras CCU está 20% bajo su peak la convierte en uno de los grandes laggards del rally chileno. Eso sostiene el argumento de valuación relativa (BICE), pero 4 de 10 analistas locales recomiendan vender: el mercado no compra la normalización de Argentina y Vinos todavía. Sin datos públicos de posicionamiento institucional o insiders para el papel local.","conclusion":"CCU es una apuesta de valuación y reversión a la media, no de momentum: negocio core chileno en su mejor nivel de márgenes, múltiplos 20% bajo su historia, 3% de yield, y dos lastres (Argentina, Vinos) que explican el descuento y cuya normalización — no garantizada — es el upside. El técnico acompaña por primera vez en meses (cruce de MACD, sobre SMA20/50, doble piso en $5.000) pero la MM200 en $5.670 sigue arriba como techo de la tendencia. Con el consenso en Hold y el IPSA caro, el papel ofrece asimetría razonable bajo $5.300 con soporte claro en $5.000, catalizador fechado el 6-ago (2T26) y la incógnita del plan del nuevo CEO. La señal es **Hold** con sesgo constructivo: para pasar a Buy se necesita recuperar la MM200 y/o evidencia de que Argentina dejó de drenar EBITDA; para venderla, perder los $5.000 que ya defendió dos veces."},"scores":{"tecnica":{"score":60,"just":"Rebote con confirmación: cruce alcista de MACD, RSI 56 con espacio, precio sobre SMA20/50 y doble piso defendido en $5.000. Se descuenta porque sigue bajo la MM200 ($5.670) y 20% bajo el máximo de 52 semanas — es una base dentro de tendencia bajista, aún no una tendencia alcista."},"fundamental":{"score":62,"just":"Chile (dos tercios del EBITDA) con margen 20% y EBITDA +13,7%, balance sano (D/E 0,71x) y valuación 20% bajo su media histórica con 3% de yield. Los lastres pesan: Argentina −18,6% y Vinos −50,1% de EBITDA, utilidad total −6,8% y ROE mediocre (~7,5%)."},"sentimiento":{"score":46,"just":"Consenso tibio con 4 de 10 analistas locales en venta, laggard notorio del rally IPSA y titulares de prensa escépticos (\"hacen dudar al mercado\"). A favor: dispersión de targets con el extremo alcista (BICE +52%) bien argumentado y flujos extranjeros récord hacia la bolsa chilena que eventualmente rotan a rezagados."},"riesgo":{"score":50,"just":"Negocio defensivo de consumo básico con 65% del mercado cervecero chileno y controlador sólido (Quiñenco/Heineken), pero triple exposición adversa: macro chilena deteriorándose (5 Imacec negativos), Argentina sin piso confirmado, sobreoferta global de vino, más costos de aluminio y cebada al alza y nuevas restricciones publicitarias vigentes desde el 7-jul."},"conviccion":{"score":55,"just":"Catalizadores concretos y fechados (2T26 el 6-ago, plan del nuevo CEO, recuperación argentina en 2S26) y tesis falsable con niveles claros ($5.000 abajo, MM200 $5.670 arriba). La convicción es media porque el timing de la normalización de Argentina y Vinos es incierto y el consenso lleva meses sin comprarla."}},"sources":["TradingView — BCS:CCU tiempo real, 130 barras diarias; RSI/MACD/SMA calculados (20-jul-2026)","Investing.com — cotización local, consenso 2/4/4, PO $5.877, P/E, yield (jul-2026)","StockAnalysis.com — ADR CCU, targets, forward P/E, EV/EBITDA, earnings 6-ago (20-jul-2026)","Visfin.cl — MM50/200, ROE, D/E (jul-2026)","CCU Investor — Press Release 1Q26 (6-may-2026)","TipRanks — resultados 1T26; transición CEO/directorio; dividendo abr-2026 (may-jul 2026)","La Tercera/Pulso — utilidad 1T26 US$58M (may-2026)","Diario Financiero — POs BICE $7.794 / BTG $6.500 / UBS $4.750; compra JV aguas Nestlé US$180M (12-jun-2026)","ccuinvestor.com / Quiñenco — estructura de propiedad IRSA 65,87% (2026)","Bloomberg Línea / Infobae — consumo Argentina −3,3% 2026, inflación desacelerando (jun-2026)","Bloomberg / Emol / XTB — macro Chile: Imacec, riesgo de recesión técnica, gobierno Kast (mar-jul 2026)","TradingEconomics / AgMetalMiner — aluminio LME, déficit proyectado (jul-2026)","Expert Market Research / Mordor — mercado cervecero Chile: CCU ~65%, ABI ~30% (2025-2026)","Senado.cl / La Tercera — Ley 21.363: restricciones publicidad alcohol desde 7-jul-2026","dolarhoy.net — USD/CLP 926 (14-jul-2026)"],"events":[{"date":"2026-08-06","label":"Resultados 2T26","kind":"earnings"}],"risk":{"volatility_30d":null,"sharpe":null,"sortino":null,"max_drawdown_1y":null,"n_days":1,"window":30},"benchmark":{"ticker":"CBOE:ECH","label":"ECH (proxy Chile/IPSA)","relative_performance_30d":10.6,"relative_performance_ytd":-4.37,"price_percentile_1y":30.5,"partial":false},"technical":{"price":5450,"change_1d_pct":3.42,"change_1w_pct":4.45,"rsi":64.5,"macd":30.1153,"macd_signal":5.0712,"sma20":5197.225,"sma50":5203.858,"sma200":5668.9615,"ema12":5242.84,"ema26":5212.7247,"pct_vs_sma20":4.86,"pct_vs_sma50":4.73,"pct_vs_sma200":-3.86,"volume_today":1131099,"volume_avg20":287353.0,"volume_ratio":3.94,"volatility_30d":null,"sharpe":null,"sortino":null,"max_drawdown_1y":null,"price_percentile_1y":30.5,"vs_benchmark_30d_pct":10.6,"perf_1m_pct":6.86,"perf_ytd_pct":-7.06},"sourcesMeta":{"price":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"rsi_macd":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"smas_volume":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"benchmark":{"origin":"TradingView scanner","symbol":"CBOE:ECH","fetched_at":"2026-07-21T22:42:16-04:00"},"risk_metrics":{"origin":"data/history/CCU.json","n_days":1}},"metricChanges":[]},{"ticker":"CMPC","company":"Empresas CMPC S.A.","statsList":[["Precio","$1.083,9 CLP (21-jul-2026)"],["Rango 52 sem.","$1.015 – $1.599 CLP"],["Listado","Bolsa de Santiago: CMPC (IPSA) — grupo Matte"],["Market cap","CLP 2,68 billones (~US$2.900M)"],["P/E · P/B · EV/EBITDA","16,3x trailing / 15,3x fwd · P/B 0,28x · EV/EBITDA 7,9x"],["Deuda neta / EBITDA","4,1x (1T26) — rating S&P BBB- desde mar-2026"],["Dividend yield","~0,9% (US$0,0105/acción pagado may-2026)"],["Target consenso","JPM $1.100 (jul) vs agregadores $1.513-1.712 (rezagados)"],["Próx. earnings","6-ago-2026 (2T26)"],["Técnico (auto)","RSI 53.7 · MACD +6.13 / señal +2.27 (TradingView, 21-jul-2026)"]],"change":{"day":-0.38,"week":1.3},"sections":{"resumen":"CMPC es la gran castigada del IPSA: mientras el índice marca máximos históricos (~11.500 puntos), la papelera del grupo Matte acumula −20% en 12 meses y tocó a inicios de julio un mínimo de 4 años ($1.031), del que rebota tímidamente hacia $1.076. El castigo tiene tres causas concretas: un ciclo de celulosa deprimido (precio promedio −17% en 2025, sobreoferta global), un balance cargado (deuda neta/EBITDA 4,1x, S&P la rebajó a BBB−, a un escalón del grado especulativo) y el megaproyecto Natureza en Brasil (US$4.600M) cuyo financiamiento tiene al mercado apostando a un aumento de capital dilutivo. A favor: P/B de 0,28x — se paga 28% del valor libro —, Softys creciendo EBITDA +20%, un plan de desinversión de US$1.000-1.500M con JPMorgan, y el dato nuevo de julio: el DF reporta que mejoran las expectativas de celulosa para el 2S26, lo que explica el rebote. Es una apuesta de ciclo con balance apretado: alta convexidad si la celulosa repunta, riesgo real de dilución si no.","fundamental":"**Resultados 1T26** (reportados 8-may-2026; cifras en USD):\n\n- HECHO: ventas US$1.817M (planas a/a, bajo el consenso de US$1.850M); EBITDA ajustado US$255M (−8,1% a/a), margen 14,1% (−1 pp); **utilidad neta US$25M, −50,2% a/a** por menores envíos de celulosa, mayor costo energético (guerra en Medio Oriente), menor valorización forestal y más gastos financieros (DF / La Tercera / Investing, 8-may-2026).\n- HECHO — por segmento: **Celulosa** ventas US$731M, golpeada por mantenciones programadas y no programadas en Guaíba (menor producción, mayor cash cost); **Softys** (tissue) ventas US$835M con EBITDA US$97M (+20% a/a) por eficiencias; **Biopackaging** US$247M con recuperación de márgenes (slides 1T26, may-2026).\n- HECHO: producción de celulosa 987 mil ton; ventas BEKP 799 mil ton (−11% a/a, menores exportaciones a China); cash cost BEKP US$262/ton, BSKP US$400/ton; capex US$185M (+24% a/a) (slides 1T26).\n- HECHO — **balance**: deuda total US$5.915M, caja US$900M, deuda neta US$5.015M → **DFN/EBITDA 4,1x** (vs 3,41x en mar-2025). Guía del call: EPS US$0,01 en 2T26 y US$0,02 en 3T26 con normalización progresiva del apalancamiento (transcript 1T26, may-2026).\n- HECHO: **S&P rebajó el rating de BBB a BBB−** el 2-mar-2026 (un escalón sobre grado especulativo) por desapalancamiento lento, celulosa −17% en 2025, competencia en tissue en Brasil/México e incertidumbre por Natureza; proyecta EBITDA 2026 de US$1.200-1.300M y ~3,0x (La Tercera, 2-mar-2026).\n\n**Proyecto Natureza (Rio Grande do Sul, Brasil):**\n\n- HECHO: inversión US$4.500-4.600M — la mayor inversión chilena en el exterior —, 2,5M ton/año de BEKP, ~US$400M ya invertidos, decisión de construcción dentro de 2026 y operación hacia 2029. Hitos: permiso federal del terminal portuario (ene-2026, acto con Lula) y licencia ambiental preliminar del terminal Rio Grande (jun-2026) (DF / Argentina Forestal / La Tercera, 2026).\n- HECHO — financiamiento: desinversión de activos forestales/inmobiliarios por US$1.000-1.500M asesorada por JPMorgan (incluye Bosques del Plata en Argentina, >94.000 ha); colocó bonos híbridos por UF 7M (~US$312M) a fines de junio con mejor spread que el debut, y prepara hasta UF 10M más; **el mercado especula con un aumento de capital** (Argentina Forestal 17-jun-2026; DF jun-2026).\n- HECHO: dividendo definitivo US$0,0105/acción pagado desde el 12-may-2026; política 2026 de payout 30%; yield ~0,9% (Diario Estrategia / StockAnalysis, 2026).\n- LECTURA: el 1T26 fue un trimestre de transición con Guaíba en mantención — lo operativo debiera mejorar en 2T/3T —, pero el problema estructural es que con EBITDA deprimido, 4,1x de leverage y US$4.600M de capex por delante, la matemática solo cierra con ventas de activos exitosas o dilución. Softys es la joya silenciosa del cuadro.","valuacion":"- HECHO (StockAnalysis, 20-jul-2026): P/E trailing 16,3x / forward 15,3x; **P/B 0,28x**; EV/EBITDA 7,9x; EV/Ventas 1,13x; beta 0,17.\n- HECHO — targets con dispersión enorme: **JPMorgan Neutral, PO $1.100 a dic-2026** (el más fresco, citado por DF el 17-jul-2026, tras recortes previos desde $1.600); **MBI sobreponderar, PO $2.077** (recortado desde $2.417, upside >50%); agregadores: Investing $1.513 (máx $2.807 / mín $1.089), MarketScreener $1.712 (3 comprar / 2 vender), TradingView ~$1.754 (4 comprar / 8 mantener / 0 vender) — con fechas de corte no publicadas.\n- LECTURA: el P/B de 0,28x es el dato más llamativo — típico de fondo de ciclo más descuento por apalancamiento y riesgo de dilución. El EV/EBITDA ~8x NO es barato porque el EBITDA está deprimido: la acción es una apuesta a normalización de EBITDA, no a múltiplo bajo. El consenso de agregadores ($1.500-1.750) luce rezagado frente al PO de julio de JPMorgan ($1.100, prácticamente el precio actual): el sell-side fresco no ve upside sin repunte de celulosa. Los targets altos descansan en normalización + desinversión sin dilución.","tecnico":"- HECHO: precio $1.076,5 CLP, +0,61% en la sesión del lunes 20-jul pero **−2,93% vs 5 ruedas atrás** (TradingView tiempo real, 20-jul-2026).\n- HECHO: RSI(14) diario 52,2 — neutral; MACD(12,26,9) +5,0 sobre señal +1,1 (histograma +3,8), positivo tras el rebote desde $1.031 (calculado sobre 130 barras diarias de TradingView, 20-jul-2026). Investing.com publica RSI 46,5 y señal \"venta fuerte\" por medias móviles (1 compra / 11 ventas) (jul-2026).\n- HECHO: precio sobre la SMA20 (~$1.059, +1,6%) y SMA50 (~$1.071, +0,5%), pero −5,3% bajo la SMA100 (~$1.137) y lejos de los niveles de inicio de año ($1.480): −27% en ~26 semanas (TradingView, 20-jul-2026).\n- LECTURA: tendencia de fondo claramente bajista con rebote incipiente de julio. Soportes: $1.059-1.071 (SMA20/50) y la zona crítica **$1.015-1.031** (mínimo de 52 semanas y de 4 años — perderla abriría un tramo bajista nuevo). Resistencias: $1.094-1.110 (cierres de la semana pasada y SMA100 en $1.137) y luego $1.180. Ojo: los niveles \"soporte $1.500 / resistencia $2.500\" que circulan en ideas antiguas de TradingView están obsoletos, son previos al derrumbe. El rebote es de expectativas (celulosa 2S26), no de confirmación técnica: bajo la SMA100 y con las medias largas vendedoras, sigue siendo un intento de piso, no un cambio de tendencia.","catalizadores":"- HECHO: **resultados 2T26 el 6-ago-2026** (Investing, jul-2026). LECTURA: con Guaíba normalizada tras las mantenciones, el mercado buscará cash cost a la baja y confirmación de la guía (EPS US$0,01).\n- HECHO — **celulosa, el driver dominante**: en China la fibra corta promedia RMB 4.417/ton (10-jul-2026) con julio como temporada baja, papeleras comprando lo mínimo e inventarios altos (SunSirs); NBSK lista en EE.UU. cayó a US$1.570/t en mayo por sobreoferta (Fastmarkets, 5-jun-2026). Referencias 2026: Fitch proyecta BEKP US$625/t promedio; BTG estimaba US$575-600/t neto China (dic-2025).\n- HECHO: el DF reporta (17-jul-2026) que **mejoran las expectativas de celulosa para el 2S26**, con efecto anticipado en Arauco y CMPC — es lo que explica el rebote desde $1.031. LECTURA: es el catalizador que mueve la aguja; si la temporada alta china (sept-oct) no convalida, el rebote se deshace.\n- HECHO — **plan de desinversión**: US$1.000-1.500M en activos no estratégicos (Chile, Brasil, Argentina) con JPMorgan; decisión final de construcción de Natureza esperada dentro de 2026 (Argentina Forestal / DF, jun-2026). LECTURA: un cierre exitoso de ventas de activos sin aumento de capital sería el catalizador idiosincrático más potente; lo contrario (aumento de capital) es el mayor riesgo de corto plazo.\n- HECHO — **oferta rival**: Arauco alcanzará 5,2M ton (MAPA ~85% de utilización) y construye Sucuriú en Brasil (US$4.600M, ~70% de avance); Suzano presiona precios — es la base del Neutral de JPMorgan (DF, 17-jul-2026).\n- HECHO: USD/CLP ~926-932 en julio (dolarhoy/Wise). LECTURA: a diferencia de CCU, un peso fuerte es viento en CONTRA para CMPC (exportadora con costos en CLP e ingresos en USD).","sentimiento":"- HECHO: recomendaciones divididas — JPMorgan Neutral PO $1.100 (jul-2026), MBI sobreponderar PO $2.077, MarketScreener 3 comprar / 2 vender, agregador TradingView 4 comprar / 8 mantener / 0 vender. Sin notas frescas de BTG/Santander/BICE/LarrainVial en las fuentes consultadas.\n- HECHO — noticias de los últimos 30 días: colocación de híbridos por ~US$312M con mejor spread (fines jun), licencia ambiental del terminal de Natureza (23-jun), JPMorgan liderando la desinversión con el mercado apostando a aumento de capital (17-jun), y la nota del DF sobre el repunte de expectativas de celulosa (17-jul).\n- HECHO — contexto: IPSA en máximos históricos (~11.500 pts), inversión extranjera en Chile en récord (US$46.987M de stock de no residentes, más del doble que 2024), bolsa ~12% más cara que su historia (DF/Emol, 2026).\n- LECTURA: sentimiento negativo-a-neutral con giro incipiente. CMPC es de las pocas grandes del IPSA en rojo a 12 meses (−20%) en un mercado eufórico — el flujo extranjero récord aún no rota hacia ella porque el riesgo de aumento de capital mantiene cautos a los institucionales. El rebote de julio es de expectativas, no de resultados: frágil pero con combustible si el 2S26 convalida, porque el posicionamiento en el papel es liviano.","conclusion":"CMPC es la apuesta cíclica profunda del panel chileno: 0,28x valor libro, −33% desde el rango alto de 52 semanas, en mínimos de 4 años hace tres semanas, con el driver (precio de la celulosa) posiblemente girando al alza en el 2S26 según las expectativas que recoge el DF. Pero el balance no perdona: 4,1x deuda neta/EBITDA, rating a un escalón del grado especulativo y US$4.600M de Natureza por financiar hacen que la tesis dependa de que TODO salga razonablemente bien — celulosa arriba, activos vendidos a buen precio, sin dilución. La asimetría es atractiva para perfiles tolerantes al riesgo (si el ciclo gira, el recorrido a los targets de $1.500-2.000 es enorme), pero el PO fresco de JPMorgan ($1.100) dice que el sell-side no ve upside inmediato. La señal es **Caution**: especulativa de ciclo, no de calidad. Gatillos para subirla a Hold/Buy: celulosa china repuntando en la temporada alta (sept-oct), cierre de desinversiones sin aumento de capital, o 2T26 (6-ago) con cash cost mejorando. Gatillo de salida: perder los $1.015-1.031."},"scores":{"tecnica":{"score":45,"just":"Rebote incipiente con MACD positivo y precio sobre SMA20/50 tras defender el mínimo de 4 años en $1.031, pero la tendencia de fondo sigue bajista: −5,3% bajo la SMA100, −27% en 6 meses, y las medias largas en señal de venta (1 compra / 11 ventas según Investing). Intento de piso, no cambio de tendencia."},"fundamental":{"score":40,"just":"Utilidad −50% en 1T26, EBITDA deprimido por el ciclo de celulosa, leverage de 4,1x con rating BBB− a un escalón del especulativo y US$4.600M de Natureza por financiar. Lo rescatable: Softys con EBITDA +20%, P/B de 0,28x, guía de mejora secuencial y un plan de desinversión de US$1.000-1.500M en marcha."},"sentimiento":{"score":45,"just":"Gran rezagada del IPSA en un mercado en máximos, con el sell-side fresco (JPMorgan $1.100) sin ver upside y el mercado apostando a un aumento de capital dilutivo. El giro de expectativas de celulosa del 2S26 (DF, 17-jul) y el posicionamiento liviano dan combustible al rebote si se convalida."},"riesgo":{"score":30,"just":"El perfil de riesgo más alto del panel chileno: apalancamiento 4,1x, rating al borde del grado especulativo, ciclo de celulosa en sobreoferta con Arauco y Suzano agregando capacidad, riesgo de dilución por Natureza, shock de costos energéticos e incendios/Araucanía recurrentes (61 siniestros en la última temporada, mitad intencionales)."},"conviccion":{"score":40,"just":"Tesis falsable con niveles y fechas claras (soporte $1.015-1.031, 2T26 el 6-ago, temporada alta china sept-oct, decisión de Natureza en 2026), pero de baja probabilidad compuesta: exige simultáneamente repunte de celulosa, desinversión exitosa y no-dilución. Apta solo como posición especulativa dimensionada."}},"sources":["TradingView — BCS:CMPC tiempo real, 130 barras diarias; RSI/MACD/SMA calculados (20-jul-2026)","Diario Financiero — repunte de expectativas de celulosa 2S26; PO JPMorgan $1.100 (17-jul-2026)","Diario Financiero / La Tercera — resultados 1T26: utilidad −50% (8-may-2026)","Investing.com — slides y transcript 1T26; earnings 6-ago; technicals (may-jul 2026)","La Tercera/Pulso — S&P rebaja a BBB− (2-mar-2026)","StockAnalysis.com — P/B 0,28x, EV/EBITDA 7,9x, market cap (snapshot 20-jul-2026)","Argentina Forestal — plan Natureza, desinversión con JPMorgan, licencia terminal portuario (may-jun 2026)","Diario Financiero — bonos híbridos UF 7M (~US$312M) y preparación de UF 10M (jun-2026)","Diario Financiero — MBI recorta PO a $2.077, mantiene sobreponderar (2026)","SunSirs — pulpa fibra corta China RMB 4.417/t, temporada baja (10-14-jul-2026)","Fastmarkets — NBSK EE.UU. US$1.570/t lista, sobreoferta (5-jun-2026)","Diario Estrategia — dividendo definitivo US$0,0105 pagado 12-may-2026","Yahoo Finance — rango 52 semanas CMPC.SN (jul-2026)","MarketScreener — consenso $1.712, 3 comprar / 2 vender (jul-2026)","Diario Financiero / Emol — IPSA en máximos, inversión extranjera récord US$46.987M (2026)","BioBioChile — incendios en predios CMPC, 84 brigadas temporada 2025-26 (dic-2025 / ene-2026)"],"events":[{"date":"2026-08-06","label":"Resultados 2T26 (foco: cash cost con Guaíba normalizada)","kind":"earnings"}],"risk":{"volatility_30d":null,"sharpe":null,"sortino":null,"max_drawdown_1y":null,"n_days":1,"window":30},"benchmark":{"ticker":"CBOE:ECH","label":"ECH (proxy Chile/IPSA)","relative_performance_30d":7.06,"relative_performance_ytd":-20.66,"price_percentile_1y":11.8,"partial":false},"technical":{"price":1083.9,"change_1d_pct":-0.38,"change_1w_pct":1.3,"rsi":53.7,"macd":6.1349,"macd_signal":2.2726,"sma20":1061.975,"sma50":1070.544,"sma200":1244.547,"ema12":1076.5122,"ema26":1070.3773,"pct_vs_sma20":2.06,"pct_vs_sma50":1.25,"pct_vs_sma200":-12.91,"volume_today":1947861,"volume_avg20":2802351.0,"volume_ratio":0.7,"volatility_30d":null,"sharpe":null,"sortino":null,"max_drawdown_1y":null,"price_percentile_1y":11.8,"vs_benchmark_30d_pct":7.06,"perf_1m_pct":3.33,"perf_ytd_pct":-23.35},"sourcesMeta":{"price":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"rsi_macd":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"smas_volume":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"benchmark":{"origin":"TradingView scanner","symbol":"CBOE:ECH","fetched_at":"2026-07-21T22:42:16-04:00"},"risk_metrics":{"origin":"data/history/CMPC.json","n_days":1}},"metricChanges":[]},{"ticker":"EUR/USD","company":"Euro / Dólar","baseCurrency":"EUR","statsList":[["Precio","1.14063 (21-jul-2026)"],["Rango 80 días","1.133 – 1.182"],["Tasas BCE / Fed","2,25% / 3,50–3,75%"],["COT EUR (14-jul)","-12,605 netos (corto)"],["DXY","100.76 (17-jul-2026)"],["Próximo evento","BCE 23-jul · FOMC 28-29-jul"],["Técnico (auto)","RSI 43.1 · MACD -0.00 / señal -0.00 (TradingView, 21-jul-2026)"]],"change":{"day":0.07,"week":-0.27},"customSections":[{"title":"Resumen ejecutivo","nav":"Resumen","body":"EUR/USD cerró la semana en **1.14382**, dentro de un rango contenido tras una caída de ~4% desde los máximos de abril (~1.182) y un rebote desde los mínimos de junio (~1.133). El cuadro es de **equilibrio inestable con sesgo de cautela**:\n\n- **HECHO:** El diferencial de tasas sigue siendo claramente favorable al USD (Fed Funds 3.50–3.75% vs. tasa de depósito BCE 2.25%), aunque el BCE **subió** 25 pb en junio mientras la Fed está en pausa — el diferencial se está cerrando en el margen a favor del EUR.\n- **HECHO:** La semana entrante es de alto riesgo de evento: **reunión del BCE el jueves 23-jul** (mercado descuenta ~95% de mantención) y **FOMC el 28-29-jul** (~87–89% de mantención).\n- **HECHO:** Los especuladores están **netos cortos en EUR** (-12,605 contratos, COT al 14-jul-2026), aunque recortando cortos.\n- **LECTURA:** Los riesgos de cola (guerra en Medio Oriente y shock energético asimétrico contra Europa, reapertura de la disputa arancelaria EEUU-UE, crisis política/energética en Francia) recaen desproporcionadamente sobre el EUR.\n\n**Señal resultante: Caution (Grado C — 46/100).** Sin ventaja clara para comprar EUR; el par sigue siendo un rango 1.133–1.155 dominado por bancos centrales y geopolítica.\n\n---"},{"title":"Diferencial de tasas y política monetaria","nav":"Tasas","body":"**BCE (HECHO):**\n- Tasa de depósito vigente: **2.25%**, tras una **subida de 25 pb decidida en la reunión de junio (17-jun-2026)** en respuesta a la presión inflacionaria derivada del shock energético (ECB / Trading Economics, jul-2026).\n- Próxima reunión: **jueves 23-jul-2026** (decisión 13:45 CET, conferencia de Lagarde 14:30 CET) — es decir, **sí hay reunión la semana del 20-jul**. Es reunión sin proyecciones de staff.\n- Expectativas de mercado: **~95.3% de mantención en 2.25%**, con una cola alcista de ~3.4% para +25 pb (rateprobability.com / ecb-watch, consultado 19-jul-2026).\n- Tono de Lagarde: **hawkish**. El 2-jul defendió la subida de junio citando proyecciones de inflación en torno al 3% para 2026 y la necesidad de mantenerse vigilante (ECB Forum Sintra, jul-2026).\n\n**Fed (HECHO):**\n- Rango objetivo vigente: **3.50%–3.75%**; en junio el FOMC mantuvo y señaló que la inflación sigue elevada respecto de la meta del 2% (core PCE ~2.9%).\n- FOMC 28-29-jul-2026: **~89% de probabilidad de mantención** según CME FedWatch (~86.7% según fuentes alternativas al 18-jul-2026). Consenso: tasas sin cambios al menos hasta el otoño boreal, condicionado a progreso en inflación.\n- Tono del presidente de la Fed, Kevin Warsh (Sintra, 1-jul-2026): sin señales para julio, pero \"los precios están demasiado altos\" — sesgo restrictivo.\n\n**Divergencia (LECTURA):** El **nivel** del diferencial (~125–150 pb en tasas de política; 2 años: UST 4.16% vs. Schatz ~2.6–2.8%) favorece al USD y sostiene el carry en contra del EUR. Pero la **dirección** favorece marginalmente al EUR: el BCE está subiendo (y conserva cola hawkish) mientras la Fed está estática. Riesgo señalado por estrategas: que el mercado retire el tightening del BCE antes que el de la Fed, limitando el alza del EUR (VT Markets, jul-2026).\n\n---"},{"title":"Balanza de pagos y flujos","nav":"Balanza","body":"**Cuenta corriente (HECHO):**\n- Superávit de la eurozona de **€25 mil millones en mayo-2026** (+€8 mm m/m): bienes +€16 mm, servicios +€14 mm, renta primaria +€12 mm, renta secundaria -€18 mm (BCE, 17-jul-2026).\n- Acumulado 12 meses a mayo-2026: **€272 mm (1.7% del PIB)**, frente a €318 mm (2.0% del PIB) un año antes — **superávit en contracción**, principalmente por menor superávit de bienes (de €350 mm a €286 mm) (BCE, 17-jul-2026).\n- Proyección del staff del Eurosistema (jun-2026): caída adicional a **~1.3% del PIB en 2026** por mayores precios de importación de energía a raíz de la guerra en Medio Oriente (ECB Economic Bulletin, 2026).\n\n**Flujos de portafolio 2026 (HECHO/LECTURA):**\n- HECHO: La rotación hacia Europa de comienzos de año **se revirtió a mitad de 2026**: la porción de flujos de ETFs de renta variable de EEUU hacia fondos centrados en EEUU subió todos los meses del año, alcanzando ~85% en junio (iShares H1-2026). En Europa, los flujos hacia productos centrados en EEUU se **cuadruplicaron** interanual (Morningstar, 2026). En money markets, USD fue la clasificación más comprada (+€15.98 mm) mientras los fondos EUR registraron salidas (-€5.06 mm) (Lipper/LSEG, may-2026).\n- LECTURA: El colchón estructural de cuenta corriente sigue siendo un soporte de fondo para el EUR, pero se erosiona por energía, y los flujos de portafolio han vuelto a favorecer activos en USD por el atractivo relativo de las tasas americanas. Neto: **levemente negativo para el EUR**.\n\n---"},{"title":"Posicionamiento","nav":"Posicionamiento","body":"**HECHO — CFTC COT, Euro FX (CME), datos al martes 14-jul-2026, publicado 17-jul-2026 (Tradingster/CFTC):**\n- No comerciales (especuladores): largos 230,307 / cortos 242,912 → **neto -12,605 contratos (corto)**.\n- Variación semanal: +6,877 largos, +3,255 cortos → **neto +3,622 hacia largo** (los cortos se están recortando).\n- Interés abierto: 799,495 contratos — mercado profundo y líquido.\n- Tendencia de meses: el neto largo de ~+21,000 contratos de marzo-2026 (percentil 15 del rango de 52 semanas, mínimo de 1 año) se ha degradado hasta territorio **neto corto** (AhaSignals/Investing.com, 2026).\n\n**LECTURA:** Posicionamiento levemente bajista en EUR pero **cercano a plano y mejorando** — no hay extremo de posicionamiento que genere señal contraria potente en ninguna dirección. Un BCE hawkish el 23-jul podría forzar cobertura de cortos (riesgo alcista táctico); la señal estructural es neutral-negativa.\n\n---"},{"title":"Análisis técnico","nav":"Técnico","body":"**HECHO — TradingView (17-jul-2026):**\n- Precio: **1.14382**.\n- RSI(14) diario: **47.2** — neutral.\n- MACD(12,26): **-0.0025** vs. señal **-0.0036**; histograma **+0.0011** — momentum bajista moderándose.\n- Medias: precio **sobre SMA20 (1.1414)** pero **bajo SMA50 (1.1530)**.\n- Ventana 80 días: caída desde máximos ~**1.182** (abril) hasta mínimos ~**1.133** (junio); rebote reciente a ~1.148 y cierre 1.1438.\n\n**LECTURA:**\n- La estructura de mediano plazo sigue siendo **correctiva/bajista** (máximos y mínimos decrecientes desde abril; precio bajo SMA50), pero el rebote desde 1.133 con histograma MACD al alza y recuperación de la SMA20 sugiere que la caída **perdió fuerza**.\n- Soportes: 1.1414 (SMA20), luego 1.133 (mínimo de junio — pivote clave). Resistencias: 1.148 (techo del rebote), 1.1530 (SMA50), luego zona 1.16.\n- Un cierre diario sobre la SMA50 (~1.153) convertiría el rebote en cambio de tendencia; la pérdida de 1.133 reactivaría el tramo bajista hacia 1.12. Con RSI en 47 y precio entre medias, el veredicto técnico es **neutral** (par ni alcista ni bajista con convicción).\n\n---"},{"title":"Intervención y riesgo de banco central","nav":"Intervención","body":"**HECHO/LECTURA:** El riesgo de intervención cambiaria **directa** en EUR/USD es históricamente bajo (última intervención coordinada relevante: 2000/2011); ni el BCE ni el Tesoro de EEUU han señalado nada en 2026 a los niveles actuales. El riesgo relevante es **de cola**:\n\n1. **Energía / Medio Oriente (HECHO):** Tras los ataques de Israel-EEUU contra Irán (28-feb-2026) y la disrupción del Estrecho de Ormuz (~1/5 del suministro global de GNL afectado), el gas europeo opera en ~€46/MWh; los escenarios de crisis prolongada de la Comisión Europea/JRC contemplan petróleo hasta ~USD 180/bbl y gas ~€80/MWh en 4T-2026 (JRC, may-2026; Bloomberg, 9-jul-2026). **LECTURA:** shock asimétricamente negativo para el EUR (Europa importadora neta; EEUU exportador de energía).\n2. **Aranceles EEUU-UE (HECHO):** El acuerdo provisional del 20-may-2026 (arancel máximo ~15% a productos UE) coexiste con amenazas de Trump de tarifas \"mucho más altas\" si no se ratifica, reabriendo la guerra comercial (ING, Euronews, 2026). **LECTURA:** riesgo bajista para crecimiento europeo y EUR.\n3. **Política europea (HECHO):** Crisis política y presupuestaria en Francia, con hoja de ruta energética bloqueada y reactores nucleares parados por olas de calor (Energynews/MNI, 2026). **LECTURA:** prima de riesgo político latente en activos EUR.\n\n**Balance:** riesgo de intervención bajo, pero **riesgo de cola elevado y sesgado en contra del EUR**.\n\n---"},{"title":"Correlaciones macro","nav":"Correlaciones","body":"- **DXY (HECHO):** 100.76 al 17-jul-2026, prácticamente plano en la sesión (Trading Economics/FXStreet). Con EUR ~58% del índice, la correlación inversa DXY–EUR/USD **se mantiene plenamente operativa**: el estancamiento del DXY sobre 100 es el espejo del rango 1.13–1.15 del par.\n- **Diferencial de bonos (HECHO):** UST 10a **4.55%** vs. Bund 10a **3.14%** → spread ~**141 pb** a favor de EEUU (17-jul-2026). En 2 años: UST **4.16%** (16-jul) vs. Schatz **~2.6–2.8%** (máximo desde jul-2024) → ~140–155 pb.\n- **LECTURA:** El spread 10a se ha comprimido desde niveles de 2024–25 (>180 pb) por la subida de los Bunds (BCE hawkish + fiscal alemán), coherente con un EUR/USD que dejó de caer. La correlación negativa entre spread UST–Bund y EUR/USD **se mantiene**; para que el par supere 1.155 de forma sostenida se requeriría compresión adicional del diferencial (BCE subiendo o Fed girando dovish), que hoy no está descontada para julio.\n\n---"},{"title":"Conclusión","nav":"Conclusión","body":"EUR/USD en 1.14382 es un par **en rango, sin ventaja direccional clara**: el carry y los riesgos de cola favorecen al USD; la dirección de la política monetaria (BCE subiendo, Fed en pausa) y un posicionamiento corto en corrección dan soporte táctico al EUR. La semana del 20-jul (BCE 23-jul) y el FOMC del 28-29-jul definirán el próximo tramo.\n\n**Qué validaría una tesis alcista en EUR (Buy EUR):** sorpresa hawkish del BCE el 23-jul y/o giro dovish de la Fed el 29-jul; cierre diario sobre la SMA50 (~1.1530) con compresión del spread UST–Bund bajo ~130 pb; distensión en Medio Oriente (gas < €40/MWh) y ratificación limpia del acuerdo arancelario; COT cruzando a neto largo.\n\n**Qué la invalidaría (riesgo bajista):** pérdida del mínimo de junio (1.133), que abriría 1.12; escalada en Ormuz con petróleo hacia $150–180/bbl y gas hacia €80/MWh, o ruptura arancelaria EEUU-UE; Fed re-hawkish con BCE forzado a pausar; agravamiento de la crisis política francesa con ampliación de spreads OAT–Bund.\n\n> *Este informe es una herramienta de investigación educativa generada con IA. No constituye asesoría de inversión ni recomendación de compra/venta. Verifique todos los datos de forma independiente antes de tomar decisiones financieras.*"}],"scoreIndex":8,"customCats":[{"key":"tasas","name":"Diferencial de Tasas y Política Monetaria","weight":30},{"key":"macro","name":"Fundamentales Macro","weight":20},{"key":"tecnico","name":"Técnico","weight":20},{"key":"posicionamiento","name":"Posicionamiento y Sentimiento","weight":15},{"key":"intervencion","name":"Riesgo de Intervención / Cola","weight":15}],"scores":{"tasas":{"score":48,"just":"El nivel del diferencial (~125–150 pb en política y en 2 años) sigue pagando por estar en USD, pero la dirección (BCE subió en junio con cola hawkish para el 23-jul; Fed estática) cierra la brecha en el margen. Neutral con leve sesgo negativo por el carry."},"macro":{"score":45,"just":"Superávit de cuenta corriente aún sólido (€272 mm, 1.7% PIB) pero en contracción por energía, y flujos de portafolio rotando de vuelta a EEUU. El shock energético golpea más el crecimiento europeo que el americano."},"tecnico":{"score":50,"just":"RSI 47.2 neutral, MACD bajista moderándose, precio sobre SMA20 pero bajo SMA50 dentro de una estructura correctiva desde abril (TradingView, 17-jul). Ni alcista ni bajista con convicción: rango."},"posicionamiento":{"score":47,"just":"COT al 14-jul: especuladores netos cortos -12,605 contratos, aunque recortando desde el neto largo de marzo. Levemente negativo, sin extremo contrario."},"intervencion":{"score":40,"just":"Riesgo de intervención directa bajo, pero colas gruesas y asimétricas contra el EUR: guerra Irán/energía (escenarios de $180/bbl), reapertura arancelaria EEUU-UE y crisis política francesa."}},"sources":["TradingView (17-jul-2026, técnico verificado en tiempo real)","ECB — decisiones de política monetaria (jun-2026), balanza de pagos mayo-2026 (17-jul-2026), Economic Bulletin","rateprobability.com / ecb-watch (19-jul-2026)","Finance Calendar — reunión BCE 23-jul-2026","Trading Economics — tasas eurozona, DXY, Bund 10a, Schatz 2a","CME FedWatch / centralbank.watch","CNBC — Warsh en Sintra (1-jul-2026)","VT Markets (jul-2026)","iShares H1-2026","Morningstar","Lipper/LSEG (may-2026)","Tradingster/CFTC — COT Euro FX (14-jul-2026)","AhaSignals / Investing.com","FXStreet (17-jul-2026)","Advisor Perspectives — UST 10a (17-jul-2026)","JRC Comisión Europea (27-may-2026)","Bloomberg — gas europeo (9-jul-2026)","ING THINK","Euronews (may-2026)","Energynews/MNI (2026)"],"events":[{"date":"2026-07-23","label":"Reunión del BCE","kind":"macro"},{"date":"2026-07-29","label":"FOMC 28-29 jul — decisión de tasas de la Fed","kind":"macro"}],"risk":{"volatility_30d":null,"sharpe":null,"sortino":null,"max_drawdown_1y":null,"n_days":1,"window":30},"benchmark":{"ticker":"TVC:DXY","label":"DXY","relative_performance_30d":-0.71,"relative_performance_ytd":-5.79,"price_percentile_1y":10.8,"partial":false},"technical":{"price":1.14063,"change_1d_pct":0.07,"change_1w_pct":-0.27,"rsi":43.1,"macd":-0.0024,"macd_signal":-0.0031,"sma20":1.1416,"sma50":1.1509,"sma200":1.1636,"ema12":1.142,"ema26":1.1445,"pct_vs_sma20":-0.08,"pct_vs_sma50":-0.89,"pct_vs_sma200":-1.97,"volume_today":16622,"volume_avg20":194775.0,"volume_ratio":0.09,"volatility_30d":null,"sharpe":null,"sortino":null,"max_drawdown_1y":null,"price_percentile_1y":10.8,"vs_benchmark_30d_pct":-0.71,"perf_1m_pct":-0.41,"perf_ytd_pct":-2.83},"sourcesMeta":{"price":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"rsi_macd":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"smas_volume":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"benchmark":{"origin":"TradingView scanner","symbol":"TVC:DXY","fetched_at":"2026-07-21T22:42:16-04:00"},"risk_metrics":{"origin":"data/history/FX-EURUSD.json","n_days":1}},"metricChanges":[]}]</script>
<script id="stock-data" type="application/json">[{"ticker": "AAPL", "company": "Apple Inc.", "stats": {"precio": "$327.74 (21-jul-2026)", "rango52s": "$201.50 – $334.98", "marketCap": "$4.91T", "pe": "38.4x", "targetConsenso": "$313–329 (30-47 analistas)", "proximoEarnings": "30-jul-2026 (Q3 FY26)"}, "sections": {"resumen": "Apple llega a mitad de 2026 en máximos históricos, impulsada por un año fiscal de reaceleración: el trimestre de marzo (Q2 FY2026) marcó récords de iPhone y Services con revenue +17% interanual, y el mercado anticipa el ciclo del iPhone 18 en septiembre bajo un nuevo CEO (John Ternus, efectivo 1-sep-2026). La tesis alcista descansa en momentum operativo y de precio simultáneos; el contrapeso es una valuación ~53% por encima de su promedio histórico de 10 años, un precio que ya superó al target promedio de consenso, y riesgos regulatorios (DMA europea) y de concentración en China. El balance riesgo/retorno de corto plazo luce más ajustado que el operativo: la empresa ejecuta muy bien, pero el precio ya lo paga.", "fundamental": "**Resultados Q2 FY2026** (trimestre de marzo, reportado 30-abr-2026):\n\n- HECHO: Revenue total $111.2B, +17% interanual, récord de trimestre de marzo; EPS $2.01, +22% interanual, vs. consenso de $1.93 (Motley Fool / Investing.com, 30-abr-2026).\n- HECHO: iPhone $57B (+22%, récord de trimestre de marzo); Services $31B (+16%, récord histórico absoluto) (transcript de earnings, 30-abr-2026).\n- HECHO: Utilidad neta $29.6B; flujo de caja operativo $28.7B en el trimestre (transcript, 30-abr-2026).\n- HECHO: Guidance Q3 FY2026: crecimiento de revenue 14%-17% y margen bruto 46.5%-47.5%, con 150-200 pb de viento en contra por costos de memoria (transcript, 30-abr-2026).\n\n**Posición competitiva:**\n\n- HECHO: Broadcom y Apple extendieron su acuerdo de chips custom hasta 2031 (prensa financiera, jul-2026). Apple obtuvo aprobación para sus servicios de IA en China (TipRanks, 13-jul-2026).\n- HECHO: Greater China representó $20.5B de revenue en Q2 FY2026, ~18% del total (abr-2026).\n- LECTURA: el moat (ecosistema, base instalada, Services de márgenes altos) sigue intacto y la reaceleración del iPhone sugiere que el ciclo de reemplazo con IA está traccionando. La dependencia manufacturera de China sigue siendo la principal fragilidad estructural.\n\n**Transición de management:** HECHO: Tim Cook pasa a Executive Chairman; John Ternus asume como CEO el 1-sep-2026, aprobado por unanimidad (Apple Newsroom / Fortune, 20-abr-2026). LECTURA: sucesión ordenada; el mercado la leyó como continuidad (la acción hizo máximos después del anuncio).", "valuacion": "- HECHO: P/E actual ~38.4x (13-jul-2026); promedio 12 meses ~35x; 3 años ~33.3x; 5 años ~30.7-32.4x; 10 años ~30.6x (MacroTrends/FullRatio, jul-2026). El P/E actual está **~53% por encima del promedio de 10 años**.\n- HECHO vs. peers: forward P/E de Microsoft ~25x vs. ~34x de Apple; análisis de Barchart/Motley Fool (1-jul-2026) califican a Microsoft como significativamente más barata por dólar de utilidad esperada.\n- HECHO — price targets de consenso (jul-2026): $312.88 (MarketBeat, 32 analistas), $318.25 (S&P Global, 47), $324-329 (otras muestras). Rango: máx $400 (Wedbush, 5-jun-2026), mín $200 (Phillip Securities, sep-2025).\n- LECTURA: con la acción en $333.65, el precio ya está **por encima del target promedio de consenso** en todas las muestras — el mercado paga hoy la ejecución futura. No se encontraron escenarios bull/base/bear con probabilidades publicadas.", "tecnico": "- HECHO: tendencia alcista en diario y semanal; precio sobre las medias de 20 días (~$299), 50 días (~$289-299) y 200 días (Investing.com/ChartMill/Investtech, 14-jul-2026). 15° récord intradiario de 2026 a mediados de julio; ~+20% YTD (TipRanks/24-7 Wall St., 13/15-jul-2026).\n- HECHO: RSI diario reportado entre 64.3 (neutral-alto) y ~76 (sobrecompra) según la fuente (14-jul-2026). No se encontró lectura pública verificable de MACD.\n- HECHO: niveles citados — resistencia ~$317 (superada), zona de soporte $290.81-$294.80 (confluencia de medias y líneas de tendencia) y soporte secundario ~$275-276 (ChartMill/Investtech, 14-jul-2026).\n- LECTURA: ruptura a máximos históricos con estructura de tendencia limpia; el riesgo técnico dominante no es de tendencia sino de extensión (RSI alto tras +20% YTD) — probable consolidación hacia $290-295 sin invalidar la tendencia.", "catalizadores": "**Catalizadores (con fecha):**\n\n- **30-jul-2026 — Earnings Q3 FY2026:** consenso EPS $1.88, +20% interanual. Primer test del guidance de 14-17%.\n- **1-sep-2026 — John Ternus asume como CEO** (anunciado 20-abr-2026).\n- **Septiembre 2026 — Lanzamiento iPhone 18:** Citi lo señala como el punto de inflexión de sentimiento del 2° semestre.\n- **Pipeline:** iPad mini OLED en preparación (Bloomberg, jul-2026); revamp mayor de Siri con iOS 27.\n\n**Riesgos (por materialidad):**\n\n- **Regulatorio/antitrust:** multa DMA de €500M ya aplicada (abr-2025); la Comisión Europea planea intensificar la aplicación en 2026 con sanciones potenciales de 4%-20% de facturación global; demanda del DOJ (2024) abierta.\n- **China (18% del revenue) y aranceles:** la mayor parte de los iPhone se fabrica en China; escaladas arancelarias afectarían costos y precios (Reuters, 2026).\n- **Brecha en IA:** Needham (Laura Martin) sitúa a Apple 1-2 años detrás de Google/Samsung; el Siri conversacional completo se pospuso a iOS 27.\n- **Valuación extendida:** P/E ~53% sobre su media de 10 años y precio sobre el consenso — alta sensibilidad a decepciones.\n- **Costos de memoria:** 150-200 pb de presión en margen bruto guiada para Q3.", "sentimiento": "- HECHO: consenso \"Buy\"/\"Moderate Buy\" — 18 Buy, 11 Hold, 1 Sell (TipRanks/MarketBeat, jul-2026); downgrades puntuales a mediados de julio (MarketScreener).\n- HECHO — insiders: últimos 30 días, ventas por ~257.8K acciones (~$72M) y **cero compras**; 90 días: >$48M en ventas. Destacan Arthur D. Levinson (255K acciones a $284.76, 8-may-2026), CFO Kevan Parekh (27-abr-2026), y ventas planificadas de Tim Cook y Deirdre O'Brien. Neto 2 años: ~-$400M (AltIndex/MarketBeat/Benzinga, jul-2026).\n- HECHO: tono de noticias de julio claramente constructivo — récords sucesivos, +$500B de market cap en julio, aprobación de IA en China, extensión Broadcom (TipRanks/GuruFocus, 13-15-jul-2026).\n- LECTURA: sentimiento eufórico-positivo con dos matices: los targets de consenso van \"persiguiendo\" al precio, y los insiders solo venden — patrón habitual en Apple (planes 10b5-1), pero la ausencia total de compras en máximos no aporta convicción interna adicional.", "conclusion": "El cuadro de Apple a julio de 2026 es el de una compañía ejecutando en su mejor nivel de los últimos años justo cuando el mercado ya lo tiene puesto en precio. Para que la tesis funcione desde estos niveles se necesita que el 30 de julio confirme el guidance de doble dígito, que el ciclo iPhone 18 supere expectativas en septiembre y que la transición a Ternus sea el no-evento que el mercado asume. La tesis se invalidaría con una pérdida sostenida de la zona $290-295 acompañada de guidance débil, o con una sanción DMA en el rango alto — cualquiera comprimiría el múltiplo de 38x más rápido de lo que crecen las utilidades. El diferencial entre la calidad del negocio (alta) y el margen de seguridad del precio (bajo) es hoy la variable central de decisión."}, "scores": {"tecnica": {"score": 80, "just": "Tendencia alcista confirmada en diario y semanal, precio sobre todas las medias relevantes y en máximos históricos con 15 récords en el año. Se descuenta por extensión: RSI entre 64 y 76 tras +20% YTD, con riesgo de consolidación hacia $290-295."}, "fundamental": {"score": 72, "just": "Crecimiento reacelerado (revenue +17%, EPS +22%, Services en récord absoluto), caja operativa robusta y moat de ecosistema intacto. El descuento viene de la valuación: P/E ~38x, 53% sobre su media de 10 años y cara vs. peers como Microsoft."}, "sentimiento": {"score": 65, "just": "Tono de noticias muy positivo y consenso mayoritario Buy (18/11/1), pero el precio ya superó el target promedio de consenso, hubo downgrades a mediados de julio y los insiders registran $72M en ventas sin ninguna compra en 30 días."}, "riesgo": {"score": 60, "just": "Liquidez y estabilidad de mega-cap (positivo), pero riesgos concretos: exposición DMA con sanciones potenciales de 4-20% de facturación, 18% del revenue en China bajo tensión arancelaria, y drawdown potencial amplificado por la prima de valuación."}, "conviccion": {"score": 68, "just": "Catalizadores concretos y fechados (earnings 30-jul, Ternus 1-sep, iPhone 18 en septiembre) y tesis falsable con niveles técnicos claros. La asimetría es el punto débil: con el precio sobre el consenso, la tesis depende de que el ciclo iPhone 18 sorprenda al alza."}}, "sources": ["Yahoo Finance (17-jul-2026)", "Motley Fool — transcript Q2 FY26 (30-abr-2026)", "Investing.com (30-abr-2026)", "Apple Newsroom (20-abr-2026)", "Fortune (20/21-abr-2026)", "MarketBeat (jul-2026)", "TipRanks (13-jul-2026)", "S&P Global vía MarketScreener (jul-2026)", "MacroTrends / FullRatio (jul-2026)", "Barchart (1-jul-2026)", "ChartMill / Investtech / JournalArta (14-jul-2026)", "GuruFocus (jul-2026)", "24/7 Wall St. (15-jul-2026)", "AltIndex / Benzinga (jul-2026)", "Reuters vía Investing.com (2026)"], "change": {"day": 0.35, "week": -1.8}, "events": [{"date": "2026-07-30", "label": "Resultados Q3 FY26", "kind": "earnings"}, {"date": "2026-09-01", "label": "John Ternus asume como CEO (Tim Cook pasa a Executive Chairman)", "kind": "corporate"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "SP:SPX", "label": "S&P 500", "relative_performance_30d": 9.65, "relative_performance_ytd": 11.2, "price_percentile_1y": 94.6, "partial": false}, "technical": {"price": 327.74, "change_1d_pct": 0.35, "change_1w_pct": -1.8, "rsi": 64.5, "macd": 8.9271, "macd_signal": 6.7128, "sma20": 308.4835, "sma50": 304.236, "sma200": 274.937, "ema12": 320.2963, "ema26": 311.3692, "pct_vs_sma20": 6.24, "pct_vs_sma50": 7.73, "pct_vs_sma200": 19.21, "volume_today": 41338916, "volume_avg20": 61800456.0, "volume_ratio": 0.67, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 94.6, "vs_benchmark_30d_pct": 9.65, "perf_1m_pct": 9.94, "perf_ytd_pct": 20.38}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "SP:SPX", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/AAPL.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "MSFT", "company": "Microsoft Corporation", "statsList": [["Precio", "$397.75 (21-jul-2026)"], ["Rango 52 sem.", "$349.20 – $555.45"], ["Market cap", "$2.93T"], ["P/E", "23.4–24.4x (fwd ~19.5x)"], ["Target consenso", "$558.77 (56 analistas)"], ["Próx. earnings", "29-jul-2026 (Q4 FY26)"], ["Técnico (auto)", "RSI 53.4 · MACD +0.59 / señal -2.59 (TradingView, 21-jul-2026)"]], "sections": {"resumen": "MSFT vive una desconexión inusual: los fundamentales aceleran (revenue +18%, Azure +40%, EPS +23% en Q3 FY26) mientras la acción cae ~29% desde el máximo de 52 semanas ($555.45) por el shock del guidance de capex de ~$190B para 2026 y la caída del FCF. Con P/E de ~23-24x vs su promedio de 10 años de ~32x y consenso Strong Buy con target promedio $558 (+42%), la tesis es de calidad a precio de descuento, condicionada a que el capex demuestre retorno. El catalizador inmediato son los resultados Q4 FY26 del 29 de julio de 2026.", "fundamental": "**Últimos resultados (Q3 FY26, cerrado 31-mar-2026, reportado 29-abr-2026):**\n\n- HECHO: Revenue $82.9B, +18% a/a, vs consenso $81.39B; EPS diluido GAAP $4.27, +23% a/a, vs consenso $4.06 — beat en ambas líneas (CNBC, Yahoo Finance, 29-abr-2026).\n- HECHO: Ingreso operativo $38.4B, +20% a/a — margen operativo ~46% (Microsoft IR, 29-abr-2026); ingreso neto $31.78B vs $25.82B el año anterior (CNBC).\n- HECHO: Azure creció +40% a/a, sobre el rango guiado de 37-38%; negocio de IA con run-rate anual de $37B, +123% a/a; Copilot superó 20M de asientos (Alphastreet, abr-2026).\n- HECHO: Guidance Q4 FY26: Azure +39-40% cc; capex calendario 2026 de ~$190B, ~$35B sobre el consenso de Visible Alpha, +61% a/a (Alphastreet/TIKR, abr-2026).\n- HECHO: FCF cayó a $15.8B desde $20.3B un año antes, contra ingreso neto de $31.8B (Investing.com, 2026).\n\nLECTURA: El negocio operativo está en su mejor momento en años (reaceleración de Azure, monetización de IA tangible, márgenes intactos), pero el mercado exige prueba de retorno sobre el capex: la brecha entre utilidad neta ($31.8B) y FCF ($15.8B) es el núcleo del debate. La tesis alcista depende de que el FCF se recupere con fuerza desde FY27.", "valuacion": "- HECHO: P/E trailing ~23.4x (FinanceCharts, 17-jul-2026) / 24.4x (Macrotrends, 15-jul-2026); P/E forward ~19.5x.\n- HECHO vs. histórico propio: promedio 5 años ~32.2x, 10 años ~32.0x, pico jun-2024 38.5x, mínimo 5 años 26.5x (jun-2022) — MSFT cotiza hoy **debajo de su mínimo de 5 años previo** (FullRatio/Macrotrends, jul-2026).\n- HECHO vs. peers (jul-2026): AAPL ~35.0x, AMZN ~29.6x, GOOGL ~26.8x trailing; forward: MSFT ~19.5x vs GOOGL ~21.9x y AMZN ~27.8x — la más barata del grupo en ambas métricas (FinanceCharts/GuruFocus, 12-17-jul-2026).\n- HECHO: Price targets: promedio $558.77 (56 analistas, S&P Global); rango $400 – $870; otras muestras $557.96 (MarketBeat) y $589-592 sobre ~97 analistas (24/7 Wall St, 17-jul-2026). Upside implícito ~42-46%.\n\nLECTURA: La valuación relativa más atractiva de MSFT en al menos una década, contra su historia y contra peers. El descuento no es gratis: capitaliza el riesgo capex/FCF. Si el capex normaliza, hay doble palanca (crecimiento de EPS + re-rating); si no, el múltiplo bajo puede persistir.", "tecnico": "- HECHO: Precio ~$383-394 (fuentes difieren por día de corte, 17-18-jul-2026); **bajo** la media de 50 días ($401.88) y **bajo** la de 200 días ($438.98) — ambas en señal de venta (MarketBeat, jul-2026).\n- HECHO: RSI(14) ~53.5, zona neutral (TipRanks/AltIndex, jul-2026). Resumen de medias móviles MA5-MA200: 4 compra / 8 venta (Investing.com, jul-2026).\n- HECHO: Rebote de ~12% en el último mes dentro de una corrección mayor; +4% el 1-jul-2026 (acuerdo IA con Haleon, rotación hacia software) (ChartMill, jul-2026).\n- HECHO: Soportes: $368.57 y zona $349 (piso de 52 semanas); resistencias: $400-413, luego $427-440 (zona MM200) y $485 (Financhill/Barchart, jul-2026).\n\nLECTURA: Estructura de mediano plazo bajista (precio bajo ambas medias clave, MM200 descendente), con rebote de corto plazo aún no confirmado: recuperar y sostener $400-413 sería la primera señal constructiva; el cambio de tendencia real exige superar la MM200 (~$440). Mientras, es un intento de piso dentro de un downtrend, no una tendencia alcista.", "catalizadores": "**Catalizadores:**\n\n- **29-jul-2026 — Resultados Q4 FY26 + guidance FY27:** el evento clave; Azure guiado a +39-40% cc y primer test de la trayectoria de FCF.\n- **31-ago-2026 — Vesting del PSA de Nadella** (venta programada 10b5-1 del 80% de acciones netas) — evento conocido, puede generar ruido de titulares (SEC/StockTitan).\n- **2H 2026 — Copilot Cowork GA mundial** y SKUs Microsoft 365 Business con Copilot GA desde 1-jul-2026.\n- **Trimestres FY27 — Inflexión esperada del FCF** a medida que el capex 2026 (~$190B) entra en producción — la variable que valida o refuta la tesis.\n\n**Riesgos (por materialidad):**\n\n- **Capex sin retorno:** $190B en 2026 (+61% a/a) ya comprimió el FCF a $15.8B; si el retorno no aparece en FY27, el de-rating continúa.\n- **Concentración/diversificación de OpenAI:** acuerdo de $50B de OpenAI con AWS; alta concentración del backlog (~45% citado) — el negocio incremental futuro puede migrar.\n- **Desaceleración de Azure:** cualquier trimestre bajo el 39-40% guiado golpearía la única pata que sostiene la narrativa.\n- **Macro/rotación sectorial:** la acción ya demostró en 2026 que puede caer 30%+ con fundamentales intactos.\n- **Regulatorio/competencia cloud-IA:** presión de AWS y Google Cloud; riesgo antitrust no cuantificado en lo encontrado (no verificable en detalle).", "sentimiento": "- HECHO: Consenso Strong Buy: 34 buy / 1 hold / 1 sell (TipRanks vía Public.com) y Strong Buy en 56 analistas de S&P Global con target $558.77; sobre ~97 analistas, target promedio $589-592 (24/7 Wall St, 17-jul-2026).\n- HECHO: Acciones recientes: Argus target $510 (10-jul-2026); Morgan Stanley subió target de $625 a $650 y lo llamó top pick; Bernstein subió a $641 citando Azure. Último downgrade relevante: Stifel recortó de $540 a $392 (5-feb-2026) (Benzinga/MarketBeat).\n- HECHO: Insiders 2026: ~$51M vendidos en 34 ventas vs 1 compra abierta; Judson Althoff vendió 15,500 acciones a ~$461 (1-jun-2026); Nadella adoptó plan 10b5-1 (8-mar-2026); el director John Stanton **compró** 5,000 acciones (~$1.99M a $397.35) el 18-feb-2026 (StockTitan/MarketBeat).\n- HECHO: Tono de noticias 30-60 días constructivo — encuesta Jefferies con Azure como cloud primario del 55% de CIOs de EE.UU. vs 28% AWS; GA de Copilot Cowork; +4% el 1-jul por acuerdo con Haleon.\n\nLECTURA: Sentimiento de analistas claramente alcista y mejorando, en contraste con la acción del precio: el mercado (que vendió) y el sell-side (que compra) están en lados opuestos. Las ventas de insiders son mayormente programadas (10b5-1) y hay una compra abierta de un director cerca del precio actual, lo que resta señal negativa. El riesgo es que el consenso esté anclado a targets pre-corrección.", "conclusion": "La tesis funciona si el 29 de julio Microsoft entrega Azure en o sobre el 39-40% guiado y, sobre todo, si el guidance FY27 muestra capex desacelerando como porcentaje de ventas y un camino creíble de recuperación del FCF: con P/E forward ~19.5x, el más bajo del grupo de mega-caps y muy por debajo de su media histórica de ~32x, la combinación de beat + disciplina de capital podría disparar un re-rating hacia la zona de targets ($510-650). La tesis se invalida si: (a) Azure desacelera bajo lo guiado, (b) el capex vuelve a subir sin mejora de FCF (otro trimestre con FCF < $20B sería mala señal), o (c) OpenAI profundiza su migración a AWS erosionando el backlog. Técnicamente, perder $368.57 reabriría el camino al piso de 52 semanas ($349); recuperar $440 (MM200) confirmaría el giro. Es una apuesta de calidad a descuento con fecha de veredicto concreta, no un momentum trade."}, "scores": {"tecnica": {"score": 35, "just": "Precio bajo la MM50 ($401.88) y MM200 ($438.98), ambas en venta, y ~29% bajo el máximo de 52s: tendencia de fondo bajista. El rebote de +12% en un mes y RSI neutral (53.5) evitan un puntaje menor, pero no hay confirmación de giro sobre $400-413."}, "fundamental": {"score": 78, "just": "Crecimiento y márgenes excelentes: revenue +18%, EPS +23%, Azure +40%, margen operativo ~46%, y valuación inusualmente razonable (P/E 23-24x vs 32x histórico). Descuento por la caída del FCF a $15.8B ante capex de $190B: la calidad es alta pero la conversión a caja está transitoriamente rota."}, "sentimiento": {"score": 68, "just": "Consenso Strong Buy (34/1/1), targets $510-650 con upgrades recientes de Morgan Stanley y Bernstein, y noticias constructivas. Se descuenta porque el precio cayó ~30% en 2026 (el mercado votó en contra), insiders son vendedores netos en monto y el último downgrade (Stifel, feb-2026) apuntó justo al riesgo capex."}, "riesgo": {"score": 60, "just": "Mega-cap de $2.93T con liquidez máxima y negocio diversificado, lo que acota el riesgo estructural; pero el drawdown realizado de ~30% en 2026, la dependencia de un evento cercano (earnings 29-jul) y la incógnita capex/FCF elevan la volatilidad efectiva."}, "conviccion": {"score": 72, "just": "Tesis falsable con catalizador fechado: earnings y guidance FY27 el 29-jul-2026, con vara concreta (Azure 39-40%, trayectoria de FCF). Asimetría favorable con forward P/E ~19.5x bajo mínimos de 5 años y target consenso +42%; el veredicto del capex tomará varios trimestres, no uno."}}, "sources": ["Yahoo Finance (18-jul-2026)", "Investing.com (17-jul-2026)", "Microsoft IR — press release Q3 FY26 (29-abr-2026)", "CNBC (29-abr-2026)", "Alphastreet (abr-2026)", "TIKR (2026)", "Public.com / TipRanks (jul-2026)", "24/7 Wall St (17-jul-2026)", "MarketBeat (jul-2026)", "Benzinga (jul-2026)", "FinanceCharts (12-17-jul-2026)", "Macrotrends / FullRatio (15-jul-2026)", "GuruFocus (jul-2026)", "StockTitan — Form 4 / 10b5-1 (2026)", "Financhill / Barchart (jul-2026)", "Jefferies CIO survey vía prensa (jul-2026)"], "change": {"day": -1.13, "week": 1.0}, "events": [{"date": "2026-07-29", "label": "Resultados Q4 FY26 + guidance FY27 (Azure guiado +39-40% cc)", "kind": "earnings"}, {"date": "2026-08-31", "label": "Vesting del PSA de Nadella (venta programada 10b5-1)", "kind": "corporate"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "SP:SPX", "label": "S&P 500", "relative_performance_30d": 4.98, "relative_performance_ytd": -27.06, "price_percentile_1y": 23.5, "partial": false}, "technical": {"price": 397.75, "change_1d_pct": -1.13, "change_1w_pct": 1.0, "rsi": 53.4, "macd": 0.5919, "macd_signal": -2.5949, "sma20": 383.8225, "sma50": 400.8178, "sma200": 438.1605, "ema12": 392.3258, "ema26": 391.7339, "pct_vs_sma20": 3.63, "pct_vs_sma50": -0.77, "pct_vs_sma200": -9.22, "volume_today": 24126632, "volume_avg20": 42575270.0, "volume_ratio": 0.57, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 23.5, "vs_benchmark_30d_pct": 4.98, "perf_1m_pct": 5.27, "perf_ytd_pct": -17.89}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "SP:SPX", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/MSFT.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "NVDA", "company": "NVIDIA Corporation", "statsList": [["Precio", "$207.29 (21-jul-2026)"], ["Rango 52 sem.", "$164.07 – $236.54"], ["Market cap", "$4.91T"], ["P/E", "31.1x trailing / 20.3x forward"], ["Target consenso", "$301.62 (61 analistas)"], ["Próx. earnings", "26-ago-2026 (Q2 FY27)"], ["Técnico (auto)", "RSI 52.2 · MACD +0.19 / señal -0.64 (TradingView, 21-jul-2026)"]], "sections": {"resumen": "NVIDIA sigue siendo el eje del ciclo de infraestructura de IA: en el Q1 FY27 (20-may-2026) creció 85% a/a con margen bruto de 75% y guió $91B para el Q2, muy por sobre el consenso. La acción, sin embargo, corrige ~14% desde su máximo de 52 semanas ($236.54) en medio de un selloff sectorial por dudas sobre la sostenibilidad del capex de hiperescaladores y el avance del silicio custom. LECTURA: la tensión central es fundamentales excepcionales y valuación históricamente barata (P/E 31x vs promedio propio de 53x a 10 años) contra un sentimiento de mercado que empezó a cuestionar la duración del ciclo.", "fundamental": "- HECHO: Q1 FY27 (reportado 20-may-2026): revenue récord de $81.6B, +85% a/a y +20% t/t, vs consenso de ~$78.8B; EPS non-GAAP $1.87 vs estimado $1.76 (beat); EPS GAAP $2.39; margen bruto GAAP 74.9% / non-GAAP 75.0% (8-K SEC, CNBC 20-may-2026).\n- HECHO: Data Center facturó $75.2B (+92% a/a): compute $60.4B (+77%) y networking $14.8B (+199%). Por cliente: hiperescaladores ~$38B (+12% t/t) y ACIE ~$37B (+31% t/t) (Yahoo Finance / Futurum Group, may-2026). Ingreso neto GAAP $58.3B, +211% a/a. LECTURA: que el EPS GAAP supere al non-GAAP sugiere ganancias no operativas infladas en el GAAP; el $1.87 non-GAAP es la cifra operativa comparable.\n- HECHO: Guidance Q2 FY27 de $91B vs consenso $86.84B; recompra adicional autorizada por $80B y dividendo trimestral elevado 25x, de $0.01 a $0.25 (StockTitan sobre el 8-K, may-2026). TTM: revenue $253.5B (+70.7%), ingreso neto $159.6B, EPS $6.53 (StockAnalysis, 17-jul-2026).\n\nLECTURA: El moat sigue intacto: CUDA como estándar de software, liderazgo en networking (el segmento que más crece, +199%) y cadencia anual de producto (Blackwell → Rubin). El balance con $80B extra de recompra y dividendo creciente refleja generación de caja masiva. Riesgo fundamental principal: concentración en pocos hiperescaladores y un ciclo de capex que el mercado empieza a cuestionar.", "valuacion": "- HECHO: P/E trailing 31.1x y forward 20.3x al 17-jul-2026 (StockAnalysis); FullRatio/Public.com registran 31.8x al 16-jul-2026. Contra su propio histórico: promedio 10 años 53.7x, 5 años 69.0x, 3 años 59.9x, promedio 12 meses 44.4x — cotiza ~40% bajo su media de una década (FullRatio/Public.com, jul-2026).\n- HECHO: Vs peers, su P/E es menor que el de AMD y TXN, mayor que MSFT y QCOM (Public.com, jul-2026). Cifras puntuales de P/E de AMD y Broadcom a mediados de julio 2026: no verificable en las fuentes consultadas.\n- HECHO: Price targets: promedio $301.62 (61 analistas, S&P Global vía StockAnalysis, jul-2026); TipRanks promedio $309.94. Máximo $500 (Baird, 21-may-2026), mínimo $180-215 según la fuente. Upside implícito ~49-54% desde $202.81.\n\nLECTURA: La compresión de múltiplo con EPS creciendo +110% TTM implica que el mercado descuenta desaceleración fuerte hacia FY28. Si el guidance de $91B se cumple y Rubin escala, el forward de ~20x es bajo para el perfil de crecimiento; es el argumento central de los alcistas y explica el gap enorme entre precio y target consenso.", "tecnico": "- HECHO: Al 16/17-jul-2026: media de 50 días ~$205.3 y de 200 días ~$194.6 (AltIndex/ChartMill, jul-2026). Con el cierre en $202.81, el precio está **por debajo de la MM50 pero por encima de la MM200**. RSI ~53.7 (neutral); MACD sobre la línea de señal según ChartMill (jul-2026).\n- HECHO: Soportes: zona $196.50-198.36 (confluencia de tendencias, ChartMill) y soporte mayor ~$165 (mínimo de 6 meses); resistencia ~$235.5 (máximo de 52 semanas) (AltIndex/ChartMill, jul-2026).\n- HECHO: La acción cayó ~2.2-2.4% entre el 16 y 17 de julio dentro de un selloff sectorial de chips de IA que borró más de $1T de capitalización del sector (CryptoBriefing/CBS News, jul-2026) y está rindiendo menos que el mercado en 2026 (Motley Fool, 12-jul-2026).\n\nLECTURA: Estructura de mediano plazo aún alcista (MM50 > MM200, precio sobre MM200), pero el corto plazo se deterioró: pérdida de la MM50, ~14% bajo el máximo y momentum neutro. Soporte inmediato $196-198; perderlo abre camino a la MM200 (~$195) y luego $165. Recuperar $205-210 restauraría el sesgo alcista de corto plazo.", "catalizadores": "**Catalizadores:**\n\n- **26-ago-2026 — Earnings Q2 FY27:** guidance propio de $91B vs consenso previo $86.84B; el beat/miss definirá el tono del semestre.\n- **2H 2026 — Ramp de Vera Rubin:** en producción plena según NVIDIA Newsroom (jul-2026), tras un retraso de semanas por un problema del lid térmico y calificación de HBM4 de SK Hynix; proyección anual mantenida en 1.7-1.8M unidades (KeyBanc vía Memeburn, jul-2026).\n- **Fechas por confirmar — flexibilización de exportaciones a China:** Jensen Huang no descarta Rubin para China si se relajan restricciones (Wccftech, jul-2026).\n- **Continuo — recompra de $80B y dividendo de $0.25/trim** como soporte de demanda de la acción.\n\n**Riesgos (por materialidad):**\n\n- **Desaceleración del capex de hiperescaladores:** la ansiedad dominante del selloff de julio; el gasto en IA aún no muestra retornos claros (CBS News, jul-2026).\n- **Competencia de silicio custom:** la ola de chips propios de grandes tecnológicas comenzó a despacharse a fines de junio/julio 2026 (CryptoBriefing).\n- **China/regulatorio:** Commerce cerró el loophole de exportación vía entidades chinas en el exterior; NVIDIA recortó más de la mitad de sus compradores asiáticos aprobados por controles anti-desvío (Yahoo Finance, jul-2026).\n- **Cadena de suministro:** HBM4 (SK Hynix) fue el cuello de botella del retraso de Rubin; SK Hynix planea frenar expansión de HBM (Memeburn, jul-2026).\n- **Concentración de clientes:** hiperescaladores ~50% del data center (Futurum, may-2026).", "sentimiento": "- HECHO — Analistas: consenso Strong Buy: TipRanks 36 buy / 1 hold / 0 sell, PT promedio $309.94; S&P Global (61 analistas) PT promedio $301.62, rango $180-$500 (jul-2026). Street-high $500 de Baird (21-may-2026).\n- HECHO — Insiders: los cinco ejecutivos más senior (todo el C-suite) vendieron el mismo día, 17-jun-2026 (Kresmion Research, 26-jun-2026); el director Mark A. Stevens vendió 885,000 acciones por ~$186M el 18-jun-2026 (MarketScreener); TECHi reporta ~$3.3B en ventas de ejecutivos acumuladas. La clasificación 10b5-1 de las ventas de jun-2026 no es verificable en las fuentes consultadas. No se encontró compra de insiders relevante.\n- HECHO — Tono de noticias: negativo en las últimas 4-6 semanas: selloff de chips de IA >$1T, dudas sobre capex, retraso de Rubin, endurecimiento de export controls (CBS/CryptoBriefing/Memeburn, jul-2026).\n\nLECTURA: hay divergencia clara: el sell-side sigue unánimemente alcista con targets 50% arriba, pero el flujo de noticias y la venta coordinada de insiders enfrían el sentimiento de corto plazo. El patrón de venta en un mismo día sugiere ventana de trading planificada más que señal direccional, pero la ausencia total de compras de insiders es un dato a monitorear.", "conclusion": "La tesis funciona si: (1) el 26-ago hay beat del guidance de $91B con guía Q3 fuerte, validando que el capex de hiperescaladores no se frena; (2) el ramp de Rubin avanza sin nuevos retrasos con las 1.7-1.8M unidades intactas; (3) el múltiplo se re-expande desde 20x forward hacia niveles históricos, lo que por sí solo cerraría parte del gap de ~50% contra el target consenso ($301.62). La invalidarían: (1) recorte o guía plana de capex de algún hiperescalador grande; (2) evidencia de que el silicio custom captura workloads de inferencia a escala, comprimiendo el margen del 75%; (3) pérdida técnica del soporte $196-198 y luego de la MM200 (~$195), que convertiría la corrección en cambio de tendencia con siguiente piso en ~$165; (4) escalada regulatoria con China que afecte también a Rubin. El 26 de agosto es el punto de falsación más cercano y concreto de la tesis."}, "scores": {"tecnica": {"score": 60, "just": "Estructura de fondo alcista: MM50 ($205.3) sobre MM200 ($194.6) y precio sobre la MM200, con RSI neutral (53.7). Pero el precio perdió la MM50, está ~14% bajo el máximo de 52s y cae dentro de un selloff sectorial: lateral con sesgo de corrección, no tendencia alcista confirmada multi-marco."}, "fundamental": {"score": 90, "just": "Crecimiento de +85% a/a a $81.6B con margen bruto de 75%, beat de revenue y EPS, guidance $91B sobre consenso, $80B de recompra. Moat de CUDA + networking (+199%) intacto y valuación razonable: 31x trailing / 20x forward vs promedio propio de 53x a 10 años. Descuento: concentración en hiperescaladores."}, "sentimiento": {"score": 65, "just": "Consenso sell-side unánime: Strong Buy con 36 buy/1 hold/0 sell (TipRanks) y PT promedio $301.62 con ~50% upside. En contra: todo el C-suite vendió el 17-jun-2026 y un director $186M, y el tono de noticias de julio es negativo (selloff IA >$1T, retraso Rubin, export controls)."}, "riesgo": {"score": 45, "just": "Liquidez máxima ($4.9T de cap) y balance fortísimo acotan riesgo de solvencia, pero el perfil es de alta volatilidad: drawdown de ~14% en semanas, sector que borró >$1T en julio, exposición binaria a decisiones de capex de pocos clientes y a shocks regulatorios de China. Riesgo solo parcialmente acotado."}, "conviccion": {"score": 78, "just": "Tesis falsable con catalizador concreto y fechado: earnings 26-ago-2026 contra guía propia de $91B, más ramp de Rubin en 2H26 con proyección verificable (1.7-1.8M unidades). Asimetría favorable si el forward P/E de 20x es correcto vs historia; se descuentan puntos porque el debate del capex no se resuelve en un solo trimestre."}}, "sources": ["StockAnalysis.com — quote y forecast NVDA (17-jul-2026)", "Yahoo Finance / CNBC / MarketBeat — precio y rango 52s (17-jul-2026)", "SEC 8-K NVIDIA Q1 FY27 press release (20-may-2026)", "CNBC — cobertura earnings Q1 FY27 (20-may-2026)", "StockTitan — dividendo y buyback (may-2026)", "Yahoo Finance / Futurum Group — desglose Data Center (may-2026)", "TipRanks — ratings y price target (jul-2026)", "S&P Global vía StockAnalysis — consenso 61 analistas (jul-2026)", "FullRatio / Public.com — P/E actual e histórico (16-jul-2026)", "AltIndex / ChartMill — MM50/MM200, RSI, soportes (jul-2026)", "Memeburn / KeyBanc — retraso y ramp de Vera Rubin (jul-2026)", "NVIDIA Newsroom — Vera Rubin en producción plena (jul-2026)", "Yahoo Finance / Wccftech — export controls China (jul-2026)", "CBS News / CryptoBriefing — selloff sector chips IA (jul-2026)", "Kresmion Research — ventas de insiders C-suite (26-jun-2026)", "MarketScreener — venta Mark Stevens $186M (jun-2026)", "Motley Fool — NVDA vs mercado 2026 (12-jul-2026)"], "change": {"day": 1.97, "week": 2.21}, "events": [{"date": "2026-08-26", "label": "Resultados Q2 FY27", "kind": "earnings"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "SP:SPX", "label": "S&P 500", "relative_performance_30d": -0.31, "relative_performance_ytd": 0.02, "price_percentile_1y": 59.6, "partial": false}, "technical": {"price": 20
