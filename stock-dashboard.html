_percentile_1y": 64.1, "vs_benchmark_30d_pct": 3.08, "perf_1m_pct": 3.38, "perf_ytd_pct": 3.85}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "TVC:DXY", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/FX-USDCLP.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "EUR/USD", "company": "Euro / Dólar", "baseCurrency": "EUR", "statsList": [["Precio", "1.14063 (21-jul-2026)"], ["Rango 80 días", "1.133 – 1.182"], ["Tasas BCE / Fed", "2,25% / 3,50–3,75%"], ["COT EUR (14-jul)", "-12,605 netos (corto)"], ["DXY", "100.76 (17-jul-2026)"], ["Próximo evento", "BCE 23-jul · FOMC 28-29-jul"], ["Técnico (auto)", "RSI 43.1 · MACD -0.00 / señal -0.00 (TradingView, 21-jul-2026)"]], "change": {"day": 0.07, "week": -0.27}, "customSections": [{"title": "Resumen ejecutivo", "nav": "Resumen", "body": "EUR/USD cerró la semana en **1.14382**, dentro de un rango contenido tras una caída de ~4% desde los máximos de abril (~1.182) y un rebote desde los mínimos de junio (~1.133). El cuadro es de **equilibrio inestable con sesgo de cautela**:\n\n- **HECHO:** El diferencial de tasas sigue siendo claramente favorable al USD (Fed Funds 3.50–3.75% vs. tasa de depósito BCE 2.25%), aunque el BCE **subió** 25 pb en junio mientras la Fed está en pausa — el diferencial se está cerrando en el margen a favor del EUR.\n- **HECHO:** La semana entrante es de alto riesgo de evento: **reunión del BCE el jueves 23-jul** (mercado descuenta ~95% de mantención) y **FOMC el 28-29-jul** (~87–89% de mantención).\n- **HECHO:** Los especuladores están **netos cortos en EUR** (-12,605 contratos, COT al 14-jul-2026), aunque recortando cortos.\n- **LECTURA:** Los riesgos de cola (guerra en Medio Oriente y shock energético asimétrico contra Europa, reapertura de la disputa arancelaria EEUU-UE, crisis política/energética en Francia) recaen desproporcionadamente sobre el EUR.\n\n**Señal resultante: Caution (Grado C — 46/100).** Sin ventaja clara para comprar EUR; el par sigue siendo un rango 1.133–1.155 dominado por bancos centrales y geopolítica.\n\n---"}, {"title": "Diferencial de tasas y política monetaria", "nav": "Tasas", "body": "**BCE (HECHO):**\n- Tasa de depósito vigente: **2.25%**, tras una **subida de 25 pb decidida en la reunión de junio (17-jun-2026)** en respuesta a la presión inflacionaria derivada del shock energético (ECB / Trading Economics, jul-2026).\n- Próxima reunión: **jueves 23-jul-2026** (decisión 13:45 CET, conferencia de Lagarde 14:30 CET) — es decir, **sí hay reunión la semana del 20-jul**. Es reunión sin proyecciones de staff.\n- Expectativas de mercado: **~95.3% de mantención en 2.25%**, con una cola alcista de ~3.4% para +25 pb (rateprobability.com / ecb-watch, consultado 19-jul-2026).\n- Tono de Lagarde: **hawkish**. El 2-jul defendió la subida de junio citando proyecciones de inflación en torno al 3% para 2026 y la necesidad de mantenerse vigilante (ECB Forum Sintra, jul-2026).\n\n**Fed (HECHO):**\n- Rango objetivo vigente: **3.50%–3.75%**; en junio el FOMC mantuvo y señaló que la inflación sigue elevada respecto de la meta del 2% (core PCE ~2.9%).\n- FOMC 28-29-jul-2026: **~89% de probabilidad de mantención** según CME FedWatch (~86.7% según fuentes alternativas al 18-jul-2026). Consenso: tasas sin cambios al menos hasta el otoño boreal, condicionado a progreso en inflación.\n- Tono del presidente de la Fed, Kevin Warsh (Sintra, 1-jul-2026): sin señales para julio, pero \"los precios están demasiado altos\" — sesgo restrictivo.\n\n**Divergencia (LECTURA):** El **nivel** del diferencial (~125–150 pb en tasas de política; 2 años: UST 4.16% vs. Schatz ~2.6–2.8%) favorece al USD y sostiene el carry en contra del EUR. Pero la **dirección** favorece marginalmente al EUR: el BCE está subiendo (y conserva cola hawkish) mientras la Fed está estática. Riesgo señalado por estrategas: que el mercado retire el tightening del BCE antes que el de la Fed, limitando el alza del EUR (VT Markets, jul-2026).\n\n---"}, {"title": "Balanza de pagos y flujos", "nav": "Balanza", "body": "**Cuenta corriente (HECHO):**\n- Superávit de la eurozona de **€25 mil millones en mayo-2026** (+€8 mm m/m): bienes +€16 mm, servicios +€14 mm, renta primaria +€12 mm, renta secundaria -€18 mm (BCE, 17-jul-2026).\n- Acumulado 12 meses a mayo-2026: **€272 mm (1.7% del PIB)**, frente a €318 mm (2.0% del PIB) un año antes — **superávit en contracción**, principalmente por menor superávit de bienes (de €350 mm a €286 mm) (BCE, 17-jul-2026).\n- Proyección del staff del Eurosistema (jun-2026): caída adicional a **~1.3% del PIB en 2026** por mayores precios de importación de energía a raíz de la guerra en Medio Oriente (ECB Economic Bulletin, 2026).\n\n**Flujos de portafolio 2026 (HECHO/LECTURA):**\n- HECHO: La rotación hacia Europa de comienzos de año **se revirtió a mitad de 2026**: la porción de flujos de ETFs de renta variable de EEUU hacia fondos centrados en EEUU subió todos los meses del año, alcanzando ~85% en junio (iShares H1-2026). En Europa, los flujos hacia productos centrados en EEUU se **cuadruplicaron** interanual (Morningstar, 2026). En money markets, USD fue la clasificación más comprada (+€15.98 mm) mientras los fondos EUR registraron salidas (-€5.06 mm) (Lipper/LSEG, may-2026).\n- LECTURA: El colchón estructural de cuenta corriente sigue siendo un soporte de fondo para el EUR, pero se erosiona por energía, y los flujos de portafolio han vuelto a favorecer activos en USD por el atractivo relativo de las tasas americanas. Neto: **levemente negativo para el EUR**.\n\n---"}, {"title": "Posicionamiento", "nav": "Posicionamiento", "body": "**HECHO — CFTC COT, Euro FX (CME), datos al martes 14-jul-2026, publicado 17-jul-2026 (Tradingster/CFTC):**\n- No comerciales (especuladores): largos 230,307 / cortos 242,912 → **neto -12,605 contratos (corto)**.\n- Variación semanal: +6,877 largos, +3,255 cortos → **neto +3,622 hacia largo** (los cortos se están recortando).\n- Interés abierto: 799,495 contratos — mercado profundo y líquido.\n- Tendencia de meses: el neto largo de ~+21,000 contratos de marzo-2026 (percentil 15 del rango de 52 semanas, mínimo de 1 año) se ha degradado hasta territorio **neto corto** (AhaSignals/Investing.com, 2026).\n\n**LECTURA:** Posicionamiento levemente bajista en EUR pero **cercano a plano y mejorando** — no hay extremo de posicionamiento que genere señal contraria potente en ninguna dirección. Un BCE hawkish el 23-jul podría forzar cobertura de cortos (riesgo alcista táctico); la señal estructural es neutral-negativa.\n\n---"}, {"title": "Análisis técnico", "nav": "Técnico", "body": "**HECHO — TradingView (17-jul-2026):**\n- Precio: **1.14382**.\n- RSI(14) diario: **47.2** — neutral.\n- MACD(12,26): **-0.0025** vs. señal **-0.0036**; histograma **+0.0011** — momentum bajista moderándose.\n- Medias: precio **sobre SMA20 (1.1414)** pero **bajo SMA50 (1.1530)**.\n- Ventana 80 días: caída desde máximos ~**1.182** (abril) hasta mínimos ~**1.133** (junio); rebote reciente a ~1.148 y cierre 1.1438.\n\n**LECTURA:**\n- La estructura de mediano plazo sigue siendo **correctiva/bajista** (máximos y mínimos decrecientes desde abril; precio bajo SMA50), pero el rebote desde 1.133 con histograma MACD al alza y recuperación de la SMA20 sugiere que la caída **perdió fuerza**.\n- Soportes: 1.1414 (SMA20), luego 1.133 (mínimo de junio — pivote clave). Resistencias: 1.148 (techo del rebote), 1.1530 (SMA50), luego zona 1.16.\n- Un cierre diario sobre la SMA50 (~1.153) convertiría el rebote en cambio de tendencia; la pérdida de 1.133 reactivaría el tramo bajista hacia 1.12. Con RSI en 47 y precio entre medias, el veredicto técnico es **neutral** (par ni alcista ni bajista con convicción).\n\n---"}, {"title": "Intervención y riesgo de banco central", "nav": "Intervención", "body": "**HECHO/LECTURA:** El riesgo de intervención cambiaria **directa** en EUR/USD es históricamente bajo (última intervención coordinada relevante: 2000/2011); ni el BCE ni el Tesoro de EEUU han señalado nada en 2026 a los niveles actuales. El riesgo relevante es **de cola**:\n\n1. **Energía / Medio Oriente (HECHO):** Tras los ataques de Israel-EEUU contra Irán (28-feb-2026) y la disrupción del Estrecho de Ormuz (~1/5 del suministro global de GNL afectado), el gas europeo opera en ~€46/MWh; los escenarios de crisis prolongada de la Comisión Europea/JRC contemplan petróleo hasta ~USD 180/bbl y gas ~€80/MWh en 4T-2026 (JRC, may-2026; Bloomberg, 9-jul-2026). **LECTURA:** shock asimétricamente negativo para el EUR (Europa importadora neta; EEUU exportador de energía).\n2. **Aranceles EEUU-UE (HECHO):** El acuerdo provisional del 20-may-2026 (arancel máximo ~15% a productos UE) coexiste con amenazas de Trump de tarifas \"mucho más altas\" si no se ratifica, reabriendo la guerra comercial (ING, Euronews, 2026). **LECTURA:** riesgo bajista para crecimiento europeo y EUR.\n3. **Política europea (HECHO):** Crisis política y presupuestaria en Francia, con hoja de ruta energética bloqueada y reactores nucleares parados por olas de calor (Energynews/MNI, 2026). **LECTURA:** prima de riesgo político latente en activos EUR.\n\n**Balance:** riesgo de intervención bajo, pero **riesgo de cola elevado y sesgado en contra del EUR**.\n\n---"}, {"title": "Correlaciones macro", "nav": "Correlaciones", "body": "- **DXY (HECHO):** 100.76 al 17-jul-2026, prácticamente plano en la sesión (Trading Economics/FXStreet). Con EUR ~58% del índice, la correlación inversa DXY–EUR/USD **se mantiene plenamente operativa**: el estancamiento del DXY sobre 100 es el espejo del rango 1.13–1.15 del par.\n- **Diferencial de bonos (HECHO):** UST 10a **4.55%** vs. Bund 10a **3.14%** → spread ~**141 pb** a favor de EEUU (17-jul-2026). En 2 años: UST **4.16%** (16-jul) vs. Schatz **~2.6–2.8%** (máximo desde jul-2024) → ~140–155 pb.\n- **LECTURA:** El spread 10a se ha comprimido desde niveles de 2024–25 (>180 pb) por la subida de los Bunds (BCE hawkish + fiscal alemán), coherente con un EUR/USD que dejó de caer. La correlación negativa entre spread UST–Bund y EUR/USD **se mantiene**; para que el par supere 1.155 de forma sostenida se requeriría compresión adicional del diferencial (BCE subiendo o Fed girando dovish), que hoy no está descontada para julio.\n\n---"}, {"title": "Conclusión", "nav": "Conclusión", "body": "EUR/USD en 1.14382 es un par **en rango, sin ventaja direccional clara**: el carry y los riesgos de cola favorecen al USD; la dirección de la política monetaria (BCE subiendo, Fed en pausa) y un posicionamiento corto en corrección dan soporte táctico al EUR. La semana del 20-jul (BCE 23-jul) y el FOMC del 28-29-jul definirán el próximo tramo.\n\n**Qué validaría una tesis alcista en EUR (Buy EUR):** sorpresa hawkish del BCE el 23-jul y/o giro dovish de la Fed el 29-jul; cierre diario sobre la SMA50 (~1.1530) con compresión del spread UST–Bund bajo ~130 pb; distensión en Medio Oriente (gas < €40/MWh) y ratificación limpia del acuerdo arancelario; COT cruzando a neto largo.\n\n**Qué la invalidaría (riesgo bajista):** pérdida del mínimo de junio (1.133), que abriría 1.12; escalada en Ormuz con petróleo hacia $150–180/bbl y gas hacia €80/MWh, o ruptura arancelaria EEUU-UE; Fed re-hawkish con BCE forzado a pausar; agravamiento de la crisis política francesa con ampliación de spreads OAT–Bund.\n\n> *Este informe es una herramienta de investigación educativa generada con IA. No constituye asesoría de inversión ni recomendación de compra/venta. Verifique todos los datos de forma independiente antes de tomar decisiones financieras.*"}], "scoreIndex": 8, "customCats": [{"key": "tasas", "name": "Diferencial de Tasas y Política Monetaria", "weight": 30}, {"key": "macro", "name": "Fundamentales Macro", "weight": 20}, {"key": "tecnico", "name": "Técnico", "weight": 20}, {"key": "posicionamiento", "name": "Posicionamiento y Sentimiento", "weight": 15}, {"key": "intervencion", "name": "Riesgo de Intervención / Cola", "weight": 15}], "scores": {"tasas": {"score": 48, "just": "El nivel del diferencial (~125–150 pb en política y en 2 años) sigue pagando por estar en USD, pero la dirección (BCE subió en junio con cola hawkish para el 23-jul; Fed estática) cierra la brecha en el margen. Neutral con leve sesgo negativo por el carry."}, "macro": {"score": 45, "just": "Superávit de cuenta corriente aún sólido (€272 mm, 1.7% PIB) pero en contracción por energía, y flujos de portafolio rotando de vuelta a EEUU. El shock energético golpea más el crecimiento europeo que el americano."}, "tecnico": {"score": 50, "just": "RSI 47.2 neutral, MACD bajista moderándose, precio sobre SMA20 pero bajo SMA50 dentro de una estructura correctiva desde abril (TradingView, 17-jul). Ni alcista ni bajista con convicción: rango."}, "posicionamiento": {"score": 47, "just": "COT al 14-jul: especuladores netos cortos -12,605 contratos, aunque recortando desde el neto largo de marzo. Levemente negativo, sin extremo contrario."}, "intervencion": {"score": 40, "just": "Riesgo de intervención directa bajo, pero colas gruesas y asimétricas contra el EUR: guerra Irán/energía (escenarios de $180/bbl), reapertura arancelaria EEUU-UE y crisis política francesa."}}, "sources": ["TradingView (17-jul-2026, técnico verificado en tiempo real)", "ECB — decisiones de política monetaria (jun-2026), balanza de pagos mayo-2026 (17-jul-2026), Economic Bulletin", "rateprobability.com / ecb-watch (19-jul-2026)", "Finance Calendar — reunión BCE 23-jul-2026", "Trading Economics — tasas eurozona, DXY, Bund 10a, Schatz 2a", "CME FedWatch / centralbank.watch", "CNBC — Warsh en Sintra (1-jul-2026)", "VT Markets (jul-2026)", "iShares H1-2026", "Morningstar", "Lipper/LSEG (may-2026)", "Tradingster/CFTC — COT Euro FX (14-jul-2026)", "AhaSignals / Investing.com", "FXStreet (17-jul-2026)", "Advisor Perspectives — UST 10a (17-jul-2026)", "JRC Comisión Europea (27-may-2026)", "Bloomberg — gas europeo (9-jul-2026)", "ING THINK", "Euronews (may-2026)", "Energynews/MNI (2026)"], "events": [{"date": "2026-07-23", "label": "Reunión del BCE", "kind": "macro"}, {"date": "2026-07-29", "label": "FOMC 28-29 jul — decisión de tasas de la Fed", "kind": "macro"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "TVC:DXY", "label": "DXY", "relative_performance_30d": -0.71, "relative_performance_ytd": -5.79, "price_percentile_1y": 10.8, "partial": false}, "technical": {"price": 1.14063, "change_1d_pct": 0.07, "change_1w_pct": -0.27, "rsi": 43.1, "macd": -0.0024, "macd_signal": -0.0031, "sma20": 1.1416, "sma50": 1.1509, "sma200": 1.1636, "ema12": 1.142, "ema26": 1.1445, "pct_vs_sma20": -0.08, "pct_vs_sma50": -0.89, "pct_vs_sma200": -1.97, "volume_today": 16622, "volume_avg20": 194775.0, "volume_ratio": 0.09, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 10.8, "vs_benchmark_30d_pct": -0.71, "perf_1m_pct": -0.41, "perf_ytd_pct": -2.83}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "TVC:DXY", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/FX-EURUSD.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "USD/JPY", "company": "Dólar / Yen japonés", "baseCurrency": "USD", "statsList": [["Precio", "163.098 (21-jul-2026)"], ["Rango 80 días", "155.00 – 163.04"], ["Tasas Fed / BoJ", "3,50–3,75% / 1,00%"], ["COT JPY (10-jul)", "-123,800 netos (corto)"], ["Riesgo intervención", "zona gatillo 160-163 (MoF)"], ["Próximo evento", "FOMC 29-jul · BoJ 30-31-jul"], ["Técnico (auto)", "RSI 65.0 · MACD +0.55 / señal +0.54 (TradingView, 21-jul-2026)"]], "change": {"day": -0.05, "week": 0.46}, "customSections": [{"title": "Resumen ejecutivo", "nav": "Resumen", "body": "USD/JPY rompió el nivel de **163.00 el martes 21-jul-2026**, tocando **163.04** intradía — su nivel más débil para el yen **desde diciembre de 1986** (FXStreet, 21-jul-2026). El movimiento se apoya en un giro claramente hawkish de la Fed bajo su nuevo presidente **Kevin Warsh** (asumió en mayo-2026), que en su primera reunión (17-jun) elevó la proyección de inflación PCE 2026 a 3.6% y llevó a 9 de 18 miembros del FOMC a proyectar al menos una subida en 2026, más un salto en la demanda de refugio del dólar por la escalada de tensiones EE.UU.-Irán y petróleo sobre US$90 (Moneta Markets / yournews.com, 20-jul-2026). El BoJ, en cambio, mantiene su 1.00% con la próxima subida vista recién en el 4T-2026. El diferencial de tasas se mantiene amplio (~262 pb nominal), y aunque el posicionamiento corto en yen se alivió algo (CFTC pasó de -155.1K a -123.8K contratos al 10-jul), el par cotiza ya **por encima** de la zona de intervención de abril-mayo (¥11.73 billones) y de un episodio adicional de intervención sospechada el 2-3 de julio. La ministra de Finanzas Katayama repitió el 17-jul su advertencia de \"acción decisiva\", sin frenar el avance. El mercado, de nuevo, desafía el límite de Tokio, ahora en un territorio sin precedentes en 40 años. **Score compuesto: ~50/100 — Grado C, \"Caution\" con riesgo de cola elevado.**\n\n---"}, {"title": "Diferencial de tasas y política monetaria", "nav": "Tasas", "body": "**Reserva Federal — HECHO:** Bajo su nuevo presidente **Kevin Warsh** (debut el 17-jun-2026), la Fed mantuvo el rango en **3.50%–3.75%** pero adoptó un tono decididamente hawkish: elevó su proyección de inflación PCE 2026 a **3.6%** (desde 2.7%) y **9 de 18 participantes** del FOMC proyectan al menos una subida en 2026 — un giro radical frente a las expectativas previas de recortes (Yahoo Finance/intellectia.ai, jul-2026).\n- **HECHO:** Warsh ha declarado explícitamente que prioriza la estabilidad de precios sobre el pleno empleo, en un contexto de inflación ~4.2% interanual (realeconomy.rsmus.com, jul-2026).\n- **HECHO:** Para la reunión del **28-29-jul-2026**, el consenso de mercado sigue viendo **mantención como escenario base (77%-89% según fuente)**, pero la probabilidad de una subida en julio saltó de **18% (2-jul) a 36% (13-jul)** (intellectia.ai). Para **septiembre**, CME FedWatch ya asigna **~63% a una subida**, impulsada por el repunte del petróleo (VT Markets, 20-jul-2026). **LECTURA:** el mercado de tasas se ha movido claramente hacia \"higher for longer\"; Goldman Sachs postergó sus expectativas de recorte a 2027.\n\n**Banco de Japón — HECHO:** Mantiene su tasa en **1.00%** (elevada el 16-jun-2026, votación 7-1, el nivel más alto desde 1995). La próxima reunión concluye el **30-31-jul-2026**; el consenso espera **mantención**, con la siguiente subida vista **recién en el 4T-2026** condicionada a confirmar la persistencia de la inflación subyacente (EFG International / tradingeconomics, jul-2026).\n\n**Diferencial nominal — HECHO (cálculo):** Punto medio Fed 3.625% − BoJ 1.00% = **~262 pb**, sin cambios respecto a la semana anterior. **LECTURA:** el diferencial de tasas de política ya no se comprime como se esperaba — al contrario, el giro hawkish de Warsh amplía el riesgo de que se **ensanche** en julio-septiembre, mientras el BoJ permanece en pausa hasta fin de año. Este es el principal motor detrás de la ruptura de 163.\n\n---"}, {"title": "Balanza de pagos y flujos", "nav": "Balanza", "body": "- **HECHO:** El superávit de cuenta corriente de Japón fue de **¥3,968.3 mil millones (~US$24.4 mm) en mayo-2026**, subiendo desde ¥3,907.3 mm en abril y **+19.5% interanual**, tras el récord de ¥4,681.5 mm en marzo (Ministerio de Finanzas / Xinhua / FX.co, publicado 8-jul-2026). Impulsores: exportaciones de semiconductores y automóviles (+14.7% interanual) y renta primaria en ¥4.28 billones (+2.3% interanual).\n- **HECHO:** Japón vendió cerca de **US$30 mil millones en Treasuries en el 1T-2026**, el ritmo de venta más rápido en cuatro años, en un proceso de repatriación de capital ante el alza de rendimientos domésticos (moomoo, 2026).\n- **LECTURA — carry trade:** Los flujos estructurales de Japón (superávit récord de cuenta corriente + repatriación de Treasuries) siguen siendo **fundamentalmente pro-yen**, reforzando la idea de que el ascenso reciente del par responde a factores de corto plazo (diferencial de política + refugio en USD por Medio Oriente) y no a un deterioro de los fundamentos externos japoneses. Esta divergencia entre balanza de pagos sólida y yen débil es, en sí misma, una fuente de riesgo de reversión.\n\n---"}, {"title": "Posicionamiento", "nav": "Posicionamiento", "body": "- **HECHO:** El COT de la CFTC (dato al **10-jul-2026**, publicado por FX.co / bitcoinworld.co.in / VT Markets) muestra que los especuladores **redujeron su posición neta corta en yen a -123,800 contratos**, desde -155,100 la semana previa — una reducción de ~31,300 contratos, la primera señal clara de cobertura parcial tras ~12 semanas de acumulación de cortos.\n- **HECHO (dato previo, 7-jul, otra metodología):** forexfundamentals.com había reportado -90,083 contratos netos (84,990 largos vs 175,073 cortos) para esa fecha; se mantiene la discrepancia entre fuentes por distinta agregación de categorías, pero ambas coinciden en la **dirección reciente: cortos aún elevados, con cierto alivio**.\n- **LECTURA:** el posicionamiento sigue siendo netamente corto en yen —consistente con la tesis alcista del par— pero la reducción de cortos en la semana del 10-jul, justo cuando el precio *sube* hacia 163, sugiere que el rally reciente está siendo impulsado más por flujo fresco (nuevo giro hawkish de la Fed, refugio por Medio Oriente) que por presión especulativa acumulada. Esto dejaría **margen para nuevos cortos** si el momentum persiste, pero también expone al mercado a un **short-squeeze** si aparece un catalizador pro-yen (intervención efectiva, sorpresa hawkish del BoJ, distensión geopolítica).\n\n---"}, {"title": "Análisis técnico", "nav": "Técnico", "body": "Datos de esta sección: **HECHO — TradingView / FXStreet / Investing.com (21-jul-2026)**, salvo lecturas indicadas.\n\n| Indicador | Valor | Interpretación |\n|---|---|---|\n| Precio | ~163.04-163.22 | Nuevo máximo desde dic-1986 |\n| RSI(14) diario | ~53.8-61 (rango entre fuentes) | Alcista, sin sobrecompra |\n| MACD(12,26) | Cruce alcista completado, divergiendo de la señal | Momentum alcista reactivado |\n| Soporte inmediato | ~162.26 (línea de tendencia) / 161 | Pérdida expondría 160.49 |\n| Resistencia | 163.00-163.04 (máximo 40 años); extensión hacia 164-165 | Ruptura confirmada abre terreno inexplorado |\n| Rango 80 días | 155.00 (6-may) – 163.04 (21-jul) | Tendencia alcista dominante desde mayo |\n\n- **HECHO:** El par formó un patrón de **triángulo simétrico** bajo los máximos de varias décadas durante la primera quincena de julio (FXStreet, 15-jul y 20-jul-2026) y **rompió al alza** el 21-jul, confirmando continuación de tendencia.\n- **LECTURA:** El cuadro técnico es constructivo: MACD con cruce alcista, RSI sin sobrecompra y ruptura de rango. El objetivo técnico de corto plazo se traslada a **164-165**. Sin embargo, se trata de una ruptura hacia una zona sin ningún precedente de precio en 40 años, lo que reduce la utilidad de niveles técnicos clásicos y **aumenta la probabilidad de una respuesta oficial** antes que la de una continuación técnica \"limpia\".\n\n---"}, {"title": "Intervención y riesgo de banco central", "nav": "Intervención", "body": "**Historial (HECHO, ampliamente documentado):**\n- **2022:** el MoF intervino comprando yenes (~¥9 billones) con el par en la zona **~146–152**.\n- **2024:** intervenciones récord con el par en torno a **~160** (abril-mayo y julio).\n- **Abril-mayo 2026 — HECHO:** el MoF desplegó un **récord de ¥11.73 billones (~US$73.35 mil millones)** tras la ruptura de ¥160 (Bloomberg/Reuters, 30-abr y 1-may-2026), pese a lo cual el yen volvió a debilitarse en las semanas siguientes.\n- **2-3 de julio 2026 — HECHO:** el yen saltó bruscamente a la zona de 160-161 (el dólar cayó hasta 0.9%, a 161.115) en medio de especulación de intervención o \"rate check\"; el **MoF no confirmó** oficialmente haber intervenido, y el rebote fue de menor magnitud que en episodios previos, lo que llevó a analistas a dudar de que hubiera acción oficial real (Nikkei Asia / Yahoo Finance / KFGO, 2-jul-2026).\n\n**Declaraciones recientes (HECHO):**\n- **3-jul-2026:** Katayama repitió que las autoridades \"están listas para responder apropiadamente en cualquier momento si es necesario\" y confirmó contacto regular con EE.UU. (Bloomberg / Star-Advertiser, 3-4-jul-2026).\n- **17-jul-2026:** Katayama escaló el lenguaje a \"si es necesario, tomaremos acción decisiva en cualquier momento\" — fórmula que históricamente antecede la intervención directa. El mercado apenas reaccionó (Bloomberg / Japan Times, 17-18-jul-2026).\n- **LECTURA:** la eficacia de la intervención verbal se **sigue erosionando**: cada advertencia sucesiva mueve menos al mercado, y el par ha superado ampliamente los niveles donde el MoF actuó en abril-mayo.\n\n**Niveles gatillo hoy (LECTURA):** con el precio ya en **163.0-163.2**, la \"zona gatillo\" percibida por el mercado (antes 160-162) se ha vuelto obsoleta como techo — el mercado la cruzó sin respuesta contundente confirmada. Analistas (Investing.com, \"Tokyo's bluff\") describen la situación como Tokio deliberadamente **sin anunciar un nivel exacto** para preservar ambigüedad estratégica (Eastern Herald, 5-jul-2026). El riesgo de una intervención de facto (no solo verbal) aum     };
    let marks = "";
    for (let v = 0; v <= 100; v += 25) {
      const a = (start + sweepMax * v / 100 - 90) * Math.PI / 180;
      const r1 = r - 8, r2 = r - 12;
      marks += `<line x1="${(cx + r1 * Math.cos(a)).toFixed(1)}" y1="${(cy + r1 * Math.sin(a)).toFixed(1)}" x2="${(cx + r2 * Math.cos(a)).toFixed(1)}" y2="${(cy + r2 * Math.sin(a)).toFixed(1)}" stroke="var(--hairline)" stroke-width="1.5"/>`;
    }
    return (
      `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="Score compuesto ${score} de 100">` +
      arc(start, start + sweepMax, "var(--track)", 9) +
      (score > 0 ? arc(start, start + Math.max(sweep, 3), "var(--accent)", 9) : "") +
      marks +
      `</svg>`
    );
  }

  function renderRail() {
    const assets = modeAssets();
    document.getElementById("railCount").textContent = assets.length;
    const list = document.getElementById("stockList");
    const q = state.query.trim().toLowerCase();
    const shown = q ? assets.filter((s) => matches(s, q)) : assets;
    let html = shown.map((s) => {
      const sc = composite(s, state.weights);
      const g = gradeFor(sc);
      return (
        `<button class="stock-card${s.ticker === state.ticker ? " active" : ""}" data-t="${s.ticker}" aria-pressed="${s.ticker === state.ticker}">` +
        `<span class="t">${s.ticker} ${deltaSpan(s.change && s.change.day)}</span>` +
        `<span class="score-chip grade-${g.cls}"><span class="v">${sc}</span><span class="g">${g.grade}</span></span>` +
        `<span class="n">${esc(s.company)}</span>` +
        `<span class="p">${esc(priceOf(s))}</span>` +
        (s.change && s.change.week != null ? `<span class="pw">Semana: ${deltaSpan(s.change.week)}</span>` : "") +
        `</button>`
      );
    }).join("");
    if (q && shown.length === 0) {
      html =
        `<div class="no-match">` +
        `<p><span class="q">${esc(state.query.trim().toUpperCase())}</span> no está en la cobertura actual.</p>` +
        `<p>Este dashboard no puede investigar activos nuevos por sí solo: los informes se generan con búsqueda web al momento del análisis.</p>` +
        `<p>Para agregarlo, pídele a Claude en la conversación del proyecto: <em>«agrega ${esc(state.query.trim().toUpperCase())} al dashboard»</em>. El análisis se hace con la misma metodología y esta página se actualiza en la misma URL.</p>` +
        `</div>`;
    }
    list.innerHTML = html;
    list.querySelectorAll(".stock-card").forEach((b) =>
      b.addEventListener("click", () => {
        state.ticker = b.dataset.t;
        render();
        window.scrollTo({ top: 0 });
      })
    );
  }

  function scoreSection(stock) {
    const { norm, sum } = normWeights(state.weights);
    const cats = catsOf(stock);
    const sc = composite(stock, state.weights);
    const g = gradeFor(sc);
    const sig = signalOf(stock, g);
    const rows = cats.map((c) => {
      const v = stock.scores[c.key].score;
      const w = stock.customCats ? c.weight : norm[c.key];
      return (
        `<div class="cat-row">` +
        `<div class="name">${esc(c.name)}<span class="w">${w.toFixed(0)}%</span></div>` +
        `<div class="bar"><div class="fill" style="width:${v}%"></div></div>` +
        `<div class="val"><b>${v}</b> · ${(v * w / 100).toFixed(1)}</div>` +
        `</div>` +
        `<div class="cat-just">${inline(esc(stock.scores[c.key].just))}</div>`
      );
    }).join("");
    let weightsBlock = "";
    if (!stock.customCats) {
      const sliders = CATS.map(
        (c) =>
          `<label for="w-${c.key}">${c.name}</label>` +
          `<input type="range" id="w-${c.key}" data-k="${c.key}" min="0" max="60" step="5" value="${state.weights[c.key]}">` +
          `<div class="wv" id="wv-${c.key}">${state.weights[c.key]}%</div>`
      ).join("");
      const sumWarn = sum !== 100 ? `<span class="warn">Los pesos suman ${sum}% — se normalizan proporcionalmente a 100%.</span>` : "";
      weightsBlock =
        `<details class="weights"><summary>Ajustar pesos del score</summary>` +
        `<div class="w-grid">${sliders}</div>` +
        `<div class="w-foot">${sumWarn}<button class="btn" id="resetW" type="button">Restaurar pesos por defecto</button></div>` +
        `</details>`;
    } else {
      weightsBlock = `<p class="score-note">Este activo usa las categorías y pesos específicos de su metodología (fijos, no ajustables).</p>`;
    }
    return (
      `<div class="score-detail">` +
      rows +
      `<div class="score-total"><span class="num">${sc} / 100</span>` +
      `<span class="grade-pill grade-${g.cls}"><span class="dot"></span>Señal: ${esc(sig)} · Grado ${g.grade}</span></div>` +
      `<p class="signal-close"><strong>Señal: ${esc(sig)}</strong> (Grado ${g.grade} — ${sc}/100)` +
      (stock.baseCurrency ? ` — un score alto favorece a la divisa base (${esc(stock.baseCurrency)}); la señal indica qué se compra y qué se vende en el par` : "") +
      `, sustentada en el desglose de las 5 categorías: ` +
      cats.map((c) => `${esc(c.name)} ${stock.scores[c.key].score}`).join(" · ") + `.</p>` +
      `<p class="score-note">La señal traduce el score cuantitativo a la escala convencional de research y nunca se presenta sin su desglose; no es una orden de ejecución.</p>` +
      weightsBlock +
      `</div>`
    );
  }

  function sectionPlan(stock) {
    if (!stock.customSections) {
      return SECTIONS.map((s) => ({
        num: s.num, key: s.key, title: s.title, nav: s.nav,
        body: s.key === "score" ? null : stock.sections[s.key],
      }));
    }
    const plan = [];
    let num = 1;
    stock.customSections.forEach((cs) => {
      if (num === stock.scoreIndex) {
        plan.push({ num: num, key: "score", title: "Score Compuesto FX", nav: "Score", body: null });
        num++;
      }
      plan.push({ num: num, key: "cs" + num, title: cs.title, nav: cs.nav || cs.title, body: cs.body });
      num++;
    });
    if (num === stock.scoreIndex) plan.push({ num: num, key: "score", title: "Score Compuesto FX", nav: "Score", body: null });
    return plan;
  }

  // — Calendario de eventos —
  const MONTHS_ES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const MONTH_ABBR = { ene: 0, feb: 1, mar: 2, abr: 3, may: 4, jun: 5, jul: 6, ago: 7, sep: 8, sept: 8, set: 8, oct: 9, nov: 10, dic: 11 };
  const WEEKDAYS_ES = ["dom","lun","mar","mié","jue","vie","sáb"];
  const KIND_LABELS = { earnings: "Resultados", macro: "Macro", corporate: "Corporativo" };

  function busDaysUntil(d, today0) {
    let n = 0;
    const cur = new Date(today0);
    while (cur < d && n < 30) {
      cur.setDate(cur.getDate() + 1);
      const wd = cur.getDay();
      if (wd !== 0 && wd !== 6) n++;
    }
    return n;
  }
  function parseISODate(s) {
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s || "");
    return m ? new Date(+m[1], +m[2] - 1, +m[3]) : null;
  }
  function parseSpanishDate(txt) {
    const m = /(\d{1,2})[-\s]*(ene|feb|mar|abr|may|jun|jul|ago|sept|sep|set|oct|nov|dic)[a-z]*\.?[-\s]*(\d{4})/i.exec(txt || "");
    if (!m) return null;
    const mo = MONTH_ABBR[m[2].toLowerCase()];
    return mo == null ? null : new Date(+m[3], mo, +m[1]);
  }
  function assetEvents(s) {
    const out = (s.events || [])
      .map((e) => ({ ...e, d: parseISODate(e.date) || parseSpanishDate(e.date) }))
      .filter((e) => e.d && e.label);
    if (!out.some((e) => (e.kind || "") === "earnings")) {
      const pair = statsPairs(s).find(([l]) => /earnings|evento/i.test(l));
      const d = pair && parseSpanishDate(pair[1]);
      if (d) out.push({ d: d, label: (/earnings/i.test(pair[0]) ? "Resultados — " : "") + pair[1], kind: /earnings/i.test(pair[0]) ? "earnings" : "macro" });
    }
    return out.map((e) => ({ ...e, ticker: s.ticker, isFx: s.ticker.includes("/") }));
  }
  function renderCalendar() {
    const today = new Date();
    const today0 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const from = new Date(today0);
    from.setDate(from.getDate() - 7);
    const evts = STOCKS.flatMap(assetEvents)
      .filter((e) => e.d >= from)
      .sort((a, b) => a.d - b.d || (b.kind === "earnings") - (a.kind === "earnings") || a.ticker.localeCompare(b.ticker));

    const byDay = new Map();
    evts.forEach((e) => {
      const k = e.d.getTime();
      if (!byDay.has(k)) byDay.set(k, []);
      byDay.get(k).push(e);
    });

    let html = `<div class="cal-wrap"><div class="cal-head"><h1>Calendario de eventos</h1>` +
      `<p class="sub">Resultados, bancos centrales y eventos corporativos de los ${STOCKS.length} activos en cobertura · ` +
      `desde la última semana en adelante · datos del ${esc(DATA_DATE)}</p></div>`;

    if (!byDay.size) {
      html += `<div class="cal-empty">No hay eventos fechados en la cobertura actual. Se poblarán con la próxima actualización de datos.</div>`;
    } else {
      let lastMonth = "";
      byDay.forEach((dayEvts, k) => {
        const d = new Date(k);
        const mKey = MONTHS_ES[d.getMonth()] + " " + d.getFullYear();
        if (mKey !== lastMonth) {
          lastMonth = mKey;
          html += `<div class="cal-month">${esc(mKey)}</div>`;
        }
        const isToday = d.getTime() === today0.getTime();
        const isPast = d < today0;
        const isNear = !isPast && busDaysUntil(d, today0) <= 5;
        const daysAway = Math.round((d - today0) / 86400000);
        const soon = isToday ? "" : (isNear ? `<div class="dwk cal-soon">en ${daysAway} d</div>` : "");
        html += `<div class="cal-day${isToday ? " is-today" : ""}${isPast ? " is-past" : ""}${isNear ? " is-near" : ""}">` +
          `<div class="cal-date"><div class="dnum">${d.getDate()}</div><div class="dwk">${isToday ? "hoy" : WEEKDAYS_ES[d.getDay()]}</div>${soon}</div>` +
          `<div class="cal-evts">` +
          dayEvts.map((e) =>
            `<div class="cal-evt">` +
            `<button type="button" class="cal-tick" data-goto="${esc(e.ticker)}" title="Ver informe de ${esc(e.ticker)}">${esc(e.ticker)}</button>` +
            `<span class="cal-lbl">${esc(e.label)}</span>` +
            `<span class="cal-kind k-${esc(e.kind || "macro")}">${esc(KIND_LABELS[e.kind] || "Evento")}</span>` +
            `</div>`
          ).join("") +
          `</div></div>`;
      });
    }

    html += `<div class="cal-note">Cada activo aporta sus fechas (campo de eventos + "Próx. earnings" de su informe); ` +
      `al agregar un activo nuevo al dashboard, sus fechas aparecen aquí automáticamente. Toca un ticker para abrir su informe. ` +
      `${esc(DISCLAIMER)}</div></div>`;

    document.getElementById("main").innerHTML = html;
    document.querySelectorAll("#main .cal-tick").forEach((b) =>
      b.addEventListener("click", () => {
        const t = b.dataset.goto;
        state.ticker = t;
        applyMode(t.includes("/") ? "fx" : "equity");
      })
    );
  }

  // — Panel Técnico (todo lo gratuito, junto y a mano) —
  const TECH_COLS = [
    { key: "ticker", label: "Ticker", num: false },
    { key: "price", label: "Precio" },
    { key: "change_1d_pct", label: "Día", fmt: "delta" },
    { key: "change_1w_pct", label: "Semana", fmt: "delta" },
    { key: "rsi", label: "RSI", fmt: "rsi" },
    { key: "pct_vs_sma50", label: "vs SMA50", fmt: "delta" },
    { key: "pct_vs_sma200", label: "vs SMA200", fmt: "delta" },
    { key: "volatility_30d", label: "Vol. 30d", fmt: "pct1" },
    { key: "sharpe", label: "Sharpe", fmt: "n2" },
    { key: "price_percentile_1y", label: "Pctl. 1A", fmt: "pctl" },
    { key: "vs_benchmark_30d_pct", label: "vs Bench 30d", fmt: "delta" },
    { key: "volume_ratio", label: "Vol. rel.", fmt: "ratio" },
  ];
  function techCell(col, s) {
    if (col.key === "ticker") return `<td class="t" data-goto="${esc(s.ticker)}" title="Ver informe">${esc(s.ticker)}</td>`;
    const t = s.technical || {};
    const v = t[col.key];
    if (v === null || v === undefined) return `<td><span class="mut">—</span></td>`;
    let cls = "", txt;
    if (col.fmt === "delta") {
      txt = (v > 0 ? "+" : v < 0 ? "−" : "") + Math.abs(v).toFixed(2).replace(".", ",") + " %";
      cls = v > 0 ? "pos" : v < 0 ? "neg" : "";
    } else if (col.fmt === "rsi") {
      txt = v.toFixed(0);
      cls = v >= 70 || v <= 30 ? "xtreme" : "";
    } else if (col.fmt === "pctl") {
      txt = v.toFixed(0);
      cls = v >= 90 || v <= 10 ? "xtreme" : "";
    } else if (col.fmt === "pct1") {
      txt = v.toFixed(1).replace(".", ",") + " %";
    } else if (col.fmt === "n2") {
      txt = v.toFixed(2).replace(".", ",");
      cls = v > 0 ? "pos" : v < 0 ? "neg" : "";
    } else if (col.fmt === "ratio") {
      txt = v.toFixed(2).replace(".", ",") + "×";
      cls = v >= 2 ? "xtreme" : "";
    } else {
      txt = v >= 1000 ? v.toLocaleString("es-CL", { maximumFractionDigits: 0 })
        : v.toFixed(v < 10 ? 3 : 2).replace(".", ",");
    }
    return `<td${cls ? ` class="${cls}"` : ""}>${txt}</td>`;
  }
  function renderTech() {
    const { key, dir } = state.techSort;
    const rows = STOCKS.slice().sort((a, b) => {
      if (key === "ticker") return a.ticker.localeCompare(b.ticker) * dir;
      const av = (a.technical || {})[key], bv = (b.technical || {})[key];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      return (av - bv) * dir;
    });
    const fetched = (STOCKS.map((s) => s.sourcesMeta && s.sourcesMeta.price && s.sourcesMeta.price.fetched_at).find(Boolean) || "").replace("T", " ").slice(0, 16);
    const ths = TECH_COLS.map((c) =>
      `<th data-k="${c.key}" class="${c.key === key ? "sorted" + (dir === 1 ? " asc" : "") : ""}">${c.label}</th>`
    ).join("");
    const trs = rows.map((s) => `<tr>${TECH_COLS.map((c) => techCell(c, s)).join("")}</tr>`).join("");
    document.getElementById("main").innerHTML =
      `<div class="tech-wrap"><div class="tech-head"><h1>Panel Técnico</h1>` +
      `<p class="sub">Los ${STOCKS.length} activos de un vistazo: precio, momentum, medias móviles, riesgo y posición en el rango anual. ` +
      `Haz clic en una columna para ordenar; en un ticker, para abrir su informe.</p></div>` +
      (fetched ? `<p class="tech-ts">Última actualización de datos: ${esc(fetched)} (TradingView scanner)</p>` : "") +
      `<div class="tech-scroll"><table class="tech"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>` +
      `<p class="tech-note">RSI en rojo si está en sobrecompra (≥70) o sobreventa (≤30); percentil 1A en rojo en los extremos del rango anual (≥90 / ≤10); ` +
      `Vol. rel. en rojo si el volumen del día duplica su promedio de 20 ruedas. «vs Bench 30d» compara el retorno de 30 días contra el benchmark del activo ` +
      `(S&P 500, Nikkei 225, DXY, Bitcoin, cripto total o ECH como proxy de Chile). Sharpe y volatilidad requieren ≥30 ruedas de histórico acumulado. ` +
      `${DISCLAIMER}</p></div>`;
    document.querySelectorAll("#main th[data-k]").forEach((th) =>
      th.addEventListener("click", () => {
        const k = th.dataset.k;
        state.techSort = { key: k, dir: state.techSort.key === k ? -state.techSort.dir : (k === "ticker" ? 1 : -1) };
        renderTech();
      })
    );
    document.querySelectorAll("#main td.t").forEach((td) =>
      td.addEventListener("click", () => {
        const t = td.dataset.goto;
        state.ticker = t;
        applyMode(t.includes("/") ? "fx" : "equity");
      })
    );
  }

  // — Riesgo, percentil y benchmark en el detalle del activo —
  const RISK_TIPS = {
    vol: "Cuánto se mueve el precio en un año típico (desvío estándar anualizado de los retornos diarios de las últimas 30 ruedas). Más alto = más movimiento y más riesgo.",
    sharpe: "Retorno anualizado por encima de la tasa libre de riesgo, por unidad de volatilidad total. Por encima de 1 es bueno; negativo significa que rindió menos que la tasa libre de riesgo.",
    sortino: "Como el Sharpe, pero solo castiga la volatilidad de los días de caída. Útil cuando las subidas bruscas no molestan, solo las bajadas.",
    mdd: "La peor caída acumulada desde un máximo durante el último año. Cuánto llegó a perder quien compró en el peor momento.",
  };
  function riskSection(s) {
    if (!s.risk && !s.benchmark) return "";
    let html = "";
    if (s.risk) {
      const accum = `<span class="v accum">Acumulando datos (${s.risk.n_days}d/${s.risk.window || 30}d)</span>`;
      const tile = (label, tip, val) =>
        `<div class="risk-tile" title="${esc(tip)}"><div class="l">${label} <span class="q">ⓘ</span></div>` +
        (val === null ? accum : `<span class="v">${val}</span>`) + `</div>`;
      const f = (v, suf, nd) => (v === null || v === undefined ? null : v.toFixed(nd).replace(".", ",") + suf);
      html += `<div class="risk-grid">` +
        tile("Volatilidad 30d", RISK_TIPS.vol, f(s.risk.volatility_30d, " %", 1)) +
        tile("Sharpe", RISK_TIPS.sharpe, f(s.risk.sharpe, "", 2)) +
        tile("Sortino", RISK_TIPS.sortino, f(s.risk.sortino, "", 2)) +
        tile("Max drawdown 1A", RISK_TIPS.mdd, f(s.risk.max_drawdown_1y, " %", 1)) +
        `</div>`;
    }
    const b = s.benchmark;
    if (b && (b.price_percentile_1y != null || b.relative_performance_30d != null)) {
      let bar = "";
      if (b.price_percentile_1y != null) {
        bar = `<div class="pct-wrap" title="Posición del precio actual dentro de su rango de 52 semanas: 0 = mínimo del año, 100 = máximo.">` +
          `<div class="pct-bar"><div class="fill" style="width:${b.price_percentile_1y}%"></div></div>` +
          `<div class="pct-lbl"><span>Mín. 1A</span><span>Percentil <b>${Math.round(b.price_percentile_1y)}</b>${b.partial ? " (rango parcial)" : ""}</span><span>Máx. 1A</span></div></div>`;
      }
      let badge = "";
      const rel = b.relative_performance_30d;
      if (rel != null) {
        const cls = rel >= 0 ? "out" : "under";
        const word = rel >= 0 ? "Outperform" : "Underperform";
        badge = `<span class="bench-badge ${cls}" title="Retorno de 30 días del activo menos el de su benchmark (puntos porcentuales).">` +
          `${word} vs ${esc(b.label || b.ticker)} 30d: ${rel > 0 ? "+" : ""}${rel.toFixed(1).replace(".", ",")} pp</span>`;
      } else {
        badge = `<span class="bench-badge na">Benchmark: ${esc(b.label || b.ticker)}</span>`;
      }
      html += `<div class="bench-row">${bar}${badge}</div>`;
    }
    if (s.metricChanges && s.metricChanges.length) {
      const NAMES = { rsi: "RSI", percentil_1y: "Percentil 1A", precio_pct: "Precio", score: "Score" };
      html += `<details class="sources"><summary>Cambios bruscos de métricas — últimos 90 días (${s.metricChanges.length})</summary><ul>` +
        s.metricChanges.map((c) => {
          const d = parseISODate(c.date);
          const fd = d ? `${d.getDate()} ${MONTHS_ES[d.getMonth()].slice(0, 3)} ${d.getFullYear()}` : c.date;
          return `<li>${fd} — ${NAMES[c.metric] || c.metric}: ${c.from} → ${c.to}</li>`;
        }).join("") + `</ul></details>`;
    }
    return html;
  }

  function render() {
    if (state.mode === "calendar") { renderCalendar(); return; }
    if (state.mode === "tech") { renderTech(); return; }
    renderRail();
    const stock = STOCKS.find((s) => s.ticker === state.ticker);
    const cats = catsOf(stock);
    const sc = composite(stock, state.weights);
    const g = gradeFor(sc);
    const weakest = cats.reduce((a, c) => (stock.scores[c.key].score < stock.scores[a.key].score ? c : a), cats[0]);

    const stats = statsPairs(stock)
      .filter(([l]) => l !== "Precio")
      .map(([l, v]) => `<div class="stat"><div class="l">${esc(l)}</div><div class="v">${esc(v)}</div></div>`)
      .join("");

    const plan = sectionPlan(stock);
    const total = plan.length;
    const nav = plan.map(
      (s) => `<a href="#sec-${s.key}"><span class="k">${s.num}</span>${esc(s.nav)}</a>`
    ).join("");

    const sections = plan.map((s) => {
      const body = s.key === "score" ? scoreSection(stock) : `<div class="prose">${md(s.body)}</div>`;
      return (
        `<section class="report-section" id="sec-${s.key}">` +
        `<div class="sec-eyebrow">Sección ${s.num} / ${total}</div>` +
        `<h2>${esc(s.title)}</h2>` +
        body +
        `</section>`
      );
    }).join("");

    document.getElementById("main").innerHTML =
      `<div class="company-head">` +
      `<span class="ticker">${stock.ticker}</span><h1>${esc(stock.company)}</h1>` +
      `<span class="head-price">${esc(priceOf(stock))}</span>` +
      deltaSpan(stock.change && stock.change.day, "head-delta") +
      `<span class="date">Informe · ${REPORT_DATE}</span>` +
      `<div class="head-actions"><button class="btn" id="dlBtn" type="button">Descargar informe (.md)</button></div>` +
      `</div>` +
      (stock.change && stock.change.week != null
        ? `<div class="head-week"><span>Semana: ${deltaSpan(stock.change.week)}</span></div>`
        : "") +
      `<div class="stats-grid">${stats}</div>` +
      riskSection(stock) +
      `<div class="hero">` +
      `<div class="gauge-wrap">${gaugeSVG(sc, 132)}<div class="gauge-num" style="margin-top:-84px">${sc}</div><div class="gauge-cap">Score / 100</div><div style="height:26px"></div></div>` +
      `<div><div class="reading">El score de <strong>${sc} (${g.grade} · ${esc(signalOf(stock, g))})</strong> es el promedio ponderado de las 5 categorías de la sección de score. ` +
      `La dimensión más débil del cuadro es <strong>${esc(weakest.name)}</strong> (${stock.scores[weakest.key].score}), el eslabón a vigilar.</div>` +
      `<span class="grade-pill grade-${g.cls}"><span class="dot"></span>Grado ${g.grade} · ${esc(signalOf(stock, g))}</span></div>` +
      `</div>` +
      `<nav class="section-nav" aria-label="Secciones del informe">${nav}</nav>` +
      sections +
      `<details class="sources"><summary>Fuentes consultadas (${stock.sources.length})</summary><ul>` +
      stock.sources.map((x) => `<li>${esc(x)}</li>`).join("") +
      `</ul></details>` +
      `<div class="disclaimer">${DISCLAIMER}</div>`;

    const dl = document.getElementById("dlBtn");
    if (window.claude && window.claude.downloads) dl.addEventListener("click", () => download(stock));
    else dl.style.display = "none";

    document.querySelectorAll('.w-grid input[type="range"]').forEach((inp) =>
      inp.addEventListener("input", () => {
        state.weights[inp.dataset.k] = Number(inp.value);
        rerenderScore();
      })
    );
    const reset = document.getElementById("resetW");
    if (reset)
      reset.addEventListener("click", () => {
        state.weights = { ...DEFAULT_WEIGHTS };
        rerenderScore();
      });
  }

  function rerenderScore() {
    const openW = document.querySelector("details.weights");
    const wasOpen = openW && openW.open;
    const y = window.scrollY;
    render();
    if (wasOpen) {
      const d = document.querySelector("details.weights");
      if (d) d.open = true;
    }
    window.scrollTo({ top: y });
  }

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._h);
    toast._h = setTimeout(() => t.classList.remove("show"), 3200);
  }

  function reportMarkdown(stock) {
    const sc = composite(stock, state.weights);
    const g = gradeFor(sc);
    const { norm } = normWeights(state.weights);
    let out = `# Informe de Equity Research — ${stock.company} (${stock.ticker})\n\n`;
    out += `**Fecha:** ${REPORT_DATE} · Generado por Stock Research Dashboard\n\n`;
    statsPairs(stock).forEach(([l, v]) => (out += `- **${l}:** ${v}\n`));
    if (stock.change && stock.change.day != null)
      out += `- **Variación:** día ${fmtPct(stock.change.day)}` + (stock.change.week != null ? ` · semana ${fmtPct(stock.change.week)}` : "") + `\n`;
    out += `\n---\n\n`;
    const cats = catsOf(stock);
    sectionPlan(stock).forEach((s) => {
      out += `## ${s.num}. ${s.title}\n\n`;
      if (s.key === "score") {
        out += `| Categoría | Peso | Puntaje | Aporte |\n|---|---|---|---|\n`;
        cats.forEach((c) => {
          const v = stock.scores[c.key].score;
          const w = stock.customCats ? c.weight : norm[c.key];
          out += `| ${c.name} | ${w.toFixed(0)}% | ${v} | ${(v * w / 100).toFixed(1)} |\n`;
        });
        out += `| **Score Compuesto** | **100%** | | **${sc} / 100** |\n\n`;
        out += `**Señal: ${signalOf(stock, g)}** (Grado ${g.grade} — ${sc}/100), sustentada en el desglose: ` +
          cats.map((c) => `${c.name} ${stock.scores[c.key].score}`).join(" · ") + `.\n\n`;
        cats.forEach((c) => (out += `- **${c.name} (${stock.scores[c.key].score}):** ${stock.scores[c.key].just}\n`));
        out += `\nLa señal traduce el score cuantitativo a la escala convencional de research; no es una orden de ejecución.\n\n`;
      } else {
        out += s.body + `\n\n`;
      }
    });
    out += `---\n\n**Fuentes:** ${stock.sources.join("; ")}.\n\n> ${DISCLAIMER}\n`;
    return out;
  }

  async function download(stock) {
    try {
      await window.claude.downloads.save({
        filename: `${stock.ticker}-2026-07-18.md`,
        data: reportMarkdown(stock),
      });
      toast("Informe guardado.");
    } catch (e) {
      if (e && e.code === "declined") return;
      if (e && e.code === "rate_limited") toast("Hay una descarga pendiente — intenta de nuevo en unos segundos.");
      else toast("La descarga no está disponible en esta vista.");
    }
  }

  document.getElementById("search").addEventListener("input", (e) => {
    state.query = e.target.value;
    renderRail();
  });
  document.querySelectorAll("#modeSwitch button").forEach((b) =>
    b.addEventListener("click", () => {
      if (b.dataset.mode !== state.mode) applyMode(b.dataset.mode);
    })
  );

  applyMode("equity");
</script>
