scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "CRYPTOCAP:TOTAL", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/BTC.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "HDSY", "company": "Harmonic Drive Systems Inc.", "statsList": [["Precio", "¥7,150 (21-jul-2026)"], ["Rango 52 sem.", "¥2,316 – ¥9,150"], ["Listado", "Bolsa de Tokio: 6324"], ["Market cap", "¥622–627B (~US$4.2B aprox.)"], ["P/E", "386.8x trailing / 104.7x forward"], ["Target consenso", "¥6,131–6,801 (11 analistas) — dispersión ¥2,900–11,000"], ["Próx. earnings", "7-ago-2026 (Q1 FY3/27)"], ["Técnico (auto)", "RSI 47.7 · MACD -95.08 / señal +72.23 (TradingView, 21-jul-2026)"]], "sections": {"resumen": "HECHO: Harmonic Drive Systems (6324, Tokyo Stock Exchange), fabricante líder de reductores armónicos (strain wave gears) para robótica humanoide y semiconductores, cotiza en ¥6,570 al 21-jul-2026 (+1.55% en el día vs. cierre de ¥6,470 del 17-jul), pero acumula -12.9% en la semana desde el cierre de ¥7,540 del 14-jul-2026 (stockanalysis.com). La acción sigue ~29% bajo su máximo de 52 semanas (¥9,150) y ~2.8x sobre el mínimo (¥2,316). LECTURA: el rebote del día no revierte la corrección de mediados de julio; el mercado sigue digiriendo la narrativa humanoide de cara al Q1 del 7-ago. HECHO relevante no capturado antes: Jefferies pasó de 'Underperform' (¥2,400–3,000, oct-2025, por competencia china) a 'Buy' con target ¥10,000 el 16-jun-2026 — un giro de tesis significativo hacia el optimismo humanoide.", "fundamental": "**Resultados FY3/26 (cerrado 31-mar-2026, publicado ~11-may-2026 vía TDnet) — sin cambios respecto al informe previo, no hay nuevo tanshin trimestral hasta el 7-ago:**\n\n- HECHO: Ventas ¥59,557M (+7.0% a/a); utilidad operativa ¥2,567M; utilidad neta ¥1,608M (-53.7% a/a). Margen neto ~2.7% vs >6% el año anterior, por compresión de costos y capex +55% a ¥5,838M (TDnet vía BigGo, may-2026).\n- HECHO: Balance sólido: activos totales ¥111,400M, equity ratio 72.2%, flujo de caja operativo +¥6,425M (TDnet, may-2026).\n- HECHO: Guidance FY3/27: ventas ¥68,000M (+14.2%), utilidad operativa ¥6,200M (+141.5%), utilidad neta ¥4,500M (+179.7%) (TDnet/BigGo, may-2026). Sin revisión de guía detectada en las últimas semanas.\n- HECHO: Órdenes de humanoides: ~¥1.3B registrados en un trimestre, expectativa de ~¥2.5B en FY3/26, con posible duplicación/triplicación en FY3/27 apoyada en pedidos de prototipos de clientes de EE.UU. (Investing.com/humanoid.guide, 2026).\n- HECHO: EPS consenso próximo año fiscal ~¥62 (MarketScreener, jul-2026), lo que en el precio actual implicaría P/E forward de ~106x — consistente con la cifra de stockanalysis.com (104.7x).\n- El backlog total y el detalle línea por línea del tanshin en japonés siguen sin ser verificables en fuentes en inglés (laguna de cobertura declarada, típica en mid-caps japonesas).\n\nLECTURA: sin novedades fundamentales duras desde el informe anterior; la tesis de recuperación de márgenes en FY3/27 sigue intacta pero no probada — la primera validación real llega el 7-ago con el Q1.", "valuacion": "- HECHO: P/E trailing 386.8x, P/E forward 104.7x (stockanalysis.com, 21-jul-2026) — prácticamente sin cambio vs los 380.9x/103.1x del 17-jul.\n- HECHO: market cap ¥621.96B (stockanalysis.com) a ¥626.69B (investing.com), ambos 21-jul-2026 — pequeña diferencia entre proveedores de datos.\n- HECHO: consenso de targets disperso entre fuentes: stockanalysis.com/investing.com reportan ¥6,800.9 (rango ¥2,900–¥11,000); MarketScreener reporta ¥6,131 (11 analistas, 7 compra/2 venta/2 mantener), 5.24% por debajo del cierre de ¥6,470 del 17-jul.\n- HECHO: Jefferies elevó su target de ¥3,000 a ¥10,000 el 16-jun-2026 al pasar de Underperform a Buy — uno de los movimientos de target más agresivos del año para esta cobertura, y muestra cuánta dispersión hay incluso dentro de una misma casa a lo largo del tiempo.\n- El P/S no fue re-verificado esta semana; el dato previo (~10.4x vs ~1.7x de peers, Simply Wall St) se mantiene como referencia no actualizada.\n\nLECTURA: con targets de consenso apenas en línea o por debajo del precio actual (¥6,131–6,800 vs ¥6,570), el mercado no está pagando upside adicional hoy; la dispersión extrema (¥2,900–11,000) confirma que la valuación depende casi enteramente de la velocidad de adopción humanoide, no de un modelo de flujo de caja consensuado.", "tecnico": "- HECHO (dato ahora sí verificable y coherente con el precio, Investing.com, 21-jul-2026 20:55 GMT): RSI(14) = 41.2 (señal 'Sell'); MACD = -204 (bajista); medias móviles: MA5 = ¥6,508 (Buy/corto plazo), MA50 = ¥7,160.6 (Sell), MA200 = ¥7,520.9 (Sell). Resumen de osciladores y medias: 'Strong Sell' (8 señales de venta vs 4 de compra en medias móviles).\n- HECHO: pivotes clásicos del día: soporte S2 ¥6,376.7, pivote ¥6,556.7, resistencia R1 ¥6,673.4. ATR elevado (176.4), volatilidad alta.\n- HECHO: serie de cierres recientes (stockanalysis.com): 10-jul ¥7,880 → 13-jul ¥7,240 → 14-jul ¥7,540 → 15-jul ¥7,430 → 16-jul ¥7,200 → 17-jul ¥6,470 (-10.14%) → 21-jul ¥6,570 (+1.55%).\n\nLECTURA: la tendencia de fondo (12 meses) sigue alcista, pero el marco de corto/mediano plazo se deterioró: el precio perdió tanto la media de 50 como la de 200 sesiones y el rebote del 21-jul es modesto frente a la caída acumulada de ~17% desde el pico de ¥7,880 del 10-jul. Soporte inmediato ¥6,376 (pivote clásico) y zona ¥6,000; resistencia inmediata ¥6,673 y luego ¥7,200. Estructura técnica de corto plazo débil/correctiva de cara al 7-ago.", "catalizadores": "**Catalizadores:**\n\n- **7-ago-2026 — Resultados Q1 FY3/27:** primera lectura de si las órdenes humanoides van camino a duplicarse/triplicarse como indicó la compañía; también primera oportunidad de confirmar o ajustar la guía FY3/27 (+141.5% utilidad operativa).\n- **Revisiones de analistas:** el giro de Jefferies de Underperform a Buy (16-jun-2026, target x3.3 a ¥10,000) ilustra que el sell-side puede re-tasar la acción rápidamente en cualquier dirección con nueva información sobre pedidos.\n- **2026-2027:** ramp de producción de humanoides de clientes de EE.UU. (pedidos de prototipos ya registrados) y expansión de capacidad en Norteamérica.\n\n**Riesgos (por materialidad):**\n\n- **Valuación y momentum técnico:** P/E forward ~105x y señal técnica 'Strong Sell' (precio bajo MA50/MA200, RSI 41) muestran que el mercado ya está reduciendo el premium tras el pico de ¥9,150; una decepción de órdenes el 7-ago podría acelerar el de-rating.\n- **Competencia china:** Leaderdrive con ~27-40% del mercado chino de reductores armónicos (cifras varían por fuente) y Laifual ~13%, juntos casi la mitad del mercado chino; HDS + Leaderdrive concentran >63% del mercado global. Jefferies había fundamentado su downgrade de oct-2025 precisamente en esta competencia antes de revertirlo en junio 2026.\n- **Ciclicidad:** exposición a robots industriales y semiconductores; margen neto ya comprimido a ~2.7% en FY3/26.\n- **Dependencia de la narrativa humanoide:** las órdenes humanoides actuales (~¥1.3-2.5B) son <5% de ventas; el precio sigue descontando un escalamiento aún no contratado en firme.\n- **Volatilidad extrema:** movimientos diarios de doble dígito (-10.1% el 17-jul, rango semanal 14-21 jul de ~¥1,000) y ATR elevado; mid-cap de ~¥622-627B con alta sensibilidad a titulares.", "sentimiento": "- HECHO: consenso mixto según proveedor — MarketScreener: 7 compra/2 venta/2 mantener (11 analistas), target ¥6,131 (-5.2% vs cierre previo); stockanalysis.com/investing.com: rating 'Buy' agregado, target promedio ¥6,800.9 (rango ¥2,900–¥11,000).\n- HECHO: Jefferies giró de Underperform/¥2,400-3,000 (oct-2025, por competencia china) a Buy/¥10,000 (16-jun-2026) — cambio de tesis muy marcado que ilustra la volatilidad de opinión del sell-side sobre esta historia.\n- HECHO: técnico de corto plazo en 'Strong Sell' (Investing.com, 21-jul-2026) mientras el rating fundamental de consenso sigue en 'Buy' — desconexión entre el sentimiento de largo plazo (estructural, humanoide) y el posicionamiento táctico reciente.\n- La actividad de insiders y buybacks sigue sin ser verificable en fuentes en inglés — laguna declarada.\n\nLECTURA: sentimiento dividido y volátil: consenso fundamental 'Buy' con targets apenas en línea con el precio, técnico de corto plazo débil, y un historial reciente de revisiones de analistas muy bruscas (Jefferies x3.3 en el target en 8 meses). Esto sugiere que el mercado no tiene aún un ancla de valuación estable para la tesis humanoide.", "conclusion": "**Qué haría funcionar la tesis:** que el Q1 del 7-ago-2026 muestre órdenes humanoides acelerando hacia el doble/triple guiado y utilidad operativa en línea con la guía FY3/27 de ¥6,200M (+141.5%); en ese escenario, el precio podría recuperar la media de 50 sesiones (¥7,160) y reintentar el máximo de ¥9,150. La confirmación de pedidos de producción (no solo prototipos) de clientes humanoides de EE.UU. sería el catalizador mayor, y giros de analistas como el de Jefferies (Underperform a Buy en 8 meses) muestran que el re-rating puede ser rápido en ambas direcciones.\n\n**Qué la invalidaría:** (1) órdenes humanoides estancadas o guía recortada el 7-ago; (2) evidencia de que Leaderdrive/Laifual (juntos ~50% del mercado chino, HDS+Leaderdrive >63% global) ganan diseño en plataformas humanoides occidentales con precios significativamente menores; (3) que la señal técnica 'Strong Sell' actual (precio bajo MA50/MA200) se confirme con nuevos mínimos bajo ¥6,376. Con P/E forward ~105x, cualquiera de estos escenarios implica un de-rating severo — el mínimo de 52s en ¥2,316 recuerda cuánto puede comprimirse. LECTURA: tesis solo apta para perfiles tolerantes a volatilidad extrema; el próximo catalizador duro y fechado es el 7-ago-2026."}, "scores": {"tecnica": {"score": 38, "just": "Señal técnica ahora verificable y coherente (Investing.com, 21-jul-2026): RSI 41.2 y MACD bajista, precio por debajo de MA50 (¥7,160.6) y MA200 (¥7,520.9), rating agregado 'Strong Sell' pese al rebote de MA5. Tendencia de 12 meses sigue alcista de fondo, pero el marco corto/mediano plazo es débil tras la caída de ~17% desde ¥7,880 (10-jul) a ¥6,570 (21-jul)."}, "fundamental": {"score": 48, "just": "Sin cambios desde el 17-jul: ventas +7% pero utilidad neta -53.7% y margen neto ~2.7% en FY3/26; balance fuerte (equity ratio 72.2%) y guía FY3/27 de fuerte recuperación (+141.5% operativo). Moat real pero P/E forward ~105x y EPS consenso ¥62 castigan: negocio sólido en parte baja del ciclo, muy caro."}, "sentimiento": {"score": 52, "just": "Consenso fundamental 'Buy' pero con targets prácticamente en línea con el precio (¥6,131-6,800 vs ¥6,570) y dispersión extrema (¥2,900-11,000). El giro brusco de Jefferies (Underperform a Buy, target x3.3 en 8 meses) y el técnico de corto plazo en 'Strong Sell' muestran sentimiento inestable, sin ancla clara."}, "riesgo": {"score": 30, "just": "Riesgo mal acotado: mid-cap cíclica de ~¥622-627B con P/E forward ~105x, ATR elevado y caída de ~17% en dos semanas, competencia china consolidando cuota (Leaderdrive+Laifual ~50% en China) y tesis dependiente de órdenes humanoides aún incipientes (<5% de ventas). Señal técnica de corto plazo negativa se suma a la volatilidad estructural."}, "conviccion": {"score": 52, "just": "Catalizador concreto y fechado (Q1 el 7-ago-2026) y tesis falsable (duplicar/triplicar órdenes humanoides en FY3/27), pero la asimetría sigue desfavorable: target consenso ≈ precio, técnico de corto plazo negativo y valuación exige ejecución perfecta. Convicción media, sin mejora clara desde el informe previo a la espera de la validación de agosto."}}, "sources": ["stockanalysis.com — quote e historial de precios TYO:6324 (21-jul-2026)", "investing.com — cotización y ficha técnica 6324 (21-jul-2026, 20:55 GMT)", "investing.com — análisis técnico (RSI, MACD, medias móviles, pivotes) (21-jul-2026)", "MarketScreener — consenso 11 analistas, target ¥6,131 (jul-2026)", "moomoo — Jefferies upgrade a Buy, target ¥10,000 desde ¥3,000 (16-jun-2026)", "investing.com — Jefferies downgrade a Underperform, target ¥2,400 por competencia china (oct-2025)", "TDnet/JPX vía BigGo Finance — resultados FY3/26 y guidance FY3/27 (may-2026)", "humanoid.guide / investing.com — órdenes humanoides y nota de resultados (2026)", "humanoid.guide — cuota de mercado Leaderdrive/Laifual en China (2026)", "TipRanks — forecast y rango de targets (jul-2026)", "Yahoo Finance / CNBC 6324.T (jul-2026)"], "change": {"day": 8.83, "week": 10.51}, "events": [{"date": "2026-08-07", "label": "Resultados Q1 FY3/27", "kind": "earnings"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "TVC:NI225", "label": "Nikkei 225", "relative_performance_30d": -8.01, "relative_performance_ytd": 53.37, "price_percentile_1y": 70.7, "partial": false}, "technical": {"price": 7150, "change_1d_pct": 8.83, "change_1w_pct": 10.51, "rsi": 47.7, "macd": -95.0802, "macd_signal": 72.226, "sma20": 7606.5, "sma50": 7343.2, "sma200": 4597.44, "ema12": 7282.0644, "ema26": 7377.1446, "pct_vs_sma20": -6.0, "pct_vs_sma50": -2.63, "pct_vs_sma200": 55.52, "volume_today": 784000, "volume_avg20": 1862980, "volume_ratio": 0.42, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 70.7, "vs_benchmark_30d_pct": -8.01, "perf_1m_pct": -13.02, "perf_ytd_pct": 85.71}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "TVC:NI225", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/HDSY.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "CLSK", "company": "CleanSpark, Inc.", "statsList": [["Precio", "$15.38 (21-jul-2026)"], ["Rango 52 sem.", "$8.00 – $23.61"], ["Market cap", "~$3.9-4.0B (21-jul-2026, ~256-258M acciones)"], ["Hashrate", "50 EH/s operacional; 42.6 EH/s promedio (jun-2026)"], ["BTC en tesorería", "13,924 BTC (30-jun-2026); +454 BTC comprados el 7-jul a ~$64K"], ["Próx. earnings", "~6-11-ago-2026 (Q3 FY26; fuentes difieren)"], ["Técnico (auto)", "RSI 55.7 · MACD -0.42 / señal -0.60 (TradingView, 21-jul-2026)"]], "sections": {"resumen": "CleanSpark (NASDAQ: CLSK) sigue en plena transición hacia infraestructura HPC/IA. HECHO: tras el anuncio del 14-jul-2026 (lease de 20 años, $6.6B/175MW en Sandersville, Georgia, con un hyperscaler investment-grade no revelado, más LOI de exclusividad sobre 885MW en Texas), la acción continuó subiendo con fuerza el 20-jul (+13.4% a $14.78) y el 21-jul (+~4-7% hasta $15.38, intradía sobre $15.60) — el mercado sigue digiriendo la magnitud del contrato (hasta $11.6B con extensiones). HECHO: no hay contrato firmado en Texas aún, sigue como LOI de exclusividad (verificado 21-jul-2026, sin novedad de conversión). BTC cotiza ~$66,600 (21-jul), recuperándose desde mínimos de julio (~$58K) — máximo de 5 semanas, lo que también favorece el sentimiento hacia mineras.", "fundamental": "**Q2 FY2026 (cerrado 31-mar-2026, reportado 11-may-2026; StockTitan/8-K SEC) — sin cambios, sigue siendo el último trimestre reportado:**\n\n- HECHO: Revenue $136.4M, -24.9% a/a (vs $181.7M), miss vs estimados; caída impulsada por el precio promedio de BTC -24% (~$76,000).\n- HECHO: Pérdida neta de $378.3M, EPS -$1.52, que incluye $263M de ajustes mark-to-market no-cash sobre BTC. Margen bruto >40%; costo de energía 5.2¢/kWh.\n- HECHO: Liquidez $1.2B: $260M en cash + 13,561 BTC (~$925M al 31-mar).\n\n**Update operacional de junio (StockTitan/Blockspace, confirmado a lo largo de jul-2026):**\n\n- HECHO: 614 BTC minados en junio (3,724 BTC acumulados en el año), 13,924 BTC en tesorería, 50 EH/s operacional (récord), 42.6 EH/s promedio (bajó de 46.2 EH/s en mayo), 1.8 GW de potencia contratada, 808 MW en uso, 225,137 mineros, eficiencia pico de la flota 16.07 J/TH.\n- HECHO: el 7-jul-2026 la compañía compró 454 BTC adicionales a ~$64,000 (~$29M), acumulando mientras otras mineras vendían en el bear market (Bitcoin.com, 7-jul-2026).\n- HECHO: levantó $1.15B en convertibles al 0% — soporte de liquidez con riesgo de dilución futura (CryptoSlate).\n- HECHO: no se identificaron noticias financieras materiales nuevas entre el 17-jul y el 21-jul más allá de la continuación del rally por el lease de Sandersville; no hay update operacional de julio todavía (se espera a inicios de agosto, según el patrón mensual).\n\nLECTURA: con BTC recuperándose hacia $66-67K, el margen de minado mejora relativo a los ~$64K de hace dos semanas, aunque sigue por debajo del costo totalmente cargado estimado (~$82.7K/BTC, FY2025). El lease de Sandersville ($6.6B a 20 años, hasta $11.6B con extensiones, entregas desde Q4 2027) sigue siendo el driver dominante de la narrativa, más que la operación minera en sí.", "valuacion": "- HECHO: market cap ~$3.9-4.0B (cálculo con ~256-258M acciones en circulación x $15.38; TradingView reporta una cifra rezagada de $3.31B que no refleja el precio de hoy — se declara la discrepancia entre fuentes).\n- HECHO: los 13,924 BTC (~$0.93B a BTC $66.6K) cubren ~23-24% del market cap actualizado, similar al ratio previo (CoinShares Q1 2026: BTC/mcap de CLSK ~24%, vs MARA 51% y RIOT 11%).\n- HECHO (CoinShares, Q1 2026): las mineras con contratos HPC asegurados cotizan a ~12.3x EV/NTM sales vs 5.9x las pure-play.\n- LECTURA: el re-rating hacia el grupo HPC sigue en curso desde el 14-jul; el hecho de que la acción continúe subiendo 6 días después del anuncio (13.4% el 20-jul, +4-7% el 21-jul) sugiere que el mercado sigue revisando al alza el valor del contrato ($11.6B con extensiones es mayor al $6.6B inicial). No se pudo verificar un EV/EBITDA puntual actualizado.\n- HECHO — consenso (StockAnalysis, 21-jul-2026): Strong Buy (13 analistas), PT promedio $22.35 (rango $16-$27), ~45% de upside desde $15.38. Subas recientes confirmadas: Cantor Fitzgerald $17→$26, Needham $18→$23 (20-jul-2026); B. Riley $19, Keefe Bruyette también bullish.", "tecnico": "- HECHO: secuencia de precios: $13.02 (17-jul) → $12.86 (16-jul, -9%) → $13.16 (10-jul) → $14.78 (20-jul, +13.43%) → $15.38 (21-jul, +~4-7%, intradía hasta $15.60). Rango 52 semanas $8.00-$23.61 sin cambios.\n- HECHO (fuentes de días previos al rally del 20-21 jul, potencialmente desactualizadas): soporte citado en $12.96-$13.00 (Ichimoku Kijun/nivel psicológico), resistencia en SMA50 ~$13.5 y zona $14-14.06; RSI neutral ~49; MACD con señal de venta. Estas lecturas técnicas son previas al salto de +18% en 4 días y deben tomarse con cautela — se declara.\n\nLECTURA: el rally del 20-21 jul rompió al alza las resistencias de corto plazo mencionadas por esas fuentes ($14-14.06), lo que sugiere una ruptura técnica relevante, aunque sin datos de medias móviles recalculados post-rally. Próxima resistencia relevante en la zona $16-19 (rango may-jun) y luego el máximo post-anuncio inicial; soporte ahora se traslada a $13-14 (antiguas resistencias). Aún sin confirmación de tendencia alcista multi-marco por falta de indicadores actualizados a hoy, pero el momentum de las últimas 48-72h es claramente positivo.", "catalizadores": "**Catalizadores:**\n\n- **~6-11-ago-2026 — Resultados fiscal Q3 2026** (trimestre cerrado 30-jun): primera guía detallada post-lease Sandersville; fuentes difieren entre 6-ago y 11-ago.\n- **Próximas semanas/meses — Conversión del LOI de Texas (885 MW)** en leases firmados con el mismo hyperscaler — confirmado que sigue sin firmarse al 21-jul-2026 — el catalizador más material pendiente.\n- **~1ª semana de agosto:** update de producción BTC/hashrate de julio (pendiente).\n- **Q4 2027 — inicio de entregas del data center de Sandersville** (inicio de los flujos contratados de $6.6-11.6B a 20 años).\n- **Potencial revelación de la identidad del tenant** (sin fecha) — un hyperscaler top sería catalizador de re-rating adicional.\n\n**Riesgos (por materialidad):**\n\n- **Precio de BTC (crítico):** BTC ~$66,600 (21-jul), recuperándose desde mínimos de julio (~$58K) pero aún -46% del ATH; ETFs de BTC registraron $4.5B en salidas netas en junio, el peor mes desde su lanzamiento (2024). CLSK sigue apalancada a BTC en ambas direcciones.\n- **Economics de minado post-halving:** costo totalmente cargado ~$82.7K/BTC (FY2025) > spot actual $66.6K; hashrate promedio de junio bajó a 42.6 EH/s (desde 46.2 EH/s en mayo).\n- **Ejecución/financiamiento del capex HPC:** entregas recién en Q4 2027; construcción intensiva en capital.\n- **Dilución:** $1.15B en convertibles al 0%; ~317.76M acciones potenciales (mayo-2026) vs ~256.6M reportadas a marzo — posible dilución en curso; probable necesidad de capital adicional para el capex HPC.\n- **Concentración:** un solo tenant no revelado para Sandersville + exclusividad de Texas sin contrato firmado todavía.\n- **Valuación ya corrió fuerte:** +18% en 4 sesiones (17 al 21-jul) eleva el riesgo de un pullback si no hay noticias incrementales antes de los earnings de agosto.", "sentimiento": "- HECHO: consenso de analistas Strong Buy (13 analistas, StockAnalysis 21-jul), PT promedio $22.35 ($16-$27); Cantor Fitzgerald $17→$26 y Needham $18→$23 confirmados el 20-jul-2026, B. Riley $19.\n- HECHO: short interest 33.04% del float en junio (subiendo desde 32.76% el mes previo) — CleanSpark sigue siendo la cripto-compañía más shorteada con valor de mercado sobre $2B (Yahoo Finance).\n- HECHO: insiders — sin compras ni ventas relevantes en los últimos 3 meses; únicamente adjudicaciones de equity (equity awards) rutinarias sin valor de transacción reportado (Yahoo Finance, jul-2026).\n- HECHO (tono de prensa, últimos 7 días): mayormente positivo y en aumento — titulares consecutivos de \"stock jumps/rallies\" (20 y 21-jul) reforzando la narrativa HPC; se contrasta con un titular negativo del 16-jul sobre cash burn.\n\nLECTURA: sentimiento se está inclinando más claramente hacia el optimismo en los últimos días (rally sostenido de +18% en 4 sesiones) sin que el short interest haya bajado todavía (dato de junio); si el short interest de julio confirma una caída, sería señal de capitulación de los bajistas y reforzaría la tesis de squeeze. Aún no hay ese dato de julio disponible.", "conclusion": "**Qué haría funcionar la tesis:** (1) conversión del LOI de Texas (885 MW) en leases firmados — validaría el re-rating de pure-play (5.9x) hacia el grupo HPC (12.3x EV/sales), y el mercado ya empezó a anticiparlo con el rally de 4 días; (2) continuación de la recuperación de BTC sobre $70K, que restauraría márgenes mineros y el valor de los 13,924+ BTC; (3) con 33% de short interest (dato de junio, probablemente mayor presión de cobertura en julio), el rally reciente ya luce compatible con un short squeeze en marcha.\n\n**Qué la invalidaría:** (1) BTC revirtiendo por debajo de $58-60K — el minado quedaría bajo mayor presión y forzaría venta de tesorería/dilución; (2) que el LOI de Texas no se convierta en contrato en los próximos meses, generando decepción tras el rally; (3) pérdida de los nuevos soportes de corto plazo ($13-14) que devolvería el precio a la zona $11.5-12.\n\nLECTURA final: la tesis sigue siendo binaria y falsable, pero el balance de evidencia de los últimos 4 días (rally sostenido +18%, upgrades de PT, BTC recuperándose) inclina el sesgo de corto plazo al alza, aunque con riesgo de sobreextensión antes de la confirmación fundamental en los earnings de agosto y la firma del contrato de Texas."}, "scores": {"tecnica": {"score": 68, "just": "Ruptura al alza confirmada: +13.4% el 20-jul y +~5% el 21-jul, acumulando ~+18% en 4 sesiones desde $13.02 (17-jul) hasta $15.38, rompiendo resistencias previas de $14-14.06. Momentum de corto plazo claramente positivo, aunque sin indicadores técnicos (RSI/medias móviles) recalculados post-rally que confirmen tendencia alcista multi-marco — se declara la limitación. Aún lejos del máximo de 52 semanas ($23.61)."}, "fundamental": {"score": 57, "just": "Sin cambios materiales desde el informe previo: deterioro cíclico real (revenue -25% a/a, pérdida de $378M mayormente mark-to-market no-cash), hashrate promedio bajando (42.6 EH/s en junio vs 46.2 en mayo), pero balance sólido ($1.2B liquidez, 13,924+ BTC) y contrato transformacional de hasta $11.6B/20 años. La recuperación de BTC a $66.6K mejora levemente la economía de minado marginal frente a hace dos semanas."}, "sentimiento": {"score": 62, "just": "Mejora vs el informe previo: consenso Strong Buy con PTs recién confirmados ($16-27, promedio $22.35), rally de precio sostenido 4 sesiones, prensa mayormente positiva. Short interest 33% (dato de junio, aún no actualizado para julio) sigue siendo alto pero no ha subido más recientemente que se sepa. Insiders sin actividad relevante."}, "riesgo": {"score": 28, "just": "Riesgo sigue alto: beta apalancada a BTC (aunque BTC se recupera a $66.6K desde mínimos de $58K), costo pleno de minado (~$82.7K/BTC) aún por sobre el spot, $1.15B en convertibles con dilución en curso (317.76M acciones potenciales vs 256.6M reportadas), capex HPC intensivo con entregas recién en Q4 2027, LOI de Texas aún sin firmar, y la acción ya subió ~18% en 4 días lo que añade riesgo de reversión si no hay noticias incrementales."}, "conviccion": {"score": 60, "just": "Catalizadores fechados (earnings ~6-11-ago, conversión pendiente del LOI Texas, update de hashrate de julio) y asimetría reforzada por el momentum reciente + short interest elevado. Ligero aumento vs el informe previo por la confirmación del rally y upgrades de analistas, pero el driver dominante (BTC) sigue siendo exógeno, y la firma de Texas —el catalizador más material— aún no ocurre."}}, "sources": ["TradingView — precio, cambio semanal y market cap rezagado (21-jul-2026)", "StockAnalysis.com — precio $15.38, consenso Strong Buy, PT $22.35 ($16-$27) (21-jul-2026)", "Timothy Sykes News — CLSK +6.21%/+7.21% intradía, contexto del rally (21-jul-2026)", "StocksToTrade / Timothy Sykes — CLSK +13.43% a $14.78 (20-jul-2026)", "PR Newswire / TipRanks / StockTitan / SEC 8-K — lease $6.6B (hasta $11.6B)/20 años Sandersville + LOI Texas 885MW (14-jul-2026, confirmado sin conversión al 21-jul)", "Investing.com — Cantor Fitzgerald $17→$26, Needham $18→$23 (20-jul-2026)", "Yahoo Finance — Bitcoin ~$66,609 (21-jul-2026), recuperación desde ~$58K de mínimos de julio", "Yahoo Finance / news.bitcoin.com — compra de 454 BTC a ~$64K el 7-jul-2026, tesorería 13,924 BTC", "StockTitan / Yahoo Finance — update operacional junio: 614 BTC, 50 EH/s, 42.6 EH/s promedio, 225,137 mineros (jul-2026)", "Yahoo Finance / Kavout — short interest 33.04% (junio-2026, sube desde 32.76%)", "Yahoo Finance — insider transactions: solo equity awards, sin compras/ventas netas (jul-2026)", "Macrotrends / Eulerpool — acciones en circulación ~256.6M (mar-2026) / ~317.76M (may-2026)", "StockInvest.us / Investing.com — niveles técnicos previos al rally (soporte $12.96-13, resistencia $14, RSI ~49) — declarado como potencialmente desactualizado", "CoinShares Bitcoin Mining Report Q1 2026 — múltiplos HPC vs pure-play, BTC/mcap por minera", "StockTitan / Investing.com / SEC 8-K — Q2 FY2026 (11-may-2026, sin cambios)", "Investing.com / TipRanks — fecha earnings Q3 FY26 6-ago o 11-ago-2026 (fuentes difieren, jul-2026)"], "change": {"day": 6.66, "week": 18.04}, "events": [{"date": "2026-08-11", "label": "Resultados Q3 FY26 (rango 6-11 ago; fuentes difieren)", "kind": "earnings"}, {"date": "2026-07-21", "label": "Rally continuo tras lease Sandersville: +18% acumulado en 4 sesiones", "kind": "corporate"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "CRYPTO:BTCUSD", "label": "Bitcoin", "relative_performance_30d": -16.07, "relative_performance_ytd": 72.22, "price_percentile_1y": 47.3, "partial": false}, "technical": {"price": 15.38, "change_1d_pct": 6.66, "change_1w_pct": 18.04, "rsi": 55.7, "macd": -0.4203, "macd_signal": -0.6021, "sma20": 14.079, "sma50": 15.2616, "sma200": 13.2905, "ema12": 13.8965, "ema26": 14.3168, "pct_vs_sma20": 9.24, "pct_vs_sma50": 0.78, "pct_vs_sma200": 15.72, "volume_today": 28482932, "volume_avg20": 22542870.0, "volume_ratio": 1.26, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 47.3, "vs_benchmark_30d_pct": -16.07, "perf_1m_pct": -11.2, "perf_ytd_pct": 47.96}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "CRYPTO:BTCUSD", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/CLSK.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "CCU", "company": "Compañía Cervecerías Unidas S.A.", "statsList": [["Precio", "$5.450 CLP (21-jul-2026)"], ["Rango 52 sem.", "$4.947 – $6.598 CLP"], ["Listado", "Bolsa de Santiago: CCU (IPSA) · ADR NYSE: CCU US$11,25"], ["Market cap", "~CLP 1,95-2,0 billones (US$2,06B vía ADR)"], ["P/E · EV/EBITDA", "17,3x trailing / ~15x fwd · EV/EBITDA 8,7x"], ["Dividend yield", "~3,0% (div. definitivo $74,53 pagado abr-2026)"], ["Target consenso", "$5.877 CLP (+11%) — 2 buy / 4 hold / 4 sell"], ["Próx. earnings", "6-ago-2026 (2T26)"], ["Técnico (auto)", "RSI 64.5 · MACD +30.12 / señal +5.07 (TradingView, 21-jul-2026)"]], "change": {"day": 3.42, "week": 4.45}, "sections": {"resumen": "CCU llega a julio 2026 como un claro rezagado del rally chileno: mientras el IPSA encadena máximos históricos, la acción opera ~20% bajo su máximo de 52 semanas ($6.598) tras un año bajista, aunque en las últimas semanas construye una base sobre los $5.000 con el MACD recién cruzado al alza. La tesis tiene tres patas: un negocio en Chile que opera muy bien (EBITDA +13,7% en 1T26, margen 20%, viento a favor del peso fuerte), dos lastres visibles (Argentina con EBITDA −18,6% y Vinos con −50,1%) y una valuación ~20% por debajo de su promedio histórico de 10 años. El consenso es tibio (Hold/Neutral, target $5.877) pero con dispersión extrema: BICE ve +52% ($7.794) y UBS recomienda vender ($4.750). Catalizadores inmediatos: resultados 2T26 el 6-ago y las primeras señales del nuevo CEO Eduardo Ffrench-Davis, que asumió el 1-jul con foco declarado en márgenes y eficiencia.", "fundamental": "**Resultados 1T26** (reportados 6/7-may-2026):\n\n- HECHO: Ventas consolidadas CLP 819.515 millones (+0,2% a/a); EBITDA CLP 131.644 millones (+0,1%), margen estable en 16,1%; utilidad controladora CLP 53.856 millones (−6,8%, ~US$58M); UPA CLP 145,8; volúmenes consolidados +1,8% (press release 1Q26 / TipRanks / La Tercera, may-2026).\n- HECHO — **Chile, el motor**: ventas +3,9%, EBITDA +13,7% a CLP 107.357 millones, margen 20,0% (+173 pb), ayudado por la apreciación del CLP de 8,1% vs USD (menores costos dolarizados) y volúmenes +3,9% liderados por categorías no alcohólicas (press release 1Q26, may-2026).\n- HECHO — **Negocios Internacionales** (Argentina, Bolivia, Paraguay, Uruguay): ventas −6,7%, EBITDA −18,6% a CLP 28.489 millones; volúmenes −1,7% con caída de un dígito medio en cerveza en Argentina (press release 1Q26).\n- HECHO — **Vinos**: ventas −7,2%, EBITDA −50,1% a CLP 3.288 millones (margen −508 pb) por mayor costo del vino y sobreoferta global (~US$19B de inventario excedente en la industria) (press release 1Q26; DF, 12-jun-2026).\n- HECHO: TTM en USD (ADR): revenue US$3,13B (−2,2%), utilidad neta US$121,8M (−32,0%); ROE 7,3-7,9%; Deuda/Patrimonio 0,71x (StockAnalysis 20-jul-2026; Visfin jul-2026).\n\n**Propiedad y movimientos corporativos:**\n\n- HECHO: IRSA controla el 65,87% de CCU; IRSA es JV 50/50 entre Quiñenco y Heineken. Free float: 20,04% local + 14,09% ADR (ccuinvestor.com, 2026).\n- HECHO: CCU completó la compra de la participación de Nestlé en el JV de aguas por US$180 millones (DF, 12-jun-2026).\n- HECHO: Eduardo Ffrench-Davis asumió como CEO el 1-jul-2026 tras 28 años de Patricio Jottar, quien pasa al directorio; Alexandre Carreteiro (presidente de Heineken Américas) fue nombrado vicepresidente del directorio (TipRanks, jul-2026).\n- LECTURA: el negocio chileno (dos tercios del EBITDA) está en su mejor momento de márgenes en años; el problema de CCU no es operacional en su core, sino la exposición a Argentina y al ciclo global del vino. La mayor injerencia de Heineken en el directorio puede traer disciplina de márgenes o tensión con Quiñenco — sin evidencia de conflicto por ahora.", "valuacion": "- HECHO: P/E trailing 17,25x local / 16,9-18,4x ADR; forward ~15x (BTG estima 13,3x); EV/EBITDA 8,66x (Investing/Visfin/StockAnalysis, jul-2026).\n- HECHO: la acción transa **~20% por debajo de su promedio de valuación de los últimos 10 años** (DF, 12-jun-2026).\n- HECHO: dividend yield ~3,0% local (dividendo definitivo N°272 de $74,53 por acción pagado desde el 24-abr-2026) (TipRanks/Diario Estrategia, abr-2026).\n- HECHO — targets locales: consenso **$5.877 CLP (+11%)**, máx $6.600, mín $4.365; 2 buy / 4 hold / 4 sell (Investing.com, jul-2026). Casas (DF, 12-jun-2026): **BICE Sobreponderar PO $7.794 (+52%)**, **BTG Neutral PO $6.500**, **UBS Vender PO $4.750** (argumenta crecimiento de ingresos de un dígito hasta 2028).\n- HECHO: ADR consenso Hold, target US$12,46 (+10,8%, 7 analistas) (StockAnalysis, 20-jul-2026).\n- LECTURA: la valuación es el corazón de la tesis alcista — múltiplos comprimidos contra la propia historia con un IPSA que transa ~12% caro vs la suya. Pero el descuento tiene causa: el upside depende de que Argentina y Vinos se normalicen, no del negocio chileno que ya opera bien y está en el precio. La dispersión BICE/UBS (de +52% a −7%) refleja exactamente esa apuesta.", "tecnico": "- HECHO: precio $5.285 CLP, +1,28% en la sesión del lunes 20-jul y +1,63% vs 5 ruedas atrás (TradingView tiempo real, 20-jul-2026).\n- HECHO: RSI(14) diario 56,3 — neutral con sesgo alcista; MACD(12,26,9) +12,6 sobre señal −1,0 (histograma +13,6): **cruce alcista reciente** (calculado sobre 130 barras diarias de TradingView, 20-jul-2026).\n- HECHO: precio sobre la SMA20 (~$5.183, +2,0%) y SMA50 (~$5.204, +1,6%), y justo en la SMA100 (~$5.285); bajo la MM200 publicada (~$5.670) (TradingView 20-jul-2026; Visfin jul-2026).\n- HECHO: señal técnica diaria \"Strong Buy\", semanal neutral (Investing.com, jul-2026). Mínimo de 52 semanas $4.947 tocado a inicios de mayo; desde ahí, piso doble en la zona $5.000-5.050 (jun y feb).\n- LECTURA: estructura de base tras 12 meses bajistas (−16,6% en las últimas ~26 semanas). Soportes: $5.183-5.204 (SMA20/50) y $5.000-4.947; resistencias: $5.443 (máximo intradía del 20-jul), $5.670 (MM200) — su recuperación sería la confirmación de cambio de tendencia — y la zona $6.600. El cruce de MACD con RSI aún lejos de sobrecompra deja espacio al rebote, pero mientras siga bajo la MM200 es un rebote dentro de tendencia bajista, no una tendencia alcista nueva.", "catalizadores": "- HECHO: **resultados 2T26 el 6-ago-2026** (StockAnalysis, jul-2026). LECTURA: trimestre de invierno, estacionalmente débil en volúmenes; el foco estará en si Chile sostiene margen 20% y en el ritmo de deterioro/mejora argentino.\n- HECHO: **nuevo CEO** Eduardo Ffrench-Davis desde el 1-jul-2026, con prioridad declarada en márgenes y eficiencia; renovación de comités del directorio entre julio y agosto (DF 12-jun-2026; TipRanks jul-2026). LECTURA: primer plan estratégico del nuevo management es el catalizador idiosincrático más cercano.\n- HECHO: **tipo de cambio** — USD/CLP ~926 (14-jul-2026), con el CLP apreciado 8,1% vs USD en 1T26: viento a favor directo en costos dolarizados del segmento Chile (dolarhoy.net; press release 1Q26).\n- HECHO: **insumos** — aluminio LME ~US$3.160-3.200/t con inventarios −43% en el año y déficit proyectado (~930 kt según Macquarie); cebada y lúpulo europeos +12-18% de costo desembarcado en 1T26 (TradingEconomics/AgMetalMiner/Expert Market Research, jul-2026).\n- HECHO: **Argentina** — consumo masivo −3,3% acumulado en 2026, pero inflación mensual desacelerando (<2% proyectado para julio) y expectativa de recuperación gradual del consumo en 2S26 (Bloomberg Línea/Infobae, jun-2026). LECTURA: la recuperación argentina es la opción de mayor convexidad de la tesis.\n- HECHO: **macro Chile** — PIB 1T26 −0,5% a/a, Imacec de mayo −0,9% (quinto retroceso consecutivo), Banco Central recortó el crecimiento 2026 hacia ~1%, riesgo de recesión técnica (Emol/Bloomberg/XTB, mar-jul 2026). LECTURA: el 1T26 se benefició de un consumo chileno que ya no acelera — el viento de cola doméstico se está apagando.", "sentimiento": "- HECHO: consenso local Neutral con 2 buy / 4 hold / 4 sell y PO $5.877 (Investing, jul-2026); ADR Hold con target US$12,46 (StockAnalysis, 20-jul-2026). El DF tituló (12-jun-2026): \"Argentina y alta exposición a vinos y cervezas hacen dudar al mercado\".\n- HECHO: noticias de los últimos 45 días — cierre de la compra del JV de aguas a Nestlé (US$180M, jun), cambio de CEO y reordenamiento del directorio con mayor presencia de Heineken (1-jul), y entrada en vigencia de nuevas restricciones a la publicidad de alcohol en Chile el 7-jul-2026.\n- HECHO: contexto IPSA — el índice acumula ~70 máximos históricos en el año, transa ~12% más caro que su historia, con flujos extranjeros récord (US$112M vía el principal ETF en el año) y targets como el de Bci en 12.050 puntos; el optimismo se moderó en julio por el débil crecimiento (DF/Emol/Bloomberg, 2026).\n- LECTURA: el contraste es la historia — el IPSA en máximos mientras CCU está 20% bajo su peak la convierte en uno de los grandes laggards del rally chileno. Eso sostiene el argumento de valuación relativa (BICE), pero 4 de 10 analistas locales recomiendan vender: el mercado no compra la normalización de Argentina y Vinos todavía. Sin datos públicos de posicionamiento institucional o insiders para el papel local.", "conclusion": "CCU es una apuesta de valuación y reversión a la media, no de momentum: negocio core chileno en su mejor nivel de márgenes, múltiplos 20% bajo su historia, 3% de yield, y dos lastres (Argentina, Vinos) que explican el descuento y cuya normalización — no garantizada — es el upside. El técnico acompaña por primera vez en meses (cruce de MACD, sobre SMA20/50, doble piso en $5.000) pero la MM200 en $5.670 sigue arriba como techo de la tendencia. Con el consenso en Hold y el IPSA caro, el papel ofrece asimetría razonable bajo $5.300 con soporte claro en $5.000, catalizador fechado el 6-ago (2T26) y la incógnita del plan del nuevo CEO. La señal es **Hold** con sesgo constructivo: para pasar a Buy se necesita recuperar la MM200 y/o evidencia de que Argentina dejó de drenar EBITDA; para venderla, perder los $5.000 que ya defendió dos veces."}, "scores": {"tecnica": {"score": 60, "just": "Rebote con confirmación: cruce alcista de MACD, RSI 56 con espacio, precio sobre SMA20/50 y doble piso defendido en $5.000. Se descuenta porque sigue bajo la MM200 ($5.670) y 20% bajo el máximo de 52 semanas — es una base dentro de tendencia bajista, aún no una tendencia alcista."}, "fundamental": {"score": 62, "just": "Chile (dos tercios del EBITDA) con margen 20% y EBITDA +13,7%, balance sano (D/E 0,71x) y valuación 20% bajo su media histórica con 3% de yield. Los lastres pesan: Argentina −18,6% y Vinos −50,1% de EBITDA, utilidad total −6,8% y ROE mediocre (~7,5%)."}, "sentimiento": {"score": 46, "just": "Consenso tibio con 4 de 10 analistas locales en venta, laggard notorio del rally IPSA y titulares de prensa escépticos (\"hacen dudar al mercado\"). A favor: dispersión de targets con el extremo alcista (BICE +52%) bien argumentado y flujos extranjeros récord hacia la bolsa chilena que eventualmente rotan a rezagados."}, "riesgo": {"score": 50, "just": "Negocio defensivo de consumo básico con 65% del mercado cervecero chileno y controlador sólido (Quiñenco/Heineken), pero triple exposición adversa: macro chilena deteriorándose (5 Imacec negativos), Argentina sin piso confirmado, sobreoferta global de vino, más costos de aluminio y cebada al alza y nuevas restricciones publicitarias vigentes desde el 7-jul."}, "conviccion": {"score": 55, "just": "Catalizadores concretos y fechados (2T26 el 6-ago, plan del nuevo CEO, recuperación argentina en 2S26) y tesis falsable con niveles claros ($5.000 abajo, MM200 $5.670 arriba). La convicción es media porque el timing de la normalización de Argentina y Vinos es incierto y el consenso lleva meses sin comprarla."}}, "sources": ["TradingView — BCS:CCU tiempo real, 130 barras diarias; RSI/MACD/SMA calculados (20-jul-2026)", "Investing.com — cotización local, consenso 2/4/4, PO $5.877, P/E, yield (jul-2026)", "StockAnalysis.com — ADR CCU, targets, forward P/E, EV/EBITDA, earnings 6-ago (20-jul-2026)", "Visfin.cl — MM50/200, ROE, D/E (jul-2026)", "CCU Investor — Press Release 1Q26 (6-may-2026)", "TipRanks — resultados 1T26; transición CEO/directorio; dividendo abr-2026 (may-jul 2026)", "La Tercera/Pulso — utilidad 1T26 US$58M (may-2026)", "Diario Financiero — POs BICE $7.794 / BTG $6.500 / UBS $4.750; compra JV aguas Nestlé US$180M (12-jun-2026)", "ccuinvestor.com / Quiñenco — estructura de propiedad IRSA 65,87% (2026)", "Bloomberg Línea / Infobae — consumo Argentina −3,3% 2026, inflación desacelerando (jun-2026)", "Bloomberg / Emol / XTB — macro Chile: Imacec, riesgo de recesión técnica, gobierno Kast (mar-jul 2026)", "TradingEconomics / AgMetalMiner — aluminio LME, déficit proyectado (jul-2026)", "Expert Market Research / Mordor — mercado cervecero Chile: CCU ~65%, ABI ~30% (2025-2026)", "Senado.cl / La Tercera — Ley 21.363: restricciones publicidad alcohol desde 7-jul-2026", "dolarhoy.net — USD/CLP 926 (14-jul-2026)"], "events": [{"date": "2026-08-06", "label": "Resultados 2T26", "kind": "earnings"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "CBOE:ECH", "label": "ECH (proxy Chile/IPSA)", "relative_performance_30d": 10.6, "relative_performance_ytd": -4.37, "price_percentile_1y": 30.5, "partial": false}, "technical": {"price": 5450, "change_1d_pct": 3.42, "change_1w_pct": 4.45, "rsi": 64.5, "macd": 30.1153, "macd_signal": 5.0712, "sma20": 5197.225, "sma50": 5203.858, "sma200": 5668.9615, "ema12": 5242.84, "ema26": 5212.7247, "pct_vs_sma20": 4.86, "pct_vs_sma50": 4.73, "pct_vs_sma200": -3.86, "volume_today": 1131099, "volume_avg20": 287353.0, "volume_ratio": 3.94, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 30.5, "vs_benchmark_30d_pct": 10.6, "perf_1m_pct": 6.86, "perf_ytd_pct": -7.06}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "CBOE:ECH", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/CCU.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "CMPC", "company": "Empresas CMPC S.A.", "statsList": [["Precio", "$1.083,9 CLP (21-jul-2026)"], ["Rango 52 sem.", "$1.015 – $1.599 CLP"], ["Listado", "Bolsa de Santiago: CMPC (IPSA) — grupo Matte"], ["Market cap", "CLP 2,68 billones (~US$2.900M)"], ["P/E · P/B · EV/EBITDA", "16,3x trailing / 15,3x fwd · P/B 0,28x · EV/EBITDA 7,9x"], ["Deuda neta / EBITDA", "4,1x (1T26) — rating S&P BBB- desde mar-2026"], ["Dividend yield", "~0,9% (US$0,0105/acción pagado may-2026)"], ["Target consenso", "JPM $1.100 (jul) vs agregadores $1.513-1.712 (rezagados)"], ["Próx. earnings", "6-ago-2026 (2T26)"], ["Técnico (auto)", "RSI 53.7 · MACD +6.13 / señal +2.27 (TradingView, 21-jul-2026)"]], "change": {"day": -0.38, "week": 1.3}, "sections": {"resumen": "CMPC es la gran castigada del IPSA: mientras el índice marca máximos históricos (~11.500 puntos), la papelera del grupo Matte acumula −20% en 12 meses y tocó a inicios de julio un mínimo de 4 años ($1.031), del que rebota tímidamente hacia $1.076. El castigo tiene tres causas concretas: un ciclo de celulosa deprimido (precio promedio −17% en 2025, sobreoferta global), un balance cargado (deuda neta/EBITDA 4,1x, S&P la rebajó a BBB−, a un escalón del grado especulativo) y el megaproyecto Natureza en Brasil (US$4.600M) cuyo financiamiento tiene al mercado apostando a un aumento de capital dilutivo. A favor: P/B de 0,28x — se paga 28% del valor libro —, Softys creciendo EBITDA +20%, un plan de desinversión de US$1.000-1.500M con JPMorgan, y el dato nuevo de julio: el DF reporta que mejoran las expectativas de celulosa para el 2S26, lo que explica el rebote. Es una apuesta de ciclo con balance apretado: alta convexidad si la celulosa repunta, riesgo real de dilución si no.", "fundamental": "**Resultados 1T26** (reportados 8-may-2026; cifras en USD):\n\n- HECHO: ventas US$1.817M (planas a/a, bajo el consenso de US$1.850M); EBITDA ajustado US$255M (−8,1% a/a), margen 14,1% (−1 pp); **utilidad neta US$25M, −50,2% a/a** por menores envíos de celulosa, mayor costo energético (guerra en Medio Oriente), menor valorización forestal y más gastos financieros (DF / La Tercera / Investing, 8-may-2026).\n- HECHO — por segmento: **Celulosa** ventas US$731M, golpeada por mantenciones programadas y no programadas en Guaíba (menor producción, mayor cash cost); **Softys** (tissue) ventas US$835M con EBITDA US$97M (+20% a/a) por eficiencias; **Biopackaging** US$247M con recuperación de márgenes (slides 1T26, may-2026).\n- HECHO: producción de celulosa 987 mil ton; ventas BEKP 799 mil ton (−11% a/a, menores exportaciones a China); cash cost BEKP US$262/ton, BSKP US$400/ton; capex US$185M (+24% a/a) (slides 1T26).\n- HECHO — **balance**: deuda total US$5.915M, caja US$900M, deuda neta US$5.015M → **DFN/EBITDA 4,1x** (vs 3,41x en mar-2025). Guía del call: EPS US$0,01 en 2T26 y US$0,02 en 3T26 con normalización progresiva del apalancamiento (transcript 1T26, may-2026).\n- HECHO: **S&P rebajó el rating de BBB a BBB−** el 2-mar-2026 (un escalón sobre grado especulativo) por desapalancamiento lento, celulosa −17% en 2025, competencia en tissue en Brasil/México e incertidumbre por Natureza; proyecta EBITDA 2026 de US$1.200-1.300M y ~3,0x (La Tercera, 2-mar-2026).\n\n**Proyecto Natureza (Rio Grande do Sul, Brasil):**\n\n- HECHO: inversión US$4.500-4.600M — la mayor inversión chilena en el exterior —, 2,5M ton/año de BEKP, ~US$400M ya invertidos, decisión de construcción dentro de 2026 y operación hacia 2029. Hitos: permiso federal del terminal portuario (ene-2026, acto con Lula) y licencia ambiental preliminar del terminal Rio Grande (jun-2026) (DF / Argentina Forestal / La Tercera, 2026).\n- HECHO — financiamiento: desinversión de activos forestales/inmobiliarios por US$1.000-1.500M asesorada por JPMorgan (incluye Bosques del Plata en Argentina, >94.000 ha); colocó bonos híbridos por UF 7M (~US$312M) a fines de junio con mejor spread que el debut, y prepara hasta UF 10M más; **el mercado especula con un aumento de capital** (Argentina Forestal 17-jun-2026; DF jun-2026).\n- HECHO: dividendo definitivo US$0,0105/acción pagado desde el 12-may-2026; política 2026 de payout 30%; yield ~0,9% (Diario Estrategia / StockAnalysis, 2026).\n- LECTURA: el 1T26 fue un trimestre de transición con Guaíba en mantención — lo operativo debiera mejorar en 2T/3T —, pero el problema estructural es que con EBITDA deprimido, 4,1x de leverage y US$4.600M de capex por delante, la matemática solo cierra con ventas de activos exitosas o dilución. Softys es la joya silenciosa del cuadro.", "valuacion": "- HECHO (StockAnalysis, 20-jul-2026): P/E trailing 16,3x / forward 15,3x; **P/B 0,28x**; EV/EBITDA 7,9x; EV/Ventas 1,13x; beta 0,17.\n- HECHO — targets con dispersión enorme: **JPMorgan Neutral, PO $1.100 a dic-2026** (el más fresco, citado por DF el 17-jul-2026, tras recortes previos desde $1.600); **MBI sobreponderar, PO $2.077** (recortado desde $2.417, upside >50%); agregadores: Investing $1.513 (máx $2.807 / mín $1.089), MarketScreener $1.712 (3 comprar / 2 vender), TradingView ~$1.754 (4 comprar / 8 mantener / 0 vender) — con fechas de corte no publicadas.\n- LECTURA: el P/B de 0,28x es el dato más llamativo — típico de fondo de ciclo más descuento por apalancamiento y riesgo de dilución. El EV/EBITDA ~8x NO es barato porque el EBITDA está deprimido: la acción es una apuesta a normalización de EBITDA, no a múltiplo bajo. El consenso de agregadores ($1.500-1.750) luce rezagado frente al PO de julio de JPMorgan ($1.100, prácticamente el precio actual): el sell-side fresco no ve upside sin repunte de celulosa. Los targets altos descansan en normalización + desinversión sin dilución.", "tecnico": "- HECHO: precio $1.076,5 CLP, +0,61% en la sesión del lunes 20-jul pero **−2,93% vs 5 ruedas atrás** (TradingView tiempo real, 20-jul-2026).\n- HECHO: RSI(14) diario 52,2 — neutral; MACD(12,26,9) +5,0 sobre señal +1,1 (histograma +3,8), positivo tras el rebote desde $1.031 (calculado sobre 130 barras diarias de TradingView, 20-jul-2026). Investing.com publica RSI 46,5 y señal \"venta fuerte\" por medias móviles (1 compra / 11 ventas) (jul-2026).\n- HECHO: precio sobre la SMA20 (~$1.059, +1,6%) y SMA50 (~$1.071, +0,5%), pero −5,3% bajo la SMA100 (~$1.137) y lejos de los niveles de inicio de año ($1.480): −27% en ~26 semanas (TradingView, 20-jul-2026).\n- LECTURA: tendencia de fondo claramente bajista con rebote incipiente de julio. Soportes: $1.059-1.071 (SMA20/50) y la zona crítica **$1.015-1.031** (mínimo de 52 semanas y de 4 años — perderla abriría un tramo bajista nuevo). Resistencias: $1.094-1.110 (cierres de la semana pasada y SMA100 en $1.137) y luego $1.180. Ojo: los niveles \"soporte $1.500 / resistencia $2.500\" que circulan en ideas antiguas de TradingView están obsoletos, son previos al derrumbe. El rebote es de expectativas (celulosa 2S26), no de confirmación técnica: bajo la SMA100 y con las medias largas vendedoras, sigue siendo un intento de piso, no un cambio de tendencia.", "catalizadores": "- HECHO: **resultados 2T26 el 6-ago-2026** (Investing, jul-2026). LECTURA: con Guaíba normalizada tras las mantenciones, el mercado buscará cash cost a la baja y confirmación de la guía (EPS US$0,01).\n- HECHO — **celulosa, el driver dominante**: en China la fibra corta promedia RMB 4.417/ton (10-jul-2026) con julio como temporada baja, papeleras comprando lo mínimo e inventarios altos (SunSirs); NBSK lista en EE.UU. cayó a US$1.570/t en mayo por sobreoferta (Fastmarkets, 5-jun-2026). Referencias 2026: Fitch proyecta BEKP US$625/t promedio; BTG estimaba US$575-600/t neto China (dic-2025).\n- HECHO: el DF reporta (17-jul-2026) que **mejoran las expectativas de celulosa para el 2S26**, con efecto anticipado en Arauco y CMPC — es lo que explica el rebote desde $1.031. LECTURA: es el catalizador que mueve la aguja; si la temporada alta china (sept-oct) no convalida, el rebote se deshace.\n- HECHO — **plan de desinversión**: US$1.000-1.500M en activos no estratégicos (Chile, Brasil, Argentina) con JPMorgan; decisión final de construcción de Natureza esperada dentro de 2026 (Argentina Forestal / DF, jun-2026). LECTURA: un cierre exitoso de ventas de activos sin aumento de capital sería el catalizador idiosincrático más potente; lo contrario (aumento de capital) es el mayor riesgo de corto plazo.\n- HECHO — **oferta rival**: Arauco alcanzará 5,2M ton (MAPA ~85% de utilización) y construye Sucuriú en Brasil (US$4.600M, ~70% de avance); Suzano presiona precios — es la base del Neutral de JPMorgan (DF, 17-jul-2026).\n- HECHO: USD/CLP ~926-932 en julio (dolarhoy/Wise). LECTURA: a diferencia de CCU, un peso fuerte es viento en CONTRA para CMPC (exportadora con costos en CLP e ingresos en USD).", "sentimiento": "- HECHO: recomendaciones divididas — JPMorgan Neutral PO $1.100 (jul-2026), MBI sobreponderar PO $2.077, MarketScreener 3 comprar / 2 vender, agregador TradingView 4 comprar / 8 mantener / 0 vender. Sin notas frescas de BTG/Santander/BICE/LarrainVial en las fuentes consultadas.\n- HECHO — noticias de los últimos 30 días: colocación de híbridos por ~US$312M con mejor spread (fines jun), licencia ambiental del terminal de Natureza (23-jun), JPMorgan liderando la desinversión con el mercado apostando a aumento de capital (17-jun), y la nota del DF sobre el repunte de expectativas de celulosa (17-jul).\n- HECHO — contexto: IPSA en máximos históricos (~11.500 pts), inversión extranjera en Chile en récord (US$46.987M de stock de no residentes, más del doble que 2024), bolsa ~12% más cara que su historia (DF/Emol, 2026).\n- LECTURA: sentimiento negativo-a-neutral con giro incipiente. CMPC es de las pocas grandes del IPSA en rojo a 12 meses (−20%) en un mercado eufórico — el flujo extranjero récord aún no rota hacia ella porque el riesgo de aumento de capital mantiene cautos a los institucionales. El rebote de julio es de expectativas, no de resultados: frágil pero con combustible si el 2S26 convalida, porque el posicionamiento en el papel es liviano.", "conclusion": "CMPC es la apuesta cíclica profunda del panel chileno: 0,28x valor libro, −33% desde el rango alto de 52 semanas, en mínimos de 4 años hace tres semanas, con el driver (precio de la celulosa) posiblemente girando al alza en el 2S26 según las expectativas que recoge el DF. Pero el balance no perdona: 4,1x deuda neta/EBITDA, rating a un escalón del grado especulativo y US$4.600M de Natureza por financiar hacen que la tesis dependa de que TODO salga razonablemente bien — celulosa arriba, activos vendidos a buen precio, sin dilución. La asimetría es atractiva para perfiles tolerantes al riesgo (si el ciclo gira, el recorrido a los targets de $1.500-2.000 es enorme), pero el PO fresco de JPMorgan ($1.100) dice que el sell-side no ve upside inmediato. La señal es **Caution**: especulativa de ciclo, no de calidad. Gatillos para subirla a Hold/Buy: celulosa china repuntando en la temporada alta (sept-oct), cierre de desinversiones sin aumento de capital, o 2T26 (6-ago) con cash cost mejorando. Gatillo de salida: perder los $1.015-1.031."}, "scores": {"tecnica": {"score": 45, "just": "Rebote incipiente con MACD positivo y precio sobre SMA20/50 tras defender el mínimo de 4 años en $1.031, pero la tendencia de fondo sigue bajista: −5,3% bajo la SMA100, −27% en 6 meses, y las medias largas en señal de venta (1 compra / 11 ventas según Investing). Intento de piso, no cambio de tendencia."}, "fundamental": {"score": 40, "just": "Utilidad −50% en 1T26, EBITDA deprimido por el ciclo de celulosa, leverage de 4,1x con rating BBB− a un escalón del especulativo y US$4.600M de Natureza por financiar. Lo rescatable: Softys con EBITDA +20%, P/B de 0,28x, guía de mejora secuencial y un plan de desinversión de US$1.000-1.500M en marcha."}, "sentimiento": {"score": 45, "just": "Gran rezagada del IPSA en un mercado en máximos, con el sell-side fresco (JPMorgan $1.100) sin ver upside y el mercado apostando a un aumento de capital dilutivo. El giro de expectativas de celulosa del 2S26 (DF, 17-jul) y el posicionamiento liviano dan combustible al rebote si se convalida."}, "riesgo": {"score": 30, "just": "El perfil de riesgo más alto del panel chileno: apalancamiento 4,1x, rating al borde del grado especulativo, ciclo de celulosa en sobreoferta con Arauco y Suzano agregando capacidad, riesgo de dilución por Natureza, shock de costos energéticos e incendios/Araucanía recurrentes (61 siniestros en la última temporada, mitad intencionales)."}, "conviccion": {"score": 40, "just": "Tesis falsable con niveles y fechas claras (soporte $1.015-1.031, 2T26 el 6-ago, temporada alta china sept-oct, decisión de Natureza en 2026), pero de baja probabilidad compuesta: exige simultáneamente repunte de celulosa, desinversión exitosa y no-dilución. Apta solo como posición especulativa dimensionada."}}, "sources": ["TradingView — BCS:CMPC tiempo real, 130 barras diarias; RSI/MACD/SMA calculados (20-jul-2026)", "Diario Financiero — repunte de expectativas de celulosa 2S26; PO JPMorgan $1.100 (17-jul-2026)", "Diario Financiero / La Tercera — resultados 1T26: utilidad −50% (8-may-2026)", "Investing.com — slides y transcript 1T26; earnings 6-ago; technicals (may-jul 2026)", "La Tercera/Pulso — S&P rebaja a BBB− (2-mar-2026)", "StockAnalysis.com — P/B 0,28x, EV/EBITDA 7,9x, market cap (snapshot 20-jul-2026)", "Argentina Forestal — plan Natureza, desinversión con JPMorgan, licencia terminal portuario (may-jun 2026)", "Diario Financiero — bonos híbridos UF 7M (~US$312M) y preparación de UF 10M (jun-2026)", "Diario Financiero — MBI recorta PO a $2.077, mantiene sobreponderar (2026)", "SunSirs — pulpa fibra corta China RMB 4.417/t, temporada baja (10-14-jul-2026)", "Fastmarkets — NBSK EE.UU. US$1.570/t lista, sobreoferta (5-jun-2026)", "Diario Estrategia — dividendo definitivo US$0,0105 pagado 12-may-2026", "Yahoo Finance — rango 52 semanas CMPC.SN (jul-2026)", "MarketScreener — consenso $1.712, 3 comprar / 2 vender (jul-2026)", "Diario Financiero / Emol — IPSA en máximos, inversión extranjera récord US$46.987M (2026)", "BioBioChile — incendios en predios CMPC, 84 brigadas temporada 2025-26 (dic-2025 / ene-2026)"], "events": [{"date": "2026-08-06", "label": "Resultados 2T26 (foco: cash cost con Guaíba normalizada)", "kind": "earnings"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "CBOE:ECH", "label": "ECH (proxy Chile/IPSA)", "relative_performance_30d": 7.06, "relative_performance_ytd": -20.66, "price_percentile_1y": 11.8, "partial": false}, "technical": {"price": 1083.9, "change_1d_pct": -0.38, "change_1w_pct": 1.3, "rsi": 53.7, "macd": 6.1349, "macd_signal": 2.2726, "sma20": 1061.975, "sma50": 1070.544, "sma200": 1244.547, "ema12": 1076.5122, "ema26": 1070.3773, "pct_vs_sma20": 2.06, "pct_vs_sma50": 1.25, "pct_vs_sma200": -12.91, "volume_today": 1947861, "volume_avg20": 2802351.0, "volume_ratio": 0.7, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 11.8, "vs_benchmark_30d_pct": 7.06, "perf_1m_pct": 3.33, "perf_ytd_pct": -23.35}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "CBOE:ECH", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/CMPC.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "USD/CLP", "company": "Dólar / Peso chileno", "baseCurrency": "USD", "statsList": [["Precio", "938.97 (21-jul-2026)"], ["Rango 120 días", "854.7 – 943.4"], ["TPM Chile / Fed", "4,50% / 3,50–3,75%"], ["Cobre", "US$6,29/lb (20-jul, ⚠️ dato de ~1 día, en rally por tormenta en Chile)"], ["Posicionamiento", "~US$17.845M cortos CLP (récord del año)"], ["Próximo evento", "FOMC 28-29-jul-2026"], ["Técnico (auto)", "RSI 62.5 · MACD +6.44 / señal +6.39 (TradingView, 21-jul-2026)"]], "change": {"day": 0, "week": 0.28}, "customSections": [{"title": "Resumen ejecutivo", "nav": "Resumen", "body": "El USD/CLP cotiza en 934,34 el 21-jul-2026, prácticamente plano en el día (-0,02%) tras el cierre de 936,33 del viernes 17-jul, y consolidando dentro del rango de 120 días (854,7–943,4). La novedad de estos cuatro días es doble: (1) una **tormenta invernal que golpeó la zona minera centro-sur de Chile el 17-jul** (3 muertos, 257.000 hogares sin luz, Codelco suspendió actividades en Andina y El Teniente, Antofagasta Minerals y Anglo American operaron con restricciones), que empujó al cobre a un rally de +1,12% hasta US$6,29/lb el 20-jul por temores de oferta; y (2) el posicionamiento de no residentes contra el peso **marcó un nuevo máximo del año en ~US$17.845 millones** el 21-jul, superando el pico previo de US$17.025 mil millones del 9-jul. La narrativa de fondo no cambia: diferencial de tasas estrecho y en riesgo de comprimirse (Fed bajo el nuevo chair hawkish Kevin Warsh, con el mercado dividido entre 83% de probabilidad de mantención según CME FedWatch y ~50% de probabilidad de alza según plataformas de apuestas tipo Kalshi/Polymarket), versus fundamentales estructurales pro-CLP (cobre, cuenta corriente) que siguen sin traducirse en apreciación del peso. Tesis: **Hold, con el par estabilizado justo bajo la resistencia de 943,4** — el catalizador decisivo sigue siendo el FOMC del 28-29-jul.\n\n---"}, {"title": "Diferencial de tasas y política monetaria", "nav": "Tasas", "body": "**Chile (BCCh):**\n- **HECHO:** TPM vigente **4,50%**, mantenida por unanimidad en la RPM de junio 2026 (BCCh; XTB Chile, jun-2026). No hay RPM entre el 17-jul y el 21-jul-2026; la próxima reunión relevante sigue pendiente de calendario.\n- **HECHO:** El Imacec de junio 2026 fue publicado por el BCCh el **18-jul-2026** (primer día hábil de julio, según calendario estadístico oficial); el detalle numérico no pudo verificarse en las fuentes consultadas, pero medios locales (BioBioChile, La Tercera) documentan que la actividad acumuló **cinco meses de caídas consecutivas** hasta mayo (contracción de 0,9% en mayo, arrastrada por un nuevo colapso minero, con producción de bienes -4,7% i.a.), lo que mantenía abierta la amenaza de una recesión técnica hacia el cierre del primer semestre.\n- **LECTURA:** El BCCh sigue en pausa prolongada: la actividad débil impide un sesgo restrictivo, pero una inflación en torno a 4% impide recortar. Sin cambios respecto al informe anterior.\n\n**EE.UU. (Fed):**\n- **HECHO:** Fed Funds vigente **3,50%–3,75%**, mantenido el 17-jun-2026. El nuevo chair **Kevin Warsh** fue confirmado por el Senado el 13-may-2026 (54-45) y asumió el cargo el 22-may-2026 por un mandato hasta 2030, en reemplazo de Jerome Powell (Federal Reserve, NPR, CNBC, 13-may/22-may-2026).\n- **HECHO:** Al **21-jul-2026, CME FedWatch asigna ~83,4% de probabilidad de mantención** en el FOMC del 28-29-jul (growbeansprout/centralbank.watch, consultado 21-jul-2026); esta cifra viene bajando desde niveles más altos de mantención observados a comienzos de julio.\n- **HECHO (divergencia relevante):** Plataformas de mercados de predicción muestran una lectura más hawkish: Kalshi reportó el 9-jul-2026 que los traders ven **~50% de probabilidad de un alza de tasas en algún momento de 2026**, y Polymarket asignaba ~26% de probabilidad a un alza específicamente en la reunión de julio, con el consenso de mercado moviéndose de <40% a ~50% en cuestión de días tras comentarios hawkish de miembros de la Fed sobre presión de precios (guerra en el Golfo Pérsico/petróleo, IA y data centers) (CNBC, 9-jul y 13-jul-2026; Bloomberg, 14-jul-2026).\n- **LECTURA (tono):** El primer FOMC bajo Warsh (17-jun) fue descrito como un \"jolt\" para los mercados: el número de miembros de la Fed que proyecta un alza en 2026 saltó de cero a nueve en seis semanas (Fortune/BofA, 22-jun-2026). El comité está genuinamente dividido; persiste la asimetría de que el próximo movimiento —si lo hay— sería un **alza**, no un recorte.\n\n**Diferencial:** TPM 4,50% vs punto medio Fed 3,625% ⇒ **~+90 pb a favor del CLP**, sin cambios desde el informe previo, pero con riesgo de compresión mayor si el FOMC de julio sorprende con un alza o con lenguaje más agresivo — probabilidad no despreciable dado el giro de Warsh.\n\n---"}, {"title": "Balanza de pagos y flujos", "nav": "Balanza", "body": "- **HECHO:** La cuenta corriente registró un **superávit de US$1.883 millones (1,9% del PIB) en el 1T-2026**, con el déficit acumulado en 12 meses reducido a 0,6% del PIB (BCCh, Balanza de Pagos 1T-2026). No se identificó una publicación de balanza de pagos del 2T-2026 en la ventana 17-21 de julio; este dato no ha cambiado desde el informe anterior.\n- **HECHO (novedad clave):** Una **tormenta invernal golpeó el centro-norte, centro y sur de Chile el 17-jul-2026**, dejando al menos 3 muertos y más de 257.000 clientes sin electricidad. Las operaciones mineras activaron protocolos de invierno: **Codelco suspendió actividades de superficie en Andina y detuvo temporalmente el traslado de mineral desde el rajo de El Teniente por acumulación de nieve**; Anglo American operó con limitaciones sin desviaciones críticas; Antofagasta Minerals (Los Pelambres) redujo el tránsito hacia la faena por seguridad (Bloomberg Línea, El Imparcial, Cabildeo Digital, 17-jul-2026). Con Chile aportando ~25% del cobre minado globalmente, el mercado reaccionó al alza por temor a disrupciones de oferta.\n- **HECHO:** **Precio del cobre: US$6,29/lb el 20-jul-2026, +1,12% en la sesión** (Trading Economics, vía Rio Times Online, \"Copper: The Daily Wrap — July 20, 2026\"). El cierre semanal previo (viernes 17-jul) fue de **US$6,07/lb, -0,26%** en la semana (Energiminas/Guía Minera de Chile, 17-jul-2026) — nótese que esta cifra de cierre semanal difiere de la usada en el informe anterior (US$6,22/lb), lo que sugiere dispersión entre proveedores de datos; se prioriza aquí la serie de Trading Economics por ser la fuente más citada de forma consistente. El rally se explica también por un cambio estructural: el ICSG revirtió su proyección de mercado 2026 de un superávit de 209.000 toneladas a un **déficit de 150.000 toneladas** (con estimaciones de hasta 330.000 toneladas contando cuellos de botella de refinación y la pérdida permanente de Cobre Panamá).\n\n> ⚠️ **Dato de cobre con ~24-40 horas de antigüedad** (cotización del lunes 20-jul-2026 a las 21:00 hrs de este informe, 21-jul-2026) — no se encontró un cierre confirmado y verificado del propio 21-jul; dado que el mercado está en rally activo por la tormenta, **verificar cotización intradía en Trading Economics/COMEX antes de usar este informe para decisiones**.\n\n**Correlación cobre-CLP — ¿se mantiene o se rompió?**\n- **LECTURA:** Sigue debilitada como ancla de tendencia (según Diario Financiero, la influencia del cobre sobre el peso cayó de ~50% a ~30% en el margen), pero el episodio de la tormenta es un recordatorio de que el canal de oferta física puede reactivar la correlación de forma abrupta si el cobre extiende su rally hacia nuevos máximos. Por ahora, el peso se mantiene estable (IPSA/Peso, Rio Times Online, 21-jul: \"USD/CLP con un movimiento de apenas 0,05%, esencialmente un error de redondeo\"), lo que indica que el mercado cambiario aún no está incorporando plenamente el shock de oferta de cobre.\n\n---"}, {"title": "Posicionamiento", "nav": "Posicionamiento", "body": "- **HECHO (declaración obligatoria):** **USD/CLP no tiene futuros CFTC líquidos — no aplica COT para este par.** No existe Commitment of Traders utilizable para esta divisa.\n- **Proxy verificable — forwards de no residentes (datos BCCh/SIID reportados por Diario Financiero):**\n  - **HECHO:** Al **21-jul-2026, las apuestas de no residentes contra el peso chileno alcanzaron US$17.845 millones netos, el nivel más alto del año**, superando el máximo previo registrado el 9-jul (US$17.025 mil millones). El 14-jul se había marcado otro pico de US$16.366 millones. Las posiciones llevan **seis días consecutivos por sobre los US$16.000 millones** (Diario Financiero, 21-jul-2026).\n  - **HECHO:** A comienzos de julio ya se habían reportado ~US$15.000-20.000 millones tras la postura restrictiva de la Fed y la contracción de la economía local (DF, jul-2026), de modo que el nuevo récord del 21-jul confirma la tendencia, no la revierte.\n- **LECTURA:** El posicionamiento extranjero corto contra el peso sigue **escalando en vez de estabilizarse**, lo que sostiene el par en el corto plazo pero incrementa el riesgo de una reversión abrupta ante cualquier catalizador pro-CLP (sorpresa dovish de la Fed, extensión del rally del cobre por la tormenta). El precedente de un desarme de US$1.400 millones en tres días (documentado por DF en episodios previos) sigue vigente como referencia de la velocidad con que estas posiciones pueden revertirse.\n\n---"}, {"title": "Análisis técnico", "nav": "Técnico", "body": "No se dispuso de una nueva lectura verificada en tiempo real de TradingView para el 20/21-jul-2026 en esta actualización; se mantiene como referencia la lectura previa del **17-jul-2026** (última verificación técnica formal disponible), complementada con los datos de precio más recientes de fuentes periodísticas (Infobae, Rio Times Online):\n\n| Métrica | Valor | Fecha | Clasificación |\n|---|---|---|\n| Precio | 934.34 | 21-jul-2026 | HECHO (Infobae) |\n| Precio | 936.33 | 17-jul-2026 | HECHO (TradingView, informe previo) |\n| Rango 120 días | 854.7 – 943.4 | al 17-jul-2026 | HECHO |\n| RSI(14) diario | 60.6 | 17-jul-2026 | HECHO (no actualizado) |\n| MACD(12,26) | +6.01 vs señal +6.37; histograma -0.36 | 17-jul-2026 | HECHO (no actualizado) |\n| SMA20 / SMA50 | 927.9 / 912.8 | 17-jul-2026 | HECHO (no actualizado) |\n\n- **LECTURA (tendencia):** Con el precio prácticamente plano en 934,34 (21-jul) respecto al cierre del viernes, el par se mantiene **por sobre la SMA20/SMA50** estimadas previamente, consolidando lateralmente justo bajo la resistencia de 943,4 en lugar de romperla — consistente con el histograma MACD negativo ya detectado el 17-jul, que anticipaba pérdida de momentum.\n- **LECTURA (niveles):** Sin cambios materiales: resistencia clave en 943,4; soportes en la zona 925,9–927,9 y 912,8 (SMA50). El estancamiento de estos cuatro días sugiere que el mercado espera al FOMC del 28-29-jul antes de definir la ruptura del rango.\n- **Nota metodológica:** Esta sección requiere una nueva verificación directa en TradingView al momento de publicar el informe, dado que la última lectura técnica completa (indicadores) tiene fecha del 17-jul.\n\n---"}, {"title": "Intervención y riesgo de banco central", "nav": "Intervención", "body": "- **HECHO:** La última intervención cambiaria de gran escala del BCCh sigue siendo el **programa de julio-septiembre de 2022** (hasta US$25.000 millones), y en 2026 la única acción documentada son **operaciones forward por ~US$629 millones en marzo-2026** (El Ciudadano, 21-mar-2026). No se encontró evidencia de comunicados de intervención o de forwards del BCCh en la ventana 17-21 de julio de 2026.\n- **LECTURA (gatillo actual):** Con el par estabilizado en 934 (por debajo incluso del cierre del viernes) y sin señales de desorden de mercado, la probabilidad de intervención en el corto plazo se mantiene baja. Según Rio Times Online (21-jul), el peso se ubica ~4% más fuerte que su mínimo del año, lo que sugiere que el episodio de pánico cambiario de meses previos no está actualmente activo. Sin embargo, la combinación de (a) posicionamiento corto récord en no residentes (US$17.845M) y (b) un shock de oferta de cobre por la tormenta que podría revertirse o profundizarse, mantiene latente el riesgo de un movimiento brusco en cualquier dirección que podría gatillar una respuesta verbal o de forwards del BCCh, sin que exista un nivel oficial de intervención declarado.\n\n---"}, {"title": "Correlaciones macro", "nav": "Correlaciones", "body": "- **HECHO:** El **DXY se ubicó en torno a 100,59 el 20-jul-2026** (~01:50 UTC), replegándose desde un máximo de fines de junio cercano a 101,20-101,40 y un breve repunte sobre 101 a mediados de julio (Vantage Markets, Trading Economics, consultado 20/21-jul-2026). Esto representa una leve baja frente al 100,76 del 17-jul-2026 citado en el informe previo.\n- **LECTURA (DXY–USDCLP):** Pese a la leve baja del DXY, el USD/CLP se mantuvo prácticamente estable (934,34 vs 936,33), lo que sugiere que en estos días el par estuvo más influenciado por el flujo de posicionamiento en forwards y por el shock de oferta de cobre que por el dólar global en sentido estricto. La correlación DXY-USDCLP sigue siendo positiva en el mediano plazo, pero se desacopló levemente en esta ventana corta.\n- **LECTURA (cobre–CLP):** El rally del cobre a US$6,29/lb (20-jul) por la tormenta que afectó a Codelco, Antofagasta y Anglo American debería, por la correlación histórica (~-0,70), presionar a la baja al USD/CLP; sin embargo el par se mantuvo estable, reforzando la lectura de que la influencia del cobre sobre el peso sigue diluida (~30% según Diario Financiero) frente al peso del posicionamiento en forwards y el ciclo de tasas Fed-BCCh.\n- **LECTURA (riesgo a vigilar):** Si la tormenta derivara en disrupciones de oferta más prolongadas (Codelco aún no ha cuantificado el impacto en El Teniente/Andina) y el cobre extendiera su alza junto con el giro del ICSG hacia un déficit de mercado, la correlación cobre-CLP podría reactivarse con fuerza, generando presión bajista sobre el par que hoy no está reflejada en el precio.\n\n---"}, {"title": "Conclusión", "nav": "Conclusión", "body": "**Qué haría funcionar la tesis alcista del par (comprar USD):** confirmación hawkish en el FOMC del 28-29-jul (probabilidad de mantención en 83,4% según CME FedWatch, pero con plataformas de predicción mostrando ~50% de odds de alza en 2026 bajo el nuevo chair Kevin Warsh), ruptura con volumen sobre 943,4, que el rally del cobre por la tormenta se revierta rápidamente (volviendo bajo US$6/lb), y que el Imacec de junio confirme una recesión técnica que mantenga al BCCh sin margen para un sesgo restrictivo.\n\n**Qué la invalidaría:** que el FOMC sorprenda con lenguaje dovish o que las probabilidades de alza sigan escalando y afecten negativamente el apetito por riesgo global (efecto ambiguo sobre el CLP), un desarme del posicionamiento récord de no residentes (ahora en US$17.845 millones, el mayor riesgo asimétrico y creciente del par), que la tormenta invernal derive en disrupciones de oferta de cobre más severas y sostenidas (Codelco aún evaluando daños en El Teniente/Andina) empujando al cobre por sobre US$6,5-6,7/lb de forma persistente, o señales de intervención del BCCh ante un movimiento desordenado.\n\nEl balance se mantiene similar al informe previo pero con dos riesgos de cola nuevos y en direcciones opuestas: el shock de oferta de cobre (bajista para el par) y el posicionamiento corto récord que sigue creciendo (alcista táctico, pero cada vez más saturado). Esto justifica mantener el **Hold**: el par consolida bajo 943-950 mientras el mercado espera la definición del FOMC del 28-29 de julio, con riesgo/retorno pobre en ambas direcciones hasta ese catalizador.\n\n> *Este informe es una herramienta de investigación educativa generada con IA. No constituye asesoría de inversión ni recomendación de compra/venta. Verifique todos los datos de forma independiente antes de tomar decisiones financieras.*"}], "scoreIndex": 8, "customCats": [{"key": "tasas", "name": "Diferencial de Tasas y Política Monetaria", "weight": 30}, {"key": "macro", "name": "Fundamentales Macro", "weight": 20}, {"key": "tecnico", "name": "Técnico", "weight": 20}, {"key": "posicionamiento", "name": "Posicionamiento y Sentimiento", "weight": 15}, {"key": "intervencion", "name": "Riesgo de Intervención / Cola", "weight": 15}], "scores": {"tasas": {"score": 68, "just": "Diferencial TPM-Fed sigue estrecho (~90 pb) y con riesgo de comprimirse aún más: bajo el nuevo chair Kevin Warsh, la probabilidad de un alza en 2026 escaló en plataformas de predicción (~50% Kalshi) aunque CME FedWatch mantiene 83,4% de probabilidad de mantención en julio. El BCCh permanece anclado en 4,5% sin margen para recortar. Levemente favorable al USD, matizado por la incertidumbre creciente sobre el sesgo de la Fed."}, "macro": {"score": 28, "just": "El cobre saltó a US$6,29/lb (20-jul) tras una tormenta que afectó minas clave (Codelco, Antofagasta, Anglo American) y un giro del ICSG hacia déficit de mercado 2026 — flujo estructural pro-CLP, negativo para el USD base. La cuenta corriente sigue mejorando (-0,6% PIB). Solo la fragilidad de la actividad local (posible recesión técnica) evita un puntaje menor."}, "tecnico": {"score": 65, "just": "El par se mantiene estable en 934,34 (21-jul), consolidando bajo la resistencia de 943,4 sin romperla, en línea con el momentum decreciente ya detectado el 17-jul (MACD con histograma negativo). Estructura de mediano plazo aún alcista (sobre SMA20/50 estimadas), pero sin nuevo impulso confirmado en estos días de indicadores no actualizados."}, "posicionamiento": {"score": 58, "just": "Sin COT (no aplica para USD/CLP); proxy de forwards de no residentes en nuevo récord del año (~US$17.845M cortos CLP, 21-jul) tras seis días sobre US$16.000M — flujo actual pro-USD, pero cada vez más saturado, lo que aumenta el riesgo asimétrico de un desarme violento en contra del dólar."}, "intervencion": {"score": 62, "just": "El par está lejos de niveles históricos de intervención (~$1.000+) y el peso se ubica ~4% más fuerte que su mínimo anual, sin señales de comunicado del BCCh en julio; pero el shock de oferta de cobre por la tormenta invernal y el posicionamiento corto récord introducen riesgo de cola de un movimiento brusco no cubierto por el nivel de volatilidad actual."}}, "sources": ["Infobae — cotización de cierre del dólar en Chile, 21-jul-2026", "Rio Times Online — \"Copper: The Daily Wrap — July 20, 2026\" y \"Chile Markets: IPSA & the Peso — July 21, 2026\"", "Trading Economics — cobre US$6,29/lb (20-jul-2026), DXY 100,59 (20-jul-2026)", "Energiminas / Guía Minera de Chile — cierre semanal cobre US$6,07/lb (17-jul-2026)", "
