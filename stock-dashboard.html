<title>Stock Research — Dashboard de Equity Research</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --surface-2: #f3f3f0;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --hairline: #e1e0d9;
    --border: rgba(11, 11, 11, 0.10);
    --accent: #2a78d6;
    --accent-soft: rgba(42, 120, 214, 0.12);
    --track: #e7e6e0;
    --good: #0ca30c;
    --warning: #fab219;
    --serious: #ec835a;
    --critical: #d03b3b;
    --good-tint: rgba(12, 163, 12, 0.13);
    --warning-tint: rgba(250, 178, 25, 0.16);
    --serious-tint: rgba(236, 131, 90, 0.16);
    --critical-tint: rgba(208, 59, 59, 0.13);
    --hecho-bg: rgba(42, 120, 214, 0.10);
    --hecho-ink: #1c5cab;
    --lectura-bg: rgba(74, 58, 167, 0.10);
    --lectura-ink: #4a3aa7;
    --up: #006300;
    --down: #d03b3b;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --page: #0d0d0d;
      --surface: #1a1a19;
      --surface-2: #222220;
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --muted: #898781;
      --hairline: #2c2c2a;
      --border: rgba(255, 255, 255, 0.10);
      --accent: #3987e5;
      --accent-soft: rgba(57, 135, 229, 0.18);
      --track: #2c2c2a;
      --good-tint: rgba(12, 163, 12, 0.18);
      --warning-tint: rgba(250, 178, 25, 0.15);
      --serious-tint: rgba(236, 131, 90, 0.15);
      --critical-tint: rgba(208, 59, 59, 0.18);
      --hecho-bg: rgba(57, 135, 229, 0.16);
      --hecho-ink: #86b6ef;
      --lectura-bg: rgba(144, 133, 233, 0.16);
      --lectura-ink: #9085e9;
      --up: #2ebd5f;
      --down: #e66767;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --page: #0d0d0d;
    --surface: #1a1a19;
    --surface-2: #222220;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --hairline: #2c2c2a;
    --border: rgba(255, 255, 255, 0.10);
    --accent: #3987e5;
    --accent-soft: rgba(57, 135, 229, 0.18);
    --track: #2c2c2a;
    --good-tint: rgba(12, 163, 12, 0.18);
    --warning-tint: rgba(250, 178, 25, 0.15);
    --serious-tint: rgba(236, 131, 90, 0.15);
    --critical-tint: rgba(208, 59, 59, 0.18);
    --hecho-bg: rgba(57, 135, 229, 0.16);
    --hecho-ink: #86b6ef;
    --lectura-bg: rgba(144, 133, 233, 0.16);
    --lectura-ink: #9085e9;
    --up: #2ebd5f;
    --down: #e66767;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --surface-2: #f3f3f0;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --hairline: #e1e0d9;
    --border: rgba(11, 11, 11, 0.10);
    --accent: #2a78d6;
    --accent-soft: rgba(42, 120, 214, 0.12);
    --track: #e7e6e0;
    --good-tint: rgba(12, 163, 12, 0.13);
    --warning-tint: rgba(250, 178, 25, 0.16);
    --serious-tint: rgba(236, 131, 90, 0.16);
    --critical-tint: rgba(208, 59, 59, 0.13);
    --hecho-bg: rgba(42, 120, 214, 0.10);
    --hecho-ink: #1c5cab;
    --lectura-bg: rgba(74, 58, 167, 0.10);
    --lectura-ink: #4a3aa7;
    --up: #006300;
    --down: #d03b3b;
  }

  html { background: var(--page); }
  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-text-size-adjust: 100%;
  }
  * { box-sizing: border-box; }
  button { font: inherit; color: inherit; }
  :is(a, button, input, summary):focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 3px;
  }

  .topbar {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--hairline);
  }
  .brand { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
  .brand .tick { color: var(--accent); font-family: var(--mono); font-weight: 600; }
  .topbar .meta { color: var(--muted); font-size: 12.5px; }
  .topbar .spacer { flex: 1; }
  .edu-chip {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-2);
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 3px 10px;
    white-space: nowrap;
  }

  .layout {
    display: grid;
    grid-template-columns: 288px minmax(0, 1fr);
    gap: 0;
    min-height: calc(100vh - 60px);
  }
  .rail {
    border-right: 1px solid var(--hairline);
    padding: 18px 14px 24px;
  }
  .rail-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px 10px;
  }
  .search {
    width: 100%;
    margin: 0 0 12px;
    padding: 8px 11px;
    font: inherit;
    font-size: 13.5px;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 8px;
  }
  .search::placeholder { color: var(--muted); }
  .no-match {
    background: var(--surface);
    border: 1px dashed var(--hairline);
    border-radius: 9px;
    padding: 12px 13px;
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .no-match .q { font-family: var(--mono); font-weight: 700; color: var(--ink); }
  .no-match p { margin: 0 0 8px; }
  .no-match p:last-child { margin: 0; }
  .stock-list { display: flex; flex-direction: column; gap: 6px; }
  .stock-card {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 10px;
    row-gap: 1px;
    align-items: center;
    width: 100%;
    text-align: left;
    background: none;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 9px 10px;
    cursor: pointer;
  }
  .stock-card:hover { background: var(--surface-2); }
  .stock-card.active {
    background: var(--surface);
    border-color: var(--border);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  }
  .stock-card .t { font-family: var(--mono); font-weight: 700; font-size: 14px; }
  .stock-card .n {
    grid-column: 1;
    color: var(--muted);
    font-size: 11.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stock-card .p { grid-column: 1; color: var(--ink-2); font-size: 12px; font-family: var(--mono); }
  .stock-card .pw { grid-column: 1; font-size: 10.5px; color: var(--muted); }
  .delta { font-family: var(--mono); font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .delta.up { color: var(--up); }
  .delta.down { color: var(--down); }
  .delta.flat { color: var(--muted); }
  .head-delta { font-size: 19px; }
  .head-price {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
    color: var(--ink);
    white-space: nowrap;
  }
  .head-week { margin-top: 4px; font-size: 12.5px; color: var(--muted); display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .head-week .delta { font-size: 12.5px; }
  .score-chip {
    grid-column: 2;
    grid-row: 1 / span 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 46px;
    border-radius: 8px;
    padding: 5px 7px;
    line-height: 1.15;
  }
  .score-chip .v { font-family: var(--mono); font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums; }
  .score-chip .g { font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; }
  .rail-note { color: var(--muted); font-size: 11.5px; padding: 16px 8px 0; line-height: 1.5; }

  .main { padding: 26px 32px 56px; max-width: 980px; }

  .company-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .company-head h1 { margin: 0; font-size: 26px; letter-spacing: -0.015em; }
  .company-head .ticker {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 6px;
    padding: 2px 8px;
  }
  .company-head .date { color: var(--muted); font-size: 12.5px; }
  .head-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn {
    border: 1px solid var(--hairline);
    background: var(--surface);
    border-radius: 7px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink-2);
  }
  .btn:hover { background: var(--surface-2); color: var(--ink); }
  .mode-switch {
    display: inline-flex;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 2px;
    background: var(--surface);
    gap: 2px;
  }
  .mode-switch button {
    border: none;
    background: none;
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-2);
    cursor: pointer;
    white-space: nowrap;
  }
  .mode-switch button:hover { color: var(--ink); }
  .mode-switch button.active {
    background: var(--accent);
    color: #ffffff;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin: 18px 0 22px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 9px;
    padding: 10px 12px;
    min-width: 0;
  }
  .stat .l {
    font-size: 10.5px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
    white-space: nowrap;
  }
  .stat .v { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--ink); overflow-wrap: break-word; }

  .hero {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 22px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 26px;
  }
  .hero .reading { color: var(--ink-2); font-size: 14px; max-width: 62ch; }
  .hero .reading strong { color: var(--ink); }
  .grade-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border-radius: 999px;
    padding: 3px 12px 3px 8px;
    font-weight: 700;
    font-size: 13px;
    margin-top: 8px;
  }
  .grade-pill .dot { width: 9px; height: 9px; border-radius: 50%; }
  .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .gauge-num {
    font-family: var(--mono);
    font-size: 34px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .gauge-cap { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

  .grade-good { background: var(--good-tint); }
  .grade-good .dot { background: var(--good); }
  .grade-warning { background: var(--warning-tint); }
  .grade-warning .dot { background: var(--warning); }
  .grade-serious { background: var(--serious-tint); }
  .grade-serious .dot { background: var(--serious); }
  .grade-critical { background: var(--critical-tint); }
  .grade-critical .dot { background: var(--critical); }

  .section-nav {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 0;
    margin: 0 0 8px;
    background: var(--page);
    border-bottom: 1px solid var(--hairline);
    scrollbar-width: none;
  }
  .section-nav::-webkit-scrollbar { display: none; }
  .section-nav a {
    flex: 0 0 auto;
    text-decoration: none;
    color: var(--ink-2);
    font-size: 12.5px;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 4px 11px;
    white-space: nowrap;
    background: var(--surface);
  }
  .section-nav a:hover { color: var(--ink); background: var(--surface-2); }
  .section-nav a .k { font-family: var(--mono); color: var(--muted); margin-right: 4px; }

  .report-section { padding: 22px 0 6px; border-bottom: 1px solid var(--hairline); scroll-margin-top: 54px; }
  .report-section:last-of-type { border-bottom: none; }
  .sec-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .report-section h2 { margin: 2px 0 12px; font-size: 19px; letter-spacing: -0.01em; }
  .prose { max-width: 74ch; color: var(--ink-2); }
  .prose p { margin: 0 0 12px; }
  .prose ul { margin: 0 0 12px; padding-left: 20px; }
  .prose li { margin-bottom: 7px; }
  .prose strong { color: var(--ink); }
  .badge {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border-radius: 4px;
    padding: 1px 6px;
    margin-right: 4px;
    vertical-align: 0.08em;
  }
  .badge.hecho { background: var(--hecho-bg); color: var(--hecho-ink); }
  .badge.lectura { background: var(--lectura-bg); color: var(--lectura-ink); }
  .prose .md-h { font-weight: 700; color: var(--ink); margin: 16px 0 8px; }
  .md-table { overflow-x: auto; margin: 0 0 12px; }
  .md-table table { border-collapse: collapse; font-size: 12.5px; min-width: 340px; }
  .md-table th, .md-table td { padding: 5px 10px; text-align: left; border-bottom: 1px solid var(--hairline); }
  .md-table th {
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .md-table td { font-variant-numeric: tabular-nums; color: var(--ink-2); }
  .signal-close { margin: 12px 0 0; color: var(--ink-2); font-size: 13.5px; max-width: 78ch; }
  .signal-close strong { color: var(--ink); }

  .score-detail { background: var(--surface); border: 1px solid var(--hairline); border-radius: 12px; padding: 18px 20px; }
  .cat-row { display: grid; grid-template-columns: 190px minmax(0, 1fr) 88px; gap: 12px; align-items: center; padding: 7px 0; }
  .cat-row .name { font-size: 13px; font-weight: 600; }
  .cat-row .w { color: var(--muted); font-size: 11.5px; font-family: var(--mono); margin-left: 6px; font-weight: 400; }
  .bar { position: relative; height: 8px; border-radius: 4px; background: var(--track); overflow: hidden; }
  .bar .fill { position: absolute; inset: 0 auto 0 0; border-radius: 4px; background: var(--accent); }
  .cat-row .val {
    font-family: var(--mono);
    font-size: 12.5px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    color: var(--ink-2);
  }
  .cat-row .val b { color: var(--ink); font-size: 13.5px; }
  .cat-just { margin: 2px 0 10px; padding: 0 0 8px; border-bottom: 1px dashed var(--hairline); color: var(--ink-2); font-size: 12.5px; max-width: 78ch; }
  .cat-just:last-of-type { border-bottom: none; }
  .score-total {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    border-top: 1px solid var(--hairline);
    margin-top: 10px;
    padding-top: 12px;
  }
  .score-total .num { font-family: var(--mono); font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-note { color: var(--muted); font-size: 12px; margin-top: 10px; max-width: 74ch; }

  details.weights { margin-top: 14px; border-top: 1px solid var(--hairline); padding-top: 10px; }
  details.weights summary { cursor: pointer; font-size: 13px; color: var(--ink-2); user-select: none; }
  details.weights summary:hover { color: var(--ink); }
  .w-grid { display: grid; grid-template-columns: 170px minmax(0, 1fr) 52px; gap: 10px 12px; align-items: center; margin: 12px 0 6px; }
  .w-grid label { font-size: 12.5px; color: var(--ink-2); }
  .w-grid input[type="range"] { width: 100%; accent-color: var(--accent); margin: 0; }
  .w-grid .wv { font-family: var(--mono); font-size: 12.5px; text-align: right; font-variant-numeric: tabular-nums; }
  .w-foot { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 12.5px; color: var(--muted); }
  .w-foot .warn { color: var(--serious); font-weight: 600; }

  details.sources { margin: 20px 0 0; }
  details.sources summary { cursor: pointer; font-size: 13px; color: var(--ink-2); }
  details.sources ul { columns: 2; column-gap: 28px; padding-left: 18px; margin: 10px 0 0; font-size: 12.5px; color: var(--muted); }
  details.sources li { margin-bottom: 5px; break-inside: avoid; }

  .disclaimer {
    margin: 30px 0 0;
    border-left: 3px solid var(--hairline);
    padding: 4px 0 4px 14px;
    color: var(--muted);
    font-size: 12.5px;
    max-width: 74ch;
  }

  .toast {
    position: fixed;
    bottom: 18px;
    right: 18px;
    background: var(--surface);
    color: var(--ink-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 14px;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: none; }

  @media (prefers-reduced-motion: reduce) {
    .toast { transition: none; }
    html { scroll-behavior: auto; }
  }
  html { scroll-behavior: smooth; }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .rail { border-right: none; border-bottom: 1px solid var(--hairline); padding-bottom: 12px; }
    .stock-list { flex-direction: row; overflow-x: auto; padding-bottom: 6px; }
    .stock-card { min-width: 168px; }
    .rail-note { display: none; }
    .main { padding: 20px 16px 48px; }
    .hero { grid-template-columns: 1fr; }
    .cat-row { grid-template-columns: 1fr; gap: 5px; }
    .cat-row .val { text-align: left; }
    details.sources ul { columns: 1; }
  }

  /* — Calendario — */
  .layout.cal-mode { grid-template-columns: minmax(0, 1fr); }
  .layout.cal-mode .rail { display: none; }
  .cal-wrap { max-width: 880px; margin: 0 auto; padding: 30px 22px 60px; }
  .cal-head h1 { font-size: 24px; margin: 0 0 6px; }
  .cal-head .sub { color: var(--muted); font-size: 13px; margin: 0 0 8px; }
  .cal-month {
    margin: 30px 0 4px;
    font-size: 11.5px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--ink-2);
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 7px;
  }
  .cal-day { display: grid; grid-template-columns: 66px minmax(0, 1fr); gap: 16px; padding: 13px 0; border-bottom: 1px solid var(--hairline); }
  .cal-day:last-child { border-bottom: none; }
  .cal-date { text-align: center; padding-top: 2px; }
  .cal-date .dnum { font-family: var(--mono); font-size: 21px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.05; }
  .cal-date .dwk { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 2px; }
  .cal-day.is-today .dnum, .cal-day.is-today .dwk { color: var(--accent); }
  .cal-day.is-past { opacity: 0.5; }
  .cal-evts { display: flex; flex-direction: column; gap: 7px; }
  .cal-evt { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .cal-tick {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12px;
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 1px 8px;
    cursor: pointer;
    background: var(--surface);
    color: var(--ink);
    white-space: nowrap;
  }
  .cal-tick:hover { border-color: var(--accent); color: var(--accent); }
  .cal-lbl { font-size: 13.5px; color: var(--ink-2); flex: 1 1 240px; }
  .cal-kind {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    border-radius: 999px;
    padding: 2.5px 9px;
    white-space: nowrap;

40% guiado golpearía la única pata que sostiene la narrativa.\n- **Macro/rotación sectorial:** la acción ya demostró en 2026 que puede caer 30%+ con fundamentales intactos.\n- **Regulatorio/competencia cloud-IA:** presión de AWS y Google Cloud; riesgo antitrust no cuantificado en lo encontrado (no verificable en detalle).","sentimiento":"- HECHO: Consenso Strong Buy: 34 buy / 1 hold / 1 sell (TipRanks vía Public.com) y Strong Buy en 56 analistas de S&P Global con target $558.77; sobre ~97 analistas, target promedio $589-592 (24/7 Wall St, 17-jul-2026).\n- HECHO: Acciones recientes: Argus target $510 (10-jul-2026); Morgan Stanley subió target de $625 a $650 y lo llamó top pick; Bernstein subió a $641 citando Azure. Último downgrade relevante: Stifel recortó de $540 a $392 (5-feb-2026) (Benzinga/MarketBeat).\n- HECHO: Insiders 2026: ~$51M vendidos en 34 ventas vs 1 compra abierta; Judson Althoff vendió 15,500 acciones a ~$461 (1-jun-2026); Nadella adoptó plan 10b5-1 (8-mar-2026); el director John Stanton **compró** 5,000 acciones (~$1.99M a $397.35) el 18-feb-2026 (StockTitan/MarketBeat).\n- HECHO: Tono de noticias 30-60 días constructivo — encuesta Jefferies con Azure como cloud primario del 55% de CIOs de EE.UU. vs 28% AWS; GA de Copilot Cowork; +4% el 1-jul por acuerdo con Haleon.\n\nLECTURA: Sentimiento de analistas claramente alcista y mejorando, en contraste con la acción del precio: el mercado (que vendió) y el sell-side (que compra) están en lados opuestos. Las ventas de insiders son mayormente programadas (10b5-1) y hay una compra abierta de un director cerca del precio actual, lo que resta señal negativa. El riesgo es que el consenso esté anclado a targets pre-corrección.","conclusion":"La tesis funciona si el 29 de julio Microsoft entrega Azure en o sobre el 39-40% guiado y, sobre todo, si el guidance FY27 muestra capex desacelerando como porcentaje de ventas y un camino creíble de recuperación del FCF: con P/E forward ~19.5x, el más bajo del grupo de mega-caps y muy por debajo de su media histórica de ~32x, la combinación de beat + disciplina de capital podría disparar un re-rating hacia la zona de targets ($510-650). La tesis se invalida si: (a) Azure desacelera bajo lo guiado, (b) el capex vuelve a subir sin mejora de FCF (otro trimestre con FCF < $20B sería mala señal), o (c) OpenAI profundiza su migración a AWS erosionando el backlog. Técnicamente, perder $368.57 reabriría el camino al piso de 52 semanas ($349); recuperar $440 (MM200) confirmaría el giro. Es una apuesta de calidad a descuento con fecha de veredicto concreta, no un momentum trade."},"scores":{"tecnica":{"score":35,"just":"Precio bajo la MM50 ($401.88) y MM200 ($438.98), ambas en venta, y ~29% bajo el máximo de 52s: tendencia de fondo bajista. El rebote de +12% en un mes y RSI neutral (53.5) evitan un puntaje menor, pero no hay confirmación de giro sobre $400-413."},"fundamental":{"score":78,"just":"Crecimiento y márgenes excelentes: revenue +18%, EPS +23%, Azure +40%, margen operativo ~46%, y valuación inusualmente razonable (P/E 23-24x vs 32x histórico). Descuento por la caída del FCF a $15.8B ante capex de $190B: la calidad es alta pero la conversión a caja está transitoriamente rota."},"sentimiento":{"score":68,"just":"Consenso Strong Buy (34/1/1), targets $510-650 con upgrades recientes de Morgan Stanley y Bernstein, y noticias constructivas. Se descuenta porque el precio cayó ~30% en 2026 (el mercado votó en contra), insiders son vendedores netos en monto y el último downgrade (Stifel, feb-2026) apuntó justo al riesgo capex."},"riesgo":{"score":60,"just":"Mega-cap de $2.93T con liquidez máxima y negocio diversificado, lo que acota el riesgo estructural; pero el drawdown realizado de ~30% en 2026, la dependencia de un evento cercano (earnings 29-jul) y la incógnita capex/FCF elevan la volatilidad efectiva."},"conviccion":{"score":72,"just":"Tesis falsable con catalizador fechado: earnings y guidance FY27 el 29-jul-2026, con vara concreta (Azure 39-40%, trayectoria de FCF). Asimetría favorable con forward P/E ~19.5x bajo mínimos de 5 años y target consenso +42%; el veredicto del capex tomará varios trimestres, no uno."}},"sources":["Yahoo Finance (18-jul-2026)","Investing.com (17-jul-2026)","Microsoft IR — press release Q3 FY26 (29-abr-2026)","CNBC (29-abr-2026)","Alphastreet (abr-2026)","TIKR (2026)","Public.com / TipRanks (jul-2026)","24/7 Wall St (17-jul-2026)","MarketBeat (jul-2026)","Benzinga (jul-2026)","FinanceCharts (12-17-jul-2026)","Macrotrends / FullRatio (15-jul-2026)","GuruFocus (jul-2026)","StockTitan — Form 4 / 10b5-1 (2026)","Financhill / Barchart (jul-2026)","Jefferies CIO survey vía prensa (jul-2026)"],"change":{"day":-1.13,"week":1.0},"events":[{"date":"2026-07-29","label":"Resultados Q4 FY26 + guidance FY27 (Azure guiado +39-40% cc)","kind":"earnings"},{"date":"2026-08-31","label":"Vesting del PSA de Nadella (venta programada 10b5-1)","kind":"corporate"}],"risk":{"volatility_30d":null,"sharpe":null,"sortino":null,"max_drawdown_1y":null,"n_days":1,"window":30},"benchmark":{"ticker":"SP:SPX","label":"S&P 500","relative_performance_30d":4.98,"relative_performance_ytd":-27.06,"price_percentile_1y":23.5,"partial":false},"technical":{"price":397.75,"change_1d_pct":-1.13,"change_1w_pct":1.0,"rsi":53.4,"macd":0.5919,"macd_signal":-2.5949,"sma20":383.8225,"sma50":400.8178,"sma200":438.1605,"ema12":392.3258,"ema26":391.7339,"pct_vs_sma20":3.63,"pct_vs_sma50":-0.77,"pct_vs_sma200":-9.22,"volume_today":24126632,"volume_avg20":42575270.0,"volume_ratio":0.57,"volatility_30d":null,"sharpe":null,"sortino":null,"max_drawdown_1y":null,"price_percentile_1y":23.5,"vs_benchmark_30d_pct":4.98,"perf_1m_pct":5.27,"perf_ytd_pct":-17.89},"sourcesMeta":{"price":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"rsi_macd":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"smas_volume":{"origin":"TradingView scanner","fetched_at":"2026-07-21T22:42:16-04:00"},"benchmark":{"origin":"TradingView scanner","symbol":"SP:SPX","fetched_at":"2026-07-21T22:42:16-04:00"},"risk_metrics":{"origin":"data/history/MSFT.json","n_days":1}},"metricChanges":[]},{"ticker":"NVDA","company":"NVIDIA Corporation","statsList":[["Precio","$207.29 (21-jul-2026)"],["Rango 52 sem.","$164.07 – $236.54"],["Market cap","$4.91T"],["P/E","31.1x trailing / 20.3x forward"],["Target consenso","$301.62 (61 analistas)"],["Próx. earnings","26-ago-2026 (Q2 FY27)"],["Técnico (auto)","RSI 52.2 · MACD +0.19 / señal -0.64 (TradingView, 21-jul-2026)"]],"sections":{"resumen":"NVIDIA sigue siendo el eje del ciclo de infraestructura de IA: en el Q1 FY27 (20-may-2026) creció 85% a/a con margen bruto de 75% y guió $91B para el Q2, muy por sobre el consenso. La acción, sin embargo, corrige ~14% desde su máximo de 52 semanas ($236.54) en medio de un selloff sectorial por dudas sobre la sostenibilidad del capex de hiperescaladores y el avance del silicio custom. LECTURA: la tensión central es fundamentales excepcionales y valuación históricamente barata (P/E 31x vs promedio propio de 53x a 10 años) contra un sentimiento de mercado que empezó a cuestionar la duración del ciclo.","fundamental":"- HECHO: Q1 FY27 (reportado 20-may-2026): revenue récord de $81.6B, +85% a/a y +20% t/t, vs consenso de ~$78.8B; EPS non-GAAP $1.87 vs estimado $1.76 (beat); EPS GAAP $2.39; margen bruto GAAP 74.9% / non-GAAP 75.0% (8-K SEC, CNBC 20-may-2026).\n- HECHO: Data Center facturó $75.2B (+92% a/a): compute $60.4B (+77%) y networking $14.8B (+199%). Por cliente: hiperescaladores ~$38B (+12% t/t) y ACIE ~$37B (+31% t/t) (Yahoo Finance / Futurum Group, may-2026). Ingreso neto GAAP $58.3B, +211% a/a. LECTURA: que el EPS GAAP supere al non-GAAP sugiere ganancias no operativas infladas en el GAAP; el $1.87 non-GAAP es la cifra operativa comparable.\n- HECHO: Guidance Q2 FY27 de $91B vs consenso $86.84B; recompra adicional autorizada por $80B y dividendo trimestral elevado 25x, de $0.01 a $0.25 (StockTitan adena de suministro:** HBM4 (SK Hynix) fue el cuello de botella del retraso de Rubin; SK Hynix planea frenar expansión de HBM (Memeburn, jul-2026).\n- **Concentración de clientes:** hiperescaladores ~50% del data center (Futurum, may-2026).","sentimiento":"- HECHO — Analistas: consenso Strong Buy: TipRanks 36 buy / 1 hold / 0 sell, PT promedio $309.94; S&P Global (61 analistas) PT promedio $301.62, rango $180-$500 (jul-2026). Street-high $500 de Baird (21-may-2026).\n- HECHO — Insiders: los cinco ejecutivos más senior (todo el C-suite) vendieron el mismo día, 17-jun-2026 (Kresmion Research, 26-jun-2026); el director Mark A. Stevens vendió 885,000 acciones por ~$186M el 18-jun-2026 (MarketScreener); TECHi reporta ~$3.3B en ventas de ejecutivos acumuladas. La clasificación 10b5-1 de las ventas de jun-2026 no es verificable en las fuentes consultadas. No se encontró compra de insiders relevante.\n- HECHO — Tono de noticias: negativo en las últimas 4-6 semanas: selloff de chips de IA >$1T, dudas sobre capex, retraso de Rubin, endurecimiento de export controls (CBS/CryptoBriefing/Memeburn, jul-2026).\n\nLECTURA: hay divergencia clara: el sell-side sigue unánimemente alcista con targets 50% arriba, pero el flujo de noticias y la venta coordinada de insiders enfrían el sentimiento de corto plazo. El patrón de venta en un mismo día sugiere ventana de trading planificada más que señal direccional, pero la ausencia total de compras de insiders es un dato a monitorear.","conclusion":"La tesis funciona si: (1) el 26-ago hay beat del guidance de $91B con guía Q3 fuerte, validando que el capex de hiperescaladores no se frena; (2) el ramp de Rubin avanza sin nuevos retrasos con las 1.7-1.8M unidades intactas; (3) el múltiplo se re-expande desde 20x forward hacia niveles históricos, lo que por sí solo cerraría parte del gap de ~50% contra el target consenso ($301.62). La invalidarían: (1) recorte o guía plana de capex de algún hiperescalador grande; (2) evidencia de que el silicio  es excelente pero el +82% de EPS no es la tasa orgánica; el número limpio a mirar es el margen operativo de 36% y el +22% de ingresos.\n- HECHO: capex 2026 estimado en **$175-185B** por buildout de IA (Phemex/prensa, jul-2026). LECTURA: la pregunta central del Q2 será si el retorno de ese capex justifica la presión sobre free cash flow.\n- **Guidance Q2 2026 (consenso, IG/MarketBeat 16-jul):** EPS GAAP $2.86-2.95, revenue $116.8-120.2B, Cloud ~+63%.\n- HECHO: Alphabet ejecutó el mayor equity raise de la historia corporativa de EEUU ($85B), anclado por un private placement de $10B de Berkshire (Motley Fool, 1-jul-2026). LECTURA: capital para capex de IA con validación de un inversor de calidad.","valuacion":"- HECHO: P/E TTM ~26.8-27.0x al 16-jul-2026 (FullRatio/Yahoo). Promedio propio de 3 años: 22.97x; de 5 años: 22.87x (FullRatio). LECTURA: prima de ~17-18% sobre su propia historia, y el P/E TTM además está ópticamente ayudado por la ganancia no realizada de $37.7B del Q1, por lo que el múltiplo operativo real es más alto de lo que parece.\n- HECHO: peers al 16-jul-2026: Microsoft 23.8x, Meta 23.8x (Wisesheets/FullRatio) — Alphabet cotiza por encima de ambos, algo históricamente inusual.\n- Forward P/E: fuentes contradictorias (21.87x según GuruFocus vs 27.86x según StockAnalysis) — **no verificable con precisión**; la discrepancia probablemente refleja distintos tratamientos del other income.\n- HECHO: price targets — promedio $433.14 (64 analistas, S&P Global vía stockanalysis/marketbeat, jul-2026); TipRanks $435.78; mín $340 / máx $515. Upside ~25% al promedio desde $345.\n- LECTURA: valuación exigente vs historia y peers, pero no extrema si Cloud sostiene +60% y el backlog de $462B se convierte en revenue.","tecnico":"- HECHO: precio ~$345 vs **50-DMA $368.40 (por debajo — señal de venta)** y **200-DMA $311.90-317.33 (por encima — señal de compra)** (Barchart/Investing.com, ~16-jul-2026).\n- HECHO: RSI 55.9, neutral (Investing.com, lectura previa a la caída del 16-jul; el RSI actual post-caída probablemente es menor — no verificable con precisión).\n- HECHO: caída de más de 4% el 16-jul-2026 tras la noticia del retraso de Gemini (cryptobriefing/FXLeaders). Junio fue el peor mes en más de un año (247wallst, 29-jun-2026). Drawdown desde el máximo de $408.61: ~-15%.\n- Niveles: los soportes/resistencias publicados ($387/$398, TipRanks) quedaron desactualizados tras la caída. LECTURA: soporte relevante en ~$340 (coincide con el PT mínimo de consenso) y luego la zona de la 200-DMA ($312-317); resistencia en $360-370 (50-DMA y zona del gap de la caída).\n- LECTURA: corrección de corto plazo dentro de una tendencia alcista de largo plazo intacta (precio aún ~10% sobre la 200-DMA). El marco diario es bajista, el semanal sigue constructivo.","catalizadores":"**Catalizadores:**\n\n- **22-jul-2026 — earnings Q2 2026 (after close).** Foco: crecimiento de Cloud (~63% esperado), conversión del backlog de $462B, guidance de capex ($175-185B) y resiliencia de Search. Prediction markets asignan 96.6% de probabilidad de beat (Yahoo/MarketBeat, jul-2026).\n- **2H 2026 — lanzamiento de Gemini 3.5 Pro** (retrasado, sin fecha firme — Bloomberg 16-jul-2026); su llegada exitosa sería catalizador positivo.\n- **Flujos pasivos por inclusión en el Dow Jones** (efectiva ~29-jun-2026, reemplazó a Verizon).\n\n**Riesgos (por materialidad):**\n\n- **Ejecución en IA:** retraso de Gemini 3.5 Pro mientras OpenAI y Anthropic avanzan; capacidad de cómputo racionada (no pudo atender la demanda de Meta) — Bloomberg/MarketWise, jul-2026.\n- **Capex de $175-185B:** presión sobre márgenes y FCF si la monetización de IA decepciona.\n- **Regulatorio:** multa UE de €4.1B ($4.7B) confirmada por el CJUE el 2-jul-2026; escrutinio antitrust en Search y ad-tech podría escalar.\n- **Valuación sobre peers e historia:** menos margen de error ante un miss.\n- **Evento binario cercano:** el print del 22-jul puede mover la acción varios puntos porcentuales en cualquier dirección.","sentimiento":"- HECHO: consenso **Strong Buy**: 57 buy / 7 hold / 0 sell (64 analistas, S&P Global vía stockanalysis, jul-2026). BofA (Justin Post) reiteró Buy con PT $430 el 16-jul-2026 (Benzinga/Yahoo).\n- HECHO: **Berkshire Hathaway** ancló $10B del equity raise de $85B (jun-2026) y su posición en Alphabet ronda $30-41B según la fuente (Motley Fool, 4 y 15-jul-2026); Greg Abel triplicó la posición original de Buffett. LECTURA: fuerte respaldo de smart money.\n- HECHO: insiders — en los últimos 90 días, 47 transacciones, todas ventas, valor neto ~-$1.4M (Simply Wall St, jul-2026); Kent Walker vendió $2.1M en marzo-2026; sin compras. LECTURA: ventas rutinarias de ejecutivos, de magnitud irrelevante para un market cap de $4.2T, pero cero compras.\n- Tono de noticias reciente: mixto-negativo en el margen (retraso Gemini, multa UE, peor mes en un año) contra un fondo estructural positivo (Dow, Berkshire, beats consecutivos). LECTURA: sentimiento de analistas muy bullish, sentimiento de flujo de noticias de corto plazo deteriorado.","conclusion":"La tesis funciona si el 22-jul Alphabet muestra que el capex de $175-185B se traduce en Cloud creciendo ~60%+ con backlog convirtiéndose en revenue y margen operativo sostenido sobre 35%: en ese escenario el múltiplo premium se justifica y el camino hacia el target de consenso ($433) se reabre. La invalidarían: (1) desaceleración visible de Cloud o del backlog, (2) guidance de capex aún mayor sin métricas de retorno, (3) evidencia de que el retraso de Gemini 3.5 está costando cuota frente a OpenAI/Anthropic, o (4) pérdida del soporte de ~$340 y luego de la 200-DMA (~$315), que convertiría la corrección en cambio de tendencia. Con el evento a 4 días, el riesgo/retorno favorece esperar el print o dimensionar la posición asumiendo volatilidad de evento."},"scores":{"tecnica":{"score":52,"just":"Precio ($345) por debajo de la 50-DMA ($368) tras caer -4% el 16-jul y -15% desde el máximo de $408.61, pero aún ~10% sobre la 2 gin":"data/history/GOOGL.json","n_days":1}},"metricChanges":[]},{"ticker":"AMZN","company":"Amazon.com, Inc.","statsList":[["Precio","$247.55 (21-jul-2026)"],["Rango 52 sem.","$196.00 – $278.56"],["Market cap","$2.69T"],["P/E","29.6x trailing (fwd 25.5x)"],["Target consenso","$312.99 (62 analistas)"],["Próx. earnings","30-jul-2026 (after close)"],["Técnico (auto)","RSI 51.3 · MACD +0.80 / señal -0.34 (TradingView, 21-jul-2026)"]],"sections":{"resumen":"Amazon llega al earnings del 30 de julio con momentum fundamental excepcional: Q1 2026 batió en todas las líneas (revenue $181.5B +17%, AWS +28%, margen operativo récord 13.1%) y el consenso es casi unánimemente comprador (63 buy / 4 hold / 0 sell, target $312.99, ~+25% de upside). El precio, sin embargo, corrigió ~10% desde el máximo de $278.56 y el cuadro técnico es mixto. LECTURA: tesis de calidad con catalizador concreto e inminente; el riesgo de corto plazo es de ejecución en el print de Q2 y del capex de $200B.","fundamental":"- HECHO: Q1 2026 (reportado ~29-abr-2026, CNBC/Tickeron/TIKR): revenue $181.5B, +17% a/a, vs consenso ~$177B. EPS diluido $2.78 vs $1.63 esperado, aunque inflado por $16.8B de ganancias pre-tax por la inversión en Anthropic. Margen operativo 13.1%, el más alto de la historia de la compañía según el CEO Andy Jassy.\n- HECHO: AWS creció 28% a $37.6B (vs $36.64B StreetAccount), su mayor ritmo en 15 trimestres; operating income de AWS $14.16B, +23%, muy sobre el consenso de $12.84B (CNBC, 29-abr-2026).\n- HECHO: Guidance Q2: crecimiento de ventas 16-19% ($194-199B) con ~$1B de costos adicionales por Project Leo (satélites) y plan de capex 2026 de ~$200B (TIKR, jul-2026).\n\nLECTURA: El negocio está en su mejor momento operativo en años: reaceleración de AWS por demanda de IA, publicidad récord y márgenes en máximos. El moat es triple (escala logística en e-commerce, efecto de red/switching costs en AWS, flywheel de Prime + ads) y se refuerza con la relación estratégica con Anthropic. El riesgo fundamental no es demanda sino intensidad de capital: $200B de capex exigen que AWS sostenga el ~28%.","valuacion":"- HECHO: P/E trailing 29.58x al 14-jul-2026 (FinanceCharts); otra fuente reporta 34.66x a la misma fecha (discrepancia declarada; el trailing está además distorsionado por la ganancia contable de Anthropic). Forward P/E 25.47x al 26-jun-2026 (valueinvesting.io).\n- HECHO: Promedio histórico propio: 5 años ~46.8-57.8x y 10 años ~71.9-73.1x según FullRatio/FinanceCharts — el múltiplo actual está claramente por debajo de sus propios promedios de 3, 5 y 10 años.\n- HECHO: Vs peers (jun-jul 2026): forward P/E de GOOGL ~19.5x y AAPL ~23.3x (FinanceCharts/Public.com); AMZN cotiza con prima moderada.\n- HECHO: Consenso: target promedio $312.99, máximo $370, mínimo $207, sobre 62 analistas (stockanalysis.com/TipRanks, jul-2026); TD Cowen recortó a $340 desde $350 manteniendo Buy (8-jul-2026); Wells Fargo apunta a $312 (26-jun-2026).\n\nLECTURA: Para el crecimiento (+17% revenue, AWS +28%) y la expansión de márgenes, un forward de ~25x es razonable e históricamente barato para AMZN; la prima vs Google/Apple se justifica por mayor crecimiento. Upside implícito al target promedio: ~+25% desde $250.91.","tecnico":"- HECHO: Precio $250.91 (16-jul-2026), ~10% bajo el máximo de 52 semanas de $278.56; rango del último mes $225.55-$251.03 (stockinvest.us, 14-jul-2026).\n- HECHO — fuentes en conflicto: AltIndex reporta SMA50 $245.9 > SMA200 $236.1 (configuración alcista), mientras Investing.com/TipRanks reportan SMA50 ~$238-254 con señal de venta y RSI entre 49.4 (neutral) y 67.4 según la fuente; el RSI se declara no verificable con precisión.\n- HECHO: Soportes citados: zona $240.4-245.2, luego $232.5 y $227.0 (cerca del mínimo de 3 meses $225.55); resistencias: $253.7 (SMA50 según ChartMill) y $263.0 (ChartMill/Barchart, jul-2026).\n\nLECTURA: Estructura de mediano plazo alcista (precio muy por encima del piso de $196 y del SMA200 en la mayoría de lecturas) pero corto plazo lateral-correctivo: el rebote desde ~$226 a fines de junio recuperó la zona de $247-251 y ahora enfrenta la resistencia $253-263. Perder $240 abriría retest de $227-232; superar $263 reanudaría la tendencia hacia $278.","catalizadores":"**Catalizadores:**\n\n- **30-jul-2026 — resultados Q2 2026** (confirmado por aboutamazon.com). Consenso ~$196B revenue y EPS ~$1.82; TD Cowen modela $200.1B (+2% sobre consenso). Prime Day cayó en Q2 este año, un viento de cola que no existió en Q2 2025.\n- **2H 2026 — lanzamiento comercial del servicio de banda ancha Leo** — 396 satélites ya desplegados (NAI500/Technobezz, jul-2026); competencia directa a Starlink.\n- **Continuo — monetización IA:** unidad de $1B de Forward Deployed Engineers en AWS (CNBC, 30-jun-2026), AgentCore y EC2 G7 con Blackwell (AWS Summit NY, jul-2026); derivadas de la relación con Anthropic.\n\n**Riesgos (por materialidad):**\n\n- **Capex $200B en 2026:** si AWS desacelera bajo ~28%, el mercado castigará el retorno sobre ese capital (TIKR, jul-2026).\n- **Evento binario cercano:** el print del 30-jul con expectativas ya elevadas tras el rally post-Q1.\n- **Costos de Project Leo:** ~$1B adicionales en Q2 presionan el operating income guiado.\n- **Distorsión contable Anthropic:** la ganancia de $16.8B es mark-to-market y puede revertirse en trimestres futuros.\n- **Técnico:** pérdida de $240 activa retest de $227; el drawdown de 52 semanas ya fue de ~$278 a ~$226 (-19%).","sentimiento":"- HECHO: Consenso Strong Buy: 63 buy / 4 hold / 0 sell; target promedio $312.99 ($207-$370) sobre 62 analistas (stockanalysis.com/TipRanks/MarketBeat, jul-2026). Acciones recientes: TD Cowen Buy, PT $340 (8-jul); Wells Fargo recomienda entrada, PT $312 (26-jun). Un resultado atribuye a BofA un PT de $165 (7-jul) — cifra inconsistente con el rango del consenso, se trata como no verificable.\n- HECHO — insiders: CEO Andy Jassy vendió 31,352 acciones a $275.00 el 4-may-2026 (~$8.6M) bajo plan 10b5-1 adoptado el 14-nov-2025; en 6 meses acumula 12 ventas por ~102,096 acciones (~$24.9M) y 0 compras (StockTitan/GuruFocus/MarketBeat). Entidad ligada a Bezos vendió 220,200 acciones a $275.27 el 5-may-2026 (~$60.6M). Entre mayo y julio: 11 ventas de insiders por ~$8.1M, 0 compras (stockcircle/insiderscreener).\n\nLECTURA: Tono de noticias claramente constructivo (AWS reacelerando, IA, Leo). Las ventas de insiders son programadas, pequeñas vs el market cap y consistentes con el patrón histórico de solo-ventas de Amazon; no se lee señal negativa, aunque la ausencia total de compras impide leerlas como señal positiva.","conclusion":"La tesis funciona si el 30 de julio AWS imprime crecimiento igual o superior al 28% de Q1 y el operating income absorbe los costos de Leo — eso validaría el capex de $200B, cerraría el gap técnico hacia $263-278 y daría sustento al target de $313 con un forward de ~25x que es barato contra la propia historia de Amazon. La invalidarían: (1) AWS desacelerando por debajo de ~25-26% o guidance de Q3 débil, (2) margen operativo retrocediendo claramente desde 13.1% por Leo/capex, (3) pérdida técnica de $240 y luego $227, que rompería la estructura alcista de mediano plazo. Con 0 sells en el consenso, la barra de expectativas es alta: el mayor riesgo no es el negocio sino la asimetría de reacción ante un print apenas en línea."},"scores":{"tecnica":{"score":58,"just":"Estructura de mediano plazo alcista (precio $250.91 sobre el SMA200 en la mayoría de lecturas y +28% sobre el piso de 52s de $196), pero corto plazo lateral-correctivo: -10% desde $278.56, resistencia en $253-263 y fuentes técnicas en conflicto (golden cross según AltIndex vs señal de venta según Investing.com). RSI 49-67 no concluyente."},"fundamental":{"score":88,"just":"Q1 2026 récord: revenue +17% ($181.5B), AWS +28% (mejor ritmo en 15 trimestres), margen operativo 13.1% máximo histórico, moat triple (logística, AWS, Prime/ads). Valuación razonable: forward ~25.5x, muy por debajo de sus promedios de 5a (~47-58x) y 10a (~72x). Descuento solo por la intensidad de capital ($200B capex)."},"sentimiento":{"score":78,"just":"Consenso Strong Buy 63/4/0 con target $312.99 (+25% upside) y flujo de notas constructivo en jun-jul (TD Cowen $340, Wells Fargo $312). Ventas de insiders (Jassy ~$25M en 6 meses, entidad Bezos $60.6M) son vía 10b5-1 y rutinarias, pero 0 compras; resta un poco por expectativas ya muy cargadas."},"riesgo":{"score":65,"just":"Mega-cap de $2.69T con liquidez máxima y beta moderada, lo que acota el riesgo estructural; pero hay evento binario a 12 días (earnings 30-jul), drawdown reciente de -19% ($278 a $226) y exposición a un ciclo de capex de $200B más ~$1B de costos Leo en Q2. Riesgo acotado pero no bajo en el corto plazo."},"conviccion":{"score":82,"just":"Catalizadores concretos y fechados: earnings 30-jul-2026 con Prime Day en Q2, lanzamiento de Leo en 2H 2026 (396 satélites ya en órbita), pipeline de IA (FDE $1B, AgentCore). Tesis falsable con umbral claro: AWS >=28% valida, <26% invalida. Asimetría favorable con forward P/E bajo vs historia propia."}},"sources":["stockanalysis.com / TradingEconomics — precio, rango 52s, market cap (16-jul-2026)","CNBC — AWS earnings Q1 2026 (29-abr-2026)","Tickeron / TIKR — recap Q1 2026 y guidance (abr-may-2026)","stockanalysis.com / TipRanks / MarketBeat — consenso y price targets (jul-2026)","aboutamazon.com — fecha earnings Q2 (30-jul-2026)","CNBC / TechCrunch — AWS unidad FDE $1B (30-jun-2026)","NAI500 / Technobezz — Project Leo 396 satélites (jul-2026)","AltIndex / Investing.com / TipRanks / ChartMill / Barchart — técnico (jul-2026)","stockinvest.us — precio y rango mensual (14-jul-2026)","StockTitan / MarketBeat / GuruFocus — Form 4 venta Jassy (4-may-2026)","stockcircle / insiderscreener — insiders may-jul-2026","FinanceCharts / FullRatio / valueinvesting.io — P/E actual, forward e histórico (jun-jul-2026)","TD Cowen vía stockanalysis (8-jul-2026) y Wells Fargo vía watcher.guru (26-jun-2026)"],"change":{ l 2 de julio pese al beat y cotiza a $380, bajo sus medias de 50 y 200 días. LECTURA: el mercado ya no paga por los autos sino por la tesis de autonomía (robotaxi/Optimus), y a 346x earnings TTM el margen de error es mínimo. La tesis es de alto riesgo/alta opcionalidad con catalizador inmediato en el earnings de Q2.","fundamental":"- HECHO: Q1 2026 (reportado 22-abr-2026, CNBC/Electrek/SEC 8-K): revenue $22.39B (+16% a/a, bajo el consenso), EPS non-GAAP $0.41 vs $0.34 esperado (beat ~21%), margen bruto automotriz 21.1% vs 16.2% un año antes (impulsado por menores costos de materiales, mejores ASP y partidas one-time de garantías/aranceles). Servicios +42% a/a a $3.75B con 1.28M suscripciones FSD activas.\n- HECHO: Entregas Q2 2026 (IR de Tesla, 2-jul-2026): 480,126 vehículos entregados (+25% a/a, +34% t/t), >450,000 producidos, 13.5 GWh de storage desplegados — mejor Q2 de su historia (Tesla Oracle, 15-jul-2026). Guidance 2026: capex >$25B (subido desde $20B) para cómputo IA, fábricas de Optimus, líneas de Cybercab y Megapack 3; sin guidance explícito de entregas/EPS.\n- HECHO: Consenso para Q2 2026 (Zacks/IR Tesla, jul-2026): EPS ~$0.47-0.50 y revenue ~$24.7-27.6B según la fuente.\n\nLECTURA: El negocio reaceleró (crecimiento de entregas de doble dígito, márgenes recuperándose, energía en récord) tras el bache de 2024-25. Pero parte de la mejora de márgenes de Q1 fue one-time, y la pregunta clave del 22-jul es si el margen automotriz sostiene ~21% con el volumen récord. El moat real hoy es la escala en EV+energía+datos de conducción; la competencia de BYD en precio (~$10,000 por un EV completo, según análisis citados por Yahoo/TradingKey) limita el poder de precios en el hardware.","valuacion":"- HECHO: P/E TTM ~346x (Yahoo Finance/MacroTrends, 14-16-jul-2026), vs promedio propio de 12 meses de 314x. Forward P/E entre 192.65x (GuruFocus, 15-jul-2026) y ~210x (finbox). GuruFocus lo clasifica 'significantly overvalued', peor que el 98% de su sector.\n- HECHO: Price targets: promedio $400.59 con máx $600 y mín $24.86 (TipRanks, 29 analistas, jul-2026); $407.41 (StockAnalysis, 33 analistas); $425.49 con rating 'Buy' (S&P Global, 47 analistas). El mín de $24.86 es un outlier extremo — la dispersión $25-$600 es de las mayores del S&P 500.\n- HECHO: la acción ha cotizado entre ~40x y >300x en su historia (MacroTrends); hoy está en la parte alta de su propio rango.\n\nLECTURA: Contra peers automotrices (P/E de un dígito) o incluso megacaps de IA (~30-40x), Tesla cotiza como una opción sobre robotaxi/Optimus, no como automotriz. El upside al target promedio (~$400-425) es de solo +5-12% desde $380: el consenso NO ve asimetría favorable a este precio.","tecnico":"- HECHO: Precio $380.04 (18-jul-2026), tras caer ~7-8% el 2-jul-2026 (peor día en un año, Forbes/CryptoBriefing) pese al beat de entregas.\n- HECHO: Las fuentes técnicas divergen en los valores exactos: SMA50 entre $387.51 y $409.19 y SMA200 entre $408.95 y $418.14 (ChartMill/Investing.com, 18-jul-2026) — en todos los casos el precio actual está **por debajo de ambas medias**. RSI(14) ~55 (neutral) según una fuente (fecha exacta no verificable con precisión).\n- HECHO: Soporte citado en $380 y zona $400.88-406.19 (ya perdida); resistencia en $423.94-428.04 y $445 (ChartMill/Investtech).\n\nLECTURA: Estructura de corto plazo bajista: ruptura del soporte $400-406, precio bajo ambas medias móviles y a -24% del máximo de 52 semanas ($498.83). El $380 es el nivel a defender; perderlo abre camino hacia la parte baja del rango anual ($298). Marco mayor: sigue dentro de un rango amplio $298-499 — lateral-volátil más que tendencia definida. El earnings del 22-jul será el resolutor direccional.","catalizadores":"**Catalizadores:**\n\n- **22-jul-2026 — Resultados Q2 2026** (after close). Foco: sostenibilidad del margen automotriz ~21% y comentarios de robotaxi.\n- **H2 2026 — Expansión robotaxi sin supervisión:** ya activo en Austin (ene-2026) y Dallas/Houston (abr-2026); plan para Phoenix, Miami, Orlando, Tampa y Las Vegas; Musk promete red 'widespread' en EEUU a fin de 2026 (CNBC, 22-ene-2026).\n- **2026 — Producción en volumen de Cybercab, Tesla Semi y Megapack 3;** líneas de Optimus instalándose en Fremont (guidance Q1, abr-2026).\n- **Fin 2027 — Venta de Optimus al público** (Musk).\n\n**Riesgos (por materialidad):**\n\n- **Valuación extrema:** 346x TTM / ~200x forward — cualquier decepción en márgenes o en el timeline de autonomía puede comprimir el múltiplo violentamente (el -7% del 2-jul con buenas noticias lo ilustra).\n- **Ejecución robotaxi vs Waymo:** Waymo ya hace >500,000 viajes pagados/semana sin supervisión (jun-2026); si Tesla no cierra la brecha, la prima de autonomía se erosiona.\n- **Competencia en precio:** BYD vende EVs completos a ~$10,000; presión estructural sobre márgenes de hardware.\n- **Regulatorio/seguridad:** primer accidente fatal del Tesla Semi en Nevada (fines jun-2026, Forbes) — riesgo de escrutinio sobre todo el programa autónomo.\n- **Riesgo-Musk/gobernanza:** concentración de la tesis en una persona; su paquete accionario (ejercicio de 304M de opciones, jun-2026) diluye y concentra control.","sentimiento":"- HECHO: Consenso 'Hold' en TipRanks: 10 buy / 16 hold / 3 sell (29 analistas, jul-2026); S&P Global más constructivo ('Buy', 47 analistas). Últimas acciones (14-jul-2026): Morgan Stanley mantuvo equal-weight; Barclays y Wells Fargo también actualizaron.\n- HECHO: Insiders: venta neta de ~-$26.8M en 90 días, con ventas por $128.7M y cero compras (InsiderScreener/MarketBeat, jul-2026); CFO Taneja vendió 2,606 acciones por $1.05M el 5-jun-2026; Musk ejerció 303.96M opciones a $23.34 con pago de impuestos de 17.5M acciones el 16-jun-2026 (SEC Form 4, 17-jun-2026) — retención, no venta discrecional.\n- HECHO: Tono de noticias 30-60 días: mixto — positivo en operación (mejor Q2 de la historia, récord de energía), negativo en reacción de precio (peor día en un año el 2-jul) y en seguridad (accidente fatal del Semi). Motley Fool (6-8-jul-2026): 'noticias fantásticas, pero no corras a comprar'.\n\nLECTURA: Sentimiento genuinamente dividido: los datos operativos son buenos pero el mercado ya los tenía en precio y el consenso sell-side está neutral con upside limitado al target. Las ventas de insiders son modestas en escala relativa pero la ausencia total de compras y el rating 'Hold' mayoritario confirman falta de convicción institucional a estos múltiplos.","conclusion":"La tesis alcista funciona si el 22-jul Tesla muestra que el margen automotriz ~21% es estructural (no one-time) y si en H2 2026 la red robotaxi escala a las 7+ ciudades prometidas con métricas de viajes comparables a Waymo — eso validaría el múltiplo de ~200x forward y reabriría el camino a los targets altos ($500-600). La tesis se invalida si: (a) el margen Q2 recae hacia 16-17% (confirmaría que Q1 fue contable, no operativo), (b) el despliegue robotaxi se retrasa o sufre un evento de seguridad tipo Semi-Nevada que congele la expansión regulatoria, o (c) el precio pierde $380 y luego la zona $340-350, señalando que el mercado recorta la prima de autonomía. Con upside de solo +5-12% al target promedio y soportes rotos, la asimetría de corto plazo es desfavorable; la posición racional es esperar el earnings o exigir precios más cerca de $340 para construir posición."},"scores":{"tecnica":{"score":40,"just":"Precio ($380.04, 18-jul-2026) bajo la SMA50 y la SMA200 según todas las fuentes consultadas, tras el peor día en un año (-7%, 2-jul) y con la zona de soporte $400-406 perdida. RSI ~55 neutral evita lectura de sobreventa; marco mayor lateral dentro de $298-499 — bajista de corto plazo, no colapso."},"fundamental":{"score":55,"just":"Negocio reacelerando con hechos duros: entregas +25% a/a en Q2, margen automotriz 21.1% en Q1 (vs 16.2%), energía en récord y servicios +42%. Pero la valuación (346x TTM, ~200x forward, 'significantly overvalued' según GuruFocus) consume todo el mérito: negocio sólido con valuación
