"fundamental": "**Q1 2026 (reportado 29-abr-2026, CNBC / earnings release Alphabet):**\n\n- HECHO: Revenue $109.9B vs $107.2B esperado (+22% y/y). EPS GAAP $5.11 (+82% y/y).\n- HECHO: Google Cloud $20B (+63% y/y) con backlog que casi se duplicó a **$462B**. Google Services $89.6B (+16%). YouTube ads $9.9B (+11%). Operating income $39.7B, margen operativo 36.1% (Beancount/Tickeron, sobre release Q1).\n- HECHO: el EPS fue inflado por una ganancia de other income de **$37.7B** (marcas no realizadas en equity no cotizada), no por el negocio operativo (Beancount.io, 13-jul-2026). LECTURA: el crecimiento operativo real es excelente pero el +82% de EPS no es la tasa orgánica; el número limpio a mirar es el margen operativo de 36% y el +22% de ingresos.\n- HECHO: capex 2026 estimado en **$175-185B** por buildout de IA (Phemex/prensa, jul-2026). LECTURA: la pregunta central del Q2 será si el retorno de ese capex justifica la presión sobre free cash flow.\n- **Guidance Q2 2026 (consenso, IG/MarketBeat 16-jul):** EPS GAAP $2.86-2.95, revenue $116.8-120.2B, Cloud ~+63%.\n- HECHO: Alphabet ejecutó el mayor equity raise de la historia corporativa de EEUU ($85B), anclado por un private placement de $10B de Berkshire (Motley Fool, 1-jul-2026). LECTURA: capital para capex de IA con validación de un inversor de calidad.", "valuacion": "- HECHO: P/E TTM ~26.8-27.0x al 16-jul-2026 (FullRatio/Yahoo). Promedio propio de 3 años: 22.97x; de 5 años: 22.87x (FullRatio). LECTURA: prima de ~17-18% sobre su propia historia, y el P/E TTM además está ópticamente ayudado por la ganancia no realizada de $37.7B del Q1, por lo que el múltiplo operativo real es más alto de lo que parece.\n- HECHO: peers al 16-jul-2026: Microsoft 23.8x, Meta 23.8x (Wisesheets/FullRatio) — Alphabet cotiza por encima de ambos, algo históricamente inusual.\n- Forward P/E: fuentes contradictorias (21.87x según GuruFocus vs 27.86x según StockAnalysis) — **no verificable con precisión**; la discrepancia probablemente refleja distintos tratamientos del other income.\n- HECHO: price targets — promedio $433.14 (64 analistas, S&P Global vía stockanalysis/marketbeat, jul-2026); TipRanks $435.78; mín $340 / máx $515. Upside ~25% al promedio desde $345.\n- LECTURA: valuación exigente vs historia y peers, pero no extrema si Cloud sostiene +60% y el backlog de $462B se convierte en revenue.", "tecnico": "- HECHO: precio ~$345 vs **50-DMA $368.40 (por debajo — señal de venta)** y **200-DMA $311.90-317.33 (por encima — señal de compra)** (Barchart/Investing.com, ~16-jul-2026).\n- HECHO: RSI 55.9, neutral (Investing.com, lectura previa a la caída del 16-jul; el RSI actual post-caída probablemente es menor — no verificable con precisión).\n- HECHO: caída de más de 4% el 16-jul-2026 tras la noticia del retraso de Gemini (cryptobriefing/FXLeaders). Junio fue el peor mes en más de un año (247wallst, 29-jun-2026). Drawdown desde el máximo de $408.61: ~-15%.\n- Niveles: los soportes/resistencias publicados ($387/$398, TipRanks) quedaron desactualizados tras la caída. LECTURA: soporte relevante en ~$340 (coincide con el PT mínimo de consenso) y luego la zona de la 200-DMA ($312-317); resistencia en $360-370 (50-DMA y zona del gap de la caída).\n- LECTURA: corrección de corto plazo dentro de una tendencia alcista de largo plazo intacta (precio aún ~10% sobre la 200-DMA). El marco diario es bajista, el semanal sigue constructivo.", "catalizadores": "**Catalizadores:**\n\n- **22-jul-2026 — earnings Q2 2026 (after close).** Foco: crecimiento de Cloud (~63% esperado), conversión del backlog de $462B, guidance de capex ($175-185B) y resiliencia de Search. Prediction markets asignan 96.6% de probabilidad de beat (Yahoo/MarketBeat, jul-2026).\n- **2H 2026 — lanzamiento de Gemini 3.5 Pro** (retrasado, sin fecha firme — Bloomberg 16-jul-2026); su llegada exitosa sería catalizador positivo.\n- **Flujos pasivos por inclusión en el Dow Jones** (efectiva ~29-jun-2026, reemplazó a Verizon).\n\n**Riesgos (por materialidad):**\n\n- **Ejecución en IA:** retraso de Gemini 3.5 Pro mientras OpenAI y Anthropic avanzan; capacidad de cómputo racionada (no pudo atender la demanda de Meta) — Bloomberg/MarketWise, jul-2026.\n- **Capex de $175-185B:** presión sobre márgenes y FCF si la monetización de IA decepciona.\n- **Regulatorio:** multa UE de €4.1B ($4.7B) confirmada por el CJUE el 2-jul-2026; escrutinio antitrust en Search y ad-tech podría escalar.\n- **Valuación sobre peers e historia:** menos margen de error ante un miss.\n- **Evento binario cercano:** el print del 22-jul puede mover la acción varios puntos porcentuales en cualquier dirección.", "sentimiento": "- HECHO: consenso **Strong Buy**: 57 buy / 7 hold / 0 sell (64 analistas, S&P Global vía stockanalysis, jul-2026). BofA (Justin Post) reiteró Buy con PT $430 el 16-jul-2026 (Benzinga/Yahoo).\n- HECHO: **Berkshire Hathaway** ancló $10B del equity raise de $85B (jun-2026) y su posición en Alphabet ronda $30-41B según la fuente (Motley Fool, 4 y 15-jul-2026); Greg Abel triplicó la posición original de Buffett. LECTURA: fuerte respaldo de smart money.\n- HECHO: insiders — en los últimos 90 días, 47 transacciones, todas ventas, valor neto ~-$1.4M (Simply Wall St, jul-2026); Kent Walker vendió $2.1M en marzo-2026; sin compras. LECTURA: ventas rutinarias de ejecutivos, de magnitud irrelevante para un market cap de $4.2T, pero cero compras.\n- Tono de noticias reciente: mixto-negativo en el margen (retraso Gemini, multa UE, peor mes en un año) contra un fondo estructural positivo (Dow, Berkshire, beats consecutivos). LECTURA: sentimiento de analistas muy bullish, sentimiento de flujo de noticias de corto plazo deteriorado.", "conclusion": "La tesis funciona si el 22-jul Alphabet muestra que el capex de $175-185B se traduce en Cloud creciendo ~60%+ con backlog convirtiéndose en revenue y margen operativo sostenido sobre 35%: en ese escenario el múltiplo premium se justifica y el camino hacia el target de consenso ($433) se reabre. La in ito al target promedio: ~+25% desde $250.91.", "tecnico": "- HECHO: Precio $250.91 (16-jul-2026), ~10% bajo el máximo de 52 semanas de $278.56; rango del último mes $225.55-$251.03 (stockinvest.us, 14-jul-2026).\n- HECHO — fuentes en conflicto: AltIndex reporta SMA50 $245.9 > SMA200 $236.1 (configuración alcista), mientras Investing.com/TipRanks reportan SMA50 ~$238-254 con señal de venta y RSI entre 49.4 (neutral) y 67.4 según la fuente; el RSI se declara no verificable con precisión.\n- HECHO: Soportes citados: zona $240.4-245.2, luego $232.5 y $227.0 (cerca del mínimo de 3 meses $225.55); resistencias: $253.7 (SMA50 según ChartMill) y $263.0 (ChartMill/Barchart, jul-2026).\n\nLECTURA: Estructura de mediano plazo alcista (precio muy por encima del piso de $196 y del SMA200 en la mayoría de lecturas) pero corto plazo lateral-correctivo: el rebote desde ~$226 a fines de junio recuperó la zona de $247-251 y ahora enfrenta la resistencia $253-263. Perder $240 abriría retest de $227-232; superar $263 reanudaría la tendencia hacia $278.", "catalizadores": "**Catalizadores:**\n\n- **30-jul-2026 — resultados Q2 2026** (confirmado por aboutamazon.com). Consenso ~$196B revenue y EPS ~$1.82; TD Cowen modela $200.1B (+2% sobre consenso). Prime Day cayó en Q2 este año, un viento de cola que no existió en Q2 2025.\n- **2H 2026 — lanzamiento comercial del servicio de banda ancha Leo** — 396 satélites ya desplegados (NAI500/Technobezz, jul-2026); competencia directa a Starlink.\n- **Continuo — monetización IA:** unidad de $1B de Forward Deployed Engineers en AWS (CNBC, 30-jun-2026), AgentCore y EC2 G7 con Blackwell (AWS Summit NY, jul-2026); derivadas de la relación con Anthropic.\n\n**Riesgos (por materialidad):**\n\n- **Capex $200B en 2026:** si AWS desacelera bajo ~28%, el mercado castigará el retorno sobre ese capital (TIKR, jul-2026).\n- **Evento binario cercano:** el print del 30-jul con expectativas ya elevadas tras el rally post-Q1.\n- **Costos de Project Leo:** ~$1B adicionales en Q2 presionan el operating income guiado.\n- **Distorsión contable Anthropic:** la ganancia de $16.8B es mark-to-market y puede revertirse en trimestres futuros.\n- **Técnico:** pérdida de $240 activa retest de $227; el drawdown de 52 semanas ya fue de ~$278 a ~$226 (-19%).", "sentimiento": "- HECHO: Consenso Strong Buy: 63 buy / 4 hold / 0 sell; target promedio $312.99 ($207-$370) sobre 62 analistas (stockanalysis.com/TipRanks/MarketBeat, jul-2026). Acciones recientes: TD Cowen Buy, PT $340 (8-jul); Wells Fargo recomienda entrada, PT $312 (26-jun). Un resultado atribuye a BofA un PT de $165 (7-jul) — cifra inconsistente con el rango del consenso, se trata como no verificable.\n- HECHO — insiders: CEO Andy Jassy vendió 31,352 acciones a $275.00 el 4-may-2026 (~$8.6M) bajo plan 10b5-1 adoptado el 14-nov-2025; en 6 meses acumula 12 ventas por ~102,096 acciones (~$24.9M) y 0 compras (StockTitan/GuruFocus/MarketBeat). Entidad ligada a Bezos vendió 220,200 acciones a $275.27 el 5-may-2026 (~$60.6M). Entre mayo y julio: 11 ventas de insiders por ~$8.1M, 0 compras (stockcircle/insiderscreener).\n\nLECTURA: Tono de noticias claramente constructivo (AWS reacelerando, IA, Leo). Las ventas de insiders son programadas, pequeñas vs el market cap y consistentes con el patrón histórico de solo-ventas de Amazon; no se lee señal negativa, aunque la ausencia total de compras impide leerlas como señal positiva.", "conclusion": "La tesis funciona si el 30 de julio AWS imprime crecimiento igual o superior al 28% de Q1 y el operating income absorbe los costos de Leo — eso validaría el capex de $200B, cerraría el gap técnico hacia $263-278 y daría sustento al target de $313 con un forward de ~25x que es barato contra la propia historia de Amazon. La invalidarían: (1) AWS desacelerando por debajo de ~25-26% o guidance de Q3 débil, (2) margen operativo retrocediendo claramente desde 13.1% por Leo/capex, (3) pérdida técnica de $240 y luego $227, que rompería la estructura alcista d A, fábricas de Optimus, líneas de Cybercab y Megapack 3; sin guidance explícito de entregas/EPS.\n- HECHO: Consenso para Q2 2026 (Zacks/IR Tesla, jul-2026): EPS ~$0.47-0.50 y revenue ~$24.7-27.6B según la fuente.\n\nLECTURA: El negocio reaceleró (crecimiento de entregas de doble dígito, márgenes recuperándose, energía en récord) tras el bache de 2024-25. Pero parte de la mejora de márgenes de Q1 fue one-time, y la pregunta clave del 22-jul es si el margen automotriz sostiene ~21% con el volumen récord. El moat real hoy es la escala en EV+energía+datos de conducción; la competencia de BYD en precio (~$10,000 por un EV completo, según análisis citados por Yahoo/TradingKey) limita el poder de precios en el hardware.", "valuacion": "- HECHO: P/E TTM ~346x (Yahoo Finance/MacroTrends, 14-16-jul-2026), vs promedio propio de 12 meses de 314x. Forward P/E entre 192.65x (GuruFocus, 15-jul-2026) y ~210x (finbox). GuruFocus lo clasifica 'significantly overvalued', peor que el 98% de su sector.\n- HECHO: Price targets: promedio $400.59 con máx $600 y mín $24.86 (TipRanks, 29 analistas, jul-2026); $407.41 (StockAnalysis, 33 analistas); $425.49 con rating 'Buy' (S&P Global, 47 analistas). El mín de $24.86 es un outlier extremo — la dispersión $25-$600 es de las mayores del S&P 500.\n- HECHO: la acción ha cotizado entre ~40x y >300x en su historia (MacroTrends); hoy está en la parte alta de su propio rango.\n\nLECTURA: Contra peers automotrices (P/E de un dígito) o incluso megacaps de IA (~30-40x), Tesla cotiza como una opción sobre robotaxi/Optimus, no como automotriz. El upside al target promedio (~$400-425) es de solo +5-12% desde $380: el consenso NO ve asimetría favorable a este precio.", "tecnico": "- HECHO: Precio $380.04 (18-jul-2026), tras caer ~7-8% el 2-jul-2026 (peor día en un año, Forbes/CryptoBriefing) pese al beat de entregas.\n- HECHO: Las fuentes técnicas divergen en los valores exactos: SMA50 entre $387.51 y $409.19 y SMA200 entre $408.95 y $418.14 (ChartMill/Investing.com, 18-jul-2026) — en todos los casos el precio actual está **por debajo de ambas medias**. RSI(14) ~55 (neutral) según una fuente (fecha exacta no verificable con precisión).\n- HECHO: Soporte citado en $380 y zona $400.88-406.19 (ya perdida); resistencia en $423.94-428.04 y $445 (ChartMill/Investtech).\n\nLECTURA: Estructura de corto plazo bajista: ruptura del soporte $400-406, precio bajo ambas medias móviles y a -24% del máximo de 52 semanas ($498.83). El $380 es el nivel a defender; perderlo abre camino hacia la parte baja del rango anual ($298). Marco mayor: sigue dentro de un rango amplio $298-499 — lateral-volátil más que tendencia definida. El earnings del 22-jul será el resolutor direccional.", "catalizadores": "**Catalizadores:**\n\n- **22-jul-2026 — Resultados Q2 2026** (after close). Foco: sostenibilidad del margen automotriz ~21% y comentarios de robotaxi.\n- **H2 2026 — Expansión robotaxi sin supervisión:** ya activo en Austin (ene-2026) y Dallas/Houston (abr-2026); plan para Phoenix, Miami, Orlando, Tampa y Las Vegas; Musk promete red 'widespread' en EEUU a fin de 2026 (CNBC, 22-ene-2026).\n- **2026 — Producción en volumen de Cybercab, Tesla Semi y Megapack 3;** líneas de Optimus instalándose en Fremont (guidance Q1, abr-2026).\n- **Fin 2027 — Venta de Optimus al público** (Musk).\n\n**Riesgos (por materialidad):**\n\n- **Valuación extrema:** 346x TTM / ~200x forward — cualquier decepción en márgenes o en el timeline de autonomía puede comprimir el múltiplo violentamente (el -7% del 2-jul con buenas noticias lo ilustra).\n- **Ejecución robotaxi vs Waymo:** Waymo ya hace >500,000 viajes pagados/semana sin supervisión (jun-2026); si Tesla no cierra la brecha, la prima de autonomía se erosiona.\n- **Competencia en precio:** BYD vende EVs completos a ~$10,000; presión estructural sobre márgenes de hardware.\n- **Regulatorio/seguridad:** primer accidente fatal del Tesla Semi en Nevada (fines jun-2026, Forbes) — riesgo de escrutinio sobre todo el programa autónomo.\n- **Riesgo-Musk/gobernanza:** concentración de la tesis en una persona; su paquete accionario (ejercicio de 304M de opciones, jun-2026) diluye y concentra control.", "sentimiento": "- HECHO: Consenso 'Hold' en TipRanks: 10 buy / 16 hold / 3 sell (29 analistas, jul-2026); S&P Global más constructivo ('Buy', 47 analistas). Últimas acciones (14-jul-2026): Morgan Stanley mantuvo equal-weight; Barclays y Wells Fargo también actualizaron.\n- HECHO: Insiders: venta neta de ~-$26.8M en 90 días, con ventas por $128.7M y cero compras (InsiderScreener/MarketBeat, jul-2026); CFO Taneja vendió 2,606 acciones por $1.05M el 5-jun-2026; Musk ejerció 303.96M opciones a $23.34 con pago de impuestos de 17.5M acciones el 16-jun-2026 (SEC Form 4, 17-jun-2026) — retención, no venta discrecional.\n- HECHO: Tono de noticias 30-60 días: mixto — positivo en operación (mejor Q2 de la historia, récord de energía), negativo en reacción de precio (peor día en un año el 2-jul) y en seguridad (accidente fatal del Semi). Motley Fool (6-8-jul-2026): 'noticias fantásticas, pero no corras a comprar'.\n\nLECTURA: Sentimiento genuinamente dividido: los datos operativos son buenos pero el mercado ya los tenía en precio y el consenso sell-side está neutral con upside limitado al target. Las ventas de insiders son modestas en escala relativa pero la ausencia total de compras y el rating 'Hold' mayoritario confirman falta de convicción institucional a estos múltiplos.", "conclusion": "La tesis alcista funciona si el 22-jul Tesla muestra que el margen automotriz ~21% es estructural (no one-time) y si en H2 2026 la red robotaxi escala a las 7+ ciudades prometidas con métricas de viajes comparables a Waymo — eso validaría el múltiplo de ~200x forward y reabriría el camino a los targets altos ($500-600). La tesis se invalida si: (a) el margen Q2 recae hacia 16-17% (confirmaría que Q1 fue contable, no operativo), (b) el despliegue robotaxi se retrasa o sufre un evento de seguridad tipo Semi-Nevada que congele la expansión regulatoria, o (c) el precio pierde $380 y luego la zona $340-350, señalando que el mercado recorta la prima de autonomía. Con upside de solo +5-12% al target promedio y soportes rotos, la asimetría de corto plazo es desfavorable; la posición racional es esperar el earnings o exigir precios más cerca de $340 para construir posición."}, "scores": {"tecnica": {"score": 40, "just": "Precio ($380.04, 18-jul-2026) bajo la SMA50 y la SMA200 según todas las fuentes consultadas, tras el peor día en un año (-7%, 2-jul) y con la zona de soporte $400-406 perdida. RSI ~55 neutral evita lectura de sobreventa; marco mayor lateral dentro de $298-499 — bajista de corto plazo, no colapso."}, "fundamental": {"score": 55, "just": "Negocio reacelerando con hechos duros: entregas +25% a/a en Q2, margen automotriz 21.1% en Q1 (vs 16.2%), energía en récord y servicios +42%. Pero la valuación (346x TTM, ~200x forward, 'significantly overvalued' según GuruFocus) consume todo el mérito: negocio sólido con valuación muy exigente, y parte de la mejora de márgenes fue one-time."}, "sentimiento": {"score": 45, "just": "Consenso 'Hold' (10/16/3 en TipRanks, jul-2026) con Morgan Stanley en equal-weight (14-jul); venta neta de insiders (-$26.8M en 90 días, cero compras) y tono de prensa dividido: operación récord pero sell-off del 7% y accidente fatal del Semi. Dividido con sesgo levemente negativo en el margen."}, "riesgo": {"score": 32, "just": "Liquidez máxima (megacap $1.47T) pero volatilidad muy alta (-7% en un día con buenas noticias), drawdown de -24% desde máximos ya en curso, evento binario inminente (earnings 22-jul) y tesis dependiente de un múltiplo de ~200x forward y de resultados regulatorios de robotaxi. Riesgo mal acotado a este precio."}, "conviccion": {"score": 62, "just": "Catalizadores concretos y fechados: earnings 22-jul-2026, expansión robotaxi a 7 ciudades en 2026, Cybercab/Megapack 3 en producción este año. La tesis es falsable (margen Q2, métricas de viajes vs Waymo, soporte $380), pero la asimetría es desfavorable: upside de solo +5-12% al target consenso desde $380."}}, "sources": ["Yahoo Finance / StockAnalysis — cotización TSLA (18-jul-2026)", "CNBC / Electrek / Teslarati — resultados Q1 2026 (22-abr-2026)", "SEC 8-K Tesla — exhibit 99.1 Q1 2026 (abr-2026)", "Tesla IR — Q2 2026 Production & Deliveries (2-jul-2026)", "Forbes — caída 8% post-entregas (2-jul-2026)", "TradingKey / TIKR — análisis caída post-deliveries (jul-2026)", "TipRanks / StockAnalysis / S&P Global — ratings y price targets (jul-2026)", "GuruFocus — forward P/E 192.65x (15-jul-2026)", "MacroTrends / Yahoo Finance — P/E TTM ~346x (14-16-jul-2026)", "ChartMill / Investing.com / Investtech — técnico SMA/RSI/soportes (18-jul-2026)", "InsiderScreener / MarketBeat / SEC Form 4 — insiders (jun-jul-2026)", "CNBC — Musk robotaxi 'widespread' EEUU fin 2026 (22-ene-2026)", "Tesla Oracle — mejor Q2 de la historia (15-jul-2026)", "Zacks vía Yahoo Finance — preview Q2 2026 (jul-2026)", "Motley Fool — cobertura entregas y preview (6-8-jul-2026)"], "change": {"day": 2.53, "week": -0.5}, "events": [{"date": "2026-07-22", "label": "Resultados Q2 2026 (after close)", "kind": "earnings"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "SP:SPX", "label": "S&P 500", "relative_performance_30d": -5.11, "relative_performance_ytd": -26.4, "price_percentile_1y": 40.4, "partial": false}, "technical": {"price": 378.93, "change_1d_pct": 2.53, "change_1w_pct": -0.5, "rsi": 43.3, "macd": -6.1405, "macd_signal": -3.3719, "sma20": 395.0, "sma50": 408.5594, "sma200": 416.2698, "ema12": 390.0622, "ema26": 396.2027, "pct_vs_sma20": -4.07, "pct_vs_sma50": -7.25, "pct_vs_sma200": -8.97, "volume_today": 32732233, "volume_avg20": 43461161.0, "volume_ratio": 0.75, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 40.4, "vs_benchmark_30d_pct": -5.11, "perf_1m_pct": -4.81, "perf_ytd_pct": -17.23}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "SP:SPX", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/TSLA.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "SPCX", "company": "Space Exploration Technologies Corp. (SpaceX)", "statsList": [["Precio", "$123.54 (21-jul-2026)"], ["Rango desde IPO", "$119.64 – $225.64 (52 semanas / desde IPO 12-jun-2026)"], ["Listado", "Nasdaq: SPCX — IPO 12-jun-2026 a $135 (la mayor de la historia); incluida en Nasdaq-100 el 7-jul-2026"], ["Market cap", "$1.63T (stockanalysis.com, 21-jul-2026)"], ["P/E", "N/A — pérdida neta ttm de -$9.36B (EPS -$2.94); P/S ttm ~84x sobre revenue ttm $19.30B"], ["Target consenso", "~$234.78–$244.50 promedio (27 Buy / 5 Hold / 1 Sell; rango $156–$800)"], ["Próx. earnings", "4-ago-2026 (confirmado, tras el cierre de mercado) — primer reporte trimestral público"], ["Técnico (auto)", "RSI 37.0 (TradingView, 21-jul-2026)"]], "sections": {"resumen": "HECHO: SPCX cotiza hoy 21-jul-2026 en $123.54 intradía (+3.08%, +$3.69), cortando una racha de 7 sesiones consecutivas de caídas tras el cierre de ayer en $119.85 (-3.34%), su nuevo mínimo histórico desde el debut en Nasdaq el 12-jun-2026 a $135 (stockanalysis.com; Motley Fool, 20/21-jul-2026). El rebote de hoy responde a que SpaceX confirmó formalmente la fecha de su primer reporte trimestral como empresa pública: 4-ago-2026 tras el cierre (CNBC, 21-jul-2026). La acción sigue -45% bajo su máximo intradía de $225.64 (16-jun-2026) y -8.5% bajo el precio de IPO. HECHO: el relanzamiento de Starship (vuelo de prueba 13, tras el aborto automático del 16-jul por fallo de encendido en 4 de 33 motores) fue reprogramado para el jueves 23-jul-2026, con el objetivo de desplegar por primera vez satélites Starlink V3 de forma comercial (Motley Fool/Yahoo Finance, 20-jul-2026) — sigue pendiente al momento de este informe. HECHO: el short interest escaló a ~32% del float público (~206M acciones, ~$25B nocionales, S3 Partners), lo que llevó a Elon Musk a advertir públicamente que la \"probabilidad de supervivencia\" de los fondos bajistas es \"muy baja\" (CNBC/Benzinga, 21-jul-2026). LECTURA: el mercado está en un pulso de alta tensión entre catalizadores binarios que se acumulan en las próximas 2-3 semanas (Starship el 23-jul, earnings el 4-ago, y el inicio del desbloqueo escalonado de lockups el 6-ago) — la volatilidad no debería bajar en el corto plazo.", "fundamental": "**Resultados y estructura de negocio (datos ttm más recientes disponibles, previos al primer earnings del 4-ago):**\n\n- HECHO: Revenue ttm de $19.30B (+33.2% interanual) y pérdida neta ttm de -$9.36B (EPS -$2.94), cifras más recientes que las del S-1 de mayo, ya reflejando el trimestre con la consolidación de xAI/SpaceXAI y el nuevo capex de IA (stockanalysis.com, 21-jul-2026). LECTURA: la pérdida ttm se amplió notablemente respecto a la pérdida neta GAAP 2025 reportada en el S-1 (-$4.9B), lo que sugiere una aceleración del quemado de caja en 2026, probablemente ligada al negocio de IA — esto no es aún un dato confirmado por un earnings formal, se conocerá con precisión el 4-ago-2026.\n- HECHO: SpaceX anunció y cerró en tiempo récord (2 días de trading) la adquisición de Anysphere (creador de Cursor, herramienta de programación con IA) por $60B en acciones Clase A — un ~3.4% de dilución sobre la valuación de IPO — anunciada el 16-jun-2026, con cierre esperado en el Q3 2026 (TechCrunch/CNBC/Bloomberg, 16-jun-2026; Motley Fool, 29-jun y 8-jul-2026). Anysphere factura ~$4B anualizados.\n- HECHO: el 6-jul-2026 Grok, X y Colossus se integraron formalmente bajo la marca \"SpaceXAI\" como subsidiaria de SpaceX (igual que Starlink); Grok 4.5 se lanzó el 8-jul-2026 sobre la arquitectura V9 (1.5 billones de parámetros), incorporando datos de Cursor (digitalapplied/basenor/PYMNTS, jul-2026). X + Grok reportan ~550M de usuarios activos mensuales combinados (X) y ~117M (Grok) a 31-mar-2026.\n- HECHO: Starlink sigue siendo, según todas las fuentes disponibles, el único segmento consistentemente rentable del conglomerado (dato del S-1, aún no actualizado por un reporte trimestral público desde el debut).\n- HECHO: SpaceX confirmó planes para una emisión de notas senior no garantizadas (deuda corporativa nueva) después de ya haber recaudado ~$75B en la IPO, señal de que el apetito de capex (IA + Starship) sigue creciendo (CNBC, referenciado en cobertura de short interest, jul-2026).\n\nLECTURA: la tesis fundamental se está volviendo más compleja, no más simple: a los tres motores originales (lanzamiento, Starlink, IA/xAI) se suma ahora una cuarta pieza (Cursor/Anysphere) y una necesidad de financiamiento adicional vía deuda. Cada pieza nueva añade opcionalidad de crecimiento pero también dilución, complejidad de integración y mayor dependencia del capital de terceros — el mercado aún no tiene un primer reporte trimestral público (llega el 4-ago) para validar cómo se están comportando los márgenes consolidados tras estas adquisiciones.", "valuacion": "- HECHO: Market cap $1.63T (stockanalysis.com, 21-jul-2026) sobre revenue ttm $19.30B → P/S ttm ~84x. P/E: N/A (pérdida neta ttm -$9.36B); forward P/E de 197.45x según estimaciones de consenso (stockanalysis.com, 21-jul-2026) — implica que el mercado sí descuenta una vuelta a la rentabilidad, aunque a un múltiplo forward todavía extremo.\n- HECHO: targets de analistas con dispersión amplia pero algo más acotada que hace una semana: consenso Buy con 27 Buy / 5 Hold / 1 Sell, target promedio $234.78-$244.50 (stockanalysis.com/MarketBeat, jul-2026); Macquarie reiteró Outperform con target $250 (\"comprar cualquier caída\", Benzinga/Gurufocus, jul-2026), mientras Piper Sandler fijó un target más conservador de $156 el 16-jul-2026 (~28% upside desde niveles de esa fecha) — la banda baja de targets se está acercando más al precio spot que en el informe anterior (antes el extremo bajo era CFRA $115; ahora hay un target intermedio de $156 de un banco de primera línea).\n- HECHO: el upside al target promedio desde $123.54 es de ~+90-98%, prácticamente sin cambios respecto al informe previo.\n- LECTURA: la valuación sigue sin comparables (P/S ~84x, forward P/E ~197x) y el mercado está, en esencia, esperando el primer reporte formal (4-ago) para recalibrar. La ligera compresión en el extremo bajo de targets (Piper Sandler $156 vs. CFRA $115 antes) sugiere que parte del sell-side empieza a incorporar un escenario menos catastrófico que hace dos semanas, pero el consenso de precio objetivo no se ha movido de forma material.", "tecnico": "- HECHO: Precio $123.54 intradía (21-jul-2026, +3.08%), tras cerrar el 20-jul en $119.85 (-3.34%, nuevo mínimo de 52 semanas) — la sesión de hoy corta una racha de 7 días consecutivos a la baja (Motley Fool/stockanalysis.com, 20-21-jul-2026). Cambio semanal (vs. cierre 13-jul $139.14): -11.2%.\n- HECHO: lecturas de RSI(14) reportadas por distintas fuentes técnicas en días recientes son dispares — 48.52 y 40.13 según ChartMill/TipRanks a mediados de julio, frente al 35.9 calculado en el informe previo — reflejando la falta de un historial largo y metodologías distintas de cálculo con solo ~5-6 semanas de cotización; en cualquier caso, ninguna lectura reciente muestra sobreventa extrema (<30) ni sobrecompra. Niveles citados por fuentes técnicas: soporte en banda $119.6-$122 (mínimo de 52 semanas / banda inferior de Bollinger ~$122.46) y resistencia en la zona $135-$140 (precio de IPO y EMA50/EMA200, que hoy actúan como techo, no piso) (cryptonomist.ch, historicaloptiondata.com, ChartMill, ~15-16-jul-2026).\n- HECHO: el 7-jul-2026 SPCX fue incorporada al Nasdaq-100 mediante una regla de \"fast-track\" que eliminó los requisitos previos (mínimo 3 meses cotizando y 10% de flotante público), generando entre $22-27B de compra pasiva forzada por fondos indexados (QQQ/QQQM; JPMorgan estimó $4.3B solo desde QQQ) sobre un float muy delgado (~281M de 7.57B acciones totales cotizan libremente) — un episodio calificado por Seeking Alpha como advertencia clásica de \"sell-the-news\" (24/7 Wall St./TechTimes/SpotGamma, 6-9-jul-2026). Los fondos indexados compraron en la zona de ~$160, hoy con pérdidas de +$1.000M en conjunto (24/7 Wall St., 21-jul-2026).\n\nLECTURA: la estructura técnica se mantiene bajista de fondo (precio bajo el nivel de IPO y bajo todas las medias relevantes, mínimos de 52 semanas hechos ayer), pero el rebote de hoy (+3%) tras el anuncio de fecha de earnings sugiere que el mercado está empezando a reaccionar a catalizadores específicos en lugar de solo vender de forma indiscriminada. La zona $119-$122 es el soporte técnico más relevante (mínimo histórico reciente); una ruptura clara de esa zona antes del 23-jul (Starship) o el 4-ago (earnings) abriría camino hacia niveles de tres dígitos bajos sin referencias históricas adicionales.", "catalizadores": "**Catalizadores:**\n\n- **23-jul-2026 (jueves, confirmado) — Relanzamiento de Starship (vuelo de prueba 13):** reprogramado tras el aborto automático del 16-jul (falla de encendido en 4 de 33 motores); SpaceX reemplazó motores Raptor e hizo ajustes de software tras un giro direccional deficiente en el intento previo. Objetivo: lanzamiento, ascenso, separación de etapas, quemado de retorno, aterrizaje, y despliegue comercial por primera vez de satélites Starlink V3 (Motley Fool/Yahoo Finance, 20-jul-2026). Es el catalizador binario más inmediato.\n- **4-ago-2026 (confirmado) — Primer reporte trimestral público (Q2 2026):** tras el cierre de mercado, con webcast a las 4:30pm ET (IR SpaceX/Investing.com/Yahoo Finance, 21-jul-2026). Primera oportunidad de validar márgenes de Starlink, ritmo de quemado de caja consolidado y guidance formal.\n- **6-ago-2026 (confirmado) — Primer tramo del desbloqueo escalonado de lockup:** libera hasta 911.5M de acciones (~$116B en valor), dos días después del earnings. A diferencia de un lockup único a 180 días, SpaceX implementó tramos de ~7% del total en los días 70, 90, 105, 120 y 135 tras la IPO; el lockup general a 180 días vence el 8-dic-2026, y las 6.4B de acciones de Musk permanecen bloqueadas hasta 12-jun-2027 (Bloomberg/moomoo/stockalarm.io, 21-jul-2026). Es el mayor desbloqueo de acciones de la historia de los mercados de capital y la sombra dominante sobre H2 2026.\n- **Q3 2026 — Cierre de la adquisición de Anysphere/Cursor ($60B en acciones):** integrará ~$4B de revenue anualizado de IA de programación al conglomerado.\n\n**Riesgos (por materialidad):**\n\n- **Lockup escalonado + short interest:** el desbloqueo del 6-ago es el mayor de la historia bursátil ($116B) y coincide con el primer earnings; short interest ya en ~32% del float (~$25B nocionales, S3 Partners) — la combinación de oferta de insiders y cobertura de cortos puede generar movimientos extremos en cualquier dirección.\n- **Valuación extrema sin validar:** P/S ttm ~84x y forward P/E ~197x con pérdida neta ttm ampliada a -$9.36B (vs -$4.9B en el S-1); el mercado no ha visto aún un reporte trimestral formal que confirme o desmienta esta trayectoria.\n- **Riesgo binario Starship:** el vuelo del 23-jul es el segundo intento tras un aborto; una nueva falla (o un accidente catastrófico) golpearía tanto la narrativa de Starlink V3 como la valuación de la división espacial.\n- **Dilución por adquisiciones en cadena:** Cursor ($60B en acciones, ~3.4% dilución) se suma a xAI; cada adquisición estructurada en acciones diluye a los accionistas públicos y complejiza la tesis de inversión.\n- **Apalancamiento creciente:** la señal de una próxima emisión de notas senior no garantizadas, tras ya haber recaudado $75B en la IPO, indica que el capex (IA + Starship) supera el flujo de caja disponible.\n- **Concentración de gobernanza:** Musk mantiene el control de voto mayoritario y sus acciones permanecen bloqueadas hasta jun-2027; la tesis de inversión sigue dependiendo de una sola persona (riesgo no verificado con cifra actualizada esta semana, pero sin cambios conocidos respecto al S-1).", "sentimiento": "- HECHO: consenso sell-side sigue mayoritariamente alcista: 27 de 33 analistas en Buy, 5 Hold, 1 Sell; target promedio $234.78-$244.50, con Macquarie reiterando Outperform/$250 (\"comprar cualquier caída\") el 21-jul-2026, aunque Piper Sandler introdujo un target más cauto de $156 el 16-jul-2026 (stockanalysis.com/Benzinga/Gurufocus, jul-2026).\n- HECHO: Elon Musk respondió públicamente el 21-jul-2026 a los vendedores en corto, afirmando que su \"probabilidad de supervivencia\" es \"muy baja\" — la acción subió ~3-7% tras el comentario según distintas fuentes (CNBC/Benzinga/CoinCentral/Sunday Guardian, 21-jul-2026). Short interest en ~32% del float (~206M acciones, ~$25B nocionales, S3 Partners) con ganancias de los bajistas de ~$4-8.7B según el corte temporal de la fuente.\n- HECHO: prensa financiera con tono mixto pero orientado a catalizadores concretos: titulares van desde \"SpaceX vuelve a desafiar la gravedad\" (rebote tras fecha de earnings) hasta reportes sobre pérdidas de tenedores de 401(k) que compraron pasivamente vía Nasdaq-100 a ~$160 (AOL/24-7 Wall St., 21-jul-2026) — la narrativa de \"daño colateral\" a inversionistas pasivos es nueva esta semana.\n- LECTURA: la divergencia entre sell-side alcista y posicionamiento bajista masivo persiste y se intensificó (short interest subió de ~29% a ~32% del float en días), pero el tono de Musk y el anuncio de fecha de earnings sugieren que la compañía está tomando un rol más activo en gestionar el sentimiento. El evento de inclusión forzada en el Nasdaq-100 (compra pasiva a ~$160, hoy con pérdidas) añade una nueva fuente de fragilidad: hay tenedores no discrecionales (fondos indexados/401k) que no van a vender por decisión propia, pero que representan un colchón de descontento mediático, no de riesgo técnico real de venta.", "conclusion": "**Qué haría funcionar la tesis:** (1) Starship vuela exitosamente el 23-jul-2026 y logra el primer despliegue comercial de Starlink V3, revirtiendo la narrativa técnica negativa; (2) el earnings del 4-ago confirma que Starlink mantiene márgenes ≥60% y que el consolidado, pese a las pérdidas ampliadas (-$9.36B ttm), tiene una trayectoria de mejora explicada por capex de crecimiento y no por deterioro estructural; (3) el desbloqueo escalonado del 6-ago (911.5M de acciones, ~$116B) se absorbe sin colapso, ayudado por el diseño en tramos graduales (no un solo evento de 180 días). En ese escenario, el 32% de short interest es combustible para un short squeeze hacia la zona de targets promedio (~$235-245), y las advertencias públicas de Musk a los bajistas ganarían credibilidad retrospectiva.\n\n**Qué la invalidaría:** (1) un segundo fallo o aborto de Starship el 23-jul, que reforzaría la narrativa de ejecución fallida justo antes del earnings; (2) un primer reporte trimestral que muestre deterioro de márgenes de Starlink o quemado de caja peor al esperado (la pérdida ttm ya se amplió a -$9.36B desde -$4.9B en el S-1, señal de alerta pendiente de explicar); (3) una ola de ventas de insiders en el tramo del 6-ago que supere la capacidad de absorción del mercado, especialmente si coincide con un earnings decepcionante. LECTURA final: SPCX a ~$123.5 enfrenta en las próximas 3 semanas la secuencia de catalizadores binarios más concentrada desde su IPO (Starship 23-jul, earnings 4-ago, primer tramo de lockup 6-ago) sobre una base de valuación aún extrema (P/S ~84x) y un posicionamiento de mercado en abierta disputa (32% corto vs. consenso Buy). El rebote de hoy (+3%) no cambia el diagnóstico de fondo: sigue siendo una posición especulativa y binaria, apropiada solo para perfiles agresivos y en tamaño acotado, no como posición core, hasta ver a través de esta ventana de eventos."}, "scores": {"tecnica": {"score": 28, "just": "Mínimo histórico de cierre ayer ($119.85, -3.34%), rebote de +3.08% hoy tras 7 sesiones consecutivas a la baja; precio sigue bajo el nivel de IPO ($135) y bajo referencias técnicas (EMA50/EMA200 en zona $135-148). Semana -11.2%. RSI en lecturas mixtas (35-48 según fuente) sin sobreventa extrema confirmada. Leve mejora vs. informe previo (22) por el corte de la racha bajista, pero estructura de fondo sigue débil."}, "fundamental": {"score": 42, "just": "Crecimiento de revenue ttm sólido (+33.2% a $19.30B) pero pérdida neta ttm se amplió a -$9.36B (vs -$4.9B GAAP 2025 del S-1), señal de aceleración del quemado de caja aún sin explicar por un earnings formal. Suma de adquisiciones en cadena (xAI, ahora Cursor por $60B en acciones) añade opcionalidad pero también dilución y complejidad. Score baja levemente vs. informe previo por la pérdida ampliada, pendiente de aclarar el 4-ago."}, "sentimiento": {"score": 46, "just": "Divergencia extrema y en aumento: sell-side mayoritariamente Buy (27/33, target ~2x el precio, Macquarie reitera $250) contra short interest que subió a ~32% del float (~$25B). Musk salió públicamente a confrontar a los bajistas (21-jul), y la acción reaccionó con un rebote; pero la narrativa de daño a tenedores pasivos (401k vía Nasdaq-100 a ~$160) añade fricción mediática nueva."}, "riesgo": {"score": 16, "just": "Riesgo extremo y en escalada: valuación ~84x ventas ttm con pérdida neta ampliándose, el mayor desbloqueo de lockup de la historia bursátil concentrado en 6-ago justo tras el primer earnings, short interest de 32% del float, un segundo intento de Starship pendiente tras un aborto, señales de nueva emisión de deuda tras ya captar $75B en la IPO, y dilución continua por adquisiciones en acciones. Perfil de riesgo entre los más altos de cualquier megacap listada."}, "conviccion": {"score": 45, "just": "Tres catalizadores con fecha confirmada y muy próximos (Starship 23-jul, earnings 4-ago, lockup 6-ago) generan una tesis claramente falsable en semanas, no meses, con asimetría de ~2x al target consenso si se resuelven a favor. Pero la concentración de eventos binarios en un lapso de 2 semanas, sumada a una pérdida ttm que se amplió sin explicación pública aún, mantiene la conducción por debajo de convicción alta."}}, "sources": ["stockanalysis.com — precio $123.54 intradía, market cap $1.63T, P/E N/A, P/S, historial de precios diario (21-jul-2026)", "CNBC — SpaceX confirma fecha de earnings (4-ago) y desbloqueo de lockup asociado (21-jul-2026)", "CNBC — Musk advierte a vendedores en corto, short interest 32% del float (21-jul-2026)", "Bloomberg — desbloqueo de $116B en acciones tras fin de restricciones de IPO (21-jul-2026)", "The Motley Fool — SpaceX reprograma lanzamiento de Starship para el 23-jul; por qué cayó de nuevo el 20-jul (20-jul-2026)", "Yahoo Finance / TechCrunch / Bloomberg / CNBC — adquisición de Anysphere (Cursor) por $60B en acciones (16-jun, 29-jun, 8-jul-2026)", "digitalapplied.com / basenor.com / PYMNTS — integración de Grok/X/Colossus como SpaceXAI, lanzamiento de Grok 4.5 (6-8-jul-2026)", "24/7 Wall St. / TechTimes / SpotGamma / Seeking Alpha — inclusión forzada en Nasdaq-100 (7-jul-2026) y compra pasiva de $22-27B", "Benzinga / Gurufocus — Macquarie reitera Outperform $250; Piper Sandler target $156 (16 y 21-jul-2026)", "Yahoo Finance / 24/7 Wall St. — short interest ~29-32% del float, ganancias de bajistas $4-8.7B (2-21-jul-2026)", "ChartMill / TipRanks / cryptonomist.ch / historicaloptiondata.com — lecturas técnicas RSI y niveles de soporte/resistencia (14-16-jul-2026)", "moomoo / stockalarm.io / Investing.com — calendario detallado de tramos de lockup escalonado (70/90/105/120/135 días) y fecha final 8-dic-2026 / Musk 12-jun-2027", "SEC — Form S-1 Space Exploration Technologies Corp (referencia histórica, may-2026, para comparación de pérdida neta GAAP 2025)"], "change": {"day": 3.08, "week": -0.36}, "events": [{"date": "2026-07-23", "label": "Relanzamiento de Starship (vuelo de prueba 13, tras aborto del 16-jul)", "kind": "corporate"}, {"date": "2026-08-04", "label": "Primer reporte trimestral público (Q2 2026), confirmado", "kind": "earnings"}, {"date": "2026-08-06", "label": "Primer tramo del desbloqueo escalonado de lockup (~911.5M acciones, ~$116B)", "kind": "corporate"}], "risk": {"volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "n_days": 1, "window": 30}, "benchmark": {"ticker": "SP:SPX", "label": "S&P 500", "relative_performance_30d": -34.71, "relative_performance_ytd": -26.82, "price_percentile_1y": 3.6, "partial": false}, "technical": {"price": 123.54, "change_1d_pct": 3.08, "change_1w_pct": -0.36, "rsi": 37.0, "macd": -17.7039, "macd_signal": null, "sma20": 146.805, "sma50": null, "sma200": null, "ema12": 137.018, "ema26": 154.7219, "pct_vs_sma20": -15.85, "pct_vs_sma50": null, "pct_vs_sma200": null, "volume_today": 79716386, "volume_avg20": null, "volume_ratio": null, "volatility_30d": null, "sharpe": null, "sortino": null, "max_drawdown_1y": null, "price_percentile_1y": 3.6, "vs_benchmark_30d_pct": -34.71, "perf_1m_pct": -34.42, "perf_ytd_pct": -17.64}, "sourcesMeta": {"price": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "rsi_macd": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "smas_volume": {"origin": "TradingView scanner", "fetched_at": "2026-07-21T22:42:16-04:00"}, "benchmark": {"origin": "TradingView scanner", "symbol": "SP:SPX", "fetched_at": "2026-07-21T22:42:16-04:00"}, "risk_metrics": {"origin": "data/history/SPCX.json", "n_days": 1}}, "metricChanges": []}, {"ticker": "BTC", "company": "Bitcoin", "statsList": [["Precio", "$66,302 (21-jul-2026)"], ["Rango 52 sem.", "$57,833 – $126,198"], ["Market cap", "$1.32T aprox. (dominancia 56.3% s/ $2.28-2.31T cripto total, jul-2026)"], ["Dominancia BTC", "56.3% (TradingView Hub/CoinGabbar, 20-21-jul-2026)"], ["Flujos ETF spot", "+$75.7M semana 13-17-jul (2da semana positiva consecutiva); +$132.3M el 17-jul (4to día consecutivo positivo); reporte de +$227M el 20-jul (CryptoTimes)"], ["Próximo evento", "FOMC 28-29-jul-2026 (decisión de tasas, comunicado 2pm ET del 29-jul)"], ["Técnico (auto)", "RSI 60.6 · MACD +612.95 / señal +206.01 (TradingView, 21-jul-2026)"]], "sections": {"resumen": "BTC cotiza en **~$66,600**, un máximo de cinco semanas, subiendo con fuerza desde el piso de ~$57,833-58,000 de fines de junio y recuperando la zona de $65-66K que había perdido en junio. El precio sigue **-47% desde el ATH de $126,198** (oct-2025), pero la narrativa de corto plazo cambió: los ETFs spot llevan dos semanas consecutivas de flujos netos positivos tras las 8 semanas de salidas de junio, las ballenas grandes (1,000-10,000 BTC) acumularon ~66,700 BTC en 60 días, y el apetito por riesgo volvió con el Nasdaq-100 en alza. LECTURA: rebote técnico dentro de un ciclo post-halving aún no confirmado como piso — el consenso de analistas sigue ubicando el fondo de ciclo hacia octubre-2026, salvo que el FOMC del 29-jul o el CLARITY Act adelanten el catalizador.", "fundamental": "**Salud de red:**\n\n- HECHO: hashrate en ~921-923 EH/s al 20-jul-2026 (YCharts/minerstat), nuevo máximo histórico pese al precio deprimido; última dificultad ajustada -5.00% el 11-jul a 127.17T, con +2.74% estimado para el 25-jul (Hashrate Index).\n- HECHO: hashprice en ~$30.9/PH/s/día (semana 6-13 jul), en o por debajo del punto de equilibrio para buena parte de la industria minera (Hashrate Index, 13-jul-2026).\n- HECHO: reservas de BTC en exchanges en mínimo de 7 años, ~2.2M BTC (Blockonomi/CryptoNomist, jul-2026), migrando a autocustodia y ETFs.\n- HECHO: ballenas de 1,000-10,000 BTC acumularon ~66,700 BTC en los 60 días al 19-jul-2026, una de las rachas de compra más fuertes de 2026, mientras que holders medianos (100-1,000 BTC) distribuyeron ~77,800 BTC en la misma ventana (Cryptonomist/Blockonomi, 20-jul-2026).\n\n**Institucional / ETFs:**\n\n- HECHO: AUM de ETFs spot de EE.UU. con flujos netos +$75.7M en la semana 13-17-jul (segunda semana positiva consecutiva), aunque julio acumulado seguía en -$253.5M a mitad de mes (NewsBTC/Investing.com, 17-jul-2026); IBIT (BlackRock) lideró con +$136.5M el 17-jul, FBTC (Fidelity) con salida de -$4.2M el mismo día.\n- HECHO: Strategy (MSTR) mantiene 843,775 BTC (costo total $63.69B, promedio $75,476/BTC) al 19-jul-2026, **sin comprar BTC en la semana del 13-19-jul**; vendió $263.5M en acciones MSTR sin comprar cripto, llevando su reserva en USD a un récord de $3.225B para cubrir dividendos preferentes (>$1.5B anuales) — cambio de estrategia hacia acumulación de caja (Investing.com/Bitcoin Magazine/The Block, 19-21-jul-2026).\n- HECHO: Metaplanet compró 2,823 BTC en el 2T-2026 (~$225M, precio promedio $78,872), llevando su tesorería a 43,000 BTC, tercera mayor corporativa tras Strategy y Twenty One Capital (CryptoNews/TFTC, 1-2-jul-2026); Capital Group (gestora de $3.3T) reveló una posición relevante en Metaplanet (CryptoTimes, 21-jul-2026).\n\n**Ciclo post-halving (abr-2024):**\n\n- HECHO: consenso de analistas (CryptoQuant, Glassnode, Benjamin Cowen, PlanB) converge en **4T-2026 (aprox. octubre)** como ventana de mayor probabilidad para el piso de ciclo, aplicando el intervalo pico-valle desde el ATH del 7-oct-2025 (Cointelegraph/Mudrex, jul-2026).\n- LECTURA: recortes de la Fed o avance del CLARITY Act podrían adelantar ese piso; el repunte reciente (+~13% desde el mínimo de fines de junio) es alentador pero no altera el consenso de piso tardío, dado que aún no hay confirmación de tendencia en marcos largos (precio bajo el 200-week MA).", "valuacion": "- HECHO: ATH $126,198 (6-oct-2025, CoinMarketCap) → precio actual (~$66,600) implica **-47% desde máximos**, recuperando desde el mínimo de junio de ~-54%.\n- HECHO: MVRV ratio 1.19 y MVRV Z-Score 0.37 (AhaSignals/BGeometrics, dato del 13-jul-2026, el más reciente públicamente verificable), con realized price ~$52,493: el mercado cotiza ~19% sobre su costo base agregado on-chain, zona que históricamente no es ni de sobrevaloración ni de pánico extremo.\n- HECHO: BTC cerró bajo su media móvil de 200 semanas por primera vez desde 2023 en junio-2026 (CoinJuice, jul-2026), señal técnica de largo plazo bajista aún no revertida pese al rebote reciente.\n- HECHO — targets institucionales 2026 (sin cambios reportados esta semana): Standard Chartered $100K fin de año, Citigroup $143K, JPMorgan $170K, Bernstein $150K (fuentes previamente verificadas, jul-2026); JPMorgan estima costo de producción ~$77,000, aún por encima del precio actual.\n- LECTURA: con MVRV Z 0.37 y precio recuperando $66K, la valuación relativa mejoró levemente respecto a la semana previa pero sigue en zona de acumulación histórica, no de euforia.", "tecnico": "- HECHO: BTC alcanzó un máximo de cinco semanas, cotizando sobre $66,500 el 21-jul-2026 tras abrir en $65,214 (+0.8% vs apertura del lunes); rango intradía 20-21 jul entre $64,290 y $66,841 (Fortune/Yahoo Finance/Sunday Guardian, 20-21-jul-2026).\n- HECHO: niveles pivote (barchart/coinjuice, 21-jul): soporte $64,080 / $62,991 / $62,155; resistencia $66,005 / $66,841 / $67,930. Fuente adicional ubica soporte en $61,870-60,000-57,815 y resistencia en $65,560-67,950-70,340.\n- HECHO: RSI diario en 56.47 (barchart) / 52.52 (cryptonews.net), zona neutral-alcista, revirtiendo desde 33 (sobreventa) de mediados de julio; MACD histograma expandiéndose en positivo (+267.79).\n- HECHO: 17 indicadores técnicos en señal alcista vs 15 en señal bajista (CoinCodex, 21-jul-2026) — lectura neutral con sesgo levemente positivo de corto plazo.\n- HECHO: BTC/USD se mantuvo sobre la resistencia clave de $65,000 tras varios días de flujos ETF positivos (DailyForex, 21-jul-2026).\n\nLECTURA: rebote de corto plazo confirmado (ruptura de $65-66K con volumen y RSI recuperando terreno neutral), pero la tendencia primaria de marcos largos sigue bajista: BTC cerró bajo su 200-week MA en junio y el precio está a -47% del ATH. Un cierre semanal sostenido sobre $67-68K abriría camino técnico a $70K; pérdida de $62-64K devolvería el foco a $58K.", "catalizadores": "**Catalizadores:**\n\n- **28-29-jul-2026 — reunión FOMC** (comunicado 29-jul, 2pm ET): fed funds en 3.50%-3.75%, consenso de mercado apunta a mantener sin cambios; futuros muestran expectativas divergentes de posible suba a ~3.8-4% hacia fin de año si la inflación persiste (CoinGape/Kraken Blog, jul-2026) — un mantenimiento sin sesgo hawkish sería friendly para cripto, un hike o tono hawkish presionaría a la baja.\n- **Hasta 7-ago-2026 (último día hábil antes del receso) — CLARITY Act:** estancado en el Senado por tres disputas (DeFi, stablecoins/yield, AML/jurisdicción); regresó de receso el 13-jul con ~3 semanas útiles restantes; sin moción de cloture presentada aún (Yahoo Finance/Bitcoin Foundation/crypto.news, 15-20-jul-2026). Algunas fuentes marcan el 10-ago como deadline simbólico final.\n- **Continuo — flujos de ETFs spot:** segunda semana consecutiva positiva (+$75.7M al 17-jul) y reporte de +$227M el 20-jul; se necesita sostenerse varias semanas más para revertir el saldo YTD aún negativo.\n- **Ballenas grandes acumulando:** ~66,700 BTC en 60 días (1,000-10,000 BTC cohort) es una señal de demanda estructural a vigilar si continúa.\n\n**Riesgos (por materialidad):**\n\n- **Fracaso o mayor estancamiento del CLARITY Act** en el Senado por las tres disputas sin resolver — el propio calendario legislativo deja solo ~3 semanas útiles.\n- **FOMC hawkish o sin guía de recortes**: futuros ya descuentan riesgo de suba de tasas hacia fin de año, escenario adverso para activos de riesgo.\n- **Strategy dejó de comprar BTC** y prioriza reservas de caja para dividendos preferentes (>$1.5B anuales) — señal de estrés en tesorerías apalancadas y posible techo a la demanda corporativa histórica más grande.\n- **200-week MA perdida en junio**: tendencia de largo plazo bajista no revertida; el rebote actual podría ser de corto plazo dentro de un ciclo cuyo piso el consenso ubica recién en 4T-2026.\n- **Distribución de holders medianos** (100-1,000 BTC): -77,800 BTC en 60 días compensando parcialmente la acumulación de ballenas grandes.", "sentimiento": "- HECHO: Fear & Greed Index en **29 ('Fear')** el 20-jul-2026 (cryptonews.net), tras haber tocado 24 días antes (Phemex) y 27-22 la semana previa; sentimiento sigue en miedo pese al rebote de precio, lo que sugiere que el rally aún no ha sido validado por el consentimiento general del mercado — posible señal contraria constructiva.\n- HECHO: RSI diario recuperó a zona neutral-alcista (52-56), MACD positivo y expandiéndose, contrastando con el F&G aún bajo.\n- HECHO: flujos ETF en segunda semana consecutiva positiva (+$75.7M al 17-jul; +$132.3M el 17-jul fue el 4to día consecutivo positivo); reporte de +$227M el 20-jul (CryptoTimes) sugiere aceleración, aunque julio acumulado seguía negativo (-$253.5M) a mitad de mes.\n- HECHO: mercado cripto total ganó ~1.7-2.4% en 24h al 21-jul, con Nasdaq-100 también al alza — correlación de apetito por riesgo (Yahoo Finance, 21-jul-2026).\n\nLECTURA: sentimiento (F&G en Fear, 29) rezagado respecto al precio y a los indicadores técnicos, que ya giraron a neutral-alcista. Esta divergencia —precio y momentum mejorando mientras el sentimiento agregado sigue cauto— es constructiva y típica de fases tempranas de recuperación, pero no hay euforia ni sobrecompra que adviertan de un techo de corto plazo.\n\n**Flujos de capital: ETFs, institucionales y ballenas**\n\n### Flujos diarios de ETFs spot de EE.UU. (US$ millones, netos) — semana 13-20 de julio\n\n| Fecha | Flujo neto | Detalle |\n|---|---|---|\n| Lun 13-jul | -424.7 | Peor día del mes (~-6,904 BTC); coincidió con distribución de ballenas medianas ese día |\n| Mar 14-jul | +181.0 | Inicio de racha positiva |\n| Mié 15-jul | +107.8 | IBIT +$80.8M |\n| Jue 16-jul | +79.2 | IBIT +$33.4M, FBTC +$30.7M, BITB +$15.0M |\n| Vie 17-jul | +132.3 | 4to día consecutivo positivo; IBIT +$136.5M, FBTC -$4.2M (Farside/KuCoin) |\n| Lun 20-jul | ~+227 | Reportado por CryptoTimes como refuerzo de la racha alcista, IBIT liderando |\n\n- HECHO: la semana 13-17-jul cerró en +$75.7M neto, segunda semana consecutiva positiva tras el giro de inicios de julio (+$197M semana al 10-jul), aunque el saldo de julio acumulado a mitad de mes seguía en -$253.5M (Investing.com/NewsBTC, 17-jul-2026).\n- HECHO: acumulado histórico de IBIT (BlackRock) sigue siendo el producto dominante del complejo; FBTC (Fidelity) mostró salidas puntuales el 17-jul pese al rebote general.\n- LECTURA: la recuperación de flujos se está acelerando (de +$75.7M semanales a un solo día de +$227M reportado el 20-jul), pero la base de comparación es baja tras el peor mes histórico en junio (-$4.5B); persiste el patrón de \"rebote frágil, no recuperación confirmada\" señalado por Investing.com.\n\n### Flujos institucionales\n\n- HECHO: Strategy (MSTR) **no compró BTC** en la semana del 13-19-jul, manteniendo 843,775 BTC (costo promedio $75,476); en su lugar vendió $263.5M en acciones MSTR para llevar su reserva de USD a un récord de $3.225B, destinado a cubrir dividendos de preferentes que superan $1.5B anuales — confirma el giro hacia gestión de caja iniciado con la venta de 3,588 BTC a fines de junio.\n- HECHO: Metaplanet cerró el 2T-2026 con 43,000 BTC (compra trimestral de 2,823 BTC por ~$225M a $78,872 promedio), y Capital Group ($3.3T AUM) reveló una posición relevante en la acción de Metaplanet, evidencia de que gestoras tradicionales grandes están tomando exposición indirecta a BTC vía tesoreros corporativos (CryptoTimes, 21-jul-2026).\n- LECTURA: el panorama institucional sigue bifurcado — Strategy pausó compras por primera vez en mucho tiempo para atender obligaciones de dividendos, mientras Metaplanet continúa comprando y atrae capital institucional nuevo (Capital Group). El mayor comprador histórico (Strategy) ya no es el viento de cola automático que fue en 2024-2025.\n\n### Actividad de ballenas y flujos on-chain\n\n- HECHO: ballenas de 1,000-10,000 BTC acumularon ~66,700 BTC en los 60 días al 19-jul-2026, una de las rachas de acumulación más fuertes del año, con el precio moviéndose poco durante la mayor parte de la ventana (banda $64,500-64,700 a mediados de julio) antes del repunte reciente (Cryptonomist/Blockonomi/MEXC, 20-jul-2026).\n- HECHO: holders medianos (100-1,000 BTC) — perfil típico de mineros, inversores tempranos y fondos que rebalancean — distribuyeron ~77,800 BTC en la misma ventana de 60 días, compensando buena parte de la compra de ballenas grandes.\n- HECHO: reservas de BTC en exchanges permanecen en mínimo de 7 años (~2.2M BTC), reforzando la narrativa de oferta líquida en contracción estructural.\n- LECTURA: la combinación de acumulación agresiva de ballenas grandes + reservas de exchange en mínimos históricos apunta a un posible squeeze de oferta si la demanda (ETFs, ballenas) se sostiene, pero la distribución simultánea del cohorte medio muestra que la oferta vendedora aún no está agotada — el balance entre ambos grupos explica por qué el precio se mantuvo lateral hasta el repunte de esta semana.", "conclusion": "**Qué haría funcionar la tesis:** continuidad de los flujos ETF positivos (ya en su segunda semana, acelerando hacia +$227M diarios reportados el 20-jul), un FOMC (29-jul) que mantenga tasas sin sesgo hawkish, avance del CLARITY Act antes del receso de agosto, y consolidación sobre $67-68K que confirme técnicamente el quiebre de la resistencia de $65-66K; en ese escenario los targets institucionales de $100K+ (Standard Chartered, Citi, JPMorgan) vuelven a estar en juego, apoyados por acumulación de ballenas grandes (+66,700 BTC en 60 días) y reservas de exchange en mínimos de 7 años.\n\n**Qué la invalidaría:** reversión de los flujos ETF a negativo, un FOMC con tono hawkish o suba de tasas, fracaso del CLARITY Act antes del receso de agosto, y pérdida de $62-64K que devuelva el foco a $58K — el consenso de analistas (CryptoQuant, Glassnode, Cowen, PlanB) sigue ubicando el piso de ciclo recién hacia octubre-2026, y BTC permanece bajo su 200-week MA por primera vez desde 2023. LECTURA: el repunte de la semana es genuino y respaldado por flujos y on-chain, pero el sentimiento (F&G 29, 'Fear') no lo ha validado aún y la tendencia primaria de largo plazo sigue técnicamente bajista; conviene tratar esto como una recuperación táctica dentro de un proceso de formación de piso más amplio, no como confirmación de nuevo ciclo alcista."}, "scores": {"tecnica": {"score": 48, "just": "Mejora clara de corto plazo: máximo de 5 semanas, ruptura de $65-66K, RSI neutral-alcista (52-56) recuperando desde sobreventa, MACD positivo. Pero la tendencia primaria de marcos largos sigue bajista (-47% desde ATH, bajo la 200-week MA desde junio, primera vez desde 2023). Sube desde 35 la semana pasada por la confirmación del rebote, sin llegar a territorio claramente alcista por falta de confirmación en marcos largos."}, "fundamental": {"score": 56, "just": "Red en máximos (hashrate ~921 EH/s), reservas de exchange en mínimo de 7 años, ballenas grandes acumulando (+66,700 BTC/60d). Pero Strategy pausó compras por primera vez en mucho tiempo para atender dividendos (aunque Metaplanet sigue comprando y atrajo a Capital Group), y los flujos ETF, aunque girando positivo, aún no revierten el saldo negativo de julio. Mixto con sesgo estructural positivo, similar a la semana previa."}, "sentimiento": {"score": 48, "just": "Fear & Greed en 29 (Fear, 20-jul) rezagado respecto a un precio y momentum técnico que ya mejoraron notablemente; divergencia constructiva (miedo residual + mejora de fundamentals de precio) típica de fases tempranas de recuperación, no de techo. Sube desde 40 por la aceleración de flujos ETF (+$227M reportado el 20-jul) y el repunte de 24h del mercado cripto (+1.7-2.4%)."}, "riesgo": {"score": 42, "just": "Riesgo sigue alto pero algo mitigado: drawdown de -47% (mejora desde -49%), BTC bajo su 200-week MA por primera vez desde 2023, consenso de piso de ciclo recién en 4T-2026, FOMC con posible sesgo hawkish hacia fin de año y CLARITY Act con ventana de solo ~3 semanas. Mitigantes: MVRV 1.19 cerca de costo base, ballenas acumulando, reservas de exchange en mínimos históricos."}, "conviccion": {"score": 52, "just": "Tesis parcialmente falsable con catalizadores fechados (FOMC 29-jul, CLARITY Act con deadline ~7-10 ago) y mejora de momentum de corto plazo confirmada por flujos y on-chain. Resta convicción que el consenso de analistas mantiene el piso de ciclo en 4T-2026 (no confirmado que ya haya pasado) y que el mayor comprador corporativo histórico (Strategy) dejó de comprar BTC esta semana."}}, "sources": ["Yahoo Finance / Fortune / Sunday Guardian — precio $66,600, máximo de 5 semanas (21-jul-2026)", "CryptoTimes — ruptura de $65,000, flujos +$227M el 20-jul, institucional (21-jul-2026)", "TradingView Hub / CoinGabbar — dominancia BTC 56.3%, market cap total $2.28-2.31T (20-21-jul-2026)", "YCharts / minerstat / Hashrate Index — hashrate ~921-923 EH/s, hashprice $30.9/PH/s/día (13-20-jul-2026)", "Cryptonomist / Blockonomi / MEXC — acumulación de ballenas +66,700 BTC/60d, distribución de holders medianos -77,800 BTC (20-jul-2026)", "Farside Investors / KuCoin / Investing.com / NewsBTC — flujos ETF diarios y semanales (13-17-jul-2026)", "Investing.com — Strategy sin compras de BTC semana 13-19-jul, reserva USD récord $3.225B (19-jul-2026)", "Bitcoin Magazine / The Block — venta de 3,588 BTC de Strategy y venta de acciones MSTR (jul-2026)", "CryptoNews.net / TFTC / Cryptonomist — Metaplanet 43,000 BTC, compra 2T-2026 (1-2-jul-2026)", "CryptoTimes — Capital Group toma posición en Metaplanet (21-jul-2026)", "AhaSignals / BGeometrics — MVRV 1.19, Z-Score 0.37, realized price $52,493
