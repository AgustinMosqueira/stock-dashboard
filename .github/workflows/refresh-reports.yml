name: Informes L-M-V (Claude)

on:
  schedule:
    - cron: "3 22 * * 1,3,5"   # L-M-V 18:03 Chile — minuto impar: los :00 en punto se retrasan/saltan en GitHub
    - cron: "3 23 * * 1,3,5"   # respaldo 19:03 Chile — el job "guard" lo cancela si el principal ya corrió hoy
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  TZ: America/Santiago

jobs:
  guard:
    # Deja pasar: corridas manuales siempre; programadas solo si hoy (Chile) aún
    # no existe el commit "Informes <fecha>" — el respaldo de las 19:03 rescata
    # un principal saltado o fallido (p. ej. por límite de uso de la suscripción).
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"; exit 0
          fi
          today=$(date +%F)
          if git log --pretty=%s -n 50 | grep -q "^Informes ${today}"; then
            echo "Ya hay informes del ${today} — este disparo sobra, no se hace nada."
            echo "run=no" >> "$GITHUB_OUTPUT"
          else
            echo "Aún no hay informes del ${today} — se ejecuta."
            echo "run=yes" >> "$GITHUB_OUTPUT"
          fi

  informes:
    needs: guard
    if: needs.guard.outputs.run == 'yes'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Refrescar informes de los 6 activos dinámicos
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat scripts/REFRESH_PROMPT.md)" \
            --permission-mode acceptEdits \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Agent,TodoWrite"

      - name: Snapshot de señales (base del backtest)
        run: python scripts/snapshot_signals.py

      - name: Números frescos + reconstrucción
        run: python scripts/update_numbers.py

      - name: Commit
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Informes $(date +%F) (SPCX, BTC, HDSY, CLSK, USD/CLP, USD/JPY)"
          git push

      - name: Preparar sitio
        run: mkdir -p _site && cp index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
