name: Informes L-M-V (Claude)

on:
  schedule:
    - cron: "0 22 * * 1,3,5"   # lunes, miércoles y viernes 18:00 Chile (invierno)
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  TZ: America/Santiago

jobs:
  informes:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Refrescar informes de los 6 activos dinámicos
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat scripts/REFRESH_PROMPT.md)" \
            --permission-mode acceptEdits \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Agent,TodoWrite"

      - name: Snapshot de señales (base del backtest)
        run: python scripts/snapshot_signals.py

      - name: Números frescos + reconstrucción
        run: python scripts/update_numbers.py

      - name: Commit
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Informes $(date -u +%F) (SPCX, BTC, HDSY, CLSK, USD/CLP, USD/JPY)"
          git push

      - name: Preparar sitio
        run: mkdir -p _site && cp index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
