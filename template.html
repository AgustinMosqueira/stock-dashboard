<title>Stock Research — Dashboard de Equity Research</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --surface-2: #f3f3f0;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --hairline: #e1e0d9;
    --border: rgba(11, 11, 11, 0.10);
    --accent: #2a78d6;
    --accent-soft: rgba(42, 120, 214, 0.12);
    --track: #e7e6e0;
    --good: #0ca30c;
    --warning: #fab219;
    --serious: #ec835a;
    --critical: #d03b3b;
    --good-tint: rgba(12, 163, 12, 0.13);
    --warning-tint: rgba(250, 178, 25, 0.16);
    --serious-tint: rgba(236, 131, 90, 0.16);
    --critical-tint: rgba(208, 59, 59, 0.13);
    --hecho-bg: rgba(42, 120, 214, 0.10);
    --hecho-ink: #1c5cab;
    --lectura-bg: rgba(74, 58, 167, 0.10);
    --lectura-ink: #4a3aa7;
    --up: #006300;
    --down: #d03b3b;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --page: #0d0d0d;
      --surface: #1a1a19;
      --surface-2: #222220;
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --muted: #898781;
      --hairline: #2c2c2a;
      --border: rgba(255, 255, 255, 0.10);
      --accent: #3987e5;
      --accent-soft: rgba(57, 135, 229, 0.18);
      --track: #2c2c2a;
      --good-tint: rgba(12, 163, 12, 0.18);
      --warning-tint: rgba(250, 178, 25, 0.15);
      --serious-tint: rgba(236, 131, 90, 0.15);
      --critical-tint: rgba(208, 59, 59, 0.18);
      --hecho-bg: rgba(57, 135, 229, 0.16);
      --hecho-ink: #86b6ef;
      --lectura-bg: rgba(144, 133, 233, 0.16);
      --lectura-ink: #9085e9;
      --up: #2ebd5f;
      --down: #e66767;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --page: #0d0d0d;
    --surface: #1a1a19;
    --surface-2: #222220;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --hairline: #2c2c2a;
    --border: rgba(255, 255, 255, 0.10);
    --accent: #3987e5;
    --accent-soft: rgba(57, 135, 229, 0.18);
    --track: #2c2c2a;
    --good-tint: rgba(12, 163, 12, 0.18);
    --warning-tint: rgba(250, 178, 25, 0.15);
    --serious-tint: rgba(236, 131, 90, 0.15);
    --critical-tint: rgba(208, 59, 59, 0.18);
    --hecho-bg: rgba(57, 135, 229, 0.16);
    --hecho-ink: #86b6ef;
    --lectura-bg: rgba(144, 133, 233, 0.16);
    --lectura-ink: #9085e9;
    --up: #2ebd5f;
    --down: #e66767;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --surface-2: #f3f3f0;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --hairline: #e1e0d9;
    --border: rgba(11, 11, 11, 0.10);
    --accent: #2a78d6;
    --accent-soft: rgba(42, 120, 214, 0.12);
    --track: #e7e6e0;
    --good-tint: rgba(12, 163, 12, 0.13);
    --warning-tint: rgba(250, 178, 25, 0.16);
    --serious-tint: rgba(236, 131, 90, 0.16);
    --critical-tint: rgba(208, 59, 59, 0.13);
    --hecho-bg: rgba(42, 120, 214, 0.10);
    --hecho-ink: #1c5cab;
    --lectura-bg: rgba(74, 58, 167, 0.10);
    --lectura-ink: #4a3aa7;
    --up: #006300;
    --down: #d03b3b;
  }

  html { background: var(--page); }
  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-text-size-adjust: 100%;
  }
  * { box-sizing: border-box; }
  button { font: inherit; color: inherit; }
  :is(a, button, input, summary):focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 3px;
  }

  .topbar {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--hairline);
  }
  .brand { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
  .brand .tick { color: var(--accent); font-family: var(--mono); font-weight: 600; }
  .topbar .meta { color: var(--muted); font-size: 12.5px; }
  .topbar .spacer { flex: 1; }
  .edu-chip {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-2);
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 3px 10px;
    white-space: nowrap;
  }

  .layout {
    display: grid;
    grid-template-columns: 288px minmax(0, 1fr);
    gap: 0;
    min-height: calc(100vh - 60px);
  }
  .rail {
    border-right: 1px solid var(--hairline);
    padding: 18px 14px 24px;
  }
  .rail-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px 10px;
  }
  .search {
    width: 100%;
    margin: 0 0 12px;
    padding: 8px 11px;
    font: inherit;
    font-size: 13.5px;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 8px;
  }
  .search::placeholder { color: var(--muted); }
  .no-match {
    background: var(--surface);
    border: 1px dashed var(--hairline);
    border-radius: 9px;
    padding: 12px 13px;
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .no-match .q { font-family: var(--mono); font-weight: 700; color: var(--ink); }
  .no-match p { margin: 0 0 8px; }
  .no-match p:last-child { margin: 0; }
  .stock-list { display: flex; flex-direction: column; gap: 6px; }
  .stock-card {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 10px;
    row-gap: 1px;
    align-items: center;
    width: 100%;
    text-align: left;
    background: none;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 9px 10px;
    cursor: pointer;
  }
  .stock-card:hover { background: var(--surface-2); }
  .stock-card.active {
    background: var(--surface);
    border-color: var(--border);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  }
  .stock-card .t { font-family: var(--mono); font-weight: 700; font-size: 14px; }
  .stock-card .n {
    grid-column: 1;
    color: var(--muted);
    font-size: 11.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stock-card .p { grid-column: 1; color: var(--ink-2); font-size: 12px; font-family: var(--mono); }
  .stock-card .pw { grid-column: 1; font-size: 10.5px; color: var(--muted); }
  .delta { font-family: var(--mono); font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .delta.up { color: var(--up); }
  .delta.down { color: var(--down); }
  .delta.flat { color: var(--muted); }
  .head-delta { font-size: 19px; }
  .head-price {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
    color: var(--ink);
    white-space: nowrap;
  }
  .head-week { margin-top: 4px; font-size: 12.5px; color: var(--muted); display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .head-week .delta { font-size: 12.5px; }
  .score-chip {
    grid-column: 2;
    grid-row: 1 / span 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 46px;
    border-radius: 8px;
    padding: 5px 7px;
    line-height: 1.15;
  }
  .score-chip .v { font-family: var(--mono); font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums; }
  .score-chip .g { font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; }
  .rail-note { color: var(--muted); font-size: 11.5px; padding: 16px 8px 0; line-height: 1.5; }

  .main { padding: 26px 32px 56px; max-width: 980px; }

  .company-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .company-head h1 { margin: 0; font-size: 26px; letter-spacing: -0.015em; }
  .company-head .ticker {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 6px;
    padding: 2px 8px;
  }
  .company-head .date { color: var(--muted); font-size: 12.5px; }
  .head-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn {
    border: 1px solid var(--hairline);
    background: var(--surface);
    border-radius: 7px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink-2);
  }
  .btn:hover { background: var(--surface-2); color: var(--ink); }
  .mode-switch {
    display: inline-flex;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 2px;
    background: var(--surface);
    gap: 2px;
  }
  .mode-switch button {
    border: none;
    background: none;
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-2);
    cursor: pointer;
    white-space: nowrap;
  }
  .mode-switch button:hover { color: var(--ink); }
  .mode-switch button.active {
    background: var(--accent);
    color: #ffffff;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin: 18px 0 22px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 9px;
    padding: 10px 12px;
    min-width: 0;
  }
  .stat .l {
    font-size: 10.5px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
    white-space: nowrap;
  }
  .stat .v { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--ink); overflow-wrap: break-word; }

  .hero {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 22px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 26px;
  }
  .hero .reading { color: var(--ink-2); font-size: 14px; max-width: 62ch; }
  .hero .reading strong { color: var(--ink); }
  .grade-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border-radius: 999px;
    padding: 3px 12px 3px 8px;
    font-weight: 700;
    font-size: 13px;
    margin-top: 8px;
  }
  .grade-pill .dot { width: 9px; height: 9px; border-radius: 50%; }
  .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .gauge-num {
    font-family: var(--mono);
    font-size: 34px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .gauge-cap { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

  .grade-good { background: var(--good-tint); }
  .grade-good .dot { background: var(--good); }
  .grade-warning { background: var(--warning-tint); }
  .grade-warning .dot { background: var(--warning); }
  .grade-serious { background: var(--serious-tint); }
  .grade-serious .dot { background: var(--serious); }
  .grade-critical { background: var(--critical-tint); }
  .grade-critical .dot { background: var(--critical); }

  .section-nav {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 0;
    margin: 0 0 8px;
    background: var(--page);
    border-bottom: 1px solid var(--hairline);
    scrollbar-width: none;
  }
  .section-nav::-webkit-scrollbar { display: none; }
  .section-nav a {
    flex: 0 0 auto;
    text-decoration: none;
    color: var(--ink-2);
    font-size: 12.5px;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 4px 11px;
    white-space: nowrap;
    background: var(--surface);
  }
  .section-nav a:hover { color: var(--ink); background: var(--surface-2); }
  .section-nav a .k { font-family: var(--mono); color: var(--muted); margin-right: 4px; }

  .report-section { padding: 22px 0 6px; border-bottom: 1px solid var(--hairline); scroll-margin-top: 54px; }
  .report-section:last-of-type { border-bottom: none; }
  .sec-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .report-section h2 { margin: 2px 0 12px; font-size: 19px; letter-spacing: -0.01em; }
  .prose { max-width: 74ch; color: var(--ink-2); }
  .prose p { margin: 0 0 12px; }
  .prose ul { margin: 0 0 12px; padding-left: 20px; }
  .prose li { margin-bottom: 7px; }
  .prose strong { color: var(--ink); }
  .badge {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border-radius: 4px;
    padding: 1px 6px;
    margin-right: 4px;
    vertical-align: 0.08em;
  }
  .badge.hecho { background: var(--hecho-bg); color: var(--hecho-ink); }
  .badge.lectura { background: var(--lectura-bg); color: var(--lectura-ink); }
  .prose .md-h { font-weight: 700; color: var(--ink); margin: 16px 0 8px; }
  .md-table { overflow-x: auto; margin: 0 0 12px; }
  .md-table table { border-collapse: collapse; font-size: 12.5px; min-width: 340px; }
  .md-table th, .md-table td { padding: 5px 10px; text-align: left; border-bottom: 1px solid var(--hairline); }
  .md-table th {
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .md-table td { font-variant-numeric: tabular-nums; color: var(--ink-2); }
  .signal-close { margin: 12px 0 0; color: var(--ink-2); font-size: 13.5px; max-width: 78ch; }
  .signal-close strong { color: var(--ink); }

  .score-detail { background: var(--surface); border: 1px solid var(--hairline); border-radius: 12px; padding: 18px 20px; }
  .cat-row { display: grid; grid-template-columns: 190px minmax(0, 1fr) 88px; gap: 12px; align-items: center; padding: 7px 0; }
  .cat-row .name { font-size: 13px; font-weight: 600; }
  .cat-row .w { color: var(--muted); font-size: 11.5px; font-family: var(--mono); margin-left: 6px; font-weight: 400; }
  .bar { position: relative; height: 8px; border-radius: 4px; background: var(--track); overflow: hidden; }
  .bar .fill { position: absolute; inset: 0 auto 0 0; border-radius: 4px; background: var(--accent); }
  .cat-row .val {
    font-family: var(--mono);
    font-size: 12.5px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    color: var(--ink-2);
  }
  .cat-row .val b { color: var(--ink); font-size: 13.5px; }
  .cat-just { margin: 2px 0 10px; padding: 0 0 8px; border-bottom: 1px dashed var(--hairline); color: var(--ink-2); font-size: 12.5px; max-width: 78ch; }
  .cat-just:last-of-type { border-bottom: none; }
  .score-total {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    border-top: 1px solid var(--hairline);
    margin-top: 10px;
    padding-top: 12px;
  }
  .score-total .num { font-family: var(--mono); font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-note { color: var(--muted); font-size: 12px; margin-top: 10px; max-width: 74ch; }

  details.weights { margin-top: 14px; border-top: 1px solid var(--hairline); padding-top: 10px; }
  details.weights summary { cursor: pointer; font-size: 13px; color: var(--ink-2); user-select: none; }
  details.weights summary:hover { color: var(--ink); }
  .w-grid { display: grid; grid-template-columns: 170px minmax(0, 1fr) 52px; gap: 10px 12px; align-items: center; margin: 12px 0 6px; }
  .w-grid label { font-size: 12.5px; color: var(--ink-2); }
  .w-grid input[type="range"] { width: 100%; accent-color: var(--accent); margin: 0; }
  .w-grid .wv { font-family: var(--mono); font-size: 12.5px; text-align: right; font-variant-numeric: tabular-nums; }
  .w-foot { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 12.5px; color: var(--muted); }
  .w-foot .warn { color: var(--serious); font-weight: 600; }

  details.sources { margin: 20px 0 0; }
  details.sources summary { cursor: pointer; font-size: 13px; color: var(--ink-2); }
  details.sources ul { columns: 2; column-gap: 28px; padding-left: 18px; margin: 10px 0 0; font-size: 12.5px; color: var(--muted); }
  details.sources li { margin-bottom: 5px; break-inside: avoid; }

  .disclaimer {
    margin: 30px 0 0;
    border-left: 3px solid var(--hairline);
    padding: 4px 0 4px 14px;
    color: var(--muted);
    font-size: 12.5px;
    max-width: 74ch;
  }

  .toast {
    position: fixed;
    bottom: 18px;
    right: 18px;
    background: var(--surface);
    color: var(--ink-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 14px;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: none; }

  @media (prefers-reduced-motion: reduce) {
    .toast { transition: none; }
    html { scroll-behavior: auto; }
  }
  html { scroll-behavior: smooth; }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .rail { border-right: none; border-bottom: 1px solid var(--hairline); padding-bottom: 12px; }
    .stock-list { flex-direction: row; overflow-x: auto; padding-bottom: 6px; }
    .stock-card { min-width: 168px; }
    .rail-note { display: none; }
    .main { padding: 20px 16px 48px; }
    .hero { grid-template-columns: 1fr; }
    .cat-row { grid-template-columns: 1fr; gap: 5px; }
    .cat-row .val { text-align: left; }
    details.sources ul { columns: 1; }
  }

  /* — Calendario — */
  .layout.cal-mode { grid-template-columns: minmax(0, 1fr); }
  .layout.cal-mode .rail { display: none; }
  .cal-wrap { max-width: 880px; margin: 0 auto; padding: 30px 22px 60px; }
  .cal-head h1 { font-size: 24px; margin: 0 0 6px; }
  .cal-head .sub { color: var(--muted); font-size: 13px; margin: 0 0 8px; }
  .cal-month {
    margin: 30px 0 4px;
    font-size: 11.5px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--ink-2);
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 7px;
  }
  .cal-day { display: grid; grid-template-columns: 66px minmax(0, 1fr); gap: 16px; padding: 13px 0; border-bottom: 1px solid var(--hairline); }
  .cal-day:last-child { border-bottom: none; }
  .cal-date { text-align: center; padding-top: 2px; }
  .cal-date .dnum { font-family: var(--mono); font-size: 21px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.05; }
  .cal-date .dwk { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 2px; }
  .cal-day.is-today .dnum, .cal-day.is-today .dwk { color: var(--accent); }
  .cal-day.is-past { opacity: 0.5; }
  .cal-evts { display: flex; flex-direction: column; gap: 7px; }
  .cal-evt { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .cal-tick {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12px;
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 1px 8px;
    cursor: pointer;
    background: var(--surface);
    color: var(--ink);
    white-space: nowrap;
  }
  .cal-tick:hover { border-color: var(--accent); color: var(--accent); }
  .cal-lbl { font-size: 13.5px; color: var(--ink-2); flex: 1 1 240px; }
  .cal-kind {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    border-radius: 999px;
    padding: 2.5px 9px;
    white-space: nowrap;

%, EPS +23% en Q3 FY26) mientras la acción cae ~29% desde el máximo de 52 semanas ($555.45) por el shock del guidance de capex de ~$190B para 2026 y la caída del FCF. Con P/E de ~23-24x vs su promedio de 10 años de ~32x y consenso Strong Buy con target promedio $558 (+42%), la tesis es de calidad a precio de descuento, condicionada a que el capex demuestre retorno. El catalizador inmediato son los resultados Q4 FY26 del 29 de julio de 2026.","fundamental":"**Últimos resultados (Q3 FY26, cerrado 31-mar-2026, reportado 29-abr-2026):**\n\n- HECHO: Revenue $82.9B, +18% a/a, vs consenso $81.39B; EPS diluido GAAP $4.27, +23% a/a, vs consenso $4.06 — beat en ambas líneas (CNBC, Yahoo Finance, 29-abr-2026).\n- HECHO: Ingreso operativo $38.4B, +20% a/a — margen operativo ~46% (Microsoft IR, 29-abr-2026); ingreso neto $31.78B vs $25.82B el año anterior (CNBC).\n- HECHO: Azure creció +40% a/a, sobre el rango guiado de 37-38%; negocio de IA con run-rate anual de $37B, +123% a/a; Copilot superó 20M de asientos (Alphastreet, abr-2026).\n- HECHO: Guidance Q4 FY26: Azure +39-40% cc; capex calendario 2026 de ~$190B, ~$35B sobre el consenso de Visible Alpha, +61% a/a (Alphastreet/TIKR, abr-2026).\n- HECHO: FCF cayó a $15.8B desde $20.3B un año antes, contra ingreso neto de $31.8B (Investing.com, 2026).\n\nLECTURA: El negocio operativo está en su mejor momento en años (reaceleración de Azure, monetización de IA tangible, márgenes intactos), pero el mercado exige prueba de retorno sobre el capex: la brecha entre utilidad neta ($31.8B) y FCF ($15.8B) es el núcleo del debate. La tesis alcista depende de que el FCF se recupere con fuerza desde FY27.","valuacion":"- HECHO: P/E trailing ~23.4x (FinanceCharts, 17-jul-2026) / 24.4x (Macrotrends, 15-jul-2026); P/E forward ~19.5x.\n- HECHO vs. histórico propio: promedio 5 años ~32.2x, 10 años ~32.0x, pico jun-2024 38.5x, mínimo 5 años 26.5x (jun-2022) — MSFT cotiza hoy **debajo de su mínimo de 5 años previo** (FullRatio/Macrotrends, jul-2026).\ mada 10b5-1 del 80% de acciones netas) — evento conocido, puede generar ruido de titulares (SEC/StockTitan).\n- **2H 2026 — Copilot Cowork GA mundial** y SKUs Microsoft 365 Business con Copilot GA desde 1-jul-2026.\n- **Trimestres FY27 — Inflexión esperada del FCF** a medida que el capex 2026 (~$190B) entra en producción — la variable que valida o refuta la tesis.\n\n**Riesgos (por materialidad):**\n\n- **Capex sin retorno:** $190B en 2026 (+61% a/a) ya comprimió el FCF a $15.8B; si el retorno no aparece en FY27, el de-rating continúa.\n- **Concentración/diversificación de OpenAI:** acuerdo de $50B de OpenAI con AWS; alta concentración del backlog (~45% citado) — el negocio incremental futuro puede migrar.\n- **Desaceleración de Azure:** cualquier trimestre bajo el 39-40% guiado golpearía la única pata que sostiene la narrativa.\n- **Macro/rotación sectorial:** la acción ya demostró en 2026 que puede caer 30%+ con fundamentales intactos.\n- **Regulatorio/competencia cloud-IA:** presión de AWS y Google Cloud; riesgo antitrust no cuantificado en lo encontrado (no verificable en detalle).","sentimiento":"- HECHO: Consenso Strong Buy: 34 buy / 1 hold / 1 sell (TipRanks vía Public.com) y Strong Buy en 56 analistas de S&P Global con target $558.77; sobre ~97 analistas, target promedio $589-592 (24/7 Wall St, 17-jul-2026).\n- HECHO: Acciones recientes: Argus target $510 (10-jul-2026); Morgan Stanley subió target de $625 a $650 y lo llamó top pick; Bernstein subió a $641 citando Azure. Último downgrade relevante: Stifel recortó de $540 a $392 (5-feb-2026) (Benzinga/MarketBeat).\n- HECHO: Insiders 2026: ~$51M vendidos en 34 ventas vs 1 compra abierta; Judson Althoff vendió 15,500 acciones a ~$461 (1-jun-2026); Nadella adoptó plan 10b5-1 (8-mar-2026); el director John Stanton **compró** 5,000 acciones (~$1.99M a $397.35) el 18-feb-2026 (StockTitan/MarketBeat).\n- HECHO: Tono de noticias 30-60 días constructivo — encuesta Jefferies con Azure como cloud primario del 55% de CIOs de EE.UU. vs 28% AWS; GA de Copilot Cowork; +4% el 1-jul por acuerdo con Haleon.\n\nLECTURA: Sentimiento de analistas claramente alcista y mejorando, en contraste con la acción del precio: el mercado (que vendió) y el sell-side (que compra) están en lados opuestos. Las ventas de insiders son mayormente programadas (10b5-1) y hay una compra abierta de un director cerca del precio actual, lo que resta señal negativa. El riesgo es que el consenso esté anclado a targets pre-corrección.","conclusion":"La tesis funciona si el 29 de julio Microsoft entrega Azure en o sobre el 39-40% guiado y, sobre todo, si el guidance FY27 muestra capex desacelerando como porcentaje de ventas y un camino creíble de recuperación del FCF: con P/E forward ~19.5x, el más bajo del grupo de mega-caps y muy por debajo de su media histórica de ~32x, la combinación de beat + disciplina de capital podría disparar un re-rating hacia la zona de targets ($510-650). La tesis se invalida si: (a) Azure desacelera bajo lo guiado, (b) el capex vuelve a subir sin mejora de FCF (otro trimestre con FCF < $20B sería mala señal), o (c) OpenAI profundiza su migración a AWS erosionando el backlog. Técnicamente, perder $368.57 reabriría el camino al piso de 52 semanas ($349); recuperar $440 (MM200) confirmaría el giro. Es una apuesta de calidad a descuento con fecha de veredicto concreta, no un momentum trade."},"scores":{"tecnica":{"score":35,"just":"Precio bajo la MM50 ($401.88) y MM200 ($438.98), ambas en venta, y ~29% bajo el máximo de 52s: tendencia de fondo bajista. El rebote de +12% en un mes y RSI neutral (53.5) evitan un puntaje menor, pero no hay confirmación de giro sobre $400-413."},"fundamental":{"score":78,"just":"Crecimiento y márgenes excelentes: revenue +18%, EPS +23%, Azure +40%, margen operativo ~46%, y valuación inusualmente razonable (P/E 23-24x vs 32x histórico). Descuento por la caída del FCF a $15.8B ante capex de $190B: la calidad es alta pero la conversión a caja está transitoriamente rota."},"sentimiento":{"score":68,"just":"Consenso Strong Buy (34/1/1), targets $510-650 con upgrades recientes de Morgan Stanley y Bernstein, y noticias constructivas. Se descuenta porque el precio cayó ~30% en 2026 (el mercado votó en contra), insiders son vendedores netos en monto y el último downgrade (Stifel, feb-2026) apuntó justo al riesgo capex."},"riesgo":{"score":60,"just":"Mega-cap de $2.93T con liquidez máxima y negocio diversificado, lo que acota el riesgo estructural; pero el drawdown realizado de ~30% en 2026, la dependencia de un evento cercano (earnings 29-jul) y la incógnita capex/FCF elevan la volatilidad efectiva."},"conviccion":{"score":72,"just":"Tesis falsable con catalizador fechado: earnings y guidance FY27 el 29-jul-2026, con vara concreta (Azure 39-40%, trayectoria de FCF). Asimetría favorable con forward P/E ~19.5x bajo mínimos de 5 años y target consenso +42%; el veredicto del capex tomará varios trimestres, no uno."}},"sources":["Yahoo Finance (18-jul-2026)","Investing.com (17-jul-2026)","Microsoft IR — press release Q3 FY26 (29-abr-2026)","CNBC (29-abr-2026)","Alphastreet (abr-2026)","TIKR (2026)","Public.com / TipRanks (jul-2026)","24/7 Wall St (17-jul-2026)","MarketBeat (jul-2026)","Benzinga (jul-2026)","FinanceCharts (12-17-jul-2026)","Macrotrends / FullRatio (15-jul-2026)","GuruFocus (jul-2026)","StockTitan — Form 4 / 10b5-1 (2026)","Financhill / Barchart (jul-2026)","Jefferies CIO survey vía prensa (jul-2026)"],"change":{"day":-1.13,"week":1.0},"events":[{"date":"2026-07-29","label":"Resultados Q4 FY26 + guidance FY27 (Azure guiado +39-40% cc)","kind":"earnings"},{"date":"2026-08-31","label":"Vesting del PSA de Nadella (venta programada 10b5-1)","kind":"corporate"}]},{"ticker":"NVDA","company":"NVIDIA Corporation","statsList":[["Precio","$207.29 (21-jul-2026)"],["Rango 52 sem.","$164.07 – $236.54"],["Market cap","$4.91T"],["P/E","31.1x trailing / 20.3x forward"],["Target consenso","$301.62 (61 analistas)"],["Próx. earnings","26-ago-2026 (Q2 FY27)"],["Técnico (auto)","RSI 52.2 · MACD +0.19 / señal -0.64 (TradingView, 21-jul-2026)"]],"sections":{"resumen":"NVIDIA sigue siendo el eje del ciclo de infraestructura de IA: en el Q1 FY27 (20-may-2026) creció 85% a/a con margen bruto de 75% y guió $91B para el Q2, muy por sobre el consenso. La acción, sin embargo, corrige ~14% desde su máximo de 52 semanas ($236.54) en medio de un selloff sectorial por dudas sobre la sostenibilidad del capex de hiperescaladores y el avance del silicio custom. LECTURA: la tensión central es fundamentales excepcionales y valuación históricamente barata (P/E 31x vs promedio propio de 53x a 10 años) contra un sentimiento de mercado que empezó a cuestionar la duración del ciclo.","fundamental":"- HECHO: Q1 FY27 (reportado 20-may-2026): revenue récord de $81.6B, +85% a/a y +20% t/t, vs consenso de ~$78.8B; EPS non-GAAP $1.87 vs estimado $1.76 (beat); EPS GAAP $2.39; margen bruto GAAP 74.9% / non-GAAP 75.0% (8-K SEC, CNBC 20-may-2026).\n- HECHO: Data Center facturó $75.2B (+92% a/a): compute $60.4B (+77%) y networking $14.8B (+199%). Por cliente: hiperescaladores ~$38B (+12% t/t) y ACIE ~$37B (+31% t/t) (Yahoo Finance / Futurum Group, may-2026). Ingreso neto GAAP $58.3B, +211% a/a. LECTURA: que el EPS GAAP supere al non-GAAP sugiere ganancias no operativas infladas en el GAAP; el $1.87 non-GAAP es la cifra operativa comparable.\n- HECHO: Guidance Q2 FY27 de $91B vs consenso $86.84B; recompra adicional autorizada por $80B y dividendo trimestral elevado 25x, de $0.01 a $0.25 (StockTitan sobre el 8-K, may-2026). TTM: revenue $253.5B (+70.7%), ingreso neto $159.6B, EPS $6.53 (StockAnalysis, 17-jul-2026).\n\nLECTURA: El moat sigue intacto: CUDA como estándar de software, liderazgo en networking (el segmento que más crece, +199%) y cadencia anual de producto (Blackwell → Rubin). El balance con $80B extra de recompra y dividendo creciente refleja generación de caja masiva. Riesgo fundamental principal: concentración en pocos hiperescaladores y un ciclo de capex que el mercado empieza a cuestionar.","valuacion":"- HECHO: P/E trailing 31.1x y forward 20.3x al 17-jul-2026 (StockAnalysis); FullRatio/Public.com registran 31.8x al 16-jul-2026. Contra su propio histórico: promedio 10 años 53.7x, 5 años 69.0x, 3 años 59.9x, promedio 12 meses 44.4x — cotiza ~40% bajo su media de una década (FullRatio/Public.com, jul-2026).\n- HECHO: Vs peers, su P/E es menor que el de AMD y TXN, mayor que MSFT y QCOM (Public.com, jul-2026). Cifras puntuales de P/E de AMD y Broadcom a mediados de julio 2026: no verificable en las fuentes consultadas.\n- HECHO: Price targets: promedio $301.62 (61 analistas, S&P Global vía StockAnalysis, jul-2026); TipRanks promedio $309.94. Máximo $500 (Baird, 21-may-2026), mínimo $180-215 según la fuente. Upside implícito ~49-54% desde $202.81.\n\nLECTURA: La compresión de múltiplo con EPS creciendo +110% TTM implica que el mercado descuenta desaceleración fuerte hacia FY28. Si el guidance de $91B se cumple y Rubin escala, el forward de ~20x es bajo para el perfil de crecimiento; es el argumento central de los alcistas y explica el gap enorme entre precio y target consenso.","tecnico":"- HECHO: Al 16/17-jul-2026: media de 50 días ~$205.3 y de 200 días ~$194.6 (AltIndex/ChartMill, jul-2026). Con el cierre en $202.81, el precio está **por debajo de la MM50 pero por encima de la MM200**. RSI ~53.7 (neutral); MACD sobre la línea de señal según ChartMill (jul-2026).\n- HECHO: Soportes: zona $196.50-198.36 (confluencia de tendencias, ChartMill) y soporte mayor ~$165 (mínimo de 6 meses); resistencia ~$235.5 (máximo de 52 semanas) (AltIndex/ChartMill, jul-2026).\n- HECHO: La acción cayó ~2.2-2.4% entre el 16 y 17 de julio dentro de un selloff sectorial de chips de IA que borró más de $1T de capitalización del sector (CryptoBriefing/CBS News, jul-2026) y está rindiendo menos que el mercado en 2026 (Motley Fool, 12-jul-2026).\n\nLECTURA: Estructura de mediano plazo aún alcista (MM50 > MM200, precio sobre MM200), pero el corto plazo se deterioró: pérdida de la MM50, ~14% bajo el máximo y momentum neutro. Soporte inmediato $196-198; perderlo abre camino a la MM200 (~$195) y luego $165. Recuperar $205-210 restauraría el sesgo alcista de corto plazo.","catalizadores":"**Catalizadores:**\n\n- **26-ago-2026 — Earnings Q2 FY27:** guidance propio de $91B vs consenso previo $86.84B; el beat/miss definirá el tono del semestre.\n- **2H 2026 — Ramp de Vera Rubin:** en producción plena según NVIDIA Newsroom (jul-2026), tras un retraso de semanas por un problema del lid térmico y calificación de HBM4 de SK Hynix; proyección anual mantenida en 1.7-1.8M unidades (KeyBanc vía Memeburn, jul-2026).\n- **Fechas por confirmar — flexibilización de exportaciones a China:** Jensen Huang no descarta Rubin para China si se relajan restricciones (Wccftech, jul-2026).\n- **Continuo — recompra de $80B y dividendo de $0.25/trim** como soporte de demanda de la acción.\n\n**Riesgos (por materialidad):**\n\n- **Desaceleración del capex de hiperescaladores:** la ansiedad dominante del selloff de julio; el gasto en IA aún no muestra retornos claros (CBS News, jul-2026).\n- **Competencia de silicio custom:** la ola de chips propios de grandes tecnológicas comenzó a despacharse a fines de junio/julio 2026 (CryptoBriefing).\n- **China/regulatorio:** Commerce cerró el loophole de exportación vía entidades chinas en el exterior; NVIDIA recortó más de la mitad de sus compradores asiáticos aprobados por controles anti-desvío (Yahoo Finance, jul-2026).\n- **Cadena de suministro:** HBM4 (SK Hynix) fue el cuello de botella del retraso de Rubin; SK Hynix planea frenar expansión de HBM (Memeburn, jul-2026).\n- **Concentración de clientes:** hiperescaladores ~50% del data center (Futurum, may-2026).","sentimiento":"- HECHO — Analistas: consenso Strong Buy: TipRanks 36 buy / 1 hold / 0 sell, PT promedio $309.94; S&P Global (61 analistas) PT promedio $301.62, rango $180-$500 (jul-2026). Street-high $500 de Cloud sostiene +60% y el backlog de $462B se convierte en revenue.","tecnico":"- HECHO: precio ~$345 vs **50-DMA $368.40 (por debajo — señal de venta)** y **200-DMA $311.90-317.33 (por encima — señal de compra)** (Barchart/Investing.com, ~16-jul-2026).\n- HECHO: RSI 55.9, neutral (Investing.com, lectura previa a la caída del 16-jul; el RSI actual post-caída probablemente es menor — no verificable con precisión).\n- HECHO: caída de más de 4% el 16-jul-2026 tras la noticia del retraso de Gemini (cryptobriefing/FXLeaders). Junio fue el peor mes en más de un año (247wallst, 29-jun-2026). Drawdown desde el máximo de $408.61: ~-15%.\n- Niveles: los soportes/resistencias publicados ($387/$398, TipRanks) quedaron desactualizados tras la caída. LECTURA: soporte relevante en ~$340 (coincide con el PT mínimo de consenso) y luego la zona de la 200-DMA ($312-317); resistencia en $360-370 (50-DMA y zona del gap de la caída).\n- LECTURA: corrección de corto plazo dentro de una tendencia alcista de largo plazo intacta (precio aún ~10% sobre la 200-DMA). El marco diario es bajista, el semanal sigue constructivo.","catalizadores":"**Catalizadores:**\n\n- **22-jul-2026 — earnings Q2 2026 (after close).** Foco: crecimiento de Cloud (~63% esperado), conversión del backlog de $462B, guidance de capex ($175-185B) y resiliencia de Search. Prediction markets asignan 96.6% de probabilidad de beat (Yahoo/MarketBeat, jul-2026).\n- **2H 2026 — lanzamiento de Gemini 3.5 Pro** (retrasado, sin fecha firme — Bloomberg 16-jul-2026); su llegada exitosa sería catalizador positivo.\n- **Flujos pasivos por inclusión en el Dow Jones** (efectiva ~29-jun-2026, reemplazó a Verizon).\n\n**Riesgos (por materialidad):**\n\n- **Ejecución en IA:** retraso de Gemini 3.5 Pro mientras OpenAI y Anthropic avanzan; capacidad de cómputo racionada (no pudo atender la demanda de Meta) — Bloomberg/MarketWise, jul-2026.\n- **Capex de $175-185B:** presión sobre márgenes y FCF si la monetización de IA decepciona.\n- **Regula
