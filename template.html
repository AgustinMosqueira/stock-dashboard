ón en cambio de tendencia. Con el evento a 4 días, el riesgo/retorno favorece esperar el print o dimensionar la posición asumiendo volatilidad de evento."},"scores":{"tecnica":{"score":52,"just":"Precio ($345) por debajo de la 50-DMA ($368) tras caer -4% el 16-jul y -15% desde el máximo de $408.61, pero aún ~10% sobre la 200-DMA ($312-317) con RSI neutral (55.9). Marco diario correctivo, tendencia de largo plazo intacta: lateral-bajista de corto dentro de estructura alcista."},"fundamental":{"score":80,"just":"Revenue +22% y/y, Cloud +63% con backlog $462B, margen operativo 36.1% (Q1 2026), balance reforzado con raise de $85B y moat dominante en Search/YouTube/Cloud. Descuenta puntos la valuación: P/E 27x vs 23x de su historia de 5 años y sobre MSFT/META (23.8x), con EPS TTM inflado por $37.7B de ganancias no realizadas y capex de $175-185B."},"sentimiento":{"score":68,"just":"Consenso Strong Buy (57 buy/7 hold/0 sell) con +25% al target promedio, respaldo de Berkshire ($10B placement) e inclusión en el Dow. Pero el flujo de noticias de 30 días es negativo (retraso Gemini con -4% el 16-jul, multa UE de $4.7B) y los insiders son vendedores netos (47 ventas, 0 compras en 90 días, aunque por monto irrelevante)."},"riesgo":{"score":58,"just":"Mega-cap ultra líquida ($4.2T, componente del Dow) con negocio diversificado, lo que acota el riesgo estructural. Pero hay evento binario a días (earnings 22-jul), volatilidad reciente elevada (movimientos diarios de 4%, peor mes en un año en junio, drawdown -15%) y colas regulatorias/capex. Riesgo moderado, no bien acotado en el corto plazo."},"conviccion":{"score":74,"just":"Catalizador concreto y fechado (Q2 el 22-jul-2026, con prediction markets en 96.6% de beat) y tesis falsable con métricas claras (Cloud ~63%, backlog $462B, capex guidance). Asimetría razonable: PT mínimo $340 casi al precio actual vs promedio $433. Resta el catalizador de Gemini 3.5 sin fecha firme."}},"sources":["Yahoo Finance — quote y key statistics GOOGL (17-jul-2026)","StockAnalysis.com — precio histórico y forecast (17-jul-2026)","CNBC — Alphabet Q1 2026 earnings (29-abr-2026)","Alphabet Q1 2026 earnings release (29-abr-2026)","Beancount.io — análisis Q1 y other income $37.7B (13-jul-2026)","S&P Global vía StockAnalysis/MarketBeat — consenso 64 analistas (jul-2026)","TipRanks — PT consenso $435.78 (jul-2026)","Benzinga/Yahoo — BofA reitera Buy PT $430 (16-jul-2026)","Bloomberg — retraso de Gemini 3.5 Pro (16-jul-2026)","CryptoBriefing/FXLeaders — caída por Gemini (16-jul-2026)","Prensa sobre fallo CJUE multa €4.1B (2-jul-2026)","Motley Fool — Berkshire $10B placement (1/4/15-jul-2026)","247WallSt/Yahoo — Alphabet entra al Dow (29-jun-2026)","Barchart/Investing.com — medias 50/200 y RSI (16-jul-2026)","FullRatio/MacroTrends — P/E actual e histórico (16-jul-2026)","Wisesheets — P/E comparado MSFT/META (jul-2026)","Simply Wall St — insiders 90 días (jul-2026)","IG/MarketBeat — preview Q2 2026 (16-jul-2026)","companiesmarketcap.com — market cap $4.22T (jul-2026)"],"change":{"day":-1.38,"week":0.11},"events":[{"date":"2026-07-22","label":"Resultados Q2 2026 (after close)","kind":"earnings"}]},{"ticker":"AMZN","company":"Amazon.com, Inc.","statsList":[["Precio","$247.55 (21-jul-2026)"],["Rango 52 sem.","$196.00 – $278.56"],["Market cap","$2.69T"],["P/E","29.6x trailing (fwd 25.5x)"],["Target consenso","$312.99 (62 analistas)"],["Próx. earnings","30-jul-2026 (after close)"],["Técnico (auto)","RSI 51.3 · MACD +0.80 / señal -0.34 (TradingView, 21-jul-2026)"]],"sections":{"resumen":"Amazon llega al earnings del 30 de julio con momentum fundamental excepcional: Q1 2026 batió en todas las líneas (revenue $181.5B +17%, AWS +28%, margen operativo récord 13.1%) y el consenso es casi unánimemente comprador (63 buy / 4 hold / 0 sell, target $312.99, ~+25% de upside). El precio, sin embargo, corrigió ~10% desde el máximo de $278.56 y el cuadro técnico es mixto. LECTURA: tesis de calidad con catalizador concreto e inminente; el riesgo de corto plazo es de ejecución en el print de Q2 y del capex de $200B.","fundamental":"- HECHO: Q1 2026 (reportado ~29-abr-2026, CNBC/Tickeron/TIKR): revenue $181.5B, +17% a/a, vs consenso ~$177B. EPS diluido $2.78 vs $1.63 esperado, aunque inflado por $16.8B de ganancias pre-tax por la inversión en Anthropic. Margen operativo 13.1%, el más alto de la historia de la compañía según el CEO Andy Jassy.\n- HECHO: AWS creció 28% a $37.6B (vs $36.64B StreetAccount), su mayor ritmo en 15 trimestres; operating income de AWS $14.16B, +23%, muy sobre el consenso de $12.84B (CNBC, 29-abr-2026).\n- HECHO: Guidance Q2: crecimiento de ventas 16-19% ($194-199B) con ~$1B de costos adicionales por Project Leo (satélites) y plan de capex 2026 de ~$200B (TIKR, jul-2026).\n\nLECTURA: El negocio está en su mejor momento operativo en años: reaceleración de AWS por demanda de IA, publicidad récord y márgenes en máximos. El moat es triple (escala logística en e-commerce, efecto de red/switching costs en AWS, flywheel de Prime + ads) y se refuerza con la relación estratégica con Anthropic. El riesgo fundamental no es demanda sino intensidad de capital: $200B de capex exigen que AWS sostenga el ~28%.","valuacion":"- HECHO: P/E trailing 29.58x al 14-jul-2026 (FinanceCharts); otra fuente reporta 34.66x a la misma fecha (discrepancia declarada; el trailing está además distorsionado por la ganancia contable de Anthropic). Forward P/E 25.47x al 26-jun-2026 (valueinvesting.io).\n- HECHO: Promedio histórico propio: 5 años ~46.8-57.8x y 10 años ~71.9-73.1x según FullRatio/FinanceCharts — el múltiplo actual está claramente por debajo de sus propios promedios de 3, 5 y 10 años.\n- HECHO: Vs peers (jun-jul 2026): forward P/E de GOOGL ~19.5x y AAPL ~23.3x (FinanceCharts/Public.com); AMZN cotiza con prima moderada.\n- HECHO: Consenso: target promedio $312.99, máximo $370, mínimo $207, sobre 62 analistas (stockanalysis.com/TipRanks, jul-2026); TD Cowen recortó a $340 desde $350 manteniendo Buy (8-jul-2026); Wells Fargo apunta a $312 (26-jun-2026).\n\nLECTURA: Para el crecimiento (+17% revenue, AWS +28%) y la expansión de márgenes, un forward de ~25x es razonable e históricamente barato para AMZN; la prima vs Google/Apple se justifica por mayor crecimiento. Upside implícito al target promedio: ~+25% desde $250.91.","tecnico":"- HECHO: Precio $250.91 (16-jul-2026), ~10% bajo el máximo de 52 semanas de $278.56; rango del último mes $225.55-$251.03 (stockinvest.us, 14-jul-2026).\n- HECHO — fuentes en conflicto: AltIndex reporta SMA50 $245.9 > SMA200 $236.1 (configuración alcista), mientras Investing.com/TipRanks reportan SMA50 ~$238-254 con señal de venta y RSI entre 49.4 (neutral) y 67.4 según la fuente; el RSI se declara no verificable con precisión.\n- HECHO: Soportes citados: zona $240.4-245.2, luego $232.5 y $227.0 (cerca del mínimo de 3 meses $225.55); resistencias: $253.7 (SMA50 según ChartMill) y $263.0 (ChartMill/Barchart, jul-2026).\n\nLECTURA: Estructura de mediano plazo alcista (precio muy por encima del piso de $196 y del SMA200 en la mayoría de lecturas) pero corto plazo lateral-correctivo: el rebote desde ~$226 a fines de junio recuperó la zona de $247-251 y ahora enfrenta la resistencia $253-263. Perder $240 abriría retest de $227-232; superar $263 reanudaría la tendencia hacia $278.","catalizadores":"**Catalizadores:**\n\n- **30-jul-2026 — resultados Q2 2026** (confirmado por aboutamazon.com). Consenso ~$196B revenue y EPS ~$1.82; TD Cowen modela $200.1B (+2% sobre consenso). Prime Day cayó en Q2 este año, un viento de cola que no existió en Q2 2025.\n- **2H 2026 — lanzamiento comercial del servicio de banda ancha Leo** — 396 satélites ya desplegados (NAI500/Technobezz, jul-2026); competencia directa a Starlink.\n- **Continuo — monetización IA:** unidad de $1B de Forward Deployed Engineers en AWS (CNBC, 30-jun-2026), AgentCore y EC2 G7 con Blackwell (AWS Summit NY, jul-2026); derivadas de la relación con Anthropic.\n\n**Riesgos (por materialidad):**\n\n- **Capex $200B en 2026:** si AWS desacelera bajo ~28%, el mercado castigará el retorno sobre ese capital (TIKR, jul-2026).\n- **Evento binario cercano:** el print del 30-jul con expectativas ya elevadas tras el rally post-Q1.\n- **Costos de Project Leo:** ~$1B adicionales en Q2 presionan el operating income guiado.\n- **Distorsión contable Anthropic:** la ganancia de $16.8B es mark-to-market y puede revertirse en trimestres futuros.\n- **Técnico:** pérdida de $240 activa retest de $227; el drawdown de 52 semanas ya fue de ~$278 a ~$226 (-19%).","sentimiento":"- HECHO: Consenso Strong Buy: 63 buy / 4 hold / 0 sell; target promedio $312.99 ($207-$370) sobre 62 analistas (stockanalysis.com/TipRanks/MarketBeat, jul-2026). Acciones recientes: TD Cowen Buy, PT $340 (8-jul); Wells Fargo recomienda entrada, PT $312 (26-jun). Un resultado atribuye a BofA un PT de $165 (7-jul) — cifra inconsistente con el rango del consenso, se trata como no verificable.\n- HECHO — insiders: CEO Andy Jassy vendió 31,352 acciones a $275.00 el 4-may-2026 (~$8.6M) bajo plan 10b5-1 adoptado el 14-nov-2025; en 6 meses acumula 12 ventas por ~102,096 acciones (~$24.9M) y 0 compras (StockTitan/GuruFocus/MarketBeat). Entidad ligada a Bezos vendió 220,200 acciones a $275.27 el 5-may-2026 (~$60.6M). Entre mayo y julio: 11 ventas de insiders por ~$8.1M, 0 compras (stockcircle/insiderscreener).\n\nLECTURA: Tono de noticias claramente constructivo (AWS reacelerando, IA, Leo). Las ventas de insiders son programadas, pequeñas vs el market cap y consistentes con el patrón histórico de solo-ventas de Amazon; no se lee señal negativa, aunque la ausencia total de compras impide leerlas como señal positiva.","conclusion":"La tesis funciona si el 30 de julio AWS imprime crecimiento igual o superior al 28% de Q1 y el operating income absorbe los costos de Leo — eso validaría el capex de $200B, cerraría el gap técnico hacia $263-278 y daría sustento al target de $313 con un forward de ~25x que es barato contra la propia historia de Amazon. La invalidarían: (1) AWS desacelerando por debajo de ~25-26% o guidance de Q3 débil, (2) margen operativo retrocediendo claramente desde 13.1% por Leo/capex, (3) pérdida técnica de $240 y luego $227, que rompería la estructura alcista de mediano plazo. Con 0 sells en el consenso, la barra de expectativas es alta: el mayor riesgo no es el negocio sino la asimetría de reacción ante un print apenas en línea."},"scores":{"tecnica":{"score":58,"just":"Estructura de mediano plazo alcista (precio $250.91 sobre el SMA200 en la mayoría de lecturas y +28% sobre el piso de 52s de $196), pero corto plazo lateral-correctivo: -10% desde $278.56, resistencia en $253-263 y fuentes técnicas en conflicto (golden cross según AltIndex vs señal de venta según Investing.com). RSI 49-67 no concluyente."},"fundamental":{"score":88,"just":"Q1 2026 récord: revenue +17% ($181.5B), AWS +28% (mejor ritmo en 15 trimestres), margen operativo 13.1% máximo histórico, moat triple (logística, AWS, Prime/ads). Valuación razonable: forward ~25.5x, muy por debajo de sus promedios de 5a (~47-58x) y 10a (~72x). Descuento solo por la intensidad de capital ($200B capex)."},"sentimiento":{"score":78,"just":"Consenso Strong Buy 63/4/0 con target $312.99 (+25% upside) y flujo de notas constructivo en jun-jul (TD Cowen $340, Wells Fargo $312). Ventas de insiders (Jassy ~$25M en 6 meses, entidad Bezos $60.6M) son vía 10b5-1 y rutinarias, pero 0 compras; resta un poco por expectativas ya muy cargadas."},"riesgo":{"score":65,"just":"Mega-cap de $2.69T con liquidez máxima y beta moderada, lo que acota el riesgo estructural; pero hay evento binario a 12 días (earnings 30-jul), drawdown reciente de -19% ($278 a $226) y exposición a un ciclo de capex de $200B más ~$1B de costos Leo en Q2. Riesgo acotado pero no bajo en el corto plazo."},"conviccion":{"score":82,"just":"Catalizadores concretos y fechados: earnings 30-jul-2026 con Prime Day en Q2, lanzamiento de Leo en 2H 2026 (396 satélites ya en órbita), pipeline de IA (FDE $1B, AgentCore). Tesis falsable con umbral claro: AWS >=28% valida, <26% invalida. Asimetría favorable con forward P/E bajo vs historia propia."}},"sources":["stockanalysis.com / TradingEconomics — precio, rango 52s, market cap (16-jul-2026)","CNBC — AWS earnings Q1 2026 (29-abr-2026)","Tickeron / TIKR — recap Q1 2026 y guidance (abr-may-2026)","stockanalysis.com / TipRanks / MarketBeat — consenso y price targets (jul-2026)","aboutamazon.com — fecha earnings Q2 (30-jul-2026)","CNBC / TechCrunch — AWS unidad FDE $1B (30-jun-2026)","NAI500 / Technobezz — Project Leo 396 satélites (jul-2026)","AltIndex / Investing.com / TipRanks / ChartMill / Barchart — técnico (jul-2026)","stockinvest.us — precio y rango mensual (14-jul-2026)","StockTitan / MarketBeat / GuruFocus — Form 4 venta Jassy (4-may-2026)","stockcircle / insiderscreener — insiders may-jul-2026","FinanceCharts / FullRatio / valueinvesting.io — P/E actual, forward e histórico (jun-jul-2026)","TD Cowen vía stockanalysis (8-jul-2026) y Wells Fargo vía watcher.guru (26-jun-2026)"],"change":{"day":-0.98,"week":0.13},"events":[{"date":"2026-07-30","label":"Resultados Q2 2026 (after close)","kind":"earnings"}]},{"ticker":"TSLA","company":"Tesla, Inc.","statsList":[["Precio","$378.93 (21-jul-2026)"],["Rango 52 sem.","$297.82 – $498.83"],["Market cap","$1.47T"],["P/E","346x TTM / ~193-211x forward"],["Target consenso","$400.59 (29 analistas) / $425.49 (47 analistas)"],["Próx. earnings","22-jul-2026 (after close)"],["Técnico (auto)","RSI 43.3 · MACD -6.14 / señal -3.37 (TradingView, 21-jul-2026)"]],"sections":{"resumen":"Tesla llega a su reporte del **22 de julio de 2026** con momentum operativo fuerte (entregas Q2 de 480,126 vehículos, +25% a/a, un beat de ~18% sobre consenso, y récord de 13.5 GWh de almacenamiento) pero con la acción corrigiendo: cayó ~7% el 2 de julio pese al beat y cotiza a $380, bajo sus medias de 50 y 200 días. LECTURA: el mercado ya no paga por los autos sino por la tesis de autonomía (robotaxi/Optimus), y a 346x earnings TTM el margen de error es mínimo. La tesis es de alto riesgo/alta opcionalidad con catalizador inmediato en el earnings de Q2.","fundamental":"- HECHO: Q1 2026 (reportado 22-abr-2026, CNBC/Electrek/SEC 8-K): revenue $22.39B (+16% a/a, bajo el consenso), EPS non-GAAP $0.41 vs $0.34 esperado (beat ~21%), margen bruto automotriz 21.1% vs 16.2% un año antes (impulsado por menores costos de materiales, mejores ASP y partidas one-time de garantías/aranceles). Servicios +42% a/a a $3.75B con 1.28M suscripciones FSD activas.\n- HECHO: Entregas Q2 2026 (IR de Tesla, 2-jul-2026): 480,126 vehículos entregados (+25% a/a, +34% t/t), >450,000 producidos, 13.5 GWh de storage desplegados — mejor Q2 de su historia (Tesla Oracle, 15-jul-2026). Guidance 2026: capex >$25B (subido desde $20B) para cómputo IA, fábricas de Optimus, líneas de Cybercab y Megapack 3; sin guidance explícito de entregas/EPS.\n- HECHO: Consenso para Q2 2026 (Zacks/IR Tesla, jul-2026): EPS ~$0.47-0.50 y revenue ~$24.7-27.6B según la fuente.\n\nLECTURA: El negocio reaceleró (crecimiento de entregas de doble dígito, márgenes recuperándose, energía en récord) tras el bache de 2024-25. Pero parte de la mejora de márgenes de Q1 fue one-time, y la pregunta clave del 22-jul es si el margen automotriz sostiene ~21% con el volumen récord. El moat real hoy es la escala en EV+energía+datos de conducción; la competencia de BYD en precio (~$10,000 por un EV completo, según análisis citados por Yahoo/TradingKey) limita el poder de precios en el hardware.","valuacion":"- HECHO: P/E TTM ~346x (Yahoo Finance/MacroTrends, 14-16-jul-2026), vs promedio propio de 12 meses de 314x. Forward P/E entre 192.65x (GuruFocus, 15-jul-2026) y ~210x (finbox). GuruFocus lo clasifica 'significantly overvalued', peor que el 98% de su sector.\n- HECHO: Price targets: promedio $400.59 con máx $600 y mín $24.86 (TipRanks, 29 analistas, jul-2026); $407.41 (StockAnalysis, 33 analistas); $425.49 con rating 'Buy' (S&P Global, 47 analistas). El mín de $24.86 es un outlier extremo — la dispersión $25-$600 es de las mayores del S&P 500.\n- HECHO: la acción ha cotizado entre ~40x y >300x en su historia (MacroTrends); hoy está en la parte alta de su propio rango.\n\nLECTURA: Contra peers automotrices (P/E de un dígito) o incluso megacaps de IA (~30-40x), Tesla cotiza como una opción sobre robotaxi/Optimus, no como automotriz. El upside al target promedio (~$400-425) es de solo +5-12% desde $380: el consenso NO ve asimetría favorable a este precio.","tecnico":"- HECHO: Precio $380.04 (18-jul-2026), tras caer ~7-8% el 2-jul-2026 (peor día en un año, Forbes/CryptoBriefing) pese al beat de entregas.\n- HECHO: Las fuentes técnicas divergen en los valores exactos: SMA50 entre $387.51 y $409.19 y SMA200 entre $408.95 y $418.14 (ChartMill/Investing.com, 18-jul-2026) — en todos los casos el precio actual está **por debajo de ambas medias**. RSI(14) ~55 (neutral) según una fuente (fecha exacta no verificable con precisión).\n- HECHO: Soporte citado en $380 y zona $400.88-406.19 (ya perdida); resistencia en $423.94-428.04 y $445 (ChartMill/Investtech).\n\nLECTURA: Estructura de corto plazo bajista: ruptura del soporte $400-406, precio bajo ambas medias móviles y a -24% del máximo de 52 semanas ($498.83). El $380 es el nivel a defender; perderlo abre camino hacia la parte baja del rango anual ($298). Marco mayor: sigue dentro de un rango amplio $298-499 — lateral-volátil más que tendencia definida. El earnings del 22-jul será el resolutor direccional.","catalizadores":"**Catalizadores:**\n\n- **22-jul-2026 — Resultados Q2 2026** (after close). Foco: sostenibilidad del margen automotriz ~21% y comentarios de robotaxi.\n- **H2 2026 — Expansión robotaxi sin supervisión:** ya activo en Austin (ene-2026) y Dallas/Houston (abr-2026); plan para Phoenix, Miami, Orlando, Tampa y Las Vegas; Musk promete red 'widespread' en EEUU a fin de 2026 (CNBC, 22-ene-2026).\n- **2026 — Producción en volumen de Cybercab, Tesla Semi y Megapack 3;** líneas de Optimus instalándose en Fremont (guidance Q1, abr-2026).\n- **Fin 2027 — Venta de Optimus al público** (Musk).\n\n**Riesgos (por materialidad):**\n\n- **Valuación extrema:** 346x TTM / ~200x forward — cualquier decepción en márgenes o en el timeline de autonomía puede comprimir el múltiplo violentamente (el -7% del 2-jul con buenas noticias lo ilustra).\n- **Ejecución robotaxi vs Waymo:** Waymo ya hace >500,000 viajes pagados/semana sin supervisión (jun-2026); si Tesla no cierra la brecha, la prima de autonomía se erosiona.\n- **Competencia en precio:** BYD vende EVs completos a ~$10,000; presión estructural sobre márgenes de hardware.\n- **Regulatorio/seguridad:** primer accidente fatal del Tesla Semi en Nevada (fines jun-2026, Forbes) — riesgo de escrutinio sobre todo el programa autónomo.\n- **Riesgo-Musk/gobernanza:** concentración de la tesis en una persona; su paquete accionario (ejercicio de 304M de opciones, jun-2026) diluye y concentra control.","sentimiento":"- HECHO: Consenso 'Hold' en TipRanks: 10 buy / 16 hold / 3 sell (29 analistas, jul-2026); S&P Global más constructivo ('Buy', 47 analistas). Últimas acciones (14-jul-2026): Morgan Stanley mantuvo equal-weight; Barclays y Wells Fargo también actualizaron.\n- HECHO: Insiders: venta neta de ~-$26.8M en 90 días, con ventas por $128.7M y cero compras (InsiderScreener/MarketBeat, jul-2026); CFO Taneja vendió 2,606 acciones por $1.05M el 5-jun-2026; Musk ejerció 303.96M opciones a $23.34 con pago de impuestos de 17.5M acciones el 16-jun-2026 (SEC Form 4, 17-jun-2026) — retención, no venta discrecional.\n- HECHO: Tono de noticias 30-60 días: mixto — positivo en operación (mejor Q2 de la historia, récord de energía), negativo en reacción de precio (peor día en un año el 2-jul) y en seguridad (accidente fatal del Semi). Motley Fool (6-8-jul-2026): 'noticias fantásticas, pero no corras a comprar'.\n\nLECTURA: Sentimiento genuinamente dividido: los datos operativos son buenos pero el mercado ya los tenía en precio y el consenso sell-side está neutral con upside limitado al target. Las ventas de insiders son modestas en escala relativa pero la ausencia total de compras y el rating 'Hold' mayoritario confirman falta de convicción institucional a estos múltiplos.","conclusion":"La tesis alcista funciona si el 22-jul Tesla muestra que el margen automotriz ~21% es estructural (no one-time) y si en H2 2026 la red robotaxi escala a las 7+ ciudades prometidas con métricas de viajes comparables a Waymo — eso validaría el múltiplo de ~200x forward y reabriría el camino a los targets altos ($500-600). La tesis se invalida si: (a) el margen Q2 recae hacia 16-17% (confirmaría que Q1 fue contable, no operativo), (b) el despliegue robotaxi se retrasa o sufre un evento de seguridad tipo Semi-Nevada que congele la expansión regulatoria, o (c) el precio pierde $380 y luego la zona $340-350, señalando que el mercado recorta la prima de autonomía. Con upside de solo +5-12% al target promedio y soportes rotos, la asimetría de corto plazo es desfavorable; la posición racional es esperar el earnings o exigir precios más cerca de $340 para construir posición."},"scores":{"tecnica":{"score":40,"just":"Precio ($380.04, 18-jul-2026) bajo la SMA50 y la SMA200 según todas las fuentes consultadas, tras el peor día en un año (-7%, 2-jul) y con la zona de soporte $400-406 perdida. RSI ~55 neutral evita lectura de sobreventa; marco mayor lateral dentro de $298-499 — bajista de corto plazo, no colapso."},"fundamental":{"score":55,"just":"Negocio reacelerando con hechos duros: entregas +25% a/a en Q2, margen automotriz 21.1% en Q1 (vs 16.2%), energía en récord y servicios +42%. Pero la valuación (346x TTM, ~200x forward, 'significantly overvalued' según GuruFocus) consume todo el mérito: negocio sólido con valuación muy exigente, y parte de la mejora de márgenes fue one-time."},"sentimiento":{"score":45,"just":"Consenso 'Hold' (10/16/3 en TipRanks, jul-2026) con Morgan Stanley en equal-weight (14-jul); venta neta de insiders (-$26.8M en 90 días, cero compras) y tono de prensa dividido: operación récord pero sell-off del 7% y accidente fatal del Semi. Dividido con sesgo levemente negativo en el margen."},"riesgo":{"score":32,"just":"Liquidez máxima (megacap $1.47T) pero volatilidad muy alta (-7% en un día con buenas noticias), drawdown de -24% desde máximos ya en curso, evento binario inminente (earnings 22-jul) y tesis dependiente de un múltiplo de ~200x forward y de resultados regulatorios de robotaxi. Riesgo mal acotado a este precio."},"conviccion":{"score":62,"just":"Catalizadores concretos y fechados: earnings 22-jul-2026, expansión robotaxi a 7 ciudades en 2026, Cybercab/Megapack 3 en producción este año. La tesis es falsable (margen Q2, métricas de viajes vs Waymo, soporte $380), pero la asimetría es desfavorable: upside de solo +5-12% al target consenso desde $380."}},"sources":["Yahoo Finance / StockAnalysis — cotización TSLA (18-jul-2026)","CNBC / Electrek / Teslarati — resultados Q1 2026 (22-abr-2026)","SEC 8-K Tesla — exhibit 99.1 Q1 2026 (abr-2026)","Tesla IR — Q2 2026 Production & Deliveries (2-jul-2026)","Forbes — caída 8% post-entregas (2-jul-2026)","TradingKey / TIKR — análisis caída post-deliveries (jul-2026)","TipRanks / StockAnalysis / S&P Global — ratings y price targets (jul-2026)","GuruFocus — forward P/E 192.65x (15-jul-2026)","MacroTrends / Yahoo Finance — P/E TTM ~346x (14-16-jul-2026)","ChartMill / Investing.com / Investtech — técnico SMA/RSI/soportes (18-jul-2026)","InsiderScreener / MarketBeat / SEC Form 4 — insiders (jun-jul-2026)","CNBC — Musk robotaxi 'widespread' EEUU fin 2026 (22-ene-2026)","Tesla Oracle — mejor Q2 de la historia (15-jul-2026)","Zacks vía Yahoo Finance — preview Q2 2026 (jul-2026)","Motley Fool — cobertura entregas y preview (6-8-jul-2026)"],"change":{"day":2.53,"week":-0.5},"events":[{"date":"2026-07-22","label":"Resultados Q2 2026 (after close)","kind":"earnings"}]},{"ticker":"CCU","company":"Compañía Cervecerías Unidas S.A.","statsList":[["Precio","$5.450 CLP (21-jul-2026)"],["Rango 52 sem.","$4.947 – $6.598 CLP"],["Listado","Bolsa de Santiago: CCU (IPSA) · ADR NYSE: CCU US$11,25"],["Market cap","~CLP 1,95-2,0 billones (US$2,06B vía ADR)"],["P/E · EV/EBITDA","17,3x trailing / ~15x fwd · EV/EBITDA 8,7x"],["Dividend yield","~3,0% (div. definitivo $74,53 pagado abr-2026)"],["Target consenso","$5.877 CLP (+11%) — 2 buy / 4 hold / 4 sell"],["Próx. earnings","6-ago-2026 (2T26)"],["Técnico (auto)","RSI 64.5 · MACD +30.12 / señal +5.07 (TradingView, 21-jul-2026)"]],"change":{"day":3.42,"week":4.45},"sections":{"resumen":"CCU llega a julio 2026 como un claro rezagado del rally chileno: mientras el IPSA encadena máximos históricos, la acción opera ~20% bajo su máximo de 52 semanas ($6.598) tras un año bajista, aunque en las últimas semanas construye una base sobre los $5.000 con el MACD recién cruzado al alza. La tesis tiene tres patas: un negocio en Chile que opera muy bien (EBITDA +13,7% en 1T26, margen 20%, viento a favor del peso fuerte), dos lastres visibles (Argentina con EBITDA −18,6% y Vinos con −50,1%) y una valuación ~20% por debajo de su promedio histórico de 10 años. El consenso es tibio (Hold/Neutral, target $5.877) pero con dispersión extrema: BICE ve +52% ($7.794) y UBS recomienda vender ($4.750). Catalizadores inmediatos: resultados 2T26 el 6-ago y las primeras señales del nuevo CEO Eduardo Ffrench-Davis, que asumió el 1-jul con foco declarado en márgenes y eficiencia.","fundamental":"**Resultados 1T26** (reportados 6/7-may-2026):\n\n- HECHO: Ventas consolidadas CLP 819.515 millones (+0,2% a/a); EBITDA CLP 131.644 millones (+0,1%), margen estable en 16,1%; utilidad controladora CLP 53.856 millones (−6,8%, ~US$58M); UPA CLP 145,8; volúmenes consolidados +1,8% (press release 1Q26 / TipRanks / La Tercera, may-2026).\n- HECHO — **Chile, el motor**: ventas +3,9%, EBITDA +13,7% a CLP 107.357 millones, margen 20,0% (+173 pb), ayudado por la apreciación del CLP de 8,1% vs USD (menores costos dolarizados) y volúmenes +3,9% liderados por categorías no alcohólicas (press release 1Q26, may-2026).\n- HECHO — **Negocios Internacionales** (Argentina, Bolivia, Paraguay, Uruguay): ventas −6,7%, EBITDA −18,6% a CLP 28.489 millones; volúmenes −1,7% con caída de un dígito medio en cerveza en Argentina (press release 1Q26).\n- HECHO — **Vinos**: ventas −7,2%, EBITDA −50,1% a CLP 3.288 millones (margen −508 pb) por mayor costo del vino y sobreoferta global (~US$19B de inventario excedente en la industria) (press release 1Q26; DF, 12-jun-2026).\n- HECHO: TTM en USD (ADR): revenue US$3,13B (−2,2%), utilidad neta US$121,8M (−32,0%); ROE 7,3-7,9%; Deuda/Patrimonio 0,71x (StockAnalysis 20-jul-2026; Visfin jul-2026).\n\n**Propiedad y movimientos corporativos:**\n\n- HECHO: IRSA controla el 65,87% de CCU; IRSA es JV 50/50 entre Quiñenco y Heineken. Free float: 20,04% local + 14,09% ADR (ccuinvestor.com, 2026).\n- HECHO: CCU completó la compra de la participación de Nestlé en el JV de aguas por US$180 millones (DF, 12-jun-2026).\n- HECHO: Eduardo Ffrench-Davis asumió como CEO el 1-jul-2026 tras 28 años de Patricio Jottar, quien pasa al directorio; Alexandre Carreteiro (presidente de Heineken Américas) fue nombrado vicepresidente del directorio (TipRanks, jul-2026).\n- LECTURA: el negocio chileno (dos tercios del EBITDA) está en su mejor momento de márgenes en años; el problema de CCU no es operacional en su core, sino la exposición a Argentina y al ciclo global del vino. La mayor injerencia de Heineken en el directorio puede traer disciplina de márgenes o tensión con Quiñenco — sin evidencia de conflicto por ahora.","valuacion":"- HECHO: P/E trailing 17,25x local / 16,9-18,4x ADR; forward ~15x (BTG estima 13,3x); EV/EBITDA 8,66x (Investing/Visfin/StockAnalysis, jul-2026).\n- HECHO: la acción transa **~20% por debajo de su promedio de valuación de los últimos 10 años** (DF, 12-jun-2026).\n- HECHO: dividend yield ~3,0% local (dividendo definitivo N°272 de $74,53 por acción pagado desde el 24-abr-2026) (TipRanks/Diario Estrategia, abr-2026).\n- HECHO — targets locales: consenso **$5.877 CLP (+11%)**, máx $6.600, mín $4.365; 2 buy / 4 hold / 4 sell (Investing.com, jul-2026). Casas (DF, 12-jun-2026): **BICE Sobreponderar PO $7.794 (+52%)**, **BTG Neutral PO $6.500**, **UBS Vender PO $4.750** (argumenta crecimiento de ingresos de un dígito hasta 2028).\n- HECHO: ADR consenso Hold, target US$12,46 (+10,8%, 7 analistas) (StockAnalysis, 20-jul-2026).\n- LECTURA: la valuación es el corazón de la tesis alcista — múltiplos comprimidos contra la propia historia con un IPSA que transa ~12% caro vs la suya. Pero el descuento tiene causa: el upside depende de que Argentina y Vinos se normalicen, no del negocio chileno que ya opera bien y está en el precio. La dispersión BICE/UBS (de +52% a −7%) refleja exactamente esa apuesta.","tecnico":"- HECHO: precio $5.285 CLP, +1,28% en la sesión del lunes 20-jul y +1,63% vs 5 ruedas atrás (TradingView tiempo real, 20-jul-2026).\n- HECHO: RSI(14) diario 56,3 — neutral con sesgo alcista; MACD(12,26,9) +12,6 sobre señal −1,0 (histograma +13,6): **cruce alcista reciente** (calculado sobre 130 barras diarias de TradingView, 20-jul-2026).\n- HECHO: precio sobre la SMA20 (~$5.183, +2,0%) y SMA50 (~$5.204, +1,6%), y justo en la SMA100 (~$5.285); bajo la MM200 publicada (~$5.670) (TradingView 20-jul-2026; Visfin jul-2026).\n- HECHO: señal técnica diaria \"Strong Buy\", semanal neutral (Investing.com, jul-2026). Mínimo de 52 semanas $4.947 tocado a inicios de mayo; desde ahí, piso doble en la zona $5.000-5.050 (jun y feb).\n- LECTURA: estructura de base tras 12 meses bajistas (−16,6% en las últimas ~26 semanas). Soportes: $5.183-5.204 (SMA20/50) y $5.000-4.947; resistencias: $5.443 (máximo intradía del 20-jul), $5.670 (MM200) — su recuperación sería la confirmación de cambio de tendencia — y la zona $6.600. El cruce de MACD con RSI aún lejos de sobrecompra deja espacio al rebote, pero mientras siga bajo la MM200 es un rebote dentro de tendencia bajista, no una tendencia alcista nueva.","catalizadores":"- HECHO: **resultados 2T26 el 6-ago-2026** (StockAnalysis, jul-2026). LECTURA: trimestre de invierno, estacionalmente débil en volúmenes; el foco estará en si Chile sostiene margen 20% y en el ritmo de deterioro/mejora argentino.\n- HECHO: **nuevo CEO** Eduardo Ffrench-Davis desde el 1-jul-2026, con prioridad declarada en márgenes y eficiencia; renovación de comités del directorio entre julio y agosto (DF 12-jun-2026; TipRanks jul-2026). LECTURA: primer plan estratégico del nuevo management es el catalizador idiosincrático más cercano.\n- HECHO: **tipo de cambio** — USD/CLP ~926 (14-jul-2026), con el CLP apreciado 8,1% vs USD en 1T26: viento a favor directo en costos dolarizados del segmento Chile (dolarhoy.net; press release 1Q26).\n- HECHO: **insumos** — aluminio LME ~US$3.160-3.200/t con inventarios −43% en el año y déficit proyectado (~930 kt según Macquarie); cebada y lúpulo europeos +12-18% de costo desembarcado en 1T26 (TradingEconomics/AgMetalMiner/Expert Market Research, jul-2026).\n- HECHO: **Argentina** — consumo masivo −3,3% acumulado en 2026, pero inflación mensual desacelerando (<2% proyectado para julio) y expectativa de recuperación gradual del consumo en 2S26 (Bloomberg Línea/Infobae, jun-2026). LECTURA: la recuperación argentina es la opción de mayor convexidad de la tesis.\n- HECHO: **macro Chile** — PIB 1T26 −0,5% a/a, Imacec de mayo −0,9% (quinto retroceso consecutivo), Banco Central recortó el crecimiento 2026 hacia ~1%, riesgo de recesión técnica (Emol/Bloomberg/XTB, mar-jul 2026). LECTURA: el 1T26 se benefició de un consumo chileno que ya no acelera — el viento de cola doméstico se está apagando.","sentimiento":"- HECHO: consenso local Neutral con 2 buy / 4 hold / 4 sell y PO $5.877 (Investing, jul-2026); ADR Hold con target US$12,46 (StockAnalysis, 20-jul-2026). El DF tituló (12-jun-2026): \"Argentina y alta exposición a vinos y cervezas hacen dudar al mercado\".\n- HECHO: noticias de los últimos 45 días — cierre de la compra del JV de aguas a Nestlé (US$180M, jun), cambio de CEO y reordenamiento del directorio con mayor presencia de Heineken (1-jul), y entrada en vigencia de nuevas restricciones a la publicidad de alcohol en Chile el 7-jul-2026.\n- HECHO: contexto IPSA — el índice acumula ~70 máximos históricos en el año, transa ~12% más caro que su historia, con flujos extranjeros récord (US$112M vía el principal ETF en el año) y targets como el de Bci en 12.050 puntos; el optimismo se moderó en julio por el débil crecimiento (DF/Emol/Bloomberg, 2026).\n- LECTURA: el contraste es la historia — el IPSA en máximos mientras CCU está 20% bajo su peak la convierte en uno de los grandes laggards del rally chileno. Eso sostiene el argumento de valuación relativa (BICE), pero 4 de 10 analistas locales recomiendan vender: el mercado no compra la normalización de Argentina y Vinos todavía. Sin datos públicos de posicionamiento institucional o insiders para el papel local.","conclusion":"CCU es una apuesta de valuación y reversión a la media, no de momentum: negocio core chileno en su mejor nivel de márgenes, múltiplos 20% bajo su historia, 3% de yield, y dos lastres (Argentina, Vinos) que explican el descuento y cuya normalización — no garantizada — es el upside. El técnico acompaña por primera vez en meses (cruce de MACD, sobre SMA20/50, doble piso en $5.000) pero la MM200 en $5.670 sigue arriba como techo de la tendencia. Con el consenso en Hold y el IPSA caro, el papel ofrece asimetría razonable bajo $5.300 con soporte claro en $5.000, catalizador fechado el 6-ago (2T26) y la incógnita del plan del nuevo CEO. La señal es **Hold** con sesgo constructivo: para pasar a Buy se necesita recuperar la MM200 y/o evidencia de que Argentina dejó de drenar EBITDA; para venderla, perder los $5.000 que ya defendió dos veces."},"scores":{"tecnica":{"score":60,"just":"Rebote con confirmación: cruce alcista de MACD, RSI 56 con espacio, precio sobre SMA20/50 y doble piso defendido en $5.000. Se descuenta porque sigue bajo la MM200 ($5.670) y 20% bajo el máximo de 52 semanas — es una base dentro de tendencia bajista, aún no una tendencia alcista."},"fundamental":{"score":62,"just":"Chile (dos tercios del EBITDA) con margen 20% y EBITDA +13,7%, balance sano (D/E 0,71x) y valuación 20% bajo su media histórica con 3% de yield. Los lastres pesan: Argentina −18,6% y Vinos −50,1% de EBITDA, utilidad total −6,8% y ROE mediocre (~7,5%)."},"sentimiento":{"score":46,"just":"Consenso tibio con 4 de 10 analistas locales en venta, laggard notorio del rally IPSA y titulares de prensa escépticos (\"hacen dudar al mercado\"). A favor: dispersión de targets con el extremo alcista (BICE +52%) bien argumentado y flujos extranjeros récord hacia la bolsa chilena que eventualmente rotan a rezagados."},"riesgo":{"score":50,"just":"Negocio defensivo de consumo básico con 65% del mercado cervecero chileno y controlador sólido (Quiñenco/Heineken), pero triple exposición adversa: macro chilena deteriorándose (5 Imacec negativos), Argentina sin piso confirmado, sobreoferta global de vino, más costos de aluminio y cebada al alza y nuevas restricciones publicitarias vigentes desde el 7-jul."},"conviccion":{"score":55,"just":"Catalizadores concretos y fechados (2T26 el 6-ago, plan del nuevo CEO, recuperación argentina en 2S26) y tesis falsable con niveles claros ($5.000 abajo, MM200 $5.670 arriba). La convicción es media porque el timing de la normalización de Argentina y Vinos es incierto y el consenso lleva meses sin comprarla."}},"sources":["TradingView — BCS:CCU tiempo real, 130 barras diarias; RSI/MACD/SMA calculados (20-jul-2026)","Investing.com — cotización local, consenso 2/4/4, PO $5.877, P/E, yield (jul-2026)","StockAnalysis.com — ADR CCU, targets, forward P/E, EV/EBITDA, earnings 6-ago (20-jul-2026)","Visfin.cl — MM50/200, ROE, D/E (jul-2026)","CCU Investor — Press Release 1Q26 (6-may-2026)","TipRanks — resultados 1T26; transición CEO/directorio; dividendo abr-2026 (may-jul 2026)","La Tercera/Pulso — utilidad 1T26 US$58M (may-2026)","Diario Financiero — POs BICE $7.794 / BTG $6.500 / UBS $4.750; compra JV aguas Nestlé US$180M (12-jun-2026)","ccuinvestor.com / Quiñenco — estructura de propiedad IRSA 65,87% (2026)","Bloomberg Línea / Infobae — consumo Argentina −3,3% 2026, inflación desacelerando (jun-2026)","Bloomberg / Emol / XTB — macro Chile: Imacec, riesgo de recesión técnica, gobierno Kast (mar-jul 2026)","TradingEconomics / AgMetalMiner — aluminio LME, déficit proyectado (jul-2026)","Expert Market Research / Mordor — mercado cervecero Chile: CCU ~65%, ABI ~30% (2025-2026)","Senado.cl / La Tercera — Ley 21.363: restricciones publicidad alcohol desde 7-jul-2026","dolarhoy.net — USD/CLP 926 (14-jul-2026)"],"events":[{"date":"2026-08-06","label":"Resultados 2T26","kind":"earnings"}]},{"ticker":"CMPC","company":"Empresas CMPC S.A.","statsList":[["Precio","$1.083,9 CLP (21-jul-2026)"],["Rango 52 sem.","$1.015 – $1.599 CLP"],["Listado","Bolsa de Santiago: CMPC (IPSA) — grupo Matte"],["Market cap","CLP 2,68 billones (~US$2.900M)"],["P/E · P/B · EV/EBITDA","16,3x trailing / 15,3x fwd · P/B 0,28x · EV/EBITDA 7,9x"],["Deuda neta / EBITDA","4,1x (1T26) — rating S&P BBB- desde mar-2026"],["Dividend yield","~0,9% (US$0,0105/acción pagado may-2026)"],["Target consenso","JPM $1.100 (jul) vs agregadores $1.513-1.712 (rezagados)"],["Próx. earnings","6-ago-2026 (2T26)"],["Técnico (auto)","RSI 53.7 · MACD +6.13 / señal +2.27 (TradingView, 21-jul-2026)"]],"change":{"day":-0.38,"week":1.3},"sections":{"resumen":"CMPC es la gran castigada del IPSA: mientras el índice marca máximos históricos (~11.500 puntos), la papelera del grupo Matte acumula −20% en 12 meses y tocó a inicios de julio un mínimo de 4 años ($1.031), del que rebota tímidamente hacia $1.076. El castigo tiene tres causas concretas: un ciclo de celulosa deprimido (precio promedio −17% en 2025, sobreoferta global), un balance cargado (deuda neta/EBITDA 4,1x, S&P la rebajó a BBB−, a un escalón del grado especulativo) y el megaproyecto Natureza en Brasil (US$4.600M) cuyo financiamiento tiene al mercado apostando a un aumento de capital dilutivo. A favor: P/B de 0,28x — se paga 28% del valor libro —, Softys creciendo EBITDA +20%, un plan de desinversión de US$1.000-1.500M con JPMorgan, y el dato nuevo de julio: el DF reporta que mejoran las expectativas de celulosa para el 2S26, lo que explica el rebote. Es una apuesta de ciclo con balance apretado: alta convexidad si la celulosa repunta, riesgo real de dilución si no.","fundamental":"**Resultados 1T26** (reportados 8-may-2026; cifras en USD):\n\n- HECHO: ventas US$1.817M (planas a/a, bajo el consenso de US$1.850M); EBITDA ajustado US$255M (−8,1% a/a), margen 14,1% (−1 pp); **utilidad neta US$25M, −50,2% a/a** por menores envíos de celulosa, mayor costo energético (guerra en Medio Oriente), menor valorización forestal y más gastos financieros (DF / La Tercera / Investing, 8-may-2026).\n- HECHO — por segmento: **Celulosa** ventas US$731M, golpeada por mantenciones programadas y no programadas en Guaíba (menor producción, mayor cash cost); **Softys** (tissue) ventas US$835M con EBITDA US$97M (+20% a/a) por eficiencias; **Biopackaging** US$247M con recuperación de márgenes (slides 1T26, may-2026).\n- HECHO: producción de celulosa 987 mil ton; ventas BEKP 799 mil ton (−11% a/a, menores exportaciones a China); cash cost BEKP US$262/ton, BSKP US$400/ton; capex US$185M (+24% a/a) (slides 1T26).\n- HECHO — **balance**: deuda total US$5.915M, caja US$900M, deuda neta US$5.015M → **DFN/EBITDA 4,1x** (vs 3,41x en mar-2025). Guía del call: EPS US$0,01 en 2T26 y US$0,02 en 3T26 con normalización progresiva del apalancamiento (transcript 1T26, may-2026).\n- HECHO: **S&P rebajó el rating de BBB a BBB−** el 2-mar-2026 (un escalón sobre grado especulativo) por desapalancamiento lento, celulosa −17% en 2025, competencia en tissue en Brasil/México e incertidumbre por Natureza; proyecta EBITDA 2026 de US$1.200-1.300M y ~3,0x (La Tercera, 2-mar-2026).\n\n**Proyecto Natureza (Rio Grande do Sul, Brasil):**\n\n- HECHO: inversión US$4.500-4.600M — la mayor inversión chilena en el exterior —, 2,5M ton/año de BEKP, ~US$400M ya invertidos, decisión de construcción dentro de 2026 y operación hacia 2029. Hitos: permiso federal del terminal portuario (ene-2026, acto con Lula) y licencia ambiental preliminar del terminal Rio Grande (jun-2026) (DF / Argentina Forestal / La Tercera, 2026).\n- HECHO — financiamiento: desinversión de activos forestales/inmobiliarios por US$1.000-1.500M asesorada por JPMorgan (incluye Bosques del Plata en Argentina, >94.000 ha); colocó bonos híbridos por UF 7M (~US$312M) a fines de junio con mejor spread que el debut, y prepara hasta UF 10M más; **el mercado especula con un aumento de capital** (Argentina Forestal 17-jun-2026; DF jun-2026).\n- HECHO: dividendo definitivo US$0,0105/acción pagado desde el 12-may-2026; política 2026 de payout 30%; yield ~0,9% (Diario Estrategia / StockAnalysis, 2026).\n- LECTURA: el 1T26 fue un trimestre de transición con Guaíba en mantención — lo operativo debiera mejorar en 2T/3T —, pero el problema estructural es que con EBITDA deprimido, 4,1x de leverage y US$4.600M de capex por delante, la matemática solo cierra con ventas de activos exitosas o dilución. Softys es la joya silenciosa del cuadro.","valuacion":"- HECHO (StockAnalysis, 20-jul-2026): P/E trailing 16,3x / forward 15,3x; **P/B 0,28x**; EV/EBITDA 7,9x; EV/Ventas 1,13x; beta 0,17.\n- HECHO — targets con dispersión enorme: **JPMorgan Neutral, PO $1.100 a dic-2026** (el más fresco, citado por DF el 17-jul-2026, tras recortes previos desde $1.600); **MBI sobreponderar, PO $2.077** (recortado desde $2.417, upside >50%); agregadores: Investing $1.513 (máx $2.807 / mín $1.089), MarketScreener $1.712 (3 comprar / 2 vender), TradingView ~$1.754 (4 comprar / 8 mantener / 0 vender) — con fechas de corte no publicadas.\n- LECTURA: el P/B de 0,28x es el dato más llamativo — típico de fondo de ciclo más descuento por apalancamiento y riesgo de dilución. El EV/EBITDA ~8x NO es barato porque el EBITDA está deprimido: la acción es una apuesta a normalización de EBITDA, no a múltiplo bajo. El consenso de agregadores ($1.500-1.750) luce rezagado frente al PO de julio de JPMorgan ($1.100, prácticamente el precio actual): el sell-side fresco no ve upside sin repunte de celulosa. Los targets altos descansan en normalización + desinversión sin dilución.","tecnico":"- HECHO: precio $1.076,5 CLP, +0,61% en la sesión del lunes 20-jul pero **−2,93% vs 5 ruedas atrás** (TradingView tiempo real, 20-jul-2026).\n- HECHO: RSI(14) diario 52,2 — neutral; MACD(12,26,9) +5,0 sobre señal +1,1 (histograma +3,8), positivo tras el rebote desde $1.031 (calculado sobre 130 barras diarias de TradingView, 20-jul-2026). Investing.com publica RSI 46,5 y señal \"venta fuerte\" por medias móviles (1 compra / 11 ventas) (jul-2026).\n- HECHO: precio sobre la SMA20 (~$1.059, +1,6%) y SMA50 (~$1.071, +0,5%), pero −5,3% bajo la SMA100 (~$1.137) y lejos de los niveles de inicio de año ($1.480): −27% en ~26 semanas (TradingView, 20-jul-2026).\n- LECTURA: tendencia de fondo claramente bajista con rebote incipiente de julio. Soportes: $1.059-1.071 (SMA20/50) y la zona crítica **$1.015-1.031** (mínimo de 52 semanas y de 4 años — perderla abriría un tramo bajista nuevo). Resistencias: $1.094-1.110 (cierres de la semana pasada y SMA100 en $1.137) y luego $1.180. Ojo: los niveles \"soporte $1.500 / resistencia $2.500\" que circulan en ideas antiguas de TradingView están obsoletos, son previos al derrumbe. El rebote es de expectativas (celulosa 2S26), no de confirmación técnica: bajo la SMA100 y con las medias largas vendedoras, sigue siendo un intento de piso, no un cambio de tendencia.","catalizadores":"- HECHO: **resultados 2T26 el 6-ago-2026** (Investing, jul-2026). LECTURA: con Guaíba normalizada tras las mantenciones, el mercado buscará cash cost a la baja y confirmación de la guía (EPS US$0,01).\n- HECHO — **celulosa, el driver dominante**: en China la fibra corta promedia RMB 4.417/ton (10-jul-2026) con julio como temporada baja, papeleras comprando lo mínimo e inventarios altos (SunSirs); NBSK lista en EE.UU. cayó a US$1.570/t en mayo por sobreoferta (Fastmarkets, 5-jun-2026). Referencias 2026: Fitch proyecta BEKP US$625/t promedio; BTG estimaba US$575-600/t neto China (dic-2025).\n- HECHO: el DF reporta (17-jul-2026) que **mejoran las expectativas de celulosa para el 2S26**, con efecto anticipado en Arauco y CMPC — es lo que explica el rebote desde $1.031. LECTURA: es el catalizador que mueve la aguja; si la temporada alta china (sept-oct) no convalida, el rebote se deshace.\n- HECHO — **plan de desinversión**: US$1.000-1.500M en activos no estratégicos (Chile, Brasil, Argentina) con JPMorgan; decisión final de construcción de Natureza esperada dentro de 2026 (Argentina Forestal / DF, jun-2026). LECTURA: un cierre exitoso de ventas de activos sin aumento de capital sería el catalizador idiosincrático más potente; lo contrario (aumento de capital) es el mayor riesgo de corto plazo.\n- HECHO — **oferta rival**: Arauco alcanzará 5,2M ton (MAPA ~85% de utilización) y construye Sucuriú en Brasil (US$4.600M, ~70% de avance); Suzano presiona precios — es la base del Neutral de JPMorgan (DF, 17-jul-2026).\n- HECHO: USD/CLP ~926-932 en julio (dolarhoy/Wise). LECTURA: a diferencia de CCU, un peso fuerte es viento en CONTRA para CMPC (exportadora con costos en CLP e ingresos en USD).","sentimiento":"- HECHO: recomendaciones divididas — JPMorgan Neutral PO $1.100 (jul-2026), MBI sobreponderar PO $2.077, MarketScreener 3 comprar / 2 vender, agregador TradingView 4 comprar / 8 mantener / 0 vender. Sin notas frescas de BTG/Santander/BICE/LarrainVial en las fuentes consultadas.\n- HECHO — noticias de los últimos 30 días: colocación de híbridos por ~US$312M con mejor spread (fines jun), licencia ambiental del terminal de Natureza (23-jun), JPMorgan liderando la desinversión con el mercado apostando a aumento de capital (17-jun), y la nota del DF sobre el repunte de expectativas de celulosa (17-jul).\n- HECHO — contexto: IPSA en máximos históricos (~11.500 pts), inversión extranjera en Chile en récord (US$46.987M de stock de no residentes, más del doble que 2024), bolsa ~12% más cara que su historia (DF/Emol, 2026).\n- LECTURA: sentimiento negativo-a-neutral con giro incipiente. CMPC es de las pocas grandes del IPSA en rojo a 12 meses (−20%) en un mercado eufórico — el flujo extranjero récord aún no rota hacia ella porque el riesgo de aumento de capital mantiene cautos a los institucionales. El rebote de julio es de expectativas, no de resultados: frágil pero con combustible si el 2S26 convalida, porque el posicionamiento en el papel es liviano.","conclusion":"CMPC es la apuesta cíclica profunda del panel chileno: 0,28x valor libro, −33% desde el rango alto de 52 semanas, en mínimos de 4 años hace tres semanas, con el driver (precio de la celulosa) posiblemente girando al alza en el 2S26 según las expectativas que recoge el DF. Pero el balance no perdona: 4,1x deuda neta/EBITDA, rating a un escalón del grado especulativo y US$4.600M de Natureza por financiar hacen que la tesis dependa de que TODO salga razonablemente bien — celulosa arriba, activos vendidos a buen precio, sin dilución. La asimetría es atractiva para perfiles tolerantes al riesgo (si el ciclo gira, el recorrido a los targets de $1.500-2.000 es enorme), pero el PO fresco de JPMorgan ($1.100) dice que el sell-side no ve upside inmediato. La señal es **Caution**: especulativa de ciclo, no de calidad. Gatillos para subirla a Hold/Buy: celulosa china repuntando en la temporada alta (sept-oct), cierre de desinversiones sin aumento de capital, o 2T26 (6-ago) con cash cost mejorando. Gatillo de salida: perder los $1.015-1.031."},"scores":{"tecnica":{"score":45,"just":"Rebote incipiente con MACD positivo y precio sobre SMA20/50 tras defender el mínimo de 4 años en $1.031, pero la tendencia de fondo sigue bajista: −5,3% bajo la SMA100, −27% en 6 meses, y las medias largas en señal de venta (1 compra / 11 ventas según Investing). Intento de piso, no cambio de tendencia."},"fundamental":{"score":40,"just":"Utilidad −50% en 1T26, EBITDA deprimido por el ciclo de celulosa, leverage de 4,1x con rating BBB− a un escalón del especulativo y US$4.600M de Natureza por financiar. Lo rescatable: Softys con EBITDA +20%, P/B de 0,28x, guía de mejora secuencial y un plan de desinversión de US$1.000-1.500M en marcha."},"sentimiento":{"score":45,"just":"Gran rezagada del IPSA en un mercado en máximos, con el sell-side fresco (JPMorgan $1.100) sin ver upside y el mercado apostando a un aumento de capital dilutivo. El giro de expectativas de celulosa del 2S26 (DF, 17-jul) y el posicionamiento liviano dan combustible al rebote si se convalida."},"riesgo":{"score":30,"just":"El perfil de riesgo más alto del panel chileno: apalancamiento 4,1x, rating al borde del grado especulativo, ciclo de celulosa en sobreoferta con Arauco y Suzano agregando capacidad, riesgo de dilución por Natureza, shock de costos energéticos e incendios/Araucanía recurrentes (61 siniestros en la última temporada, mitad intencionales)."},"conviccion":{"score":40,"just":"Tesis falsable con niveles y fechas claras (soporte $1.015-1.031, 2T26 el 6-ago, temporada alta china sept-oct, decisión de Natureza en 2026), pero de baja probabilidad compuesta: exige simultáneamente repunte de celulosa, desinversión exitosa y no-dilución. Apta solo como posición especulativa dimensionada."}},"sources":["TradingView — BCS:CMPC tiempo real, 130 barras diarias; RSI/MACD/SMA calculados (20-jul-2026)","Diario Financiero — repunte de expectativas de celulosa 2S26; PO JPMorgan $1.100 (17-jul-2026)","Diario Financiero / La Tercera — resultados 1T26: utilidad −50% (8-may-2026)","Investing.com — slides y transcript 1T26; earnings 6-ago; technicals (may-jul 2026)","La Tercera/Pulso — S&P rebaja a BBB− (2-mar-2026)","StockAnalysis.com — P/B 0,28x, EV/EBITDA 7,9x, market cap (snapshot 20-jul-2026)","Argentina Forestal — plan Natureza, desinversión con JPMorgan, licencia terminal portuario (may-jun 2026)","Diario Financiero — bonos híbridos UF 7M (~US$312M) y preparación de UF 10M (jun-2026)","Diario Financiero — MBI recorta PO a $2.077, mantiene sobreponderar (2026)","SunSirs — pulpa fibra corta China RMB 4.417/t, temporada baja (10-14-jul-2026)","Fastmarkets — NBSK EE.UU. US$1.570/t lista, sobreoferta (5-jun-2026)","Diario Estrategia — dividendo definitivo US$0,0105 pagado 12-may-2026","Yahoo Finance — rango 52 semanas CMPC.SN (jul-2026)","MarketScreener — consenso $1.712, 3 comprar / 2 vender (jul-2026)","Diario Financiero / Emol — IPSA en máximos, inversión extranjera récord US$46.987M (2026)","BioBioChile — incendios en predios CMPC, 84 brigadas temporada 2025-26 (dic-2025 / ene-2026)"],"events":[{"date":"2026-08-06","label":"Resultados 2T26 (foco: cash cost con Guaíba normalizada)","kind":"earnings"}]},{"ticker":"EUR/USD","company":"Euro / Dólar","baseCurrency":"EUR","statsList":[["Precio","1.13993 (21-jul-2026)"],["Rango 80 días","1.133 – 1.182"],["Tasas BCE / Fed","2,25% / 3,50–3,75%"],["COT EUR (14-jul)","-12,605 netos (corto)"],["DXY","100.76 (17-jul-2026)"],["Próximo evento","BCE 23-jul · FOMC 28-29-jul"],["Técnico (auto)","RSI 41.8 · MACD -0.00 / señal -0.00 (TradingView, 21-jul-2026)"]],"change":{"day":0.01,"week":-0.33},"customSections":[{"title":"Resumen ejecutivo","nav":"Resumen","body":"EUR/USD cerró la semana en **1.14382**, dentro de un rango contenido tras una caída de ~4% desde los máximos de abril (~1.182) y un rebote desde los mínimos de junio (~1.133). El cuadro es de **equilibrio inestable con sesgo de cautela**:\n\n- **HECHO:** El diferencial de tasas sigue siendo claramente favorable al USD (Fed Funds 3.50–3.75% vs. tasa de depósito BCE 2.25%), aunque el BCE **subió** 25 pb en junio mientras la Fed está en pausa — el diferencial se está cerrando en el margen a favor del EUR.\n- **HECHO:** La semana entrante es de alto riesgo de evento: **reunión del BCE el jueves 23-jul** (mercado descuenta ~95% de mantención) y **FOMC el 28-29-jul** (~87–89% de mantención).\n- **HECHO:** Los especuladores están **netos cortos en EUR** (-12,605 contratos, COT al 14-jul-2026), aunque recortando cortos.\n- **LECTURA:** Los riesgos de cola (guerra en Medio Oriente y shock energético asimétrico contra Europa, reapertura de la disputa arancelaria EEUU-UE, crisis política/energética en Francia) recaen desproporcionadamente sobre el EUR.\n\n**Señal resultante: Caution (Grado C — 46/100).** Sin ventaja clara para comprar EUR; el par sigue siendo un rango 1.133–1.155 dominado por bancos centrales y geopolítica.\n\n---"},{"title":"Diferencial de tasas y política monetaria","nav":"Tasas","body":"**BCE (HECHO):**\n- Tasa de depósito vigente: **2.25%**, tras una **subida de 25 pb decidida en la reunión de junio (17-jun-2026)** en respuesta a la presión inflacionaria derivada del shock energético (ECB / Trading Economics, jul-2026).\n- Próxima reunión: **jueves 23-jul-2026** (decisión 13:45 CET, conferencia de Lagarde 14:30 CET) — es decir, **sí hay reunión la semana del 20-jul**. Es reunión sin proyecciones de staff.\n- Expectativas de mercado: **~95.3% de mantención en 2.25%**, con una cola alcista de ~3.4% para +25 pb (rateprobability.com / ecb-watch, consultado 19-jul-2026).\n- Tono de Lagarde: **hawkish**. El 2-jul defendió la subida de junio citando proyecciones de inflación en torno al 3% para 2026 y la necesidad de mantenerse vigilante (ECB Forum Sintra, jul-2026).\n\n**Fed (HECHO):**\n- Rango objetivo vigente: **3.50%–3.75%**; en junio el FOMC mantuvo y señaló que la inflación sigue elevada respecto de la meta del 2% (core PCE ~2.9%).\n- FOMC 28-29-jul-2026: **~89% de probabilidad de mantención** según CME FedWatch (~86.7% según fuentes alternativas al 18-jul-2026). Consenso: tasas sin cambios al menos hasta el otoño boreal, condicionado a progreso en inflación.\n- Tono del presidente de la Fed, Kevin Warsh (Sintra, 1-jul-2026): sin señales para julio, pero \"los precios están demasiado altos\" — sesgo restrictivo.\n\n**Divergencia (LECTURA):** El **nivel** del diferencial (~125–150 pb en tasas de política; 2 años: UST 4.16% vs. Schatz ~2.6–2.8%) favorece al USD y sostiene el carry en contra del EUR. Pero la **dirección** favorece marginalmente al EUR: el BCE está subiendo (y conserva cola hawkish) mientras la Fed está estática. Riesgo señalado por estrategas: que el mercado retire el tightening del BCE antes que el de la Fed, limitando el alza del EUR (VT Markets, jul-2026).\n\n---"},{"title":"Balanza de pagos y flujos","nav":"Balanza","body":"**Cuenta corriente (HECHO):**\n- Superávit de la eurozona de **€25 mil millones en mayo-2026** (+€8 mm m/m): bienes +€16 mm, servicios +€14 mm, renta primaria +€12 mm, renta secundaria -€18 mm (BCE, 17-jul-2026).\n- Acumulado 12 meses a mayo-2026: **€272 mm (1.7% del PIB)**, frente a €318 mm (2.0% del PIB) un año antes — **superávit en contracción**, principalmente por menor superávit de bienes (de €350 mm a €286 mm) (BCE, 17-jul-2026).\n- Proyección del staff del Eurosistema (jun-2026): caída adicional a **~1.3% del PIB en 2026** por mayores precios de importación de energía a raíz de la guerra en Medio Oriente (ECB Economic Bulletin, 2026).\n\n**Flujos de portafolio 2026 (HECHO/LECTURA):**\n- HECHO: La rotación hacia Europa de comienzos de año **se revirtió a mitad de 2026**: la porción de flujos de ETFs de renta variable de EEUU hacia fondos centrados en EEUU subió todos los meses del año, alcanzando ~85% en junio (iShares H1-2026). En Europa, los flujos hacia productos centrados en EEUU se **cuadruplicaron** interanual (Morningstar, 2026). En money markets, USD fue la clasificación más comprada (+€15.98 mm) mientras los fondos EUR registraron salidas (-€5.06 mm) (Lipper/LSEG, may-2026).\n- LECTURA: El colchón estructural de cuenta corriente sigue siendo un soporte de fondo para el EUR, pero se erosiona por energía, y los flujos de portafolio han vuelto a favorecer activos en USD por el atractivo relativo de las tasas americanas. Neto: **levemente negativo para el EUR**.\n\n---"},{"title":"Posicionamiento","nav":"Posicionamiento","body":"**HECHO — CFTC COT, Euro FX (CME), datos al martes 14-jul-2026, publicado 17-jul-2026 (Tradingster/CFTC):**\n- No comerciales (especuladores): largos 230,307 / cortos 242,912 → **neto -12,605 contratos (corto)**.\n- Variación semanal: +6,877 largos, +3,255 cortos → **neto +3,622 hacia largo** (los cortos se están recortando).\n- Interés abierto: 799,495 contratos — mercado profundo y líquido.\n- Tendencia de meses: el neto largo de ~+21,000 contratos de marzo-2026 (percentil 15 del rango de 52 semanas, mínimo de 1 año) se ha degradado hasta territorio **neto corto** (AhaSignals/Investing.com, 2026).\n\n**LECTURA:** Posicionamiento levemente bajista en EUR pero **cercano a plano y mejorando** — no hay extremo de posicionamiento que genere señal contraria potente en ninguna dirección. Un BCE hawkish el 23-jul podría forzar cobertura de cortos (riesgo alcista táctico); la señal estructural es neutral-negativa.\n\n---"},{"title":"Análisis técnico","nav":"Técnico","body":"**HECHO — TradingView (17-jul-2026):**\n- Precio: **1.14382**.\n- RSI(14) diario: **47.2** — neutral.\n- MACD(12,26): **-0.0025** vs. señal **-0.0036**; histograma **+0.0011** — momentum bajista moderándose.\n- Medias: precio **sobre SMA20 (1.1414)** pero **bajo SMA50 (1.1530)**.\n- Ventana 80 días: caída desde máximos ~**1.182** (abril) hasta mínimos ~**1.133** (junio); rebote reciente a ~1.148 y cierre 1.1438.\n\n**LECTURA:**\n- La estructura de mediano plazo sigue siendo **correctiva/bajista** (máximos y mínimos decrecientes desde abril; precio bajo SMA50), pero el rebote desde 1.133 con histograma MACD al alza y recuperación de la SMA20 sugiere que la caída **perdió fuerza**.\n- Soportes: 1.1414 (SMA20), luego 1.133 (mínimo de junio — pivote clave). Resistencias: 1.148 (techo del rebote), 1.1530 (SMA50), luego zona 1.16.\n- Un cierre diario sobre la SMA50 (~1.153) convertiría el rebote en cambio de tendencia; la pérdida de 1.133 reactivaría el tramo bajista hacia 1.12. Con RSI en 47 y precio entre medias, el veredicto técnico es **neutral** (par ni alcista ni bajista con convicción).\n\n---"},{"title":"Intervención y riesgo de banco central","nav":"Intervención","body":"**HECHO/LECTURA:** El riesgo de intervención cambiaria **directa** en EUR/USD es históricamente bajo (última intervención coordinada relevante: 2000/2011); ni el BCE ni el Tesoro de EEUU han señalado nada en 2026 a los niveles actuales. El riesgo relevante es **de cola**:\n\n1. **Energía / Medio Oriente (HECHO):** Tras los ataques de Israel-EEUU contra Irán (28-feb-2026) y la disrupción del Estrecho de Ormuz (~1/5 del suministro global de GNL afectado), el gas europeo opera en ~€46/MWh; los escenarios de crisis prolongada de la Comisión Europea/JRC contemplan petróleo hasta ~USD 180/bbl y gas ~€80/MWh en 4T-2026 (JRC, may-2026; Bloomberg, 9-jul-2026). **LECTURA:** shock asimétricamente negativo para el EUR (Europa importadora neta; EEUU exportador de energía).\n2. **Aranceles EEUU-UE (HECHO):** El acuerdo provisional del 20-may-2026 (arancel máximo ~15% a productos UE) coexiste con amenazas de Trump de tarifas \"mucho más altas\" si no se ratifica, reabriendo la guerra comercial (ING, Euronews, 2026). **LECTURA:** riesgo bajista para crecimiento europeo y EUR.\n3. **Política europea (HECHO):** Crisis política y presupuestaria en Francia, con hoja de ruta energética bloqueada y reactores nucleares parados por olas de calor (Energynews/MNI, 2026). **LECTURA:** prima de riesgo político latente en activos EUR.\n\n**Balance:** riesgo de intervención bajo, pero **riesgo de cola elevado y sesgado en contra del EUR**.\n\n---"},{"title":"Correlaciones macro","nav":"Correlaciones","body":"- **DXY (HECHO):** 100.76 al 17-jul-2026, prácticamente plano en la sesión (Trading Economics/FXStreet). Con EUR ~58% del índice, la correlación inversa DXY–EUR/USD **se mantiene plenamente operativa**: el estancamiento del DXY sobre 100 es el espejo del rango 1.13–1.15 del par.\n- **Diferencial de bonos (HECHO):** UST 10a **4.55%** vs. Bund 10a **3.14%** → spread ~**141 pb** a favor de EEUU (17-jul-2026). En 2 años: UST **4.16%** (16-jul) vs. Schatz **~2.6–2.8%** (máximo desde jul-2024) → ~140–155 pb.\n- **LECTURA:** El spread 10a se ha comprimido desde niveles de 2024–25 (>180 pb) por la subida de los Bunds (BCE hawkish + fiscal alemán), coherente con un EUR/USD que dejó de caer. La correlación negativa entre spread UST–Bund y EUR/USD **se mantiene**; para que el par supere 1.155 de forma sostenida se requeriría compresión adicional del diferencial (BCE subiendo o Fed girando dovish), que hoy no está descontada para julio.\n\n---"},{"title":"Conclusión","nav":"Conclusión","body":"EUR/USD en 1.14382 es un par **en rango, sin ventaja direccional clara**: el carry y los riesgos de cola favorecen al USD; la dirección de la política monetaria (BCE subiendo, Fed en pausa) y un posicionamiento corto en corrección dan soporte táctico al EUR. La semana del 20-jul (BCE 23-jul) y el FOMC del 28-29-jul definirán el próximo tramo.\n\n**Qué validaría una tesis alcista en EUR (Buy EUR):** sorpresa hawkish del BCE el 23-jul y/o giro dovish de la Fed el 29-jul; cierre diario sobre la SMA50 (~1.1530) con compresión del spread UST–Bund bajo ~130 pb; distensión en Medio Oriente (gas < €40/MWh) y ratificación limpia del acuerdo arancelario; COT cruzando a neto largo.\n\n**Qué la invalidaría (riesgo bajista):** pérdida del mínimo de junio (1.133), que abriría 1.12; escalada en Ormuz con petróleo hacia $150–180/bbl y gas hacia €80/MWh, o ruptura arancelaria EEUU-UE; Fed re-hawkish con BCE forzado a pausar; agravamiento de la crisis política francesa con ampliación de spreads OAT–Bund.\n\n> *Este informe es una herramienta de investigación educativa generada con IA. No constituye asesoría de inversión ni recomendación de compra/venta. Verifique todos los datos de forma independiente antes de tomar decisiones financieras.*"}],"scoreIndex":8,"customCats":[{"key":"tasas","name":"Diferencial de Tasas y Política Monetaria","weight":30},{"key":"macro","name":"Fundamentales Macro","weight":20},{"key":"tecnico","name":"Técnico","weight":20},{"key":"posicionamiento","name":"Posicionamiento y Sentimiento","weight":15},{"key":"intervencion","name":"Riesgo de Intervención / Cola","weight":15}],"scores":{"tasas":{"score":48,"just":"El nivel del diferencial (~125–150 pb en política y en 2 años) sigue pagando por estar en USD, pero la dirección (BCE subió en junio con cola hawkish para el 23-jul; Fed estática) cierra la brecha en el margen. Neutral con leve sesgo negativo por el carry."},"macro":{"score":45,"just":"Superávit de cuenta corriente aún sólido (€272 mm, 1.7% PIB) pero en contracción por energía, y flujos de portafolio rotando de vuelta a EEUU. El shock energético golpea más el crecimiento europeo que el americano."},"tecnico":{"score":50,"just":"RSI 47.2 neutral, MACD bajista moderándose, precio sobre SMA20 pero bajo SMA50 dentro de una estructura correctiva desde abril (TradingView, 17-jul). Ni alcista ni bajista con convicción: rango."},"posicionamiento":{"score":47,"just":"COT al 14-jul: especuladores netos cortos -12,605 contratos, aunque recortando desde el neto largo de marzo. Levemente negativo, sin extremo contrario."},"intervencion":{"score":40,"just":"Riesgo de intervención directa bajo, pero colas gruesas y asimétricas contra el EUR: guerra Irán/energía (escenarios de $180/bbl), reapertura arancelaria EEUU-UE y crisis política francesa."}},"sources":["TradingView (17-jul-2026, técnico verificado en tiempo real)","ECB — decisiones de política monetaria (jun-2026), balanza de pagos mayo-2026 (17-jul-2026), Economic Bulletin","rateprobability.com / ecb-watch (19-jul-2026)","Finance Calendar — reunión BCE 23-jul-2026","Trading Economics — tasas eurozona, DXY, Bund 10a, Schatz 2a","CME FedWatch / centralbank.watch","CNBC — Warsh en Sintra (1-jul-2026)","VT Markets (jul-2026)","iShares H1-2026","Morningstar","Lipper/LSEG (may-2026)","Tradingster/CFTC — COT Euro FX (14-jul-2026)","AhaSignals / Investing.com","FXStreet (17-jul-2026)","Advisor Perspectives — UST 10a (17-jul-2026)","JRC Comisión Europea (27-may-2026)","Bloomberg — gas europeo (9-jul-2026)","ING THINK","Euronews (may-2026)","Energynews/MNI (2026)"],"events":[{"date":"2026-07-23","label":"Reunión del BCE","kind":"macro"},{"date":"2026-07-29","label":"FOMC 28-29 jul — decisión de tasas de la Fed","kind":"macro"}]}]</script>
